### YamlMime:PowerShellCmdlet1
uid: ADCSDeployment.Install-AdcsOnlineResponder
name: Install-AdcsOnlineResponder
module: ADCSDeployment
isPreview: false
summary: |-
  Installs the Online Responder service.
description: |-
  The **Install-AdcsOnlineResponder** cmdlet installs the Online Responder service, which provides Online Certificate Status Protocol (OSCP) services.
  To remove the role service, use the **Uninstall-AdcsOnlineResponder** cmdlet.

  You can import the cmdlet by running the following commands from Windows PowerShell:

  - `Import-Module ServerManager`
  - `Add-WindowsFeature Adcs-Online-Cert`
notes: |-
  * Ensure you run Windows PowerShell as an administrator. You can use the *Force* parameter to bypass the prompt for confirmation.
  To see parameters, run the following command: `Install-AdcsOnlineResponder -?`
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PSCredential** object for the Online Responder service.
      To obtain a credential object, use the **Get-Credential** cmdlet.
      For more information, type `Get-Help Get-Credential`.
      You can install the Online Responder role service only on servers that are members of Active Directory Domain Services (AD DS) domains.
      If you are installing an online responder configured to use a standalone certification authority (CA), then an account that is a member of the local Administrators group of the target server is required.
      If you are installing an online responder to target an Enterprise CA, then an account that is a member of the Domain Admins group is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Install-AdcsOnlineResponder
        [-Force]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSCredential" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.CertificateServices.Deployment.Commands.OCSP.OnlineResponderResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Install the Online Responder role service'
  description: |-
    ```
    PS C:\> Install-AdcsOnlineResponder
    ```

    This command installs the Online Responder role service.
- title: 'Example 2: Force the installation of the Online Responder role service'
  description: |-
    ```
    PS C:\> Install-AdcsOnlineResponder -Force
    ```

    This command forces the installation of the Online Responder role service.
