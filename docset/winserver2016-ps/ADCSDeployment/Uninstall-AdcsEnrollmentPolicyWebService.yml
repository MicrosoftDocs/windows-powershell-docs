### YamlMime:PowerShellCmdlet1
uid: ADCSDeployment.Uninstall-AdcsEnrollmentPolicyWebService
name: Uninstall-AdcsEnrollmentPolicyWebService
module: ADCSDeployment
isPreview: false
summary: |-
  Uninstalls the Certificate Enrollment Policy Web service.
description: |-
  The **Uninstall-AdcsEnrollmentPolicyWebService** cmdlet uninstalls the Certificate Enrollment Policy (CEP) Web Service.
notes: |-
  * Ensure you run Windows PowerShell as an administrator. You can use the *Force* parameter to bypass the prompt for confirmation.
parameters:
  cmdletParameters:
  - name: AllPolicyServers
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet uninstall all instances of the CEP Web Service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallAll
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthenticationType
    type: <xref href="AuthenticationType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication type for the CEP Web Service instance to be uninstalled when multiple instances are present.
    acceptedValues:
    - Kerberos
    - UserName
    - Certificate
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallSingleInstance
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: KeyBasedRenewal
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet uninstalls the instance of the CEP Web Service running in key-based renewal mode.
      This parameter is optional.
      It is used to distinguish which instance of the CEP Web Service is to be uninstalled if there are multiple instances that use the same authentication type.
      If this option is not specified, the instance of the CEP Web Service that is using the defined AuthenticationType that is not enabled for KeyBasedRenewal mode is uninstalled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallSingleInstance
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-AdcsEnrollmentPolicyWebService
        -AuthenticationType <AuthenticationType>
        [-KeyBasedRenewal]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallSingleInstance
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-AdcsEnrollmentPolicyWebService
        [-AllPolicyServers]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallAll
  isDefault: false
inputs:
- name: <xref href="bool, enum, bool" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.CertificateServices.Deployment.Commands.CEP.EnrollmentPolicyServiceResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Uninstall all configuration in the CEP Web Service'
  description: |-
    ```
    PS C:\> Uninstall-AdcsEnrollmentPolicyWebService -AllPolicyServers -Force
    ```

    This command uninstalls all configurations in the CEP Web Service without prompting for confirmation.
- title: 'Example 2: Uninstall an instance of the CEP Web Service'
  description: |-
    ```
    PS C:\> Uninstall-AdcsEnrollmentPolicyWebService -AuthenticationType Certificate -KeyBasedRenewal -Force
    ```

    This command uninstalls the instance of CEP Web Service that is utilizing certificate authentication and is in key-based renewal mode without prompting for confirmation.
