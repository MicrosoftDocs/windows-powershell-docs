### YamlMime:PowerShellCmdlet1
uid: ADCSDeployment.Uninstall-AdcsEnrollmentWebService
name: Uninstall-AdcsEnrollmentWebService
module: ADCSDeployment
isPreview: false
summary: |-
  Uninstalls the Certificate Enrollment Web service or individual instances of it.
description: |-
  The **Uninstall-AdcsEnrollmentWebService** cmdlet uninstalls the Certificate Enrollment Web Service either entirely removing all instances of it or partially by removing individual instances.
notes: |-
  * The application directories are removed from their respective instance folders in the file system. The uninstall command does not remove the Secure Sockets Layer/Transport Layer Security (SSL/TLS) or the secure hypertext transfer protocol (https) bindings.
parameters:
  cmdletParameters:
  - name: AllEnrollmentServices
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet removes all Certificate Enrollment Web Service instances.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallAll
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthenticationType
    type: <xref href="AuthenticationType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication type of the of enrollment services instance to be uninstalled.
    acceptedValues:
    - Kerberos
    - UserName
    - Certificate
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallSingleInstance
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CAConfig
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the configuration string of the certification authority (CA) for which this cmdlet uninstalls enrollment services.
      This parameter is used to identify which instance of the Certificate Enrollment Web Service is to be uninstalled when multiple are present.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UninstallSingleInstance
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-AdcsEnrollmentWebService
        -CAConfig <String>
        -AuthenticationType <AuthenticationType>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallSingleInstance
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-AdcsEnrollmentWebService
        [-AllEnrollmentServices]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallAll
  isDefault: false
inputs:
- name: <xref href="string,enum,bool" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.CertificateServices.Deployment.Commands.CES.EnrollmentServiceResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Uninstall all Enrollment Web Service role services'
  description: |-
    ```
    PS C:\> Uninstall-AdcsEnrollmentWebService -AllEnrollmentServices -Force
    ```

    This command uninstalls all the Enrollment Web Service role services without prompting for confirmation.
- title: 'Example 2: Uninstall an Enrollment Web Service role service using the specified CA'
  description: |-
    ```
    PS C:\> Uninstall-AdcsEnrollmentWebService -CAConfig "APP1.corp.contoso.com\corp-APP1-CA" -AuthenticationType Certificate
    ```

    This command uninstalls the Certificate Enrollment Web Service using the CA specified by the configuration named APP1.corp.contoso.com\corp-APP1-CA.
    The CA configuration is the CA Computer Name and CA common name separated by a backslash.
    The authentication type in use is Certificate.
