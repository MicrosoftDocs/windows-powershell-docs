syntaxes:
- syntax: |-
    ```Syntax
    Disable-AdfsEndpoint
        [[-TargetAddressPath] <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Address
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-AdfsEndpoint
        [-TargetEndpoint] <Endpoint>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TargetObject
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-AdfsEndpoint
        [-TargetFullUrl] <Uri>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FullUrl
  isDefault: false
inputs:
- name: <xref href="Microsoft.IdentityServer.PowerShell.Resources.Endpoint" data-throw-if-not-resolved="False" />
  description: |-
    A class that represents an endpoint for the Federation Service.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable an endpoint'
  description: |-
    ```
    PS C:\> Disable-AdfsEndpoint -TargetAddressPath "/adfs/services/trust/13/Windows"
    ```

    This command disables the WS-Trust 1.3 endpoint on the current federation server.
