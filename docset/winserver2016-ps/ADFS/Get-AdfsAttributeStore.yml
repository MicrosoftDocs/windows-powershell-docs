### YamlMime:PowerShellCmdlet1
uid: ADFS.Get-AdfsAttributeStore
name: Get-AdfsAttributeStore
module: ADFS
isPreview: false
summary: |-
  Gets the attribute stores of the Federation Service.
description: |-
  The **Get-AdfsAttributeStore** cmdlet gets an attribute store of the Federation Service.
  If you do not specify any parameters, the cmdlet gets all attribute stores of the Federation Service.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of attribute stores that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsAttributeStore
        [[-Name] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    A string object is received by the *Name* parameter.
outputs:
- name: <xref href="Microsoft.IdentityServer.Management.Resources.AttributeStore" data-throw-if-not-resolved="False" />
  description: |-
    Returns one or more AttributeStore objects that represent the attribute stores of the Federation Service.
