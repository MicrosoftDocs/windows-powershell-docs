uid: ADFS.Get-AdfsCertificateAuthority
name: Get-AdfsCertificateAuthority
module: ADFS
isPreview: false
summary: |-
  Gets a certificate authority.
description: |-
  The **Get-AdfsCertificateAuthority** cmdlet gets a certificate authority in Active Directory Federation Services (AD FS).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsCertificateAuthority
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.IdentityServer.Management.Resources.AdfsCertificateAuthority" data-throw-if-not-resolved="False" />
  description: |-
    Returns an AdfsCertificateAuthority object that represents the certificate authority of the Federation Service.
