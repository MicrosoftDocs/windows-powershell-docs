### YamlMime:PowerShellCmdlet1
uid: ADFS.Get-AdfsScopeDescription
name: Get-AdfsScopeDescription
module: ADFS
isPreview: false
summary: |-
  Gets a description for a scope in AD FS.
description: |-
  The **Get-AdfsScopeDescription** cmdlet gets scope descriptions that represent the scope of access granted to resources and applications in Active Directory Federation Services (AD FS).
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of scope description to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsScopeDescription
        [[-Name] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    String objects are received by the *Name* parameter.
outputs:
- name: <xref href="Microsoft.IdentityServer.Management.Resources.OAuthScopeDescription" data-throw-if-not-resolved="False" />
  description: |-
    Returns one or more OAuthScopeDescription objects that represent the scope descriptions for the Federation Service.
