syntaxes:
- syntax: |-
    ```Syntax
    Grant-AdfsApplicationPermission
        [-ClientRoleIdentifier] <String>
        [-ServerRoleIdentifier] <String>
        [[-ScopeNames] <String[]>]
        [-Description <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientRoleIdentifier
  isDefault: true
- syntax: |-
    ```Syntax
    Grant-AdfsApplicationPermission
        [-ServerRoleIdentifier] <String>
        [[-ScopeNames] <String[]>]
        [-AllowAllRegisteredClients]
        [-Description <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PermitAllRegisteredClients
  isDefault: false
