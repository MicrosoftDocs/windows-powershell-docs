syntaxes:
- syntax: |-
    ```Syntax
    Set-AdfsClient
        [-TargetName] <String>
        [-Force]
        [-ClientId <String>]
        [-Name <String>]
        [-RedirectUri <String[]>]
        [-Description <String>]
        [-ADUserPrincipalName <String>]
        [-JWTSigningCertificate <X509Certificate2[]>]
        [-JWTSigningCertificateRevocationCheck <RevocationSetting>]
        [-ChangeClientSecret]
        [-ResetClientSecret]
        [-JWKSUri <Uri>]
        [-ReloadJWTSigningKeys]
        [-JWKSFile <String>]
        [-LogoutUri <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
