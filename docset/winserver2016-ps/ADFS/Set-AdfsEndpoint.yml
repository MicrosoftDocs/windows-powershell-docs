examples:
- title: 'Example 1: Set an endpoint'
  description: |-
    ```
    PS C:\> Set-AdfsEndpoint -TargetAddressPath "/adfs/services/trust/13/Windows" -Proxy $True
    ```

    This command sets the WS-Trust 1.3 endpoint for proxy use.
