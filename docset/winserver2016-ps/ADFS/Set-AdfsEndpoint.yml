syntaxes:
- syntax: |-
    ```Syntax
    Set-AdfsEndpoint
        [[-TargetAddressPath] <String>]
        -Proxy <Boolean>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Address
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AdfsEndpoint
        -TargetEndpoint <Endpoint>
        -Proxy <Boolean>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TargetObject
  isDefault: false
- syntax: |-
