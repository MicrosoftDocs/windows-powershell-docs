syntaxes:
- syntax: |-
    ```Syntax
    Set-AdfsLocalClaimsProviderTrust
        -TargetClaimsProviderTrust <LocalClaimsProviderTrust>
        [-AcceptanceTransformRules <String>]
        [-AcceptanceTransformRulesFile <String>]
        [-Name <String>]
        [-Notes <String>]
        [-OrganizationalAccountSuffix <String[]>]
        [-Force]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AdfsLocalClaimsProviderTrust
        -TargetIdentifier <String>
        [-AcceptanceTransformRules <String>]
        [-AcceptanceTransformRulesFile <String>]
        [-Name <String>]
        [-Notes <String>]
        [-OrganizationalAccountSuffix <String[]>]
        [-Force]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Identifier
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AdfsLocalClaimsProviderTrust
        -TargetName <String>
        [-AcceptanceTransformRules <String>]
        [-AcceptanceTransformRulesFile <String>]
        [-Name <String>]
        [-Notes <String>]
        [-OrganizationalAccountSuffix <String[]>]
        [-Force]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierName
  isDefault: false
