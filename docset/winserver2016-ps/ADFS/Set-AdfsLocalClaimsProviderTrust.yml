### YamlMime:PowerShellCmdlet1
uid: ADFS.Set-AdfsLocalClaimsProviderTrust
name: Set-AdfsLocalClaimsProviderTrust
module: ADFS
isPreview: false
summary: |-
  Modifies a local claims provider trust.
description: |-
  The **Set-AdfsLocalClaimsProviderTrust** cmdlet modifies a local claims provider trust.
  For more information, see the **Add-AdfsLocalClaimsProviderTrust** cmdlet.
parameters:
  cmdletParameters:
  - name: AcceptanceTransformRules
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the set of claim rules to configure on the local claims provider trust.
      These rules determine the information that is accepted from the partner represented by the local claims provider trust.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AcceptanceTransformRulesFile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path of a file that contains the set of claim rules to configure on the local claims provider trust.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the local claims provider trust.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Notes
    type: <xref href="String" data-throw-if-not-resolved="False" />
