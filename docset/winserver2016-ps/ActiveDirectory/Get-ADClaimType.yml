### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.Get-ADClaimType
name: Get-ADClaimType
module: ActiveDirectory
isPreview: false
summary: |-
  Returns a claim type from Active Directory.
description: |-
  The **Get-ADClaimType** cmdlet returns a claim type defined in Active Directory.
parameters:
  cmdletParameters:
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.

      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user account credentials to use to perform this task.
      The default credentials are the credentials of the currently logged on user unless the cmdlet is run from an Active Directory module for Windows PowerShell provider drive.
      If the cmdlet is run from such a provider drive, the account associated with the drive is the default.

      To specify this parameter, you can type a user name, such as User1 or Domain01\User01 or you can specify a **PSCredential** object.
      If you specify a user name for this parameter, the cmdlet prompts for a password.

      You can also create a **PSCredential** object by using a script or by using the **Get-Credential** cmdlet.
      You can then set the *Credential* parameter to the **PSCredential** object.

      If the acting credentials do not have directory-level permission to perform the task, Active Directory module for Windows PowerShell returns a terminating error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a query string that retrieves Active Directory objects.
      This string uses the PowerShell Expression Language syntax.
      The PowerShell Expression Language syntax provides rich type-conversion support for value types received by the *Filter* parameter.
      The syntax uses an in-order representation, which means that the operator is placed between the operand and the value.
      For more information about the *Filter* parameter, type `Get-Help about_ActiveDirectory_Filter`.

      Syntax:

      The following syntax uses Backus-Naur form to show how to use the Windows PowerShell Expression Language for this parameter.

      \<filter\>  ::= "{" \<FilterComponentList\> "}"

      \<FilterComponentList\> ::= \<FilterComponent\> | \<FilterComponent\> \<JoinOperator\> \<FilterComponent\> | \<NotOperator\>  \<FilterComponent\>

      \<FilterComponent\> ::= \<attr\> \<FilterOperator\> \<value\> | "(" \<FilterComponent\> ")"

      \<FilterOperator\> ::= "-eq" | "-le" | "-ge" | "-ne" | "-lt" | "-gt"| "-approx" | "-bor" | "-band" | "-recursivematch" | "-like" | "-notlike"

      \<JoinOperator\> ::= "-and" | "-or"

      \<NotOperator\> ::= "-not"

      \<attr\> ::= \<PropertyName\> | \<LDAPDisplayName of the attribute\>

      \<value\>::= \<compare this value with an \<attr\> by using the specified \<FilterOperator\>\>

      For a list of supported types for \<value\>, see about_ActiveDirectory_ObjectModel.

      Note: PowerShell wildcards other than *, such as ?, are not supported by the *Filter* syntax.

      Note: To query using Lightweight Directory Access Protocol (LDAP) query strings, use the *LDAPFilter* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Filter
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Identity
    type: <xref href="ADClaimType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Active Directory object by providing one of the following property values.
      The identifier in parentheses is the LDAP display name for the attribute.The acceptable values for this parameter are:

      - A distinguished name
      - A GUID (objectGUID)

      This parameter can also get this object through the pipeline or you can set this parameter to an object instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LDAPFilter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an LDAP query string that is used to filter Active Directory objects.
      You can use this parameter to run your existing LDAP queries.
      The *Filter* parameter syntax supports the same functionality as the LDAP syntax.
      For more information, see the *Filter* parameter description or type `Get-Help about_ActiveDirectory_Filter`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LdapFilter
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Properties
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the properties of the output object to retrieve from the server.
      Use this parameter to retrieve properties that are not included in the default set.

      Specify properties for this parameter as a comma-separated list of names.
      To display all of the attributes that are set on the object, specify * (asterisk).

      To specify an individual extended property, use the name of the property.
      For properties that are not default or extended properties, you must specify the LDAP display name of the attribute.

      To retrieve properties and display them for an object, you can use the Get-* cmdlet associated with the object and pass the output to the **Get-Member** cmdlet.
    aliases:
    - Property
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResultPageSize
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of objects to include in one page for an Active Directory Domain Services query.

      The default is 256 objects per page.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Filter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: LdapFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResultSetSize
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of objects to return for an Active Directory Domain Services query.
      If you want to receive all of the objects, set this parameter to $Null (null value).
      You can use Ctrl+C to stop the query and return of objects.

      The default is $null.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Filter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: LdapFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Active Directory Domain Services instance to connect to, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following:  Active Directory Lightweight Domain Services, Active Directory Domain Services or Active Directory snapshot instance.

      Specify the Active Directory Domain Services instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the *Server* value from objects passed through the pipeline
      - By using the server information associated with the Active Directory Domain Services Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ADClaimType
        -Filter <String>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-ResultPageSize <Int32>]
        [-ResultSetSize <Int32>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Filter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ADClaimType
        [-Identity] <ADClaimType>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Identity
  isDefault: false
- syntax: |-
    ```Syntax
    Get-ADClaimType
        -LDAPFilter <String>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-ResultPageSize <Int32>]
        [-ResultSetSize <Int32>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: LdapFilter
  isDefault: false
inputs:
- name: <xref href="None or Microsoft.ActiveDirectory.Management.ADClaimType" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.ActiveDirectory.Management.ADClaimType" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a list of all claim types using a filter'
  description: |-
    ```
    PS C:\> Get-ADClaimType -Filter *
    ```

    This command retrieves a list of all claim types.
- title: 'Example 2: Get all the claim types that are sourced from the attribute title.'
  description: |-
    ```
    PS C:\> Get-ADClaimType -Filter "SourceAttribute -eq 'title'"
    ```

    This command gets all the claim types that are sourced from the attribute title.
- title: 'Example 3: Get a claim type with a specified display name'
  description: |-
    ```
    PS C:\> Get-ADClaimType -Identity "Employee Type"
    ```

    This command gets the claim type with display name Employee Type.
- title: 'Example 4: Get all properties of a claim type with a specified display name'
  description: |-
    ```
    PS C:\> Get-ADClaimType -Identity "Employee Type" -Properties *
    ```

    This command gets all properties of the claim type with display name Employee Type.
