syntaxes:
- syntax: |-
    ```Syntax
    Get-ADReplicationPartnerMetadata
        [[-Partition] <String[]>]
        [[-PartnerType] <ADPartnerType>]
        [-Target] <Object[]>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-EnumerationServer <String>]
        [-Filter <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Target
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ADReplicationPartnerMetadata
        [[-Partition] <String[]>]
        [[-PartnerType] <ADPartnerType>]
        [-Scope] <ADScopeType>
        [[-Target] <Object[]>]
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-EnumerationServer <String>]
        [-Filter <String>]
        [<CommonParameters>]
    ```
