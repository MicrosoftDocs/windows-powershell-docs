### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.Get-ADTrust
name: Get-ADTrust
module: ActiveDirectory
isPreview: false
summary: |-
  Gets all trusted domain objects in the directory.
description: |-
  The **Get-ADTrust** cmdlet returns all of the trusted domain objects in the directory.
notes: |-
  * This cmdlet does not work with an Active Directory snapshot.
parameters:
  cmdletParameters:
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.

      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user account credentials to use to perform this task.
      The default credentials are the credentials of the currently logged on user unless the cmdlet is run from an Active Directory PowerShell provider drive.
      If the cmdlet is run from such a provider drive, the account associated with the drive is the default.

      To specify this parameter, you can type a user name, such as User1 or Domain01\User01 or you can specify a **PSCredential** object.
      If you specify a user name for this parameter, the cmdlet prompts for a password.

      You can also create a PSCredential object by using a script or by using the **Get-Credential** cmdlet.
      You can then set the *Credential* parameter to the **PSCredential** object.

      If the acting credentials do not have directory-level permission to perform the task, Active Directory PowerShell returns a terminating error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a query string that retrieves Active Directory objects.
      This string uses the PowerShell Expression Language syntax.
      The PowerShell Expression Language syntax provides rich type-conversion support for value types received by the *Filter* parameter.
      The syntax uses an in-order representation, which means that the operator is placed between the operand and the value.
      For more information about the *Filter* parameter, type `Get-Help about_ActiveDirectory_Filter`.

      Syntax:

      The following syntax uses Backus-Naur form to show how to use the PowerShell Expression Language for this parameter.

      \<filter\>  ::= "{" \<FilterComponentList\> "}"

      \<FilterComponentList\> ::= \<FilterComponent\> | \<FilterComponent\> \<JoinOperator\> \<FilterComponent\> | \<NotOperator\>  \<FilterComponent\>

      \<FilterComponent\> ::= \<attr\> \<FilterOperator\> \<value\> | "(" \<FilterComponent\> ")"

      \<FilterOperator\> ::= "-eq" | "-le" | "-ge" | "-ne" | "-lt" | "-gt"| "-approx" | "-bor" | "-band" | "-recursivematch" | "-like" | "-notlike"

      \<JoinOperator\> ::= "-and" | "-or"

      \<NotOperator\> ::= "-not"

      \<attr\> ::= \<PropertyName\> | \<LDAPDisplayName of the attribute\>

      \<value\>::= \<compare this value with an \<attr\> by using the specified \<FilterOperator\>\>

      For a list of supported types for \<value\>, type `Get-Help about_ActiveDirectory_ObjectModel`.

      Note: To query using LDAP query strings, use the *LDAPFilter* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Filter
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Identity
    type: <xref href="ADTrust" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Active Directory object by providing one of the following property values.
      The identifier in parentheses is the LDAP display name for the attribute.
      The acceptable values for this parameter are:

      - A Distinguished Name
      - A GUID (objectGUID)

      The cmdlet searches the default naming context or partition to find the object.
      If two or more objects are found, the cmdlet returns a non-terminating error.

      This parameter can also get this object through the pipeline or you can set this parameter to an object instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Object" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Active Directory input object.
      This parameter can accept one of the following object types:

      - ADForest
      - ADDomain
      - ADObject

      The cmdlet will retrieve the corresponding **ADTrust** based on the input object specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LDAPFilter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an LDAP query string that is used to filter Active Directory objects.
      You can use this parameter to run your existing LDAP queries.
      The *Filter* parameter syntax supports the same functionality as the LDAP syntax.
      For more information, see the *Filter* parameter description or type `Get-Help about_ActiveDirectory_Filter`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LdapFilter
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Properties
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the properties of the output object to retrieve from the server.
      Use this parameter to retrieve properties that are not included in the default set.

      Specify properties for this parameter as a comma-separated list of names.
      To display all of the attributes that are set on the object, specify * (asterisk).

      To specify an individual extended property, use the name of the property.
      For properties that are not default or extended properties, you must specify the LDAP display name of the attribute.

      To retrieve properties and display them for an object, you can use the Get-* cmdlet associated with the object and pass the output to the **Get-Member** cmdlet.
    aliases:
    - Property
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the AD DS instance to connect to, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following: AD LDS, AD DS, or Active Directory snapshot instance.

      Specify the AD DS instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the *Server* value from objects passed through the pipeline
      - By using the server information associated with the AD DS Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ADTrust
        -Filter <String>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Filter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ADTrust
        [-Identity] <ADTrust>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Identity
  isDefault: false
- syntax: |-
    ```Syntax
    Get-ADTrust
        -InputObject <Object>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-ADTrust
        -LDAPFilter <String>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Properties <String[]>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: LdapFilter
  isDefault: false
inputs:
- name: <xref href="None or Microsoft.ActiveDirectory.Management.ADTrust" data-throw-if-not-resolved="False" />
  description: |-
    A trusted domain object is received by the *Identity* parameter.
outputs:
- name: <xref href="Microsoft.ActiveDirectory.Management.ADTrust" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all trusted domain objects in a forest'
  description: |-
    ```
    PS C:\> Get-ADTrust -Filter *
    ```

    This command gets all of the trusted domain objects in the forest.
- title: 'Example 2: Get filtered trusted domain objects'
  description: |-
    ```
    PS C:\> Get-ADTrust -Filter "Target -eq 'corp.contoso.com'"
    ```

    This command gets all the trusted domain objects with corp.contoso.com as the trust partner.
- title: 'Example 3: Get the specified trusted domain object'
  description: |-
    ```
    PS C:\> Get-ADTrust -Identity "corp.contoso.com"
    ```

    This command gets the trusted domain object with name corp.contoso.com.
