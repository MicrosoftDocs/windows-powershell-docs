syntaxes:
- syntax: |-
    ```Syntax
    Set-ADAccountAuthenticationPolicySilo
        [-WhatIf]
        [-Confirm]
        [-AuthenticationPolicy <ADAuthenticationPolicy>]
        [-AuthenticationPolicySilo <ADAuthenticationPolicySilo>]
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Identity] <ADAccount>
        [-PassThru]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
