### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.Set-ADClaimTransformLink
name: Set-ADClaimTransformLink
module: ActiveDirectory
isPreview: false
summary: |-
  Applies a claims transformation to one or more cross-forest trust relationships in Active Directory.
description: |-
  The **Set-ADClaimTransformLink** cmdlet can be used to apply a claims transformation to one or more cross-forest trust relationships in Active Directory.
parameters:
  cmdletParameters:
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.

      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user account credentials to use to perform this task.
      The default credentials are the credentials of the currently logged on user unless the cmdlet is run from an Active Directory module for Windows PowerShell provider drive.
      If the cmdlet is run from such a provider drive, the account associated with the drive is the default.

      To specify this parameter, you can type a user name, such as User1 or Domain01\User01 or you can specify a **PSCredential** object.
      If you specify a user name for this parameter, the cmdlet prompts for a password.

      You can also create a **PSCredential** object by using a script or by using the **Get-Credential** cmdlet.
      You can then set the *Credential* parameter to the **PSCredential** object.

      If the acting credentials do not have directory-level permission to perform the task, Active Directory module for Windows PowerShell returns a terminating error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Identity
    type: <xref href="ADTrust" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Active Directory group object by providing one of the following values.
      The identifier in parentheses is the Lightweight Directory Access Protocol (LDAP) display name for the attribute.
      The acceptable values for this parameter are:

      - A distinguished name
      - A GUID (objectGUID)

      This parameter can also get this object through the pipeline or you can set this parameter to an object instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="ADClaimTransformPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the claims transformation policy to apply to the cross-forest trust relationship.
      This parameter does not receive pipeline input.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Active Directory Domain Services instance to connect to, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following:  Active Directory Lightweight Domain Services, Active Directory Domain Services or Active Directory snapshot instance.

      Specify the Active Directory Domain Services instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the *Server* value from objects passed through the pipeline
      - By using the server information associated with the Active Directory Domain Services Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TrustRole
    type: <xref href="ADTrustRole" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a trust role, as an enumeration of the link types.
      Used to specify which links on the trust relationships that the claims transformation apply to.
      The acceptable values for this parameter are:

      - Trusted
      - Trusting
    acceptedValues:
    - Trusted
    - Trusting
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
