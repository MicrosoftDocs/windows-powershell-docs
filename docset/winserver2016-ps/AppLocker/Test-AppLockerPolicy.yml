syntaxes:
- syntax: |-
    ```Syntax
    Test-AppLockerPolicy
        [-XmlPolicy] <String>
        -Path <System.Collections.Generic.List`1[System.String]>
        [-User <String>]
        [-Filter <System.Collections.Generic.List`1[Microsoft.Security.ApplicationId.PolicyManagement.PolicyDecision]>]
        [<CommonParameters>]
    ```
  parameterSetName: ByXmlPolicy
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AppLockerPolicy
        [-XmlPolicy] <String>
        -Packages <System.Collections.Generic.List`1[Microsoft.Windows.Appx.PackageManager.Commands.AppxPackage]>
        [-User <String>]
        [-Filter <System.Collections.Generic.List`1[Microsoft.Security.ApplicationId.PolicyManagement.PolicyDecision]>]
        [<CommonParameters>]
    ```
  parameterSetName: ByXmlPolicyAppx
  isDefault: false
- syntax: |-
    ```Syntax
    Test-AppLockerPolicy
        [-PolicyObject] <AppLockerPolicy>
        -Path <System.Collections.Generic.List`1[System.String]>
        [-User <String>]
        [-Filter <System.Collections.Generic.List`1[Microsoft.Security.ApplicationId.PolicyManagement.PolicyDecision]>]
        [<CommonParameters>]
    ```
  parameterSetName: ByPolicyObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Security.ApplicationId.PolicyManagement.PolicyModel.AppLockerPolicy" data-throw-if-not-resolved="False" />
