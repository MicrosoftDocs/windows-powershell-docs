### YamlMime:PowerShellCmdlet1
uid: Appx.Get-AppxLastError
name: Get-AppxLastError
module: Appx
isPreview: false
summary: |-
  Get the last error reported in the app package installation logs.
description: |-
  The **Get-AppxLastError** cmdlet gets the last error reported in the app package installation logs for the current Windows PowerShell® session.
  An app package has an .msix or .appx file name extension.
syntaxes:
- syntax: |-
    ```Syntax
    Get-AppxLastError
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Diagnostics.Eventing.Reader.EventLogRecord" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the last error'
  description: |-
    ```
    PS C:\> Get-AppxLastError
    ```

    This command gets the last error reported in the app installation logs.
