### YamlMime:PowerShellCmdlet1
uid: Appx.Get-AppxVolume
name: Get-AppxVolume
module: Appx
isPreview: false
summary: |-
  Gets appx volumes for the computer.
description: |-
  The **Get-AppxVolume** cmdlet gets a list of **AppxVolume** objects known to the computer.
  Volumes can be added by the user or a device, for instance, by using Storage Sense.
parameters:
  cmdletParameters:
  - name: Offline
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns only volumes that are currently dismounted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: OfflineParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Online
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns only volumes that are currently mounted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: OnlineParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the mount point of a volume.
      This cmdlet gets a volume at the location that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DefaultParameterSet
      position: "1"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AppxVolume
        [[-Path] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AppxVolume
        [[-Path] <String>]
        [-Online]
        [<CommonParameters>]
    ```
  parameterSetName: OnlineParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AppxVolume
        [[-Path] <String>]
        [-Offline]
        [<CommonParameters>]
    ```
  parameterSetName: OfflineParameterSet
  isDefault: false
outputs:
- name: <xref href="Microsoft.Appx.PackageManager.Commands.AppxVolume" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all the volumes'
  description: |-
    ```
    PS C:\> Get-AppxVolume
    ```

    The command gets all the **AppxVolume** objects on the computer.
- title: 'Example 2: Get the volume at a path'
  description: |-
    ```
    PS C:\> Get-AppxVolume -Path F:\
    ```

    This command gets the **AppxVolume** at the path F:\.
- title: 'Example 3: Get mounted volumes'
  description: |-
    ```
    PS C:\> Get-AppxVolume -Online
    ```

    This command gets only **AppxVolume** objects that are currently mounted on the computer.
- title: 'Example 4: Get volumes that are note mounted'
  description: |-
    ```
    PS C:\> Get-AppxVolume -Offline
    ```

    This command gets the **AppxVolume** objects that not currently mounted on the computer.
