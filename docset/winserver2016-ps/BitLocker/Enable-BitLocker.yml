        -PasswordProtector
        [-EncryptionMethod <BitLockerVolumeEncryptionMethodOnEnable>]
        [-HardwareEncryption]
        [-SkipHardwareTest]
        [-UsedSpaceOnly][-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PasswordProtector
  isDefault: false
