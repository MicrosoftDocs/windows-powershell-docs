    Disable-SbecBcd
        -Path <String[]>
        [-Id <String>]
        [-DismLogPath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Offline
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-SbecBcd
        -ComputerName <String[]>
        [-Credential <PSCredential>]
        [-Id <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Online
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-SbecBcd
        -Session <PSSession[]>
        [-Id <String>]
        [<CommonParameters>]
    ```
  parameterSetName: OnlineSession
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-SbecBcd
        [-Local]
        [-BcdStore <String>]
        [-Id <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Local
  isDefault: false
inputs:
- name: <xref href="None." data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None." data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable BCD'
  description: |-
    ```
    PS C:\> Disable-SbecBcd -Session $MyPSSession
    ```

    This command disables the BCD settings on a remote session.
