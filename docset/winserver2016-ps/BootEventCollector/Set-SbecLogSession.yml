syntaxes:
- syntax: |-
    ```Syntax
    Set-SbecLogSession
        -Session <TraceSessionInfo[]>
        [-Path <Object>]
        [-ClockType <Object>]
        [-BufferSize <Object>]
        [-MinimumBufferCount <UInt32>]
        [-MaximumBufferCount <UInt32>]
        [-MaximumFileSize <Object>]
        [-FlushSeconds <UInt32>]
        [-LogFileMode <Object>]
        [-KernelEnableFlags <Object>]
        [-EnableKd]
        [-DisableKd]
        [-SimulateError <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
- syntax: |-
    ```Syntax
    Set-SbecLogSession
        -Name <String[]>
        [-Path <Object>]
        [-ClockType <Object>]
        [-BufferSize <Object>]
        [-MinimumBufferCount <UInt32>]
        [-MaximumBufferCount <UInt32>]
        [-MaximumFileSize <Object>]
        [-FlushSeconds <UInt32>]
        [-LogFileMode <Object>]
        [-KernelEnableFlags <Object>]
        [-EnableKd]
        [-DisableKd]
        [-SimulateError <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
inputs:
