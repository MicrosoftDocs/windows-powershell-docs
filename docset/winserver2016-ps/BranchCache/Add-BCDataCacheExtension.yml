syntaxes:
- syntax: |-
    ```Syntax
    Add-BCDataCacheExtension
        [[-Path] <String>]
        [[-Percentage] <UInt32>]
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Percentage
  isDefault: true
- syntax: |-
    ```Syntax
    Add-BCDataCacheExtension
        [[-Path] <String>]
        -SizeBytes <UInt64>
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SizeBytes
  isDefault: false
