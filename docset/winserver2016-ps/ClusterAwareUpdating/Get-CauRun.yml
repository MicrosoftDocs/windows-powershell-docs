### YamlMime:PowerShellCmdlet1
uid: ClusterAwareUpdating.Get-CauRun
name: Get-CauRun
module: ClusterAwareUpdating
isPreview: false
summary: |-
  Gets status information about an updating run currently in progress.
description: |-
  The **Get-CauRun** cmdlet gets status information about an updating run currently in progress.
  Use this cmdlet to monitor current updating runs.
parameters:
  cmdletParameters:
  - name: ClusterName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster for which this cmdlet gets the updating run status.
      This parameter is only required when this cmdlet is not run on a failover cluster node, or this cmdlet is used to reference a failover cluster different from where the cmdlet is run.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the administrative credentials for the target cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShowClusterNodeState
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets the status of the Windows Management Instrumentation (WMI) object that is created on each cluster node.
      This can be used to debug the status of leftover objects.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShowClusterNodeState
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForCompletion
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet waits for the updating run to finish.
      If this parameter is specified, the cmdlet also writes the updated CAU run objects to the output stream as progress is recorded by the current CAU Update Coordinator.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WaitForCompletion
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForStart
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet waits for an updating run that is in progress on the specified cluster.
      Otherwise the cmdlet waits for an updating run to begin.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WaitForStart
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-CauRun
        [[-ClusterName] <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParamSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-CauRun
        [[-ClusterName] <String>]
        [-Credential <PSCredential>]
        [-WaitForStart]
        [<CommonParameters>]
    ```
  parameterSetName: WaitForStart
  isDefault: false
- syntax: |-
    ```Syntax
    Get-CauRun
        [[-ClusterName] <String>]
        [-Credential <PSCredential>]
        [-WaitForCompletion]
        [<CommonParameters>]
    ```
  parameterSetName: WaitForCompletion
  isDefault: false
- syntax: |-
    ```Syntax
    Get-CauRun
        [[-ClusterName] <String>]
        [-Credential <PSCredential>]
        [-ShowClusterNodeState]
        [<CommonParameters>]
    ```
  parameterSetName: ShowClusterNodeState
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.ClusterAwareUpdating.CauRun" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.ClusterAwareUpdating.RunState" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get status information about the updating run in progress from the specified cluster'
  description: |-
    ```
    PS C:\> Get-CauRun -ClusterName "CONTOSO-FC1"

    RunId                   : 834dd11e-584b-41f2-8d22-4c9c0471dbad
    RunStartTime            : 10/13/2011 1:35:39 PM
    CurrentOrchestrator     : NODE1
    NodeStatusNotifications : {
    Node      : NODE1
    Status    : Waiting
    Timestamp : 10/13/2011 1:35:49 PM
    }
    NodeResults             : {
    Node                     : NODE2
    Status                   : Succeeded
    ErrorRecordData          :
    NumberOfSucceededUpdates : 0
    NumberOfFailedUpdates    : 0
    InstallResults           : Microsoft.ClusterAwareUpdating.UpdateInstallResult[]
    }
    ```

    This command gets status information about the updating run currently in progress on the cluster named CONTOSO-FC1.
