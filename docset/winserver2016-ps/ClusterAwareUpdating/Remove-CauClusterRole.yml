syntaxes:
- syntax: |-
    ```Syntax
    Remove-CauClusterRole
        [[-ClusterName] <String>]
        [[-Credential] <PSCredential>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
