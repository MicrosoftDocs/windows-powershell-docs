examples:
- title: 'Example 1: Merge policies'
  description: |-
    ```
    PS C:\> Merge-CIPolicy -PolicyPaths '.\Policy.xml','.\Policy02.xml' -OutputFilePath '.\MergedPolicy.xml'

    Name           : MSIT Test CodeSign CA 3
    Id             : ID_SIGNER_S_17_0
