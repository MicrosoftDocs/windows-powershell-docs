syntaxes:
- syntax: |-
    ```Syntax
    New-DfsnFolderTarget
        [-Path] <String>
        [-TargetPath] <String>
        [[-State] <State>]
        [[-ReferralPriorityClass] <ReferralPriorityClass>]
        [[-ReferralPriorityRank] <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_DfsNamespaceFolderTarget" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a target'
  description: |-
    ```
    PS C:\> New-DfsnFolderTarget -Path "\\Contoso\AccountingResources\LegacySoftware" -TargetPath "\\Contoso-FS\Software" -ReferralPriorityClass GlobalLow
    ```

    This command adds \\\\Contoso-FS\Software as a target for the DFS namespace folder \\\\Contoso\AccountingResources\LegacySoftware with a referral priority of global low.
