### YamlMime:PowerShellCmdlet1
uid: DISM.Get-WindowsImageContent
name: Get-WindowsImageContent
module: DISM
isPreview: false
summary: |-
  Displays a list of the files and folders in a specified image.
description: |-
  The **Get-WindowsImageContent** cmdlet displays a list of the files and folders in a specified image.

  This cmdlet does not apply to virtual hard disk (VHD) files.
parameters:
  cmdletParameters:
  - name: ImagePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of a WIM file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Index
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the index number of a Windows image in a WIM or VHD file.
      For a VHD file, the Index must be 1.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputByFilePathAndIndex
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogLevel
    type: <xref href="LogLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum output level shown in the logs.
      The default log level is 3.
      The accepted values are as follows:
      - 1 = Errors only
      - 2 = Errors and warnings
      - 3 = Errors, warnings, and information
      - 4 = All of the information listed previously, plus debug output
    acceptedValues:
    - Errors
    - Warnings
    - WarningsInfo
    aliases:
    - LL
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path and file name to log to.
      If not set, the default is `%WINDIR%\Logs\Dism\dism.log`.
      In Windows PE, the default directory is the RAMDISK scratch space which can be as low as 32 MB.
      The log file will automatically be archived.
      The archived log file will be saved with .bak appended to the file name and a new log file will be generated.
      Each time the log file is archived the .bak file will be overwritten.
      When using a network share that is not joined to a domain, use the net use command together with domain credentials to set access permissions before you set the log path for the DISM log.
    aliases:
    - LP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an image in a WIM file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputByFilePathAndName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScratchDirectory
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a temporary directory that will be used when extracting files for use during servicing.
      The directory must exist locally.
      If not specified, the `\Windows\%Temp%` directory will be used, with a subdirectory name of a randomly generated hexadecimal value for each run of DISM.
      Items in the scratch directory are deleted after each operation.
      You should not use a network share location as a scratch directory to expand a package (.cab or .msu file) for installation.
      The directory used for extracting files for temporary usage during servicing should be a local directory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WindowsImageContent
        -ImagePath <String>
        -Name <String>
        [-LogPath <String>]
        [-ScratchDirectory <String>]
        [-LogLevel <LogLevel>]
        [<CommonParameters>]
    ```
  parameterSetName: InputByFilePathAndName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-WindowsImageContent
        -ImagePath <String>
        -Index <UInt32>
        [-LogPath <String>]
        [-ScratchDirectory <String>]
        [-LogLevel <LogLevel>]
        [<CommonParameters>]
    ```
  parameterSetName: InputByFilePathAndIndex
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Dism.Commands.ImageObject" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Dism.Commands.ImageObjectWithState" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: List files and folders for an image'
  description: |-
    ```
    PS C:\> Get-WindowsImageContent -ImagePath "c:\imagestore\install.wim" -Index 1
    ```

    This command lists the files and folders in the first image in c:\imagestore\install.wim.
- title: 'Example 2: List files and folders for a named image'
  description: |-
    ```
    PS C:\> Get-WindowsImageContent -ImagePath "c:\imagestore\install.wim" -Name "Windows Pro"
    ```

    This command lists the files and folders in the image named Windows Pro that is located in c:\imagestore\install.wim.
