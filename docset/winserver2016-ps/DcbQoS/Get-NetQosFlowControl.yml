syntaxes:
- syntax: |-
    ```Syntax
    Get-NetQosFlowControl
        [[-Priority] <Byte[]>]
        [[-InterfaceAlias] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByIfAlias
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetQosFlowControl
        [[-Priority] <Byte[]>]
        [[-InterfaceIndex] <UInt32>]
        [-CimSession <CimSession[]>]
