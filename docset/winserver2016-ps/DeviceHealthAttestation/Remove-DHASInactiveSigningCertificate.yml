### YamlMime:PowerShellCmdlet1
uid: DeviceHealthAttestation.Remove-DHASInactiveSigningCertificate
name: Remove-DHASInactiveSigningCertificate
module: DeviceHealthAttestation
isPreview: false
summary: |-
  Removes the inactive signing certificate.
description: |-
  The **Remove-DHASInactiveSigningCertificate** cmdlet removes the inactive signing certificate for the Device Health Attestation service.

  You must have administrator rights to run this cmdlet.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Thumbprint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the signing certificate thumbprint.
      The value must contain only hexadecimal digits (0-9, A-F) and be 40 characters in length.
      This value is case-insensitive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
