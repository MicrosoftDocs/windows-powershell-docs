uid: DeviceHealthAttestation.Restore-DHASConfiguration
name: Restore-DHASConfiguration
module: DeviceHealthAttestation
isPreview: false
summary: |-
  Restores a configuration.
description: |-
  The **Restore-DHASConfiguration** cmdlet restores the Device Health Attestation service configuration from the specified file.

  You must have administrator rights to run this cmdlet.
