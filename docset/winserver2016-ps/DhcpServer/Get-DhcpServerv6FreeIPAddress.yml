syntaxes:
- syntax: |-
    ```Syntax
    Get-DhcpServerv6FreeIPAddress
        [-ComputerName <String>]
        [-Prefix] <IPAddress>
        [[-NumAddress] <UInt32>]
        [-StartAddress <IPAddress>]
        [-EndAddress <IPAddress>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
