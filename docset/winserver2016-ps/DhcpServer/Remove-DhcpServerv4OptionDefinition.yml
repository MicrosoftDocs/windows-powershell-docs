syntaxes:
- syntax: |-
    ```Syntax
    Remove-DhcpServerv4OptionDefinition
        [-ComputerName <String>]
        [-OptionId] <UInt32[]>
        [[-VendorClass] <String>]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
