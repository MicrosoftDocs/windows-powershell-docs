examples:
- title: 'Example 1: Enable manual DirectAccess site selection'
  description: |-
    ```
    PS C:\> Enable-DAManualEntryPointSelection -EntryPointName "Redmond"
    ```

    This cmdlet enables the entry point named Redmond.
