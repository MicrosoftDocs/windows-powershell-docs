outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DnsServerTrustAnchor" data-throw-if-not-resolved="False" />
  description: |-
    The DnsServerTrustAnchor object contains the following fields:

    - EnteredStateTime
