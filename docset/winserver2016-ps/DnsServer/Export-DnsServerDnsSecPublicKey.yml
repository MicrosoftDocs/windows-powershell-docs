syntaxes:
- syntax: |-
    ```Syntax
    Export-DnsServerDnsSecPublicKey
        [-ZoneName] <String>
        [-ComputerName <String>]
        [-Path <String>]
        [-PassThru]
        [-UnAuthenticated]
        [-Force]
        [-NoClobber]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DnsKey
  isDefault: true
- syntax: |-
    ```Syntax
    Export-DnsServerDnsSecPublicKey
        [-ZoneName] <String>
        -DigestType <String[]>
        [-ComputerName <String>]
        [-Path <String>]
        [-PassThru]
        [-UnAuthenticated]
        [-Force]
        [-NoClobber]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DS
  isDefault: false
