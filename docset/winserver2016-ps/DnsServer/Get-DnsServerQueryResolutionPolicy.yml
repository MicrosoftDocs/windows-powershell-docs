    This command gets all the server level policies.
- title: 'Example 4: Get a specific server level policy'
  description: |-
    ```
    PS C:\> Get-DnsServerQueryResolutionPolicy -Name "DropPolicy"
    Name                                               ProcessingOrder                                    IsEnabled                                         Action
