syntaxes:
- syntax: |-
    ```Syntax
    Get-DnsServerResourceRecord
        [[-Name] <String>]
        [-ZoneName] <String>
        [-Type] <UInt16>
        [-ComputerName <String>]
        [-Node]
        [-ZoneScope <String>]
        [-VirtualizationInstance <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Unknown
  isDefault: false
- syntax: |-
    ```Syntax
    Get-DnsServerResourceRecord
        [[-Name] <String>]
        [-ZoneName] <String>
        [-ComputerName <String>]
        [-Node]
        [-ZoneScope <String>]
        [-VirtualizationInstance <String>]
        [-RRType <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
