syntaxes:
- syntax: |-
    ```Syntax
    Register-DnsServerDirectoryPartition
        [-ComputerName <String>]
        [-PassThru]
        [-Name] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
