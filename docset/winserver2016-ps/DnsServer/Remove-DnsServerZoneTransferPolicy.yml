syntaxes:
- syntax: |-
    ```Syntax
    Remove-DnsServerZoneTransferPolicy
        [-Name] <String>
        [-PassThru]
        [-ComputerName <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Server
  isDefault: true
- syntax: |-
