    ```Syntax
    Set-DnsServerResourceRecord
        [-NewInputObject] <CimInstance>
        [-OldInputObject] <CimInstance>
        [-ComputerName <String>]
        [-ZoneName] <String>
        [-PassThru]
        [-ZoneScope <String>]
        [-VirtualizationInstance <String>]
        [-CimSession <CimSession[]>]
