syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsServerZoneTransferPolicy
        [-Name] <String>
        [-PassThru]
        [-ComputerName <String>]
        [-ClientSubnet <String>]
        [-Condition <String>]
        [-InternetProtocol <String>]
        [-ProcessingOrder <UInt32>]
        [-ServerInterfaceIP <String>]
        [-TimeOfDay <String>]
        [-TransportProtocol <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Server
  isDefault: true
- syntax: |-
    ```Syntax
    Set-DnsServerZoneTransferPolicy
        [-ZoneName] <String>
        [-Name] <String>
        [-PassThru]
        [-ComputerName <String>]
        [-ClientSubnet <String>]
        [-Condition <String>]
        [-InternetProtocol <String>]
        [-ProcessingOrder <UInt32>]
        [-ServerInterfaceIP <String>]
        [-TimeOfDay <String>]
        [-TransportProtocol <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Zone
  isDefault: false
- syntax: |-
    ```Syntax
    Set-DnsServerZoneTransferPolicy
        [-InputObject] <CimInstance>
        [[-ZoneName] <String>]
        [-PassThru]
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DnsServerPolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update a zone transfer policy'
  description: |-
    ```
    PS C:\> Set-DnsServerZoneTransferPolicy -Name "InternalTransfers" -TransportProtocol "NE,TCP" -ServerInterfaceIP $Null
    ```

    This command updates the zone transfer policy named InternalTransfers.
    The command modifies the transport protocol and the server interface IP address criteria.
    For the server interface IP address, the command specifies $Null, which removes the previously set criterion.
