syntaxes:
- syntax: |-
    ```Syntax
    Remove-EtwTraceProvider
        [[-Guid] <String[]>]
        [-AutologgerName <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByAutologger
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-EtwTraceProvider
        [[-Guid] <String[]>]
        [-SessionName <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySession
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-EtwTraceProvider
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove an ETW trace provider from a session:'
  description: |-
    ```
    PS C:\> Remove-EtwTraceProvider -Guid "{9C88041D-349D-4647-8BFD-2C0A167BFE58}" -SessionName "TestSession17"
    SessionName     : TestSession
    AutologgerName  :
    Guid            : {5EEFEBDB-E90C-423A-8ABF-0241E7C5B87D }
    Level           : 2
    MatchAnyKeyword : 0xFFFFFFFF
    MatchAllKeyword : 0x00000000
    Property        :
    ```

    This command removes the ETW Trace Provider that has the specified GUID from the session named TestSession17.
