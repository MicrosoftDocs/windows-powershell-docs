syntaxes:
- syntax: |-
    ```Syntax
    Set-EtwTraceProvider
        [[-Guid] <String[]>]
        [-AutologgerName <String[]>]
        [-Level <Byte>]
        [-MatchAnyKeyword <UInt64>]
        [-MatchAllKeyword <UInt64>]
        [-Property <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByAutologger
  isDefault: true
- syntax: |-
    ```Syntax
    Set-EtwTraceProvider
        [[-Guid] <String[]>]
        [-SessionName <String[]>]
        [-Level <Byte>]
        [-MatchAnyKeyword <UInt64>]
        [-MatchAllKeyword <UInt64>]
        [-Property <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySession
  isDefault: false
- syntax: |-
    ```Syntax
    Set-EtwTraceProvider
        -InputObject <CimInstance[]>
        [-Level <Byte>]
        [-MatchAnyKeyword <UInt64>]
        [-MatchAllKeyword <UInt64>]
        [-Property <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
