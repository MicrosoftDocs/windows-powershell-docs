### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Add-ClusterFileServerRole
name: Add-ClusterFileServerRole
module: FailoverClusters
isPreview: false
summary: |-
  Creates a clustered file server resource group.
description: |-
  The **Add-ClusterFileServerRole** cmdlet creates a clustered file server resource group that includes one or more disks, on which shared folders can be created for users.

  When adding a clustered file server, specify a name for the file server, any IP address information that is not automatically supplied by your DHCP settings, and the storage volume or volumes that the clustered file server should use.

  Note: This cmdlet cannot be run remotely without Credential Security Service Provider (CredSSP) authentication on the server computer.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet.
      If the input for this parameter is `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IgnoreNetwork
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one or more networks to ignore when running the cmdlet.
      Networks with DHCP enabled are always included, but other networks need a static address to be specified using the *StaticAddress* parameter or should be explicitly ignored with this *IgnoreNetwork* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster on which to create the highly available file server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the highly available file server to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StaticAddress
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one or more static addresses to use when running the cmdlet.
      Networks with DHCP enabled are always included, but other networks need a static address to be specified using the *StaticAddress* parameter or should be explicitly ignored with this *IgnoreNetwork* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Storage
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster disk resource to be added to the created highly available file server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Wait
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time in seconds to wait for the cmdlet.
      If the *Wait* parameter is not specified, then the cmdlet waits for completion.
      If `-Wait 0` is specified, then the call is initiated and the cmdlet returns without waiting.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusterFileServerRole
        -Storage <StringCollection>
        [-StaticAddress <StringCollection>]
        [-IgnoreNetwork <StringCollection>]
        [[-Name] <String>]
        [-Wait <Int32>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterGroup" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a clustered file server'
  description: |-
    ```
    PS C:\> Add-ClusterFileServerRole -Storage "Cluster Disk 8"
    Name                       OwnerNode                           State
    ----                       ---------                           -----
    cluster1FS                 node1                              Online
    ```

    This example creates a clustered file server using Cluster Disk 8, and assigns a default name.
- title: 'Example 2: Create and name a clustered file server'
  description: |-
    ```
    PS C:\> Add-ClusterFileServerRole -Storage "Cluster Disk 6" -Name cluster1FS12
    Name                       OwnerNode                           State
    ----                       ---------                           -----
    cluster1FS12               node1                              Online
    ```

    This example creates a clustered file server using Cluster Disk 6, and assigns the name cluster1FS12.
- title: 'Example 3: Create a clustered file server with no waiting for resources'
  description: |-
    ```
    PS C:\> Add-ClusterFileServerRole -Storage "Cluster Disk 8" -Wait 0
    Name                       OwnerNode                           State
    ----                       ---------                           -----
    cluster1FS                 node1                             Pending
    ```

    This example creates a clustered file server using Cluster Disk 8, and assigns a default name.
    The cmdlet completes without waiting for all resources to come online.
