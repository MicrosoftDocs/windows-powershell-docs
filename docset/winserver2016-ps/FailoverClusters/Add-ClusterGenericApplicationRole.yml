- syntax: |-
    ```Syntax
    Add-ClusterGenericApplicationRole
        -CommandLine <String>
        [-Parameters <String>]
        [-CheckpointKey <StringCollection>]
        [-Storage <StringCollection>]
        [-StaticAddress <StringCollection>]
        [-IgnoreNetwork <StringCollection>]
