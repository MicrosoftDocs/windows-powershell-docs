syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusterGroupSetDependency
        [[-Name] <String[]>]
        [-Provider] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Add-ClusterGroupSetDependency
        [-Provider] <String>
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Add a dependency to a provider set'
  description: |-
    ```
    PS C:\> Add-ClusterGroupSetDependency -Name "Set001" -Provider "Provider002"
    ```

    This command adds the set named Provider002 as a provider to the set named Set001.
    Both sets cannot be empty.
