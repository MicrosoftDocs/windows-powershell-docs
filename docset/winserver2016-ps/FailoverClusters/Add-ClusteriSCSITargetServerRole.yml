### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Add-ClusteriSCSITargetServerRole
name: Add-ClusteriSCSITargetServerRole
module: FailoverClusters
isPreview: false
summary: |-
  Creates a highly available iSCSI Target server.
description: |-
  The **Add-ClusteriSCSITargetServerRole** cmdlet creates a highly available iSCSI Target server.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet.
      If the input for this parameter is `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IgnoreNetwork
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one or more networks to ignore when running the cmdlet.
      Networks with DHCP enabled are always included, but other networks need a static address to be specified using the **StaticAddress** parameter or should be explicitly ignored with this **IgnoreNetwork** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster on which to create the highly available iSCSI Target server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the highly available iSCSI Target server to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StaticAddress
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one or more static addresses to use when running the cmdlet.
      Networks with DHCP enabled are always included, but other networks need a static address to be specified using the **StaticAddress** parameter or should be explicitly ignored with this **IgnoreNetwork** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Storage
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster disk resource to be added to the created highly available iSCSI Target server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Wait
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time in seconds to wait for the cmdlet.
      If the **Wait** parameter is not specified, then the cmdlet waits for completion.
      If `-Wait 0` is specified, then the call is initiated and the cmdlet returns without waiting.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusteriSCSITargetServerRole
        -Storage <StringCollection>
        [-StaticAddress <StringCollection>]
        [-IgnoreNetwork <StringCollection>]
        [[-Name] <String>]
        [-Wait <Int32>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterGroup" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a clustered target server'
  description: |-
    ```
    PS C:\> Add-ClusteriSCSITargetServerRole -Storage "Cluster Disk 5"
    Name                       OwnerNode                                      State
    ----                       ---------                                      -----
    CLiSCSITarget              node1                                          Online
    ```

    This example creates a clustered iSCSI Target server using Cluster Disk 5, and assigns a default name.
- title: Example 2
  description: |-
    ```
    PS C:\> Add-ClusteriSCSITargetServerRole -Storage "Cluster Disk 5" -Name MyiSCSITarget
    Name                       OwnerNode                                      State
    ----                       ---------                                      -----
    MyiSCSITarget              node1                                          Online
    ```

    This example creates a clustered iSCSI Target server using Cluster Disk 5, and assigns the name MyiSCSITarget.
- title: Example 3
  description: |-
    ```
    PS C:\> Add-ClusteriSCSITargetServerRole -Storage "Cluster Disk 5" -Wait 0
    Name                       OwnerNode                                      State
    ----                       ---------                                      -----
    CLiSCSITarget              node1                                          Pending
    ```

    This example creates a clustered iSCSI Target server using Cluster Disk 5, and assigns a default name.
    The cmdlet completes without waiting for all resources to come online.
