syntaxes:
- syntax: |-
    ```Syntax
    Clear-ClusterDiskReservation
        [[-Node] <StringCollection>]
        -Disk <UInt32[]>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
