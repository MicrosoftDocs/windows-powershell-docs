### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Get-ClusterSharedVolume
name: Get-ClusterSharedVolume
module: FailoverClusters
isPreview: false
summary: |-
  Gets information about Cluster Shared Volumes in a failover cluster.
description: |-
  The **Get-ClusterSharedVolume** cmdlet gets information about Cluster Shared Volumes in a failover cluster.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet.
      If the input for this parameter is `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster on which to enumerate the Cluster Shared Volumes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Cluster Shared Volume to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ClusterSharedVolume
        [[-Name] <StringCollection>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterSharedVolume" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-ClusterSharedVolume
    Name                       State                      Node
    ----                       -----                      ----
    Cluster Disk 3             Online                     node1
    Cluster Disk 4             Online                     node2
    ```

    This example lists all the Cluster Shared Volumes on the local cluster.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-ClusterSharedVolume -Cluster cluster1
    Name                       State                      Node
    ----                       -----                      ----
    Cluster Disk 1             Online                     node4
    ```

    This example lists all the Cluster Shared Volumes on the cluster named cluster1.
- title: Example 3
  description: |-
    ```
    PS C:\> Get-ClusterSharedVolume -Name "Cluster Disk 4"
    Name                       State                      Node
    ----                       -----                      ----
    Cluster Disk 4             Online                     node2
    ```

    This example displays the state of the Cluster Shared Volume called Cluster Disk 4.
