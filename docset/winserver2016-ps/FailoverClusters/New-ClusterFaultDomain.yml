syntaxes:
- syntax: |-
    ```Syntax
    New-ClusterFaultDomain
        -Name <String>
        [-FaultDomain <String>]
        -FaultDomainType <FaultDomainType>
        [-Description <String>]
        [-Location <String>]
        [-Flags <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create a cluster fault domain in an existing fault domain'
  description: |-
    ```
    PS C:\> New-ClusterFaultDomain -Type Rack -Name "Rack1" -FaultDomain "Site001"
    Name  Type ParentName ChildrenNames
    ----  ---- ---------- -------------
    Rack1 Rack Site1
    ```

    This command creates a cluster fault domain of type Rack named Rack1 in the existing fault domain named Site001.
