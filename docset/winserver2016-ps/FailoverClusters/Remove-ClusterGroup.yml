syntaxes:
- syntax: |-
    ```Syntax
    Remove-ClusterGroup
        [-VMId <Guid>]
        [[-Name] <StringCollection>]
        [-Force]
        [-RemoveResources]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
