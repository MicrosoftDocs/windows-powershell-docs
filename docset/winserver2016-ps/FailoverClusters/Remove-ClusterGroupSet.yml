### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Remove-ClusterGroupSet
name: Remove-ClusterGroupSet
module: FailoverClusters
isPreview: false
summary: |-
  Removes a group set from the cluster.
description: |-
  Removes a group set from the cluster.
  The group set cannot be a provider for another group set.
