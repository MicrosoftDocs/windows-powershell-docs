    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of groups to meet the ready setting.
    aliases:
    - Count
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartupDelay
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the delay to use after reaching the ready state, in seconds.
    aliases:
    - Delay
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartupSetting
    type: <xref href="StartupSettingType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the startup setting when the set is deemed ready.
      When delay it is when the groups specified in the *StartupCount* parameter are in pending in addition to the *StartupDelay* parameter.
      If it is online it is when *StartupCount* groups reach online in addition to the delay.

      The acceptable values for this parameter are: Delay or Online.
    acceptedValues:
    - Delay
    - Online
    aliases:
    - StartupDelayTrigger
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
