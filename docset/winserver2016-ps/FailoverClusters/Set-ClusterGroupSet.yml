syntaxes:
- syntax: |-
    ```Syntax
    Set-ClusterGroupSet
        [[-Name] <String[]>]
        [-StartupSetting <StartupSettingType>]
        [-StartupCount <UInt32>]
        [-IsGlobal <Boolean>]
        [-StartupDelay <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Set-ClusterGroupSet
        -InputObject <CimInstance[]>
        [-StartupSetting <StartupSettingType>]
        [-StartupCount <UInt32>]
        [-IsGlobal <Boolean>]
        [-StartupDelay <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Change a group set to the specified startup setting'
  description: |-
    ```
    PS C:\> Set-ClusterGroupSet -Name "Set002" -StartupSetting Online
    ```

    This command changes the group set named Set002 to the startup setting Online.
