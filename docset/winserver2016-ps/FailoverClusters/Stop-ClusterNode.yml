syntaxes:
- syntax: |-
    ```Syntax
    Stop-ClusterNode
        [[-Name] <StringCollection>]
        [-Wait <Int32>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
