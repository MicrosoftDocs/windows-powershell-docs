syntaxes:
- syntax: |-
    ```Syntax
    New-FsrmFMJNotification
        [-Days] <UInt32>
        [-Action <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
