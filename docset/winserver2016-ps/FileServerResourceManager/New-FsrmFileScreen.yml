syntaxes:
- syntax: |-
    ```Syntax
    New-FsrmFileScreen
        [-Path] <String>
        [-Description <String>]
        [-IncludeGroup <String[]>]
        [-Active]
        [-Template <String>]
        [-Notification <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
