syntaxes:
- syntax: |-
    ```Syntax
    Update-FsrmAutoQuota
        [-Path] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
