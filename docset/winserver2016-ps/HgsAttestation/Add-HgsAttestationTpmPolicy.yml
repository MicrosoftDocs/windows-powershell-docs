syntaxes:
- syntax: |-
    ```Syntax
    Add-HgsAttestationTpmPolicy
        [-InputObject] <Byte[]>
        -Name <String>
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Console
  isDefault: false
- syntax: |-
    ```Syntax
    Add-HgsAttestationTpmPolicy
        [-Path] <String>
        [-Name <String>]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
