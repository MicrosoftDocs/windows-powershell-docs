syntaxes:
- syntax: |-
    ```Syntax
    Export-HgsKeyProtectionState
        [-Path <String>]
        -Password <SecureString>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
