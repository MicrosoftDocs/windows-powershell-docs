syntaxes:
- syntax: |-
    ```Syntax
    Test-HgsServer
        [[-HgsDomainName] <String>]
        [-SafeModeAdministratorPassword <SecureString>]
        [-LogDirectory <String>]
        [-DatabasePath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: PrimaryServer_HgsDomain
  isDefault: true
- syntax: |-
    ```Syntax
    Test-HgsServer
        [[-HgsDomainName] <String>]
        [-HgsDomainCredential] <PSCredential>
        [-HgsServerIPAddress] <String>
        [-SafeModeAdministratorPassword <SecureString>]
        [-LogDirectory <String>]
        [-DatabasePath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: AdditionalServer
  isDefault: false
outputs:
- name: <xref href="Microsoft.Windows.HostGuardianService.PowerShell.TestReport" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Test the first HGS node'
  description: |-
    ```
    PS C:\> Test-HgsServer -HgsDomainName "Contoso.private"
    ```

    This command tests whether the local computer can be used as the first HGS node.
- title: 'Example 2: Test an additional HGS node'
  description: |-
    ```
    PS C:\> $Cred = Get-Credential
    PS C:\> Test-HgsServer -HgsDomainName "Contoso.private" -HgsServerIPAddress "100.100.100.1" -HgsDomainCredential $Cred
    ```

    This command tests whether the local computer can be used as an additional HGS node.
