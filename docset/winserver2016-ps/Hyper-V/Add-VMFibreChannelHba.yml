syntaxes:
- syntax: |-
    ```Syntax
    Add-VMFibreChannelHba
        [-VMName] <String>
        [-SanName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-GenerateWwn]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName and GenerateWwn
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMFibreChannelHba
        [-VMName] <String>
        [-SanName] <String>
        -WorldWideNodeNameSetA <String>
        -WorldWidePortNameSetA <String>
        -WorldWideNodeNameSetB <String>
        -WorldWidePortNameSetB <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName and manual WWN
  isDefault: false
- syntax: |-
    ```Syntax
    Add-VMFibreChannelHba
        [-VM] <VirtualMachine[]>
        [-SanName] <String>
        [-GenerateWwn]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VM object and GenerateWwn
  isDefault: false
- syntax: |-
    ```Syntax
    Add-VMFibreChannelHba
        [-VM] <VirtualMachine[]>
        [-SanName] <String>
        -WorldWideNodeNameSetA <String>
        -WorldWidePortNameSetA <String>
        -WorldWideNodeNameSetB <String>
        -WorldWidePortNameSetB <String>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VM Object and manual WWN
  isDefault: false
