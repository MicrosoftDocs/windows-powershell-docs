syntaxes:
- syntax: |-
    ```Syntax
    Add-VMSwitchExtensionPortFeature
        [-VMName] <String[]>
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMSwitchExtensionPortFeature
        [-VMNetworkAdapter] <VMNetworkAdapterBase[]>
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Add-VMSwitchExtensionPortFeature
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-ManagementOS]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ManagementOS
  isDefault: false
- syntax: |-
    ```Syntax
    Add-VMSwitchExtensionPortFeature
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-ExternalPort]
        [-SwitchName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
