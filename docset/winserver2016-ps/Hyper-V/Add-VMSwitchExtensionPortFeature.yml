        [-VM] <VirtualMachine[]>
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-VMNetworkAdapterName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
