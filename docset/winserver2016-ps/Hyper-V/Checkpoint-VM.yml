syntaxes:
- syntax: |-
    ```Syntax
    Checkpoint-VM
        [-Name] <String[]>
        [[-SnapshotName] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Checkpoint-VM
        [-VM] <VirtualMachine[]>
        [[-SnapshotName] <String>]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <span>undefined</span>
  description: |-
    Nothing by default; **Microsoft.HyperV.PowerShell.Snapshot** if *PassThru* is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Checkpoint-VM -Name Test -SnapshotName BeforeInstallingUpdates
    ```

    Checkpoints virtual machine Test, creating a checkpoint of it named BeforeInstallingUpdates.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM Test -ComputerName Server1 | Checkpoint-VM
    ```

    Checkpoints virtual machine Test on Hyper-V host Server1.
