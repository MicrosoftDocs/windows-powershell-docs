syntaxes:
- syntax: |-
    ```Syntax
    Export-VM
        [-Name] <String[]>
        [-Path] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-AsJob]
        [-Passthru]
        [-CaptureLiveState <CaptureLiveState>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Export-VM
        [-VM] <VirtualMachine[]>
        [-Path] <String>
        [-AsJob]
        [-Passthru]
        [-CaptureLiveState <CaptureLiveState>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Export-VM -Name Test -Path D:\
    ```

    Exports virtual machine Test to the root of the D drive.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM | Export-VM -Path D:\
    ```

    Exports all virtual machines to the root of the D drive.
    Each virtual machine will be exported to its own folder.
