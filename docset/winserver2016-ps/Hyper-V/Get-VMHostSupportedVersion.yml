### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Get-VMHostSupportedVersion
name: Get-VMHostSupportedVersion
module: Hyper-V
isPreview: false
summary: |-
  Returns a list of virtual machine configuration versions that are supported on a host.
description: |-
  The **Get-VMHostSupportedVersion** cmdlet returns a list of virtual machine configuration versions that are supported on a host.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CimSession
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts to run the cmdlet.
      NetBIOS names, IP addresses, and fully-qualified domain names are allowable.
      The default is the local computer.
      Use "localhost" or a dot (".") to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a user account that has permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Default
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that the cmdlet is to return the default virtual machine configuration version for this host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-VMHostSupportedVersion
        [[-ComputerName] <String[]>]
        [[-Credential] <PSCredential[]>]
        [-Default]
        [<CommonParameters>]
    ```
  parameterSetName: ComputerName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VMHostSupportedVersion
        [-CimSession] <CimSession[]>
        [-Default]
        [<CommonParameters>]
    ```
  parameterSetName: CimSession
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostSupportedVersion" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Return a table of supported configurations'
  description: |-
    ```
    PS C:\> Get-VMHostSupportedVersion
    ```

    This command returns a table showing the supported virtual machine configuration versions on this host.
- title: 'Example 2: Return the default configuration version'
  description: |-
    ```
    PS C:\> Get-VMHostSupportedVersion -Default
    ```

    This command returns the default virtual machine configuration version for this host.
