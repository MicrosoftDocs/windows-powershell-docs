syntaxes:
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterIsolation
        [[-VMName] <String[]>]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
