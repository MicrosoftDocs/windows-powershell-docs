syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMFibreChannelHba
        [-VMFibreChannelHba] <VMFibreChannelHba[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMFibreChannelHba
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMFibreChannelHba
        [-VMName] <String>
        [-WorldWideNodeNameSetA] <String>
        [-WorldWidePortNameSetA] <String>
        [-WorldWideNodeNameSetB] <String>
        [-WorldWidePortNameSetB] <String>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName and WWN
  isDefault: false
