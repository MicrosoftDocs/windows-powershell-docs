syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMSwitchExtensionPortFeature
        -VMSwitchExtensionFeature <VMSwitchExtensionPortFeature[]>
        [-Passthru]
        [-VMName <String[]>]
        [-VMNetworkAdapter <VMNetworkAdapterBase[]>]
        [-ManagementOS]
        [-ExternalPort]
        [-SwitchName <String>]
        [-VMNetworkAdapterName <String>]
        [-ComputerName <String[]>]
        [-VM <VirtualMachine[]>]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
