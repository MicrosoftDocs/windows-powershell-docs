syntaxes:
- syntax: |-
    ```Syntax
    Rename-VMGroup
        [-Name] <String[]>
        [-NewName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-VMGroup
        [-Id] <Guid>
        [-NewName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Rename-VMGroup
        [-VMGroup] <VMGroup[]>
        [-NewName] <String>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMGroup" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a **Microsoft.HyperV.PowerShell.VMGroup** object, if you specify the **Passthru** parameter.
examples:
- title: 'Example 1: Rename a group'
  description: |-
    ```
    PS C:\> Rename-VMGroup -Name "TestGroup" -NewName "Group01"
    ```

    This command renames the group named TestGroup to be Group01.
