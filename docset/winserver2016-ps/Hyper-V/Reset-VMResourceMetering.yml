syntaxes:
- syntax: |-
    ```Syntax
    Reset-VMResourceMetering
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Reset-VMResourceMetering
        [-ResourcePoolName] <String>
        [[-ResourcePoolType] <VMResourcePoolType>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourcePool
  isDefault: false
- syntax: |-
    ```Syntax
    Reset-VMResourceMetering
        [-VM] <VirtualMachine[]>
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.HyperV.PowerShell.VMResourcePoolType" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Reset-VMResourceMetering -VMName TestVM
    ```

    Resets resource utilization data collection on a virtual machine named TestVM.
- title: Example 2
  description: |-
    ```
    PS C:\> Reset-VMResourceMetering -ResourcePoolName TestResourcePool -ResourcePoolType Memory
    ```

    Resets resource utilization data collection for a single resource pool named TestResourcePool of type Memory.
- title: Example 3
  description: |-
    ```
    PS C:\> Get-VMResourcePool -ResourcePoolType @("Processor","VHD","Ethernet","Memory") | Reset-VMResourceMetering
    ```

    Resets resource utilization data collection for all supported resource pool types on the virtual machine host.
