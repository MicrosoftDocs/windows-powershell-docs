    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Revoke-VMConnectAccess
        [-UserName] <String[]>
        [-VMName] <String[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Revoke-VMConnectAccess
        [-UserName] <String[]>
        [-VMId] <Guid[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMId
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.VMConnectAce" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Revoke-VMConnectAccess -VMName VM1 -UserName Contoso\John
    ```

    This command revokes the access of user Contoso\John to connect to virtual machine VM1.
