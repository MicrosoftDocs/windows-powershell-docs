### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Set-VMHardDiskDrive
name: Set-VMHardDiskDrive
module: Hyper-V
isPreview: false
summary: |-
  Configures a virtual hard disk.
description: |-
  The **Set-VMHardDiskDrive** cmdlet configures a virtual hard disk.
parameters:
  cmdletParameters:
  - name: AllowUnverifiedPaths
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that no error is to be thrown if the specified path is not verified as accessible by the cluster.
      This parameter is applicable to clustered virtual machines.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts on which the virtual hard drive is to be configured.
      NetBIOS names, IP addresses, and fully qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    aliases:
    - PSComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerLocation
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of the location on the controller to which the virtual hard drive to be configured is attached.
      If not specified, all hard drives are configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of the controller to which the virtual hard drive to be configured is attached.
      If not specified, all hard drives are configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerType
    type: <xref href="ControllerType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of the controller to which the virtual hard drive to be configured is attached.
      Allowed values are **Floppy**, **IDE**, and **SCSI**.
    acceptedValues:
    - IDE
    - SCSI
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskNumber
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk number of the offline physical hard drive that should be connected as a passthrough disk.
    aliases:
    - Number
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumIOPS
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum normalized I/O operations per second (IOPS) for the hard disk.
      Hyper-V calculates normalized IOPS as the total size of I/O per second divided by 8 KB.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumIOPS
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum normalized I/O operations per second (IOPS) for the hard disk.
      Hyper-V calculates normalized IOPS as the total size of I/O per second divided by 8 KB.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OverrideCacheAttributes
    type: <xref href="CacheAttributes" data-throw-if-not-resolved="False" />
    acceptedValues:
    - Default
    - WriteCacheEnabled
    - WriteCacheAndFUAEnabled
    - WriteCacheDisabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Passthru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that a **Microsoft.HyperV.PowerShell.HardDiskDrive** object is to be passed through to the pipeline representing the virtual hard drive to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to media the virtual hard disk is to use.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSPolicy
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage Quality of Service (QoS) policy to associate with the hard disk drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSPolicyID
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID for a storage QoS policy to associate with the hard disk drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual hard disk resource pool to which this drive belongs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SupportPersistentReservations
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the hard disk supports SCSI persistent reservation semantics.
      Specify this parameter when the hard disk is a shared disk that is used by multiple virtual machines.
    aliases:
    - ShareVirtualDisk
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ToControllerLocation
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the controller location to which this drive should be moved.
      Allowed values are 0 and 1 for IDE controllers, and from 0 to 63 for SCSI controllers.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ToControllerNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the controller location to which this drive should be moved.
      Allowed values are 0 and 1 for IDE controllers, and from 0 to 3 for SCSI controllers.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ToControllerType
    type: <xref href="ControllerType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of controller to which this drive should be moved.
      Allowed values are IDE and SCSI.
    acceptedValues:
    - IDE
    - SCSI
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMHardDiskDrive
    type: <xref href="HardDiskDrive" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more hard disks to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Object
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual machine on which the virtual hard drive is to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-VMHardDiskDrive
        [-VMName] <String>
        [[-ControllerType] <ControllerType>]
        [[-ControllerNumber] <Int32>]
        [[-ControllerLocation] <Int32>]
        [[-Path] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-ToControllerType <ControllerType>]
        [-ToControllerNumber <Int32>]
        [-ToControllerLocation <Int32>]
        [-DiskNumber <UInt32>]
        [-ResourcePoolName <String>]
        [-SupportPersistentReservations <Boolean>]
        [-AllowUnverifiedPaths]
        [-MaximumIOPS <UInt64>]
        [-MinimumIOPS <UInt64>]
        [-QoSPolicyID <String>]
        [-QoSPolicy <CimInstance>]
        [-Passthru]
        [-OverrideCacheAttributes <CacheAttributes>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-VMHardDiskDrive
        [-VMHardDiskDrive] <HardDiskDrive[]>
        [[-Path] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-ToControllerType <ControllerType>]
        [-ToControllerNumber <Int32>]
        [-ToControllerLocation <Int32>]
        [-DiskNumber <UInt32>]
        [-ResourcePoolName <String>]
        [-SupportPersistentReservations <Boolean>]
        [-AllowUnverifiedPaths]
        [-MaximumIOPS <UInt64>]
        [-MinimumIOPS <UInt64>]
        [-QoSPolicyID <String>]
        [-QoSPolicy <CimInstance>]
        [-Passthru]
        [-OverrideCacheAttributes <CacheAttributes>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.HardDiskDrive" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Set-VMHardDiskDrive -VMName TestVM -Path .\Test.vhd
    ```

    Configures the hard drive of virtual machine TestVM to use Test.vhd as its media.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VMHardDiskDrive -VMName TestVM -ControllerType IDE -ControllerNumber 1 -ControllerLocation 0 | Set-VMHardDiskDrive -ToControllerLocation 1
    ```

    Moves the virtual hard drive on virtual machine TestVM from IDE 1,0 to IDE 1,1.
