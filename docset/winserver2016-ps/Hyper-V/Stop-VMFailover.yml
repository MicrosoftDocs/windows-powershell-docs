syntaxes:
- syntax: |-
    ```Syntax
    Stop-VMFailover
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-VMFailover
        [-VM] <VirtualMachine[]>
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
