### YamlMime:PowerShellCmdlet1
uid: IISAdministration.Remove-IISConfigCollectionElement
name: Remove-IISConfigCollectionElement
module: IISAdministration
isPreview: false
summary: |-
  Removes a configuration element object from an IIS configuration collection.
description: |-
  The **Remove-IISConfigCollectionElement** cmdlet removes a ConfigurationElement from a given Internet Information Services (IIS) ConfigurationCollection.
parameters:
  cmdletParameters:
  - name: ConfigAttribute
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a hashtable of the attributes to match while searching for the configuration elements to delete in the collection.
      For the configuration attributes that are not specified, no filtering will be done.
      If you omit this parameter, all the elements in the collection are deleted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConfigCollection
    type: <xref href="ConfigurationElementCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ConfigurationCollection from which the matching ConfigurationElements will be removed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-IISConfigCollectionElement
        [-ConfigCollection] <ConfigurationElementCollection>
        [[-ConfigAttribute] <Hashtable>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Web.Administration.ConfigurationElementCollection, System.Collections.Hashtable" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a file name from the list of default documents'
  description: |-
    ```
    PS C:\> $ConfigSection = Get-IISConfigSection -SectionPath "system.webServer/defaultDocument"
    PS C:\> Get-IISConfigCollection $ConfigSection "Files" | Remove-IISConfigCollectionElement  -ConfigAttribute @{"Value" = "MyDefDoc.htm"}
    ```

    This command removes a configuration entry from the list of default documents.
