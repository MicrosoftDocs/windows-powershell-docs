### YamlMime:PowerShellCmdlet1
uid: IISAdministration.Stop-IISSite
name: Stop-IISSite
module: IISAdministration
isPreview: false
summary: |-
  Stops an IIS Web site.
description: |-
  The **Stop-IISSite** cmdlet stops an existing site on the Internet Information Services (IIS) server.
