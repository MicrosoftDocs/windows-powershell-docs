### YamlMime:PowerShellCmdlet1
uid: IpamServer.Get-IpamDhcpScope
name: Get-IpamDhcpScope
module: IpamServer
isPreview: false
summary: |-
  Gets information about DHCP scopes from IPAM database.
description: |-
  The **Get-IpamDhcpScope** cmdlet retrieves information about the Dynamic Host Configuration Protocol (DHCP) scopes in the IP Address Management (IPAM) database.
  Scopes represent the IP addresses that a DHCP server can lease to clients.
  In most cases, scopes correspond to IP subnets.

  As a general rule, DHCP servers can only lease addresses from a single scope.
  However, superscopes provide a mechanism that allows a DHCP server to lease addresses from multiple scopes.
  See the **Get-IpamDhcpSuperscope** cmdlet for more information.
parameters:
  cmdletParameters:
  - name: AddressFamily
    type: <xref href="AddressFamily" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the address family for the DHCP scopes that this cmdlet gets.

      The acceptable values for this parameter are:

      - IPv4
      - IPv6
    acceptedValues:
    - IPv4
    - IPv6
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScopeId
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the ID of the DHCP scope that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerFqdn
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the fully qualified domain name (FQDN) of the DHCP server hosting the DHCP scopes that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-IpamDhcpScope
        [-AddressFamily] <AddressFamily[]>
        [[-ScopeId] <IPAddress[]>]
        [[-ServerFqdn] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <span>undefined</span>
  description: |-
    This cmdlet returns an object that represents an **IpamDhcpScope** object.
examples:
- title: 'Example 1: Get information about all IPv4 scopes'
  description: |-
    ```
    PS C:\> Get-IpamDhcpScope -AddressFamily "IPv4"
    ```

    This command returns all the IPv4 DHCP scopes found in the IPAM database.
- title: 'Example 2: Get information about the IPv4 scopes on a specific server'
  description: |-
    ```
    PS C:\> Get-IpamDhcpScope -AddressFamily "IPv4" -ServerFqdn "dhcp.contoso.com"
    ```

    This command also returns IPv4 DHCP scopes.
    In this case, however, the only scopes returned are the ones found on the server dhcp.contoso.com.
