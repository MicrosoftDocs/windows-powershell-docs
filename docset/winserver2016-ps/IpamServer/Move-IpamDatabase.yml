syntaxes:
- syntax: |-
    ```Syntax
    Move-IpamDatabase
        [-DatabaseServer] <String>
        [-DatabaseName] <String>
        [-DatabasePort] <UInt16>
        -DatabaseAuthType <AuthType>
        [-DatabaseCredential <PSCredential>]
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
