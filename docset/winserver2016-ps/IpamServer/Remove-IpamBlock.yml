syntaxes:
- syntax: |-
    ```Syntax
    Remove-IpamBlock
        [-NetworkId] <String[]>
        [-StartIPAddress] <IPAddress[]>
        [-EndIPAddress] <IPAddress[]>
        [-DeleteAssociatedSubBlocks]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByKeySet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-IpamBlock
        -InputObject <CimInstance[]>
        [-DeleteAssociatedSubBlocks]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
