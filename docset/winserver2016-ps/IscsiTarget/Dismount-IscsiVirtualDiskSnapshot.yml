examples:
- title: 'Example 1: Dismount all snapshots'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDiskSnapshot | Dismount-IscsiVirtualDiskSnapshot
    ```

    This example gets all of the snapshot and dismounts them.
