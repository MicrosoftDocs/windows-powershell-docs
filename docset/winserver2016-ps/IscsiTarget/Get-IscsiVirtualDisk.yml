### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.Get-IscsiVirtualDisk
name: Get-IscsiVirtualDisk
module: IscsiTarget
isPreview: false
summary: |-
  Obtains the iSCSI virtual disks and their associated properties.
description: |-
  The **Get-IscsiVirtualDisk** cmdlet obtains the iSCSI virtual disks and their associated properties.
parameters:
  cmdletParameters:
  - name: ClusterGroupName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group or network in the resource group on which this cmdlet runs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InitiatorId
    type: <xref href="InitiatorId" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the iSCSI initiator identifiers (IDs) to which the iSCSI target is assigned.
      Use this parameter to filter out the iSCSI virtual disk object that can be accessed by the given iSCSI initiator.
      The format for this parameter is IdType:Value.
      The acceptable values for this parameter are: DNSName, IPAddress, IPv6Address, IQN, or MACAddress.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Initiator
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the virtual hard disk (VHD) file that is associated with the iSCSI virtual disk.
      Filter the iSCSI virtual disk object by using this parameter.
    aliases:
    - DevicePath
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Device
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the iSCSI target.
      Use this parameter to filter out the iSCSI virtual disk objects that are assigned to the specified iSCSI target.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Target
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-IscsiVirtualDisk
        [[-Path] <String>]
        [-ClusterGroupName <String>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Device
  isDefault: true
- syntax: |-
    ```Syntax
    Get-IscsiVirtualDisk
        [-ClusterGroupName <String>]
        [-TargetName <String>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Target
  isDefault: false
- syntax: |-
    ```Syntax
    Get-IscsiVirtualDisk
        [-ClusterGroupName <String>]
        [-InitiatorId <InitiatorId>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Initiator
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDisk" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all virtual disks on the local server'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDisk
    ```

    This example gets all of the virtual disks on the local server.
- title: 'Example 2: Get virtual disk by using a path'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDisk -Path "E:\temp\test.vhdx"
    ```

    This example gets the virtual disk object that has the path E:\temp\test.vhdx on the local server.
- title: 'Example 3: Get a virtual disk on a remote server'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDisk -Path "E:\temp\test.vhdx" -ComputerName "fscluster.contoso.com" -ClusterGroupName "target1Group"
    ```

    This example gets the virtual disk object that has the path E:\temp\test.vhdx in the resource group named target1Group on cluster server named fscluster.contoso.com.
- title: 'Example 4: Get virtual disks associated with a target'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDisk -TargetName "TargetOne"
    ```

    This example gets all of the virtual disks that are associated with the target named TargetOne on the local server.
- title: 'Example 5: Get virtual disks by an initial'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDisk -InitiatorId "IpAddress:10.10.1.1"
    ```

    This example gets all of the virtual disks on the local server that are used by the initiator with IP address 10.10.1.1.
