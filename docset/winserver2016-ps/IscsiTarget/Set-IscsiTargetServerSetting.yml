### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.Set-IscsiTargetServerSetting
name: Set-IscsiTargetServerSetting
module: IscsiTarget
isPreview: false
summary: |-
  Sets the global settings or common configurations for an iSCSI target virtual disk.
description: |-
  The **Set-IscsiTargetServerSetting** cmdlet sets the global settings or common configurations for an iSCSI target.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableRemoteManagement
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the computer that runs Microsoft iSCSI Target Server accepts any network-based management requests.
      If you specify a value of $True, iSCSI Target Server does not accept requests issued by thread tokens that contain a SECURITY_NETWORK_RID.

      You can specify this parameter only as a local user on the computer that runs iSCSI Target Server or on the cluster node that owns the iSCSI Target Server clustered role.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ServerGlobal
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the portal state as set by the user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IpScoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IP
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an IP address.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IpScoped
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port number to which the iSCSI target should listen.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IpScoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-IscsiTargetServerSetting
        [-IP] <String>
        [-Port <Int32>]
        [-Enable <Boolean>]
        [-PassThru]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: IpScoped
  isDefault: true
- syntax: |-
    ```Syntax
    Set-IscsiTargetServerSetting
        -DisableRemoteManagement <Boolean>
        [-PassThru]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: ServerGlobal
  isDefault: false
inputs:
- name: <xref href="None." data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiTargetServerSetting" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set target portal port number'
  description: |-
    ```
    PS C:\> Set-IscsiTargetServerSetting -IP 10.1.1.1 -Port 3200
    ```

    This example sets the target portal with the IP address 10.1.1.1 to use port number 3200.
    The default is port number 3260.
- title: 'Example 2: Disable target portal'
  description: |-
    ```
    PS C:\> Set-IscsiTargetServerSetting -IP 10.1.1.1 -Enable $False
    ```

    This example disables the target portal with the IP address 10.1.1.1.
- title: 'Example 3: Enable target portal'
  description: |-
    ```
    PS C:\> Set-IscsiTargetServerSetting -IP 10.1.1.1 -Port 3200 -Enable $True
    ```

    This example enables the target portal with the IP address 10.1.1.1 and changes the port number to 3200.
