    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-DtcLog
        [-DtcName <String>]
        [-Path <String>]
        [-SizeInMB <UInt32>]
        [-MaxSizeInMB <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set the log file path and file size'
  description: |-
    ```
    PS C:\> Set-DtcLog -Path "C:\Windows\system32\MSDtc\NewLog\" -SizeInMB 32 -MaxSizeInMB 1024
    PS C:\> Get-DtcLog
    MaxSizeInMB      : 1024
    Path             : C:\Windows\system32\MSDtc\NewLog
    SizeInMB         : 32
    ```

    The first command sets the path for the DTC log file and specifies the file size.
    The second command confirms the change.
