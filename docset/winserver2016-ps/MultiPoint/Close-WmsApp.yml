syntaxes:
- syntax: |-
    ```Syntax
    Close-WmsApp
        [-SessionId] <UInt32>
        [-ProcessId] <UInt32>
        [-WindowId] <UInt64>
        [-CreateTime] <UInt64>
        [-Server <String>]
        [-WhatIf]
