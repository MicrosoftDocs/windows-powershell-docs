### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Disable-WmsScheduledUpdate
name: Disable-WmsScheduledUpdate
module: MultiPoint
isPreview: false
summary: |-
  Disables scheduled updates while disk protection is enabled and in discard mode.
description: |-
  The **Disable-WmsScheduledUpdate** cmdlet disables scheduled updates while disk protection is enabled and in discard mode.
parameters:
  cmdletParameters:
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-WmsScheduledUpdate
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Disable scheduled updates on the local computer'
  description: |-
    ```
    PS C:\> Disable-WmsScheduledUpdate
    ```

    This command disables scheduled updates on the local computer.
- title: 'Example 2: Disable schedule updates for a specified computer'
  description: |-
    ```
    PS C:\> Disable-WmsScheduledUpdate -Server "sample.microsoft.com"
    ```

    This command disables scheduled updates on the computer sample.microsoft.com
