### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Get-WmsApp
name: Get-WmsApp
module: MultiPoint
isPreview: false
summary: |-
  Gets a collection of currently running applications in a session.
description: |-
  The **Get-WmsApp** cmdlet gets a collection of the currently running applications in a specified session.
  It also gets the process ID, window ID, and process creation time of the applications.
parameters:
  cmdletParameters:
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a Remote Desktop Session (RDS).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsApp
        [-SessionId] <UInt32>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <span>undefined</span>
  description: |-
    This cmdlet returns a **WmsRunningApp** collection as **PSObject** collection.
examples:
- title: 'Example 1: Get running applications'
  description: |-
    ```
    PS C:\> Get-WmsApp -SessionId 3
    Name                                                               ProcessId                                WindowId                           CreateTime
    ----                                                               ------                                   ----                               ----------
    Calculator                                                         4228                                     197108                             129937600254314944
    ```

    This command gets the applications that are running in session 3.
