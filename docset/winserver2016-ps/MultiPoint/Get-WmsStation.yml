### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Get-WmsStation
name: Get-WmsStation
module: MultiPoint
isPreview: false
summary: |-
  Gets station information.
description: |-
  The **Get-WmsStation** cmdlet gets information for the specified station or for all stations.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAll
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of station IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsStation
        [-StationId] <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-WmsStation
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAll
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <span>undefined</span>
  description: |-
    This cmdlet returns a **WmsStation** collection as **PSObject** collection.
examples:
- title: 'Example 1: Get information for all stations'
  description: |-
    ```
    PS C:\> Get-WmsStation -All
    StationId         : 1
    Name              : 1
    IsAutoLogOn       : False
    IsSplit           : False
    CollabId          : 0
    RemoteConnectionServerName   :
    VirtualMachineName           :
    VirtualMachineId  :
    AutoLogOnUserName :
    AutoLogOnPassword :
    DeviceTypes       : {DT_Keyboard, DT_Mouse, DT_Audio, DT_Image...}
    DeviceCounts      : {1, 0, 0, 0...}
    ComputerName      : Test1
    SessionId         : 3
    SessionHostServer  : Test1
    DisplayOrientation : Landscape
    ```

    This command gets MultiPoint Server station information, along with the remote desktop session ID, if a session is associated with it.

    If no session is associated with the station, 4294967295 is returned as the session ID.
