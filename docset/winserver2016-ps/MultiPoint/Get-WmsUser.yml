### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Get-WmsUser
name: Get-WmsUser
module: MultiPoint
isPreview: false
summary: |-
  Gets local user account information.
description: |-
  The **Get-WmsUser** cmdlet gets local user account information for a specified user or all users.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAllUsers
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the user to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetUser
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsUser
        -Name <String>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetUser
  isDefault: false
- syntax: |-
    ```Syntax
    Get-WmsUser
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllUsers
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="WmsUser" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a **WmsUser** collection as **PSObject** collection.
examples:
- title: 'Example 1: Get all local user account information'
  description: |-
    ```
    PS C:\> Get-WmsUser -All
    Name         : Administrator
    Password     :
    FullName     :
    Description  : Built-in account for administering the computer/domain
    UserType     : Administrator
    ComputerName : Test1
    Name         : Guest
    Password     :
    FullName     :
    Description  : Built-in account for guest access to the computer/domain
    UserType     : Standard
    ComputerName : Test1
    ```

    This command gets all local user account information.
