### YamlMime:PowerShellCmdlet1
uid: MultipointVdi.Get-WmsVirtualDesktop
name: Get-WmsVirtualDesktop
module: MultipointVdi
isPreview: false
summary: |-
  Gets a virtual desktop.
description: |-
  The **Get-WmsVirtualDesktop** cmdlet gets the specified virtual desktop or all virtual desktops if you don't specify the *VirtualMachineName* parameter.
parameters:
  cmdletParameters:
  - name: VirtualMachineName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual desktop to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsVirtualDesktop
        [-VirtualMachineName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a virtual desktop by name'
  description: |-
    ```
    PS C:\> Get-WmsVirtualDesktop -VirtualMachineName "MyDesktop"
    ```

    This command gets the virtual desktop named MyDesktop.
