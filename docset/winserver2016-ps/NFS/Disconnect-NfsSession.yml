syntaxes:
- syntax: |-
    ```Syntax
    Disconnect-NfsSession
        [-SessionId] <String[]>
        [[-ClientId] <UInt64[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Disconnect-NfsSession
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Nothing" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disconnect an NFS session for a specified client computer'
  description: |-
    ```
    PS C:\> Disconnect-NfsSession -ClientId 101
    ```

    This command disconnects all NFS sessions on a local NFS server for a client computer that has the ID 101.
