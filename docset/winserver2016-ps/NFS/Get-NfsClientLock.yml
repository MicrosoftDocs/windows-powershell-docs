### YamlMime:PowerShellCmdlet1
uid: NFS.Get-NfsClientLock
name: Get-NfsClientLock
module: NFS
isPreview: false
summary: |-
  Gets file locks that a client computer holds on an NFS server.
description: |-
  The **Get-NfsClientLock** cmdlet gets locks that client computers hold for files that a Network File System (NFS) server shares.

  For NFS v3 protocol locks, this cmdlet gets NFS client locks based on the list of client computers that hold locks to a particular file, and the list of files that a particular client computer has locked.

  For NFS v4 protocol locks, this cmdlet gets NFS client locks based on the list of files that a particular client computer has locked, and the state identifiers of the locked files.

  You can also use the *LockType* parameter to get locked files on an NFS server based on the NFS protocol that the NFS client uses.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet runs the command as a background job on a remote computer.
      Use this parameter to run commands that take an extensive time to finish.

      When you use the *AsJob* parameter, the command returns an object that represents the job, and then displays the command prompt.
      You can continue to work in the session while the job finishes.
      To manage the job, use the **Job** cmdlets.
      To get the job results, use the Receive-Job cmdlet.

      The *AsJob* parameter resembles using the Invoke-Command cmdlet to run a Start-Job command remotely.
      However, with *AsJob*, the job is created on the local computer, even though the job runs on a remote computer, and the results of the remote job are automatically returned to the local computer.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251) and [about_Remote_Jobs](https://go.microsoft.com/fwlink/?LinkID=135184).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name of a computer that holds a lock to files on the NFS server.
      All the locks that the specified computer holds are enumerated.
    aliases:
    - client
    - name
    - ClientComputer
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: v3
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LockType
    type: <xref href="ClientLockType" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of lock types.
      **Get-NfsClientLock** gets files that have the specified lock types.
      Valid values are NLM and NFS.

      Locks acquired by NFS clients that mount files to an NFS share by using the NFS v2 or the NFS v3 protocol are Network Lock Manager (NLM) locks.
      Locks acquired by NFS clients that mount files by using the NFS v4.1 protocol are NFS locks.
    acceptedValues:
    - NLM
    - NFS
    aliases:
    - type
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of paths and file names on the NFS server.
      **Get-NfsClientLock** gets the locked files on an NFS server that have the specified paths.
      If there are multiple clients that have multiple locks on the same file, all the locks are revoked.
    aliases:
    - LockedFile
    - file
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StateId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the state identifier of the locks on the NFS server.
      *StateId* applies only to locks that an NFS client acquires by using the NFS v4.1 protocol.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: v4
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NfsClientLock
        [[-Path] <String[]>]
        [[-LockType] <ClientLockType[]>]
        [[-StateId] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: v4
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NfsClientLock
        [[-Path] <String[]>]
        [[-LockType] <ClientLockType[]>]
        [[-ComputerName] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: v3
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/NFS/MSFT_NfsNlmClientLock" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/NFS/MSFT_Nfsv4ClientLock" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get locked files on a local NFS server'
  description: |-
    ```
    PS C:\> Get-NfsClientLock -Path "c:\shares\NFSshare01\*"
    ```

    This command gets all the locked files on a local NFS server that have a path that begins with C:\shares\NFSshare01\.
- title: 'Example 2: Get locked files on a NFS server that have NLM lock type'
  description: |-
    ```
    PS C:\>Get-NfsClientLock -LockType NLM
    ```

    This command gets all the locked files on the server that have a NLM lock type.
