### YamlMime:PowerShellCmdlet1
uid: NFS.Get-NfsServerConfiguration
name: Get-NfsServerConfiguration
module: NFS
isPreview: false
summary: |-
  Gets configuration settings for an NFS server.
description: |-
  The **Get-NfsServerConfiguration** cmdlet gets a configuration object for a Network File System (NFS) server.
  You can use the Set-NfsServerConfiguration cmdlet to change NFS server settings.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet runs the command as a background job on a remote computer.
      Use this parameter to run commands that take an extensive time to finish.

      When you use the *AsJob* parameter, the command returns an object that represents the job, and then displays the command prompt.
      You can continue to work in the session while the job finishes.
      To manage the job, use the **Job** cmdlets.
      To get the job results, use the Receive-Job cmdlet.

      The *AsJob* parameter resembles using the Invoke-Command cmdlet to run a Start-Job command remotely.
      However, with *AsJob*, the job is created on the local computer, even though the job runs on a remote computer, and the results of the remote job are automatically returned to the local computer.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251) and [about_Remote_Jobs](https://go.microsoft.com/fwlink/?LinkID=135184).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NfsServerConfiguration
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/NFS/MSFT_NfsServerConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get local NFS server settings'
  description: |-
    ```
    PS C:\> Get-NfsServerConfiguration
    State                                      : Running
    LogActivity                                :
    CharacterTranslationFile                   : Not Configured
    DirectoryCacheSize                         : 128
    HideFilesBeginningInDot                    : Disabled
    EnableNFSV2                                : Enabled
    EnableNFSV3                                : Enabled
    EnableNFSV4                                : Enabled
    EnableAuthenticationRenewal                : Enabled
    AuthenticationRenewalIntervalSec           : 600
    NlmGracePeriodSec                          : 45
    MountProtocol                              : {TCP, UDP}
    NfsProtocol                                : {TCP, UDP}
    NisProtocol                                : {TCP, UDP}
    NlmProtocol                                : {TCP, UDP}
    NsmProtocol                                : {TCP, UDP}
    PortmapProtocol                            : {TCP, UDP}
    MapServerProtocol                          : {TCP, UDP}
    PreserveInheritance                        : False
    NetgroupCacheTimeoutSec                    : 30
    UnmappedUserAccount                        :
    WorldAccount                               : Everyone
    AlwaysOpenByName                           : False
    GracePeriodSec                             : 240
    LeasePeriodSec                             : 120
    OnlineTimeoutSec                           : 180
    ```

    This command gets the configuration settings for a local NFS server.
