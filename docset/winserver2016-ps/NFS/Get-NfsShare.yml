syntaxes:
- syntax: |-
    ```Syntax
    Get-NfsShare
        [[-Name] <String[]>]
        [[-NetworkName] <String[]>]
        [-ExcludeName <String[]>]
        [-IsClustered]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NfsShare
        -LiteralName <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NfsShare
        [[-Path] <String[]>]
        [[-NetworkName] <String[]>]
        [-ExcludePath <String[]>]
        [-IsClustered]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
