syntaxes:
- syntax: |-
    ```Syntax
    Remove-NfsShare
        [-Name] <String[]>
        [[-NetworkName] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-NfsShare
        [-Path] <String[]>
        [[-NetworkName] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-NfsShare
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove an NFS share by name'
  description: |-
    ```
    PS C:\> Remove-NfsShare -Name "NFSshare01"
    Are you sure you want to perform this action?
    Performing operation "Remove Share" on Target "C:\shares\NFSshare01".
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): y
    ```

    This command stops sharing the folder C:\shares\NFSshare01 named NFSshare01.
- title: 'Example 2: Remove an NFS share by its path'
  description: |-
    ```
    PS C:\> Remove-NfsShare -Path "C:\shares\NFSshare01"
    Are you sure you want to perform this action?
    Performing operation "Remove Share" on Target "C:\shares\NFSshare01".
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): y
    ```

    This command stops sharing the folder that has the path C:\shares\NFSshare01.
