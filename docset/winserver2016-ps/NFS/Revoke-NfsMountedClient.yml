examples:
- title: 'Example 1: Revoke a mounted client from a local NFS server'
  description: |-
    ```
    PS C:\> Revoke-NfsMountedClient -ClientId 101
    ```

    This command revokes a mounted client that has the ID 101 from a local NFS server.
