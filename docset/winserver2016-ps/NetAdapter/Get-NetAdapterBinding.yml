### YamlMime:PowerShellCmdlet1
uid: NetAdapter.Get-NetAdapterBinding
name: Get-NetAdapterBinding
module: NetAdapter
isPreview: false
summary: |-
  Gets a list of bindings for a network adapter.
description: |-
  The **Get-NetAdapterBinding** cmdlet gets a list of bindings for a network adapter.
  By default only the visible bindings shown in the Networking tab under the Network Adapter properties in Windows UI is returned.
  To get all properties for a network adapter, use the *AllProperties* parameter.
parameters:
  cmdletParameters:
  - name: AllBindings
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet gets all the bindings for the network adapter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
      Use this parameter to run commands that take a long time to complete.
       The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.
       For more information about Windows PowerShell® background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComponentID
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of underlying names of the transport or filter in the following form: `ms_xxxx`, such as `ms_tcpip`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisplayName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of transport or filter names shown in the Networking tab under the network adapter properties in Windows Server® 2012 and later.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeHidden
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet includes both visible and hidden network adapters in the operation.
      By default only visible network adapters are included.
      If a wildcard character is used in identifying a network adapter and this parameter has been specified, then the wildcard string is matched against both hidden and visible network adapters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceDescription
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the network adapter interface description.
      For a physical network adapter this is typically the name of the vendor of the network adapter followed by a part number and description, such as `Contoso 12345 Gigabit Network Device`.
    aliases:
    - ifDesc
    - InstanceID
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByInstanceID
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of network adapter names.
    aliases:
    - ifAlias
    - InterfaceAlias
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetAdapterBinding
        [[-Name] <String[]>]
        [-ComponentID <String[]>]
        [-DisplayName <String[]>]
        [-IncludeHidden]
        [-AllBindings]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetAdapterBinding
        -InterfaceDescription <String[]>
        [-ComponentID <String[]>]
        [-DisplayName <String[]>]
        [-IncludeHidden]
        [-AllBindings]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter BindingSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get bindings for the specified network adapter'
  description: |-
    ```
    PS C:\> Get-NetAdapterBinding -Name "MyAdapter"
    ```

    This command gets the bindings for the network adapter named MyAdapter.
- title: 'Example 2: Get all of the binding for the specified network adapter in an unformatted list'
  description: |-
    ```
    PS C:\> Get-NetAdapterBinding -Name "MyAdapter" -AllBindings
    ```

    This command gets all of the bindings for the network adapter named MyAdapter as an unformatted list .
- title: 'Example 3: Get the state of TCP/IPv4 on the specified network adapter using the display name'
  description: |-
    ```
    PS C:\> Get-NetAdapterBinding -Name "MyAdapter" -DisplayName "Internet Protocol Version 4 (TCP/IPv4)"
    ```

    This command gets the state of the TCP/IPv4 on the network adapter named MyAdapter using display name.
- title: 'Example 4: Get the state of the TCP/IPv4 transport on the specified network adapter'
  description: |-
    ```
    PS C:\> Get-NetAdapterBinding -Name "MyAdapter"  -ComponentID ms_tcpip
    ```

    This command gets the state of the TCP/IPv4 transport on MyAdapter using component ID.
- title: 'Example 5: Get the state of TCP/IPv4 and TCP/IPv6 on all visible network adapters using a search string'
  description: |-
    ```
    PS C:\> Get-NetAdapterBinding -Name "*" -DisplayName "Internet*"
    ```

    This command gets the state of TCP/IPv4 and TCP/IPv6 on all visible network adapters using wildcard characters.
