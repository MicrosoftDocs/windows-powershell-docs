syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterBinding
        [-Name] <String[]>
        [-ComponentID <String[]>]
        [-DisplayName <String[]>]
        [-IncludeHidden]
        [-AllBindings]
        [-Enabled <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterBinding
        -InterfaceDescription <String[]>
        [-ComponentID <String[]>]
        [-DisplayName <String[]>]
        [-IncludeHidden]
        [-AllBindings]
        [-Enabled <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterBinding
        -InputObject <CimInstance[]>
        [-Enabled <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter BindingSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter BindingSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Enable TCP/IPv4 on the specified network adapter'
  description: |-
    ```
    PS C:\> Set-NetAdapterBinding -Name "MyAdapter" -DisplayName "Internet Protocol Version 4 (TCP/IPv4)" -Enabled $True
    ```

    This command enables TCP/IPv4 on the network adapter named MyAdapter.
- title: 'Example 2: Disable TCP/IPv4 on the specified network adapter'
  description: |-
    ```
    PS C:\> Set-NetAdapterBinding -Name "MyAdapter" -DisplayName "Internet Protocol Version 4 (TCP/IPv4)" -Enabled $False
    ```

    This command disables TCP/IPv4 on the network adapter named MyAdapter.
- title: 'Example 3: Enable TCP/IPv4 on the specified network adapter using the component ID'
  description: |-
    ```
    PS C:\> Set-NetAdapterBinding -Name "MyAdapter" -ComponentID ms_tcpip -Enabled $True
    ```

    This command enables TCP/IPv4 on the network adapter named MyAdapter using the component ID.
