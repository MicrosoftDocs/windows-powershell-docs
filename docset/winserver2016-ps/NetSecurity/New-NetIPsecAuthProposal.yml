    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: HealthCert
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: MachineKerb
      position: "1"
      isRequired: true
