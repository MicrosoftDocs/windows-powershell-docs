      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrimaryStatus
    type: <xref href="PrimaryStatus" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies that firewall rules that match the indicated primary status are removed.
      This parameter specifies the overall status of the rule.
      - OK: Specifies that the rule will work as specified.
      - Degraded: Specifies that one or more parts of the rule will not be enforced.
       -- Error: Specifies that the computer is unable to use the rule at all.
      See the Status and StatusCode fields of the object for more detailed status information.
    acceptedValues:
    - Unknown
    - OK
    - Inactive
    - Error
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
