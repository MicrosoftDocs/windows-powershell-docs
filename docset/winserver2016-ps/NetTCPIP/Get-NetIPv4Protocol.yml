    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetIPv4Protocol
        [-DefaultHopLimit <UInt32[]>]
        [-NeighborCacheLimitEntries <UInt32[]>]
        [-RouteCacheLimitEntries <UInt32[]>]
        [-ReassemblyLimitBytes <UInt32[]>]
        [-IcmpRedirects <IcmpRedirects[]>]
        [-SourceRoutingBehavior <SourceRoutingBehavior[]>]
        [-DhcpMediaSense <DhcpMediaSense[]>]
        [-MediaSenseEventLog <MediaSenseEventLog[]>]
        [-IGMPLevel <MldLevel[]>]
        [-IGMPVersion <MldVersion[]>]
        [-MulticastForwarding <MulticastForwarding[]>]
        [-GroupForwardedFragments <GroupForwardedFragments[]>]
        [-RandomizeIdentifiers <RandomizeIdentifiers[]>]
        [-AddressMaskReply <AddressMaskReply[]>]
        [-MinimumMtu <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetIPv4Protocol" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get all IPv4 protocol configurations'
  description: |-
    ```
    PS C:\>Get-NetIPv4Protocol
    ```

    This command gets the global settings for all the IPv4 protocol configurations for the computer.
    The default output for the cmdlet does not include all properties of the **NetIPv4Protocol** object.
- title: 'Example 2: Output all settings for IPv4 protocol configurations'
  description: |-
    ```
    PS C:\>Get-NetIPv4Protocol | Format-List -Property *
    ```

    This command gets the global settings for all IPv4 protocol configurations for the computer.
    The command uses the Format-List cmdlet to display all the properties in the output in the form of a table.
    For more information, type `Get-Help Format-Table`.
