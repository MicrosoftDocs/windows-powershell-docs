### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Get-NetTransportFilter
name: Get-NetTransportFilter
module: NetTCPIP
isPreview: false
summary: |-
  Gets transport filters.
description: |-
  The **Get-NetTransportFilter** cmdlet gets transport filters.
  A transport filter specifies the TCP settings, as a **NetTcpSetting** object, to apply to an IP address prefix or a TCP port range.
  Use the cmdlet without parameters to get all transport filters for the computer.

  Use the New-NetTransportFilter cmdlet to create transport filters, and use the Remove-NetTransportFilter cmdlet to remove filters.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssociatedTCPSetting
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **NetTCPSetting** object.
      The cmdlet gets transport filters associated with the setting that you specify.
      To obtain a **NetTCPSetting** object, use the Get-NetTCPSetting cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of destination prefixes of IP routes.
      The cmdlet gets transport filters that have the prefixes that you specify.
      A destination prefix consists of an IP address prefix and a prefix length, separated by a slash (/).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPortEnd
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of upper bounds of ranges of local TCP ports.
      The cmdlet removes transport filters that have the upper bounds that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPortStart
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of lower bounds of ranges of local TCP ports.
      The cmdlet removes transport filters that have the lower bounds that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="Protocol" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of types of routing protocols.
      The cmdlet gets transport filters based on the protocols that you specify.
      The acceptable values for this parameter are:

      - Bbn
      - Bgp
      - Dhcp
      - Dvmrp
      - Egp
      - Eigrp
      - EsIs
      - Ggp
      - Hello
      - Icmp
      - Idpr
      - Igrp
      - IsIs
      - Local
      - NetMgmt
      - Ospf
      - Rip
      - Rpl
      - Other
    acceptedValues:
    - TCP
    - UDP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePortEnd
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of upper bounds of ranges of remote TCP ports.
      The cmdlet removes transport filters that have the upper bounds that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePortStart
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of lower bounds of a ranges of remote TCP ports.
      The cmdlet removes transport filters that have the lower bounds that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SettingName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of setting names.
      The cmdlet gets transport filters that have the settings that you specify.
      The acceptable values for this parameter are:

      - Internet
      - Datacenter
      - Compat
      - Custom
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetTransportFilter
        [-SettingName <String[]>]
        [-Protocol <Protocol[]>]
        [-LocalPortStart <UInt16[]>]
        [-LocalPortEnd <UInt16[]>]
        [-RemotePortStart <UInt16[]>]
        [-RemotePortEnd <UInt16[]>]
        [-DestinationPrefix <String[]>]
        [-AssociatedTCPSetting <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetTransportFilter" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get all transport filters'
  description: |-
    ```
    PS C:\>Get-NetTransportFilter
    ```

    This command gets all the transport filters on the computer.
- title: 'Example 2: Get transport filters that apply specified settings'
  description: |-
    ```
    PS C:\>Get-NetTransportFilter -SettingName Internet
    ```

    This command gets transport filters that apply Internet settings.
