syntaxes:
- syntax: |-
    ```Syntax
    Set-NetUDPSetting
        [-InputObject <CimInstance[]>]
        [-DynamicPortRangeStartPort <UInt16>]
        [-DynamicPortRangeNumberOfPorts <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetPrefixPolicy" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify the dynamic port range for UDP'
  description: |-
    ```
    PS C:\>Set-NetUDPSetting -DynamicPortRangeStartPort 49152 -DynamicPortRangeNumberOfPorts 1700
    ```

    This command modifies the port range from which applications can send and receive UDP traffic.
