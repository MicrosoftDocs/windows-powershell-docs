### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Set-NetUDPSetting
name: Set-NetUDPSetting
module: NetTCPIP
isPreview: false
summary: |-
  Modifies UDP settings.
description: |-
  The **Set-NetUDPSetting** cmdlet modifies UDP settings of the IP interface.
  Use this cmdlet to change the starting port and the number of ports for the dynamic port range.
  You can use the *InputObject* parameter to specify a **NetUDPSetting** object for the input to this cmdlet.
  Use the Get-NetUDPSetting to get a **NetUDPSetting** object.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
