syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerVirtualGatewayBgpRouter
        [-VirtualGatewayId] <String>
        [-ResourceId] <String>
        [-Properties] <VGwBgpRouterProperties>
        [[-ResourceMetadata] <ResourceMetadata>]
        [[-Etag] <String>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
