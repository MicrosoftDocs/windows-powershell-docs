### YamlMime:PowerShellCmdlet1
uid: NetworkController.Remove-NetworkControllerVirtualNetwork
name: Remove-NetworkControllerVirtualNetwork
module: NetworkController
isPreview: false
summary: |-
  This cmdlet removes a virtual network from the Network Controller
description: |-
  This cmdlet removes a virtual network from the Network Controller
parameters:
  cmdletParameters:
  - name: CertificateThumbPrint
    type: <xref href="string" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the digital public key X.509 certificate of a user account that has permission to perform this action.
      This is the certificate thumbprint of the certificate.
      This thumbprint must also be provided in the ClientCertificateThumbprint parameter in the Install-NetworkController or Set-NetworkController cmdlet so that Network Controller can authorize this user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionUri
    type: <xref href="Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Uniform Resource Identifier (URI) of the Network Controller, used by all Representational State Transfer (REST) clients to connect to Network Controller.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user credential that has permission to perform this action.
      The default value is the current user.This user must be present in the security group provided in the ClientSecurityGroup parameter in the Install-NetworkController cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Etag
    type: <xref href="string" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the entity tag (ETag) parameter of the resource.
      An ETag (entity tag) is an HTTP response header returned by an HTTP-compliant web server used to determine change in the content of a resource at a given URL.
      The value of the header is an opaque string representing the state of the resource at the time the response was generated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="switch" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="string" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the virtual network to be removed
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetworkControllerVirtualNetwork
        -ConnectionUri <Uri>
        -ResourceId <string>
        [-CertificateThumbPrint <string>]
        [-Credential <PSCredential>]
        [-Etag <string>]
        [-Force]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: Example 1
  description: |-
    ```
    Remove-NetworkControllerVirtualNetwork -ConnectionUri https://networkcontroller -ResourceId vnet1
    ```

    Description



    The above cmdlet removes a virtual network named vnet1 from the Network Controller.
