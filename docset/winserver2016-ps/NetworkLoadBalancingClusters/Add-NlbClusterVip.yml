syntaxes:
- syntax: |-
    ```Syntax
    Add-NlbClusterVip
        [-IP] <IPAddress>
        -InterfaceName <String>
        [-SubnetMask <IPAddress>]
        [-HostName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Add-NlbClusterVip
        [-IP] <IPAddress>
        -InputObject <Cluster[]>
        [-SubnetMask <IPAddress>]
