syntaxes:
- syntax: |-
    ```Syntax
    Set-NlbClusterVip
        [-IP] <IPAddress>
        -InterfaceName <String>
        -NewIP <IPAddress>
        [-HostName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NlbClusterVip
        -InputObject <ClusterVip[]>
