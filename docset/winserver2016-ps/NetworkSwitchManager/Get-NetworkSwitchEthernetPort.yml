syntaxes:
- syntax: |-
    ```Syntax
    Get-NetworkSwitchEthernetPort
        -CimSession <CimSession>
        [-DeviceId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: DeviceIDSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetworkSwitchEthernetPort
        -CimSession <CimSession>
        [-FullDuplexEnabled]
        [<CommonParameters>]
    ```
  parameterSetName: FullDuplexEnabledSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetworkSwitchEthernetPort
        -CimSession <CimSession>
        [-FullDuplexDisabled]
        [<CommonParameters>]
    ```
  parameterSetName: FullDuplexDisabledSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetworkSwitchEthernetPort
        -CimSession <CimSession>
