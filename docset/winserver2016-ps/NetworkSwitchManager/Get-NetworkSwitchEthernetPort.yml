### YamlMime:PowerShellCmdlet1
uid: NetworkSwitchManager.Get-NetworkSwitchEthernetPort
name: Get-NetworkSwitchEthernetPort
module: NetworkSwitchManager
isPreview: false
summary: |-
  Gets port information for a network switch.
description: |-
  The **Get-NetworkSwitchEthernetPort** cmdlet gets port information for a network switch.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **CimSession** that this cmdlet uses to connect to the network switch.
      For more information about **CimSession** objects, type `Get-Help New-CimSession`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a device ID.
      This cmdlet gets information for the port that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DeviceIDSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FullDuplexDisabled
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns only ports that have **FullDuplex** disabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FullDuplexDisabledSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FullDuplexEnabled
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns only ports that have **FullDuplex** enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FullDuplexEnabledSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PortNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a port number.
      This cmdlet gets the port that the parameter specifies.
