uid: NetworkSwitchManager.Remove-NetworkSwitchEthernetPortIPAddress
name: Remove-NetworkSwitchEthernetPortIPAddress
module: NetworkSwitchManager
isPreview: false
summary: |-
  Removes an IP address from a port of a network switch.
description: |-
  The **Remove-NetworkSwitchEthernetPortIPAddress** cmdlet removes an assigned IP address from a port of a network switch.
