### YamlMime:PowerShellCmdlet1
uid: NetworkTransition.Enable-NetDnsTransitionConfiguration
name: Enable-NetDnsTransitionConfiguration
module: NetworkTransition
isPreview: false
summary: |-
  Enables the DNS64 configuration on a computer.
description: |-
  The **Enable-NetDnsTransitionConfiguration** makes the DNS64 configuration effective on a computer.
