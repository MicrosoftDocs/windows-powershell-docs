### YamlMime:PowerShellCmdlet1
uid: NetworkTransition.Set-NetIPHttpsConfiguration
name: Set-NetIPHttpsConfiguration
module: NetworkTransition
isPreview: false
summary: |-
  Modifies an IP-HTTPS configuration.
description: |-
  The **Set-NetIPHttpsConfiguration** cmdlet modifies an IP-HTTPS configuration.

  You can specify the IP-HTTPS configuration profile to modify either by using a configuration object retrieved by the Get-NetIPHttpsConfiguration cmdlet or by specifying the profile name.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthMode
    type: <xref href="AuthMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication mode.
      The acceptable values for this parameter are:

      - None.
      Performs no client authentication during the SSL handshake.
      This is the default value.
      - Certificates.
      Uses client certificates to authenticate clients.
      This authentication mode applies only to a server interface on a computer running Windows Server® 2012 or Windows Server 2016.
    acceptedValues:
    - None
    - Certificates
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GPOSession
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Group Policy session to which to store the configuration information.

      You can use this parameter with the **NetGPO** cmdlets to aggregate multiple operations performed on a Group Policy Object (GPO).

      You cannot use this parameter with the *PolicyStore* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByGpoSession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store that contains the IP-HTTPS configuration profile to set.
      The acceptable values for this parameter are:

      - ActiveStore
      - PersistentStore
      - GPO

      To set the configuration profile of a GPO, specify the GPO name using the following format: Domain\GPOName

      You cannot use this parameter with the *GPOSession* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the profile to modify.
      This parameter is only allowed when the store is a GPO.
    aliases:
    - IPHttpsProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByGpoSession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProfileActivated
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Filters the objects to modify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByGpoSession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerURL
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URL for the server.
      If the profile is a client profile, Windows attempts to connect to the server URL.
      If the profile is a server profile, then this is the URL to which the server listens.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="State" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the state behavior of IP-HTTPS.
      The acceptable values for this parameter are:

      - Default.
       ---- For a server interface, IP-HTTPS is always configured.
      ---- For a client interface, IP-HTTPS is configured on demand based on the other connectivity options available.
      Client interfaces are created with this setting by default.
      - Enabled.
      IP-HTTPS is always configured, for both server interfaces and client interfaces.
      Server interfaces are created with this setting by default.
      - Disabled.
      Disables the IP-HTTPS interface.
      - OutsideEnabled.
      IP-HTTPs is configured on demand whenever the computer is outside of the corporate network.
    acceptedValues:
    - Default
    - Enabled
    - Disabled
    - OutsideEnabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StrongCRLRequired
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Determines if a strong certificate revocation list (CRL) check is required before connection.

      The default value is False.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="Type" data-throw-if-not-resolved="False" />
    description: |-
      Specifies if IP-HTTPS should start in server mode or client mode.
      The parameter value set to server mode is only allowed on Windows Server 2012 or Windows Server 2016.
    acceptedValues:
    - Client
    - Server
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
