syntaxes:
- syntax: |-
    ```Syntax
    Set-NetIPHttpsConfiguration
        [-Profile <String[]>]
        [-ProfileActivated <Boolean[]>]
        [-PolicyStore <String>]
        [-State <State>]
        [-Type <Type>]
        [-AuthMode <AuthMode>]
        [-StrongCRLRequired <Boolean>]
        [-ServerURL <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPolicyStore
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetIPHttpsConfiguration
        [-Profile <String[]>]
        [-ProfileActivated <Boolean[]>]
        [-GPOSession <String>]
        [-State <State>]
        [-Type <Type>]
        [-AuthMode <AuthMode>]
        [-StrongCRLRequired <Boolean>]
        [-ServerURL <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByGpoSession
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetIPHttpsConfiguration
        -InputObject <CimInstance[]>
        [-State <State>]
        [-Type <Type>]
        [-AuthMode <AuthMode>]
        [-StrongCRLRequired <Boolean>]
        [-ServerURL <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet accepts no input objects.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetIpHTTPsConfiguration" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.

    When the *Passthru* parameter is specified, this cmdlet outputs a modified IP-HTTPS configuration object.
examples:
- title: 'Example 1: Set the server URL of the profile'
  description: |-
    ```
    PS C:\>Set-NetIPHttpsConfiguration -Profile "Redmond" -ServerURL "https://da.com:443/IPHTTPs" -PolicyStore "Domain\TestGPO"
    ```

    This command modifies the profile named Redmond in the GPO named TestGPO, modifying the server URL.
- title: 'Example 2: Set the server URL using IP-HTTPS configuration object'
  description: |-
    ```
    PS C:\>Get-NetIPHttpsConfiguration -Profile "Redmond" -PolicyStore "Domain\TestGPO" | Set-NetIPHttpsConfiguration -ServerURL "https://da.com:443/IPHTTPs"
    ```

    This command gets the IP-HTTPS configuration profile named Redmond in the GPO named TestGPO using the Get-NetIPHttpsConfiguration cmdlet, and then provides the output object as input to this cmdlet using the pipeline operator.
