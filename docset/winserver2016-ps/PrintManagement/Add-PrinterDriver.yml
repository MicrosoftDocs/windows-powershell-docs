syntaxes:
- syntax: |-
    ```Syntax
    Add-PrinterDriver
        [-Name] <String>
        [[-InfPath] <String>]
        [-PrinterEnvironment <String>]
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
