syntaxes:
- syntax: |-
    ```Syntax
    Add-PrinterPort
        [-Name] <String>
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: local
  isDefault: true
- syntax: |-
    ```Syntax
    Add-PrinterPort
        [-Name] <String>
        [-LprHostAddress] <String>
        [-LprQueueName] <String>
        [-ComputerName <String>]
        [-SNMP <UInt32>]
        [-SNMPCommunity <String>]
        [-LprByteCounting]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: tcplpr
  isDefault: false
- syntax: |-
    ```Syntax
    Add-PrinterPort
        [-Name] <String>
        [-PrinterHostAddress] <String>
        [-ComputerName <String>]
        [-PortNumber <UInt32>]
        [-SNMP <UInt32>]
        [-SNMPCommunity <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: tcp
  isDefault: false
- syntax: |-
    ```Syntax
    Add-PrinterPort
        [-HostName] <String>
        [-PrinterName] <String>
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
