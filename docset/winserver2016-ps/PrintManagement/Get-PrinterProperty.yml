syntaxes:
- syntax: |-
    ```Syntax
    Get-PrinterProperty
        [[-PropertyName] <String[]>]
        [-ComputerName <String>]
        [-PrinterName] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
