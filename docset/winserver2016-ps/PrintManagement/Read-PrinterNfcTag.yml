syntaxes:
- syntax: |-
    ```Syntax
    Read-PrinterNfcTag
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
