### YamlMime:PowerShellCmdlet1
uid: ProcessMitigations.ConvertTo-ProcessMitigationPolicy
name: ConvertTo-ProcessMitigationPolicy
module: ProcessMitigations
isPreview: false
summary: |-
  Converts an mitigation policy file formats.
description: |-
  Converts an EMET policy file or pinning rule file to a new Windows 10 format.
parameters:
  cmdletParameters:
  - name: EMETFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    aliases:
    - f
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OutputFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    aliases:
    - o
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    ConvertTo-ProcessMitigationPolicy
        -EMETFilePath <String>
        -OutputFilePath <String>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> ConvertTo-ProcessMitigationPolicy -EMETFilePath policy.xml -OutputFilePath result.xml
    ```

    Converts EMET file policy.xml to result.xml, may also generate a CI file CI-result.xml if necessary.
