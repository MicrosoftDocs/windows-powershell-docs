    IPv4Subnet                       : {172.23.90.4/32:100}
    IPv4TriggerFilter                :
    IPv6Subnet                       :
    IPv6TriggerFilter                :
    LastError                        : 0
    LocalVpnTrafficSelector          : {VpnTrafficSelector}
    MMSALifeTime                     : 28800
    Name                             : Blue-Tunnel-2_9e8ddf33-cadc-48bd-861b-150311c53c9a
    NetworkOutageTime                : 15
