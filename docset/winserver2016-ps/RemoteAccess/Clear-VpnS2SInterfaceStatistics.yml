syntaxes:
- syntax: |-
    ```Syntax
    Clear-VpnS2SInterfaceStatistics
        [-Name] <String>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
