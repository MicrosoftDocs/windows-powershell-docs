examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\> Clear-VpnS2SInterfaceStatistics -Name 2-edge1 -PassThru
    True
    ```

    This example clears statistics for the S2S VPN interface named 2-edge1.
