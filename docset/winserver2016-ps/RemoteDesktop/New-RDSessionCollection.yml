syntaxes:
- syntax: |-
    ```Syntax
    New-RDSessionCollection
        [-CollectionName] <String>
        -SessionHost <String[]>
        [-CollectionDescription <String>]
        [-ConnectionBroker <String>]
        [-PersonalUnmanaged]
        [-AutoAssignUser]
        [-GrantAdministrativePrivilege]
        [<CommonParameters>]
    ```
  parameterSetName: PersonalSessionCollection
  isDefault: false
- syntax: |-
    ```Syntax
    New-RDSessionCollection
        [-CollectionName] <String>
