### YamlMime:PowerShellCmdlet1
uid: RemoteDesktop.Remove-RDPersonalVirtualDesktopAssignment
name: Remove-RDPersonalVirtualDesktopAssignment
module: RemoteDesktop
isPreview: false
summary: |-
  Removes the association between a personal virtual desktop and a user.
description: |-
  The **Remove-RDPersonalVirtualDesktopAssignment** cmdlet removes an existing association between a personal virtual desktop and a user.
  This removal makes the virtual desktop available for another user.
parameters:
  cmdletParameters:
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a personal virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a Remote Desktop deployment.
      If you do not supply a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: User
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user account to remove, in DOMAIN\User format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoveByUser
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualDesktopName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual desktop.
      This parameter is required.
      The virtual desktop identified here must be a member of the collection that the *CollectionName* parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoveByDesktop
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-RDPersonalVirtualDesktopAssignment
        [-CollectionName] <String>
        [-User] <String>
        [-ConnectionBroker <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByUser
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-RDPersonalVirtualDesktopAssignment
        [-CollectionName] <String>
        [-VirtualDesktopName] <String>
        [-ConnectionBroker <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByDesktop
  isDefault: false
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a personal virtual desktop assignment by user'
  description: |-
    ```powershell
    PS C:\>Remove-RDPersonalVirtualDesktopAssignment -CollectionName "Virtual Desktop Collection" -User "CONTOSO\sarahjones"
    ```

    This command removes a personal virtual desktop assignment by user.
- title: 'Example 2: Remove a personal virtual desktop assignment virtual desktop name'
  description: |-
    ```powershell
    PS C:\>Remove-RDPersonalVirtualDesktopAssignment -CollectionName "Virtual Desktop Collection" -VirtualDesktopName "PVD-12"
    ```

    This command removes a personal virtual desktop assignment by virtual desktop name.
