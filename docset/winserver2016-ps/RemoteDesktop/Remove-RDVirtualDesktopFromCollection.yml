### YamlMime:PowerShellCmdlet1
uid: RemoteDesktop.Remove-RDVirtualDesktopFromCollection
name: Remove-RDVirtualDesktopFromCollection
module: RemoteDesktop
isPreview: false
summary: |-
  Removes virtual desktops from a virtual desktop collection.
description: |-
  The **Remove-RDVirtualDesktopFromCollection** cmdlet removes one or more virtual desktops from a virtual desktop collection.
parameters:
  cmdletParameters:
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
