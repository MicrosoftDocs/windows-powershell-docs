### YamlMime:PowerShellCmdlet1
uid: ScheduledTasks.Set-ScheduledTask
name: Set-ScheduledTask
module: ScheduledTasks
isPreview: false
summary: |-
  Modifies a scheduled task.
description: |-
  The **Set-ScheduledTask** cmdlet modifies a task definition.

  You can make changes to a task definition even if an instance of the task is running.
  The changes do not affect the current instance.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of work items to be performed by the task.
      If you specify several actions, the computer runs them in order.
      You can specify up to 32 actions.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: User
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Principal
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
