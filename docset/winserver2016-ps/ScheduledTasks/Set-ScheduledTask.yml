syntaxes:
- syntax: |-
    ```Syntax
    Set-ScheduledTask
        [[-Password] <String>]
        [[-User] <String>]
        [[-Action] <CimInstance[]>]
        [[-TaskPath] <String>]
        [[-Settings] <CimInstance>]
        [[-Trigger] <CimInstance[]>]
        [-TaskName] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: User
  isDefault: true
- syntax: |-
    ```Syntax
    Set-ScheduledTask
        [-InputObject] <CimInstance>
        [[-Password] <String>]
