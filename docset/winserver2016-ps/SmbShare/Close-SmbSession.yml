syntaxes:
- syntax: |-
    ```Syntax
    Close-SmbSession
        [[-SessionId] <UInt64[]>]
        [-ClientComputerName <String[]>]
        [-ClientUserName <String[]>]
        [-ScopeName <String[]>]
        [-ClusterNodeName <String[]>]
        [-SmbInstance <SmbInstance>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
    ```Syntax
    Close-SmbSession
        -InputObject <CimInstance[]>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
