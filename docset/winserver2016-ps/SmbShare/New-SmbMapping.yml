### YamlMime:PowerShellCmdlet1
uid: SmbShare.New-SmbMapping
name: New-SmbMapping
module: SmbShare
isPreview: false
summary: |-
  Creates an SMB mapping.
description: |-
  The **New-SmbMapping** cmdlet creates a Server Message Block (SMB) mapping on the SMB client to an SMB share.
