### YamlMime:PowerShellCmdlet1
uid: SmbShare.New-SmbShare
name: New-SmbShare
module: SmbShare
isPreview: false
summary: |-
  Creates an SMB share.
description: |-
  The **New-SmbShare** cmdlet exposes a file system folder to remote clients as a Server Message Block (SMB) share.

  To delete a share that was created by this cmdlet, use the Remove-SmbShare cmdlet.

  > [!NOTE]
  > The **WhatIf** parameter does not work with this cmdlet.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CachingMode
    type: <xref href="CachingMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the caching mode of the offline files for the SMB share.
      There are five caching modes:

      - None.
      Prevents users from storing documents and programs offline.
      - Manual.
      Allows users to identify the documents and programs they want to store offline.
      - Programs.
      Automatically stores documents and programs offline.
      - Documents.
      Automatically stores documents offline.
      - BranchCache.
      Enables BranchCache and manual caching of documents on the shared folder.
    acceptedValues:
    - None
    - Manual
    - Documents
    - Programs
    - BranchCache
    - Unknown
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CATimeout
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the continuous availability time-out for the share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ChangeAccess
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies which users are granted modify permission to access the share.
      Multiple users can be specified by using a comma-separated list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentUserLimit
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrently connected users that the new SMB share may accommodate.
      If this parameter is set to zero (0), then the number of users is unlimited.
      The default value is zero (0).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContinuouslyAvailable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the share is continuously available.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an optional description of the SMB share.
      A description of the share is displayed by running the Get-SmbShare cmdlet.
      The description may not contain more than 256 characters.
      The default value no description, or an empty description.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptData
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the share is encrypted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FolderEnumerationMode
    type: <xref href="FolderEnumerationMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies which files and folders in the SMB share are visible to users.
      The acceptable values for this parameter are:

      - AccessBased.
      SMB does not display the files and folders for a share to a user unless that user has rights to access the files and folders.
      By default, access-based enumeration is disabled for new SMB shares.
      - Unrestricted.
      SMB displays files and folders to a user even when the user does not have permission to access the items.

      The default value is Unrestricted.
    acceptedValues:
    - AccessBased
    - Unrestricted
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FullAccess
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies which accounts are granted full permission to access the share.
      Use a comma-separated list to specify multiple accounts.
      An account may not be specified more than once in the *FullAccess*, *ChangeAccess*, or *ReadAccess* parameter lists, but may be specified once in the *FullAccess*, *ChangeAccess*, or *ReadAccess* parameter list and once in the *NoAccess* parameter list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the SMB share.
      The name may be composed of any valid file name characters, but must be less than 80 characters long.
      The names `pipe` and `mailslot` are reserved for use by the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NoAccess
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies which accounts are denied access to the SMB share.
      Multiple accounts can be specified by supplying a comma-separated list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the location of the folder to share.
      The path must be fully qualified.
      Relative paths or paths that contain wildcard characters are not permitted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReadAccess
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies which users are granted read permission to access the share.
      Multiple users can be specified by supplying a comma-separated list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScopeName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the scope name of the share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecurityDescriptor
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the security descriptor for the SMB share in string format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Temporary
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the lifetime of the new SMB share.
      A temporary share does not persist beyond the next restart of the computer.
      By default, new SMB shares are persistent, and non-temporary.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-SmbShare
        [-Temporary]
        [-ContinuouslyAvailable <Boolean>]
        [-Description <String>]
        [-ConcurrentUserLimit <UInt32>]
        [-CATimeout <UInt32>]
        [-FolderEnumerationMode <FolderEnumerationMode>]
        [-CachingMode <CachingMode>]
        [-FullAccess <String[]>]
        [-ChangeAccess <String[]>]
        [-ReadAccess <String[]>]
        [-NoAccess <String[]>]
        [-SecurityDescriptor <String>]
        [-Path] <String>
        [-Name] <String>
        [[-ScopeName] <String>]
        [-EncryptData <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/SMB/MSFT_SmbShare" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
    This cmdlet returns a **MSFT_SmbShare** object that represents the SMB share.
examples:
- title: 'Example 1: Create an SMB share'
  description: |-
    ```
    PS C:\>New-SmbShare -Name "VMSFiles" -Path "C:\ClusterStorage\Volume1\VMFiles" -FullAccess "Contoso\Administrator", "Contoso\Contoso-HV1$"
    Name                          ScopeName                     Path                          Description
    ----                          ---------                     ----                          -----------
    VMSFiles                      Contoso-SO                    C:\ClusterStorage\Volume1\...
    ```

    This command creates an SMB share named "VMSFiles" and grants Full Access permissions to "Contoso\Administrator", and "Contoso\Contoso-HV1$".
- title: 'Example 2: Create an encrypted SMB share'
  description: |-
    ```
    PS C:\>New-SmbShare -Name "Data" -Path "J:\Data" -EncryptData $True
    Name                          ScopeName                     Path                          Description
    ----                          ---------                     ----                          -----------
    Data                          Contoso-FS                    J:\Data
    ```

    This command creates an encrypted SMB share.
- title: 'Example 3: Create an SMB share with Multiple Permissions'
  description: |-
    ```
    PS C:\>New-SmbShare -Name "VMSFiles" -Path "C:\ClusterStorage\Volume1\VMFiles" -ChangeAccess "Users" -FullAccess "Administrators"

    Name                          ScopeName                     Path                          Description
    ----                          ---------                     ----                          -----------
    VMSFiles                      Contoso-SO                    C:\ClusterStorage\Volume1\...
    ```

    This command creates an SMB share named "VMSFiles" and grants Change permissions to the local "Users" group, and Full Access permissions to the local "Administrators" group.
