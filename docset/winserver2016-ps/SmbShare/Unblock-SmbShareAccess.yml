syntaxes:
- syntax: |-
    ```Syntax
    Unblock-SmbShareAccess
        [-Name] <String[]>
        [[-ScopeName] <String[]>]
        [-SmbInstance <SmbInstance>]
        [-AccountName <String[]>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
    ```Syntax
    Unblock-SmbShareAccess
        -InputObject <CimInstance[]>
        [-AccountName <String[]>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/SMB/MSFT_SmbShareAccessControlEntry" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
    This cmdlet returns a **MSFT_SmbShareAccessControlEntry** object.
examples:
- title: 'Example 1: Remove the deny ACEs for a trustee'
  description: |-
    ```
    PS C:\>Unblock-SmbShareAccess -Name "VMFiles" -AccountName "Guest Users"
    Confirm
    Are you sure you want to perform this action?
    Performing operation 'Modify' on Target 'Contoso-SO,VMFiles'.
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): Y

    Name                    ScopeName               AccountName             AccessControlType       AccessRight
    ----                    ---------               -----------             -----------------       -----------
    VMFiles                 Contoso-SO              Contoso\Guest           Deny                    Full
    VMFiles                 Contoso-SO              Contoso\Administrator   Allow                   Full
    VMFiles                 Contoso-SO              Contoso\Contoso-HV1$    Allow                   Full
    ```

    This command removes all of the deny ACEs for the trustee from the security descriptor of the SMB share.
- title: 'Example 2: Remove the deny ACEs for a trustee without confirmation'
  description: |-
    ```
    PS C:\>Unblock-SmbShareAccess -Name "VMFiles" -AccountName "Contoso\Guest" -Force
    Name                    ScopeName               AccountName             AccessControlType       AccessRight
    ----                    ---------               -----------             -----------------       -----------
    VMFiles                 Contoso-SO              Contoso\Administrator   Allow                   Full
    VMFiles                 Contoso-SO              Contoso\Contoso-HV1$    Allow                   Full
    ```

    This command removes all of the deny ACEs for the trustee from the security descriptor of the SMB share without user confirmation.
