syntaxes:
- syntax: |-
    ```Syntax
    Set-SilLogging
        -TimeOfDay <DateTime>
        [-CimSession <CimSession[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TimeOfDay
  isDefault: true
- syntax: |-
    ```Syntax
    Set-SilLogging
        [-TimeOfDay <DateTime>]
        [-TargetUri <String>]
        [-CertificateThumbprint <String>]
        [-CimSession <CimSession[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TargetUri
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimMethodResult#msftsil_managementtasks#SetLoggingState" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Specify an aggregation server'
  description: |-
    ```
    PS C:\> Set-SilLogging -TargetUri "https://log03.hosts.contoso.com"
    ```

    This command specifies an aggregation server for Software Inventory Logging for the current computer.
- title: 'Example 2: Specify a time of day'
  description: |-
    ```
    PS C:\> Set-SilLogging -TimeOfDay "01/01/2013 5:00:00AM"
    ```

    This command specifies the time of day that the computer forwards logging data.
    Note that when you specify a date in the future, Software Inventory Logging does not start logging until that date and time.
    If you specify a date in the past, only the time specified is relevant to the configuration setting.
