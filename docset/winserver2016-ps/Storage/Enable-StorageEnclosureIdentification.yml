syntaxes:
- syntax: |-
    ```Syntax
    Enable-StorageEnclosureIdentification
        [-FriendlyName] <String[]>
        [-SlotNumbers <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-StorageEnclosureIdentification
        -UniqueId <String[]>
        [-SlotNumbers <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-StorageEnclosureIdentification
        -InputObject <CimInstance[]>
        [-SlotNumbers <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="MSFT_StorageEnclosure" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not generate any output by default.
    If you specify the *PassThru* parameter, the cmdlet returns an array of **MSFT_StorageEnclosure** objects.
examples:
- title: 'Example 1: Enable identification of an enclosure'
  description: |-
    ```
    PS C:\>Enable-StorageEnclosureIdentification -FriendlyName "E11"
    ```

    This command enables identification for the enclosure named E11.
- title: 'Example 2: Enable identification of specified slot numbers'
  description: |-
    ```
    PS C:\>Enable-StorageEnclosureIdentification -FriendlyName "E11" -SlotNumbers @(20, 14)
    ```

    This command enables identification for the slots numbers 20 and 14 of the enclosure named E11.
