### YamlMime:PowerShellCmdlet1
uid: Storage.Get-FileShare
name: Get-FileShare
module: Storage
isPreview: false
summary: |-
  Retrieves file share objects and their properties.
description: |-
  The **Get-FileShare** cmdlet gets objects that correspond to the file shares on the specified server.
  You must have local administrator credentials on a server to retrieve the objects.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
