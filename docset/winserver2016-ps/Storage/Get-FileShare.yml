syntaxes:
- syntax: |-
    ```Syntax
    Get-FileShare
        [-Name <String[]>]
        [-Protocol <FileSharingProtocol[]>]
        [-FileServer <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFileServer
  isDefault: true
- syntax: |-
    ```Syntax
    Get-FileShare
        [-UniqueId <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-FileShare
        [-Name <String[]>]
        [-Protocol <FileSharingProtocol[]>]
        [-Volume <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVolume
  isDefault: false
- syntax: |-
    ```Syntax
    Get-FileShare
        [-Name <String[]>]
        [-Protocol <FileSharingProtocol[]>]
        [-Subsystem <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: BySubsystem
  isDefault: false
examples:
- title: 'Example 1: Get all file shares on the local server'
  description: |-
    ```
    PS C:\>Get-FileShare
    ```

    This command lists all the file shares on the local server.
    You must have local administrator permissions on the server to run this command.
- title: 'Example 2: Get all NFS file shares on the specified file server'
  description: |-
    ```
    PS C:\>Get-FileShare -Protocol NFS -FileServer (Get-StorageFileServer -FriendlyName "FileServer01")
    ```

    This command lists all NFS file shares on the file server named FileServer01.
    You must have local administrator credentials on the server to run this command.
    The command gets the file server by using the **Get-StorageFileServer** cmdlet.
