syntaxes:
- syntax: |-
    ```Syntax
    Get-FileStorageTier
        -VolumeDriveLetter <Char>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVolumeDriveLetter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-FileStorageTier
        -VolumePath <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVolumePath
  isDefault: false
- syntax: |-
    ```Syntax
    Get-FileStorageTier
        -Volume <CimInstance>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVolume
  isDefault: false
- syntax: |-
    ```Syntax
    Get-FileStorageTier
        -FilePath <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFilePath
  isDefault: false
outputs:
- name: <xref href="MSFT_FileStorageTier" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet generates a file storage tier object that contains the desired storage tier, file path, status, desired storage tier file size, and state.
    State includes values of Ok, Pending, and Processing.
examples:
- title: 'Example 1: Get status for a file'
  description: |-
    ```
    PS C:\>Get-FileStorageTier -FilePath "D:\DataFile06.txt"
    ```

    This command gets the pinned file that you specify, and its status.
- title: 'Example 2: Get pinned files for a volume'
  description: |-
    ```
    PS C:\>Get-FileStorageTier -VolumePath "\\?\Volume{6d6e000d-6038-11e2-be6d-806e6f6e6963}\"
    ```

    This command gets the pinned files for the specified volume, and their status values.
