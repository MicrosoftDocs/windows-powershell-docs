### YamlMime:PowerShellCmdlet1
uid: Storage.Get-OffloadDataTransferSetting
name: Get-OffloadDataTransferSetting
module: Storage
isPreview: false
summary: |-
  Returns offloaded data transfer (ODX) settings for the specified subsystem.
description: |-
  The **Get-OffloadDataTransferSetting** cmdlet returns offloaded data transfer (ODX) settings for the specified storage subsystem.

  Note: This cmdlet does not return settings for storage arrays that use the Storage Management Initiative Specification (SMI-S) protocol.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageSubSystem
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage subsystem for which you want to get ODX settings.
      Enter a StorageSubsystem CIM object, which is exposed by the Get-StorageSubSystem cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-OffloadDataTransferSetting
        [-StorageSubSystem <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StorageSubsystem" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a StorageSubsystem object to the *StorageSubsystem* parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_OffloadDataTransferSetting" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet outputs one or more objects that represents the ODX settings for one or more storage subsystems.
examples:
- title: 'Example 1: Get all ODX settings'
  description: |-
    ```
    PS C:\>Get-OffloadDataTransferSetting
    ```

    This example gets all ODX settings for connected storage arrays, not including storage arrays that support ODX using the SMI-S protocol.
- title: 'Example 2: Get storage subsystems that have SMPs that support ODX'
  description: |-
    ```
    PS C:\>Get-OffloadDataTransferSetting | Get-StorageSubSystem
    ```

    This example displays all storage subsystems on storage management providers that support ODX, not including storage arrays that support ODX using the SMI-S protocol.
- title: 'Example 3: Get the ODX settings for a particular storage subsystem'
  description: |-
    ```
    PS C:\>$stsubsys = Get-StorageSubsystem -FriendlyName "Big Array"



    PS C:\>Get-OffloadDataTransferSetting -StorageSubsystem $stsubsys
    ```

    This example returns the offload data transfer settings for the StorageSubsystem objects returned by Get-StorageSubSystem cmdlet.
