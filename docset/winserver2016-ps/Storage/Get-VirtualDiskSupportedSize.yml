    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-VirtualDiskSupportedSize
        [-StoragePoolFriendlyName] <String[]>
        [-ResiliencySettingName <String>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VirtualDiskSupportedSize
        -StoragePoolUniqueId <String[]>
        [-ResiliencySettingName <String>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VirtualDiskSupportedSize
        -StoragePoolName <String[]>
        [-ResiliencySettingName <String>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VirtualDiskSupportedSize
        -InputObject <CimInstance[]>
        [-ResiliencySettingName <String>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StoragePool" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass an MSFT_StoragePool object to the **InputObject** parameter.
outputs:
- name: <xref href="System.Management.Automation.PSCustomObject" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an object that lists the minimum and maximum size for creating a virtual disk in the specified pool with the specified resiliency setting.
examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\>Get-VirtualDiskSupportedSize -ResiliencySettingsName Mirror
    ```

    This example lists the minimum and maximum supported sizes for virtual disk creation using the specified resiliency settings name.
