syntaxes:
- syntax: |-
    ```Syntax
    Get-VolumeScrubPolicy
        [-DriveLetter] <Char[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByDriveLetter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VolumeScrubPolicy
        -ObjectId <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VolumeScrubPolicy
        -Path <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
