syntaxes:
- syntax: |-
    ```Syntax
    New-StorageFileServer
        [-StorageSubSystemFriendlyName] <String[]>
        -HostNames <String[]>
        -Protocols <FileSharingProtocol[]>
        [-FriendlyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    New-StorageFileServer
        -StorageSubSystemUniqueId <String[]>
        -HostNames <String[]>
        -Protocols <FileSharingProtocol[]>
        [-FriendlyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    New-StorageFileServer
        -StorageSubSystemName <String[]>
        -HostNames <String[]>
        -Protocols <FileSharingProtocol[]>
        [-FriendlyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    New-StorageFileServer
        -InputObject <CimInstance[]>
        -HostNames <String[]>
        -Protocols <FileSharingProtocol[]>
        [-FriendlyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_StorageFileServer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a file server'
  description: |-
    ```
    PS C:\>New-StorageFileServer -FriendlyName "SalesFiles" -StorageSubSystemFriendlyName "Sales-cluster" -HostName "salesfiles" -Protocol SMB -ContinuouslyAvailabe $True
    ```

    This command creates a scale-out file server on the sales-cluster subsystem.
