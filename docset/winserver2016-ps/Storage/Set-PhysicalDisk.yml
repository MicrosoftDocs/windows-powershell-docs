syntaxes:
- syntax: |-
    ```Syntax
    Set-PhysicalDisk
        -UniqueId <String>
        [-NewFriendlyName <String>]
        [-Description <String>]
        [-Usage <Usage>]
        [-MediaType <MediaType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: true
- syntax: |-
    ```Syntax
    Set-PhysicalDisk
        -InputObject <CimInstance[]>
        [-NewFriendlyName <String>]
        [-Description <String>]
        [-Usage <Usage>]
        [-MediaType <MediaType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-PhysicalDisk
        [-FriendlyName] <String>
        [-NewFriendlyName <String>]
        [-Description <String>]
        [-Usage <Usage>]
        [-MediaType <MediaType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_PhysicalDisk" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass an MSFT_PhysicalDisk object to the *InputObject* parameter.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change the friendly name of a physical disk'
  description: |-
    ```
    PS C:\>Set-PhysicalDisk -FriendlyName "PhysicalDisk4" -NewFriendlyName "PhysicalDiskInSlot5"
    ```

    This example changes the friendly name of PhysicalDisk4 to PhysicalDiskInSlot5.
- title: 'Example 2: Change the Usage of a physical disk'
  description: |-
    ```
    PS C:\>Set-PhysicalDisk -FriendlyName PhysicalDisk2 -Usage AutoSelect
    ```

    This example changes the Usage property of PhysicalDisk2 to AutoSelect.
