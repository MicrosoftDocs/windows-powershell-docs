### YamlMime:PowerShellCmdlet1
uid: Storage.Set-StoragePool
name: Set-StoragePool
module: Storage
isPreview: false
summary: |-
  Modifies the properties of the specified storage pool.
description: |-
  The **Set-StoragePool** cmdlet modifies the properties of the specified storage pool.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
