syntaxes:
- syntax: |-
    ```Syntax
    Update-Disk
        [-Number] <UInt32[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByNumber
  isDefault: true
- syntax: |-
    ```Syntax
    Update-Disk
        -UniqueId <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
