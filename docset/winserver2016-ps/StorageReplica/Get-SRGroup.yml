### YamlMime:PowerShellCmdlet1
uid: StorageReplica.Get-SRGroup
name: Get-SRGroup
module: StorageReplica
isPreview: false
summary: |-
  Gets replication groups.
description: |-
  The **Get-SRGroup** cmdlet gets replication groups.
  A replication group contains replicated volumes, replication properties, and replication state.
  Partnerships join replication groups to form a source and destination topology.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica host computer NetBIOS name or fully qualified domain name (FQDN) of a computer for which this cmdlet gets groups.
      The default value is the local computer.
    aliases:
    - CN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromGroup
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica host computer NetBIOS name or FQDN of the destination computer for which this cmdlet gets groups.
    aliases:
    - DCN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromPartnership
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationRGName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the destination replication group that this cmdlet gets.
    aliases:
    - DN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromPartnership
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the replication group that this cmdlet gets.
    aliases:
    - N
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromGroup
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica host computer NetBIOS name or FQDN of the source computer for which this cmdlet gets groups.
    aliases:
    - SCN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromPartnership
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceRGName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the source replication group that this cmdlet gets.
    aliases:
    - SN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromPartnership
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SRGroup
        [-SourceComputerName] <String>
        [-SourceRGName] <String>
        [-DestinationComputerName] <String>
        [-DestinationRGName] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: FromPartnership
  isDefault: false
- syntax: |-
    ```Syntax
    Get-SRGroup
        [[-ComputerName] <String>]
        [[-Name] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: FromGroup
  isDefault: false
outputs:
- name: <xref href="replicationgroup" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all replication groups'
  description: |-
    ```
    PS C:\>Get-SRGroup
    AllowVolumeResize  : False
    AsyncRPO           :
    ComputerName       : SR-SRV05
    Description        :
    Id                 : a19cc039-4cb0-47ad-b848-a1723858ff73
    IsAutoFailover     :
    IsCluster          : False
    IsEncrypted        : False
    IsInPartnership    : True
    IsPrimary          : True
    IsSuspended        : False
    IsWriteConsistency : False
    LastInSyncTime     :
    LogSizeInBytes     : 8589934592
    LogVolume          : e:\
    Name               : ReplicationGroup01
    NumOfReplicas      : 1
    Partitions         : {6b3ee5ef-5a95-4685-a395-726ed3b644d3}
    Replicas           : {MSFT_WvrReplica (PartitionId = "6b3ee5ef-5a95-4685-a395-726ed3b644d3")}
    ReplicationMode    : Synchronous
    ReplicationStatus  : ContinuouslyReplicating
    PSComputerName     :
    ```

    This command gets properties of all replication groups on the local computer.
