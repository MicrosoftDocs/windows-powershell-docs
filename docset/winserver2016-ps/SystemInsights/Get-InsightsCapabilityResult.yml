### YamlMime:PowerShellCmdlet1
uid: SystemInsights.Get-InsightsCapabilityResult
name: Get-InsightsCapabilityResult
module: SystemInsights
isPreview: false
summary: |-
  Gets the most recent prediction or the last 30 predictions from the specified capabilities.
description: |-
  The **Get-InsightsCapabilityResult** cmdlet gets the most recent prediction or the last 30 predictions from the specified capabilities.

  >[!IMPORTANT]
  >Some information relates to prereleased product which may be substantially modified before it's commercially released. Microsoft makes no warranties, express or implied, with respect to the information provided here.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a fully qualified domain name (FQDN). If not specified, uses the local computer.
    aliases:
    - CN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credential for accessing the computer specified by the -ComputerName parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: History
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Retrieves the most recent 30 predictions for the specified capability.
    aliases:
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a capability using a capability name.
    aliases:
    - N
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-InsightsCapabilityResult
        [-Name] <String>
        [-History]
        [[-ComputerName] <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.SystemInsights.Management.PowerShell.Capability" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass a capability object to the *Name* parameter.
outputs:
- name: <xref href="Microsoft.SystemInsights.Management.PowerShell.CapabilityResult" data-throw-if-not-resolved="False" />
  description: |-
    The cmdlet returns one or more objects that represent the specified capability results.
examples:
- title: Example 1
  description: |-
    ```powershell
    PS C:\> Get-InsightsCapabilityResult -Name "CPU capacity forecasting"
    ```

    This example gets the most recent result for the **CPU capacity forecasting** capability.
- title: Example 2
  description: |-
    ```powershell
    PS C:\> Get-InsightsCapability | Get-InsightsCapabilityResult
    ```

    This example uses the **Get-InsightsCapability** and the pipeline operator to get the most recent result for all capabilities.
- title: Example 3
  description: |-
    ```powershell
    PS C:\> Get-InsightsCapabilityResult -Name "CPU capacity forecasting" -History
    ```

    This example uses the **History** parameter to get the most last 30 results for the **CPU capacity forecasting** capability.
