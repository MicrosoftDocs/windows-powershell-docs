### YamlMime:PowerShellCmdlet1
uid: SystemInsights.Set-InsightsCapabilitySchedule
name: Set-InsightsCapabilitySchedule
module: SystemInsights
isPreview: false
summary: |-
  Sets a prediction schedule for the specified capabilities.
description: |-
  The **Set-InsightsCapabilitySchedule** cmdlet sets a prediction schedule for the specified capabilities.

  >[!IMPORTANT]
  >Some information relates to prereleased product which may be substantially modified before it's commercially released. Microsoft makes no warranties, express or implied, with respect to the information provided here.
