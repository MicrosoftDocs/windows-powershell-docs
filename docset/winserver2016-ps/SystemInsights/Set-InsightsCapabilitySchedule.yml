syntaxes:
- syntax: |-
    ```Syntax
    Set-InsightsCapabilitySchedule
        [-Name] <String>
        [[-DaysInterval] <UInt16>]
        [[-At] <DateTime>]
        [[-ComputerName] <String>]
        [-Daily]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Daily with interval
  isDefault: false
- syntax: |-
    ```Syntax
    Set-InsightsCapabilitySchedule
        [-Name] <String>
        [[-DaysOfWeek] <DayOfWeek[]>]
        [[-At] <DateTime>]
        [[-ComputerName] <String>]
        [-Daily]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Daily with days of week
  isDefault: false
- syntax: |-
    ```Syntax
    Set-InsightsCapabilitySchedule
        [-Name] <String>
        [[-DaysOfWeek] <DayOfWeek[]>]
        [[-MinutesInterval] <UInt16>]
        [[-ComputerName] <String>]
        [-Minute]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Minute
  isDefault: false
- syntax: |-
    ```Syntax
    Set-InsightsCapabilitySchedule
        [-Name] <String>
