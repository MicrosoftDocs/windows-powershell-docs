### YamlMime:PowerShellCmdlet1
uid: TrustedPlatformModule.Import-TpmOwnerAuth
name: Import-TpmOwnerAuth
module: TrustedPlatformModule
isPreview: false
summary: |-
  Imports a TPM owner authorization value to the registry.
description: |-
  The **Import-TpmOwnerAuth** cmdlet imports a valid Trusted Platform Module (TPM) owner authorization value to the registry.

  For more information on TPM, see the [Trusted Platform Module Technology Overview](https://technet.microsoft.com/en-us/library/jj131725.aspx) in the Technet library.
parameters:
  cmdletParameters:
  - name: File
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a file that contains the current owner authorization value for the TPM.
      You can use the TPM Management Console to create this file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: File
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OwnerAuthorization
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the current owner authorization value for the TPM.
    aliases:
    - o
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Owner Auth
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Import-TpmOwnerAuth
        -File <String>
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
- syntax: |-
    ```Syntax
    Import-TpmOwnerAuth
        [-OwnerAuthorization] <String>
        [<CommonParameters>]
    ```
  parameterSetName: Owner Auth
  isDefault: false
inputs:
- name: <xref href="String" data-throw-if-not-resolved="False" />
  description: |-
    Specifies the owner authorization value for the TPM.
outputs:
- name: <xref href="TpmObject" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a **TpmObject** object that contains the following information:

    - TpmReady. Whether a TPM complies with Windows Server® 2012 standards.
    - TpmPresent. Whether there is a TMP on the current computer.
    - ManagedAuthLevel. The level at which the operating system manages the owner authorization. Possible values are Legacy, Balanced, and Full.
    - OwnerClearDisabled. Whether TPM can be reset. If this value is True, the TPM cannot be reset through the operating system by using the owner authorization value. If this value is False, the TPM can be reset through the operating system.
    - AutoProvisioning. Whether the computer can use auto-provisioning. Possible values are NotDefined, Enabled, Disabled, and DisabledForNextBoot.
    - LockedOut. Whether a TPM is locked out.
    - SelfTest. Information returned by a test that TPM runs.
examples:
- title: 'Example 1: Import an owner authorization value'
  description: |-
    ```
    PS C:\> Import-TpmOwnerAuth -OwnerAuthorization "Qn2sdCFQmvjf+tBtSWH4GT87sQs="
    TpmReady           : False
    TpmPresent         : True
    ManagedAuthLevel   : Full
    OwnerAuth          : Qn2sdCFQmvjf+tBtSWH4GT87sQs=
    OwnerClearDisabled : True
    AutoProvisioning   : DisabledForNextBoot
    LockedOut          : False
    SelfTest           : {191, 191, 245, 191...}
    ```

    This command imports the specified owner authorization value to the registry.
- title: 'Example 2: Import an owner authorization value from a file'
  description: |-
    ```
    PS C:\> Import-TpmOwnerAuth -File "OwnAuthFile.tpm"
    TpmReady           : False
    TpmPresent         : True
    ManagedAuthLevel   : Full
    OwnerAuth          : OwnerClearDisabled : True
    AutoProvisioning   : DisabledForNextBoot
    LockedOut          : False
    SelfTest           : {191, 191, 245, 191...}
    ```

    This command imports the owner authorization value in the specified file to the registry.
