### YamlMime:PowerShellCmdlet1
uid: VAMT.Update-VamtProduct
name: Update-VamtProduct
module: VAMT
isPreview: false
summary: |-
  Updates the VAMT database by querying the computers for their current status.
description: |-
  The **Update-VamtProduct** cmdlet updates the information in the dep_nextref_vamt database by querying the computers in the environment for their current status.
  You can use this cmdlet in a script when product data in the database must be updated regularly.
parameters:
  cmdletParameters:
  - name: DbCommandTimeout
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Indicates how long dep_nextref_vamt waits for a response from the database before timing out.
      The default value is 30 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DbConnectionString
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the database where the products are updated.
      If no database connection string is provided, dep_nextref_vamt attempts to use the database that the dep_nextref_vamt user console used on the local computer.
      If dep_nextref_vamt does not find a database, it returns an error.
      You can find the connection string in the dep_nextref_vamt UI in the Preferences dialog box.
      On the menu bar, click View, and then click Preferences to open the Volume Activation Management Tool Preferences dialog box.
      The connection string is in the Database Settings section under Current connection string.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides the password for password-protected environments.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Products
    type: <xref href="Product" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the product or products in the dep_nextref_vamt database that this cmdlet updates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Username
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides the user name for password-protected environments.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Update-VamtProduct
        -Products <Product[]>
        [-DbConnectionString <String>]
        [-Username <String>]
        [-Password <String>]
        [-DbCommandTimeout <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Update all product information in database'
  description: |-
    ```
    PS C:\>Get-VamtProduct | Update-VamtProduct
    ```

    This command updates all of the product information in the database.
