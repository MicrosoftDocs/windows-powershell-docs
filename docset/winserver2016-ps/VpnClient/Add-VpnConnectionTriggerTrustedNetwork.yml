syntaxes:
- syntax: |-
    ```Syntax
    Add-VpnConnectionTriggerTrustedNetwork
        [-ConnectionName] <String>
        [-DnsSuffix] <String[]>
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
