syntaxes:
- syntax: |-
    ```Syntax
    Set-VpnConnection
        [-Name] <String>
        [[-ServerAddress] <String>]
        [[-SplitTunneling] <Boolean>]
        [[-RememberCredential] <Boolean>]
        [[-TunnelType] <String>]
        [[-L2tpPsk] <String>]
        [[-AuthenticationMethod] <String[]>]
        [[-EapConfigXmlStream] <XmlDocument>]
        [[-UseWinlogonCredential] <Boolean>]
        [[-EncryptionLevel] <String>]
        [-AllUserConnection]
        [-PassThru]
        [-Force]
        [-MachineCertificateEKUFilter <String[]>]
        [-MachineCertificateIssuerFilter <X509Certificate2>]
        [-ServerList <CimInstance[]>]
        [-IdleDisconnectSeconds <UInt32>]
        [-DnsSuffix <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InboxProfile
  isDefault: true
