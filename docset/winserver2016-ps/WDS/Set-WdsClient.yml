    - Full
    defaultValue: "TRUE"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UserAndJoinRightsSearchForest
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: UserAndJoinRights
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PxePromptPolicy
    type: <xref href="PxePromptPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the prompt policy for this computer to boot in PXE.
      The acceptable values for this parameter are:

      - Adopt
      - NoPrompt
      - OptIn
      - OptOut
    acceptedValues:
    - OptIn
    - NoPrompt
    - OptOut
    - Abort
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReferralServer
    type: <xref href="String" data-throw-if-not-resolved="False" />
