### YamlMime:PowerShellCmdlet1
uid: Wdac.Get-OdbcPerfCounter
name: Get-OdbcPerfCounter
module: Wdac
isPreview: false
summary: |-
  Gets connection pooling Performance Monitor counters.
description: |-
  The **Get-OdbcPerfCounter** cmdlet gets the Open Database Connectivity (ODBC) connection pooling performance monitor counters.

  For more information about ODBC and performance counters, see [Microsoft Open Database Connectivity (ODBC)](https://msdn.microsoft.com/en-us/library/ms710252.aspx) and [ODBC Performance Counters](https://msdn.microsoft.com/en-us/library/windows/desktop/ms709288.aspx) on the Microsoft Developer Network.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Platform
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the platform architecture.
      This cmdlet gets the ODBC connection pooling Performance Monitor counters that belong to the architecture that this parameter specifies.
      The acceptable values for this parameter are:

      - 32-bit
      - 64-bit
      - All

      The default value is All.
      If you run this cmdlet in a remote CIM session, this parameter refers to the platform architecture on the remote computer.
    acceptedValues:
    - 32-bit
    - 64-bit
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-OdbcPerfCounter
        [[-Platform] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_OdbcPerfCounter" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get ODBC Performance Counter setting on a 32-bit platform'
  description: |-
    ```
    PS C:\> Get-OdbcPerfCounter -Platform "32-bit"
    ```

    This command gets the ODBC Performance Counter setting on a 32-bit platform.
- title: 'Example 2: Get ODBC Performance Counter setting on both platforms'
  description: |-
    ```
    PS C:\> Get-OdbcPerfCounter
    ```

    This command gets the ODBC Performance Counter setting on both 32-bit and 64-bit platforms.
- title: 'Example 3: Store ODBC Performance Counter setting for a 32-bit platform'
  description: |-
    ```
    PS C:\> $PerfCounter = Get-OdbcPerfCounter -Platform "32-bit"
    ```

    This command gets the ODBC Performance Counter setting on a 32-bit platform, and then stores the result in the $PerfCounter variable.
