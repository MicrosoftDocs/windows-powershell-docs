### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Enable-WebRequestTracing
name: Enable-WebRequestTracing
module: WebAdministration
isPreview: false
summary: |-
  Enables request tracing for a website.
description: |-
  The **Enable-WebRequestTracing** cmdlet enables request tracing, and automatically configures a website rule that traces responses that have a status value between 400 and 600.
parameters:
  cmdletParameters:
  - name: CustomActions
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an action to take when a request tracing log file is generated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Directory
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the directory in which request tracing log files are stored.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxLogFiles
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of log files to store.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxLogFileSize
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum file size of a single request tracing log file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site for which tracing is enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StatusCodes
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the status codes for which a default request tracing rule is configured.
      The default code value is 500.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-WebRequestTracing
        [[-Name] <String>]
        [-Directory <String>]
        [-MaxLogFiles <UInt32>]
        [-MaxLogFileSize <UInt32>]
        [-CustomActions]
        [-StatusCodes <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Enable request tracing for the default website'
  description: |-
    ```
    IIS:\> Enable-WebRequestTracing -Name "Default Web Site"
    ```

    This command enables request tracing for the default website, which also automatically creates a rule that traces status code 500 errors.
