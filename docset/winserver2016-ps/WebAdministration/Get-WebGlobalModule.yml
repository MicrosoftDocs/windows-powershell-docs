### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebGlobalModule
name: Get-WebGlobalModule
module: WebAdministration
isPreview: false
summary: |-
  Gets the global modules configured in IIS, or information about a specific module.
description: |-
  The **Get-WebGlobalModule** cmdlet gets the global modules configured in Internet Information Services (IIS), or information about a specific module.
parameters:
  cmdletParameters:
  - name: Image
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the image file associated with the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a module about which this cmdlet gets information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Precondition
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a precondition for the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebGlobalModule
        [[-Name] <String>]
        [-Image <String>]
        [-Precondition <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Getting configuration information about a module'
  description: |-
    ```
    IIS:\> Get-WebGlobalModule -Name "UriCacheModule"
    ```

    This command returns information about the configuration of the module named UriCacheModule.
