### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebItemState
name: Get-WebItemState
module: WebAdministration
isPreview: false
summary: |-
  Gets the run-time state of a site or an application pool.
description: |-
  The **Get-WebItemState** cmdlet gets the run-time state of a site or an application pool.
parameters:
  cmdletParameters:
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol binding for which information is returned, such as HTTP or FTP.
      This parameter is for sites only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the path to the application pool or site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebItemState
        [-Protocol <String>]
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the state of all websites'
  description: |-
    ```
    C:\PS>Get-WebItemState -PSPath "IIS:\sites\*"
    ```

    This command returns information about the state of all the sites on the IIS server.
- title: 'Example 2: Get the state of the default website using HTTP'
  description: |-
    ```
    IIS:\> Get-WebItemState -PSPath ".\Default Web Site" -Protocol "http"
    Value

    -----

    Started
    ```

    This command returns information about the HTTP binding on the default website.
