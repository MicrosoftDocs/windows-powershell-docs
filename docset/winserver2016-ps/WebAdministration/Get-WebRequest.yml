### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebRequest
name: Get-WebRequest
module: WebAdministration
isPreview: false
summary: |-
  Gets the IIS requests that are currently being run.
description: |-
  The **Get-WebRequest** cmdlet gets Internet Information Services (IIS) requests that are currently being run.
parameters:
  cmdletParameters:
  - name: AppPool
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the application pool from which request information is retrieved.
    aliases:
    - pool
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the input object from which parameter data is received.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Process
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a process ID for which request information is retrieved.
    aliases:
    - proc
    - procid
    - pid
    - wp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebRequest
        [-InputObject <PSObject>]
        [-AppPool <String>]
        [-Process <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get requests that are currently being run'
  description: |-
    ```
    IIS:\> Get-Item -AppPool "IIS:\AppPools\DefaultAppPool" | Get-WebRequest
    ```

    This command gets a list of IIS requests that are currently being run.
