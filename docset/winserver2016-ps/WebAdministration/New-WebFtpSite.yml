### YamlMime:PowerShellCmdlet1
uid: WebAdministration.New-WebFtpSite
name: New-WebFtpSite
module: WebAdministration
isPreview: false
summary: |-
  Creates an FTP 7 Site.
description: |-
  The **New-WebFtpSite** cmdlet creates an FTP site.
  This cmdlet requires FTP 7 or later.
parameters:
  cmdletParameters:
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the new FTP site to be created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostHeader
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host header of the new FTP site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the new FTP site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP Address of the new FTP site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the new FTP site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical path to the new FTP site.
      The specified folder must already exist.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port number of the new FTP site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-WebFtpSite
        [-Name] <String>
        [-Id <UInt32>]
        [-Port <UInt32>]
        [-IPAddress <String>]
        [-HostHeader <String>]
        [-PhysicalPath <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create an FTP site binding'
  description: |-
    ```
    IIS:\> New-WebFtpSite -Name "testFtpSite" -Port 21 -PhysicalPath "c:\test" -HostHeader "mySite" -IPAddress "127.0.0.1"
    ```

    This command creates an FTP site named testFtpSite.
    This command works with FTP7 only.
