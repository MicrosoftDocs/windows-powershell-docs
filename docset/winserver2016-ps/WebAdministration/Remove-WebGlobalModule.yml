uid: WebAdministration.Remove-WebGlobalModule
name: Remove-WebGlobalModule
module: WebAdministration
isPreview: false
summary: |-
  Removes an IIS module.
description: |-
  The **Remove-WebGlobalModule** cmdlet removes an Internet Information Services (IIS) module.
