### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Restart-WebItem
name: Restart-WebItem
module: WebAdministration
isPreview: false
summary: |-
  Restarts an application pool or a website.
description: |-
  The **Restart-WebItem** cmdlet restarts an application pool or a website.
parameters:
  cmdletParameters:
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol binding of the item to restart.
      This parameter applies to sites only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the path to the application pool or web site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Restart-WebItem
        [-Protocol <String>]
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Restart an application pool'
  description: |-
    ```
    IIS:\> Restart-WebItem -PSPath 'IIS:\AppPools\DefaultAppPool'
    ```

    This command restarts the application pool named DefaultAppPool.
