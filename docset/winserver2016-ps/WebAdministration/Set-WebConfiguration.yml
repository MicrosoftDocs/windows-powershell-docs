### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Set-WebConfiguration
name: Set-WebConfiguration
module: WebAdministration
isPreview: false
summary: |-
  Changes the value of an IIS configuration element.
description: |-
  The **Set-WebConfiguration** cmdlet changes the value of an Internet Information Services (IIS) configuration element.
  Specify an element as a configuration section or an XPath query.
parameters:
  cmdletParameters:
  - name: Clr
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the .NET Framework in the form vn.n, such as v4.0 or v2.0.
      The default is v4.0.
      Specify this parameter only when the *PSPath* parameter is set to either Machine or Machine/Webroot.
      If *PSPath* is not set to one of these values and the *Clr* parameter is set, Windows PowerShell® ignores the value of *Clr* and returns a warning.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the IIS configuration section or an XPath query that returns a configuration element.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet causes the configuration setting to be set at a level in the configuration hierarchy above a lock in the configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Object" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an input object that contains values to set for configuration elements.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the location of the configuration setting.
      Location tags are frequently used for configuration settings that must be set more precisely than per application or per virtual directory.
      For example, a setting for a particular file or directory could use a location tag.
      Location tags are also used if a particular section is locked.
      In such an instance, the configuration system would have to use a location tag in one of the parent configuration files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Metadata
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      If this parameter is specified, configuration metadata such as encryption or locking settings can be changed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the configuration path.
      This path can be either an IIS configuration path in the format computer name/webroot/apphost, or the IIS module path in the format IIS:\sites\Default Web Site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Value
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value of the configuration setting to change.
    aliases:
    - v
    - val
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputPSObject
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-WebConfiguration
        [-Filter] <String[]>
        [[-PSPath] <String[]>]
        -Value <PSObject>
        [-Metadata <String>]
        [-Clr <String>]
        [-Force]
        [-Location <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputPSObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-WebConfiguration
        [-Filter] <String[]>
        [[-PSPath] <String[]>]
        -InputObject <Object>
        [-Metadata <String>]
        [-Clr <String>]
        [-Force]
        [-Location <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="PSObject" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set new bindings on an existing website'
  description: |-
    ```
    IIS:\> Set-WebConfiguration -Filter "/system.applicationHost/sites/site[@name=" DemoSite"]/bindings" -PSPath "IIS:\" -Value (@{protocol="http";bindingInformation="*:80:DemoSite1"},@{protocol="http";bindingInformation="*:80:DemoSite2"})
    ```

    This command replaces the existing bindings of the Web site named DemoSite with new bindings.
