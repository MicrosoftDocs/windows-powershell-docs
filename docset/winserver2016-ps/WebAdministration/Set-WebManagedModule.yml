syntaxes:
- syntax: |-
    ```Syntax
    Set-WebManagedModule
        [-Name] <String>
        [-Type <String>]
        [-Precondition <String>]
        [-Location <String[]>]
        [[-PSPath] <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Change a property of a managed module'
  description: |-
    ```
    IIS:\> Set-WebManagedModule -Name "UrlMappingsModule" -Type "Test.Test"
    ```

    This command changes the type of the module named UrlMappingsModule.
