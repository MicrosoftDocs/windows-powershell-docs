syntaxes:
- syntax: |-
    ```Syntax
    Add-WBVirtualMachine
        [-Policy] <WBPolicy>
        [[-VirtualMachine] <WBVirtualMachine[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WBVirtualMachine
  isDefault: false
- syntax: |-
