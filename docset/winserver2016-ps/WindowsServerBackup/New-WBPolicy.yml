### YamlMime:PowerShellCmdlet1
uid: WindowsServerBackup.New-WBPolicy
name: New-WBPolicy
module: WindowsServerBackup
isPreview: false
summary: |-
  Creates a backup policy object.
description: |-
  The **New-WBPolicy** cmdlet creates a backup policy object.
  The new backup policy object does not contain information about the volumes included in the policy, the files in the backup, the backup target, or any scheduled times.

  To make a new policy for scheduled backups, use the [Set-WBPolicy](./Set-WBPolicy.yml) cmdlet to define what items to include or exclude in backups, when to run backups, and where to store backups.
  To make a one-time backup from policy settings, use the [Start-WBBackup](./Start-WBBackup.yml) cmdlet.

  To use this cmdlet, you must be a member of the Administrators group or Backup Operators group.
syntaxes:
- syntax: |-
    ```Syntax
    New-WBPolicy
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    None
outputs:
- name: <xref href="WBPolicy" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns and generates an empty **WBPolicy** object in edit mode.
examples:
- title: 'Example 1: Create a backup policy'
  description: |-
    ```
    PS C:\> $Policy = New-WBPolicy
    ```

    This command creates an empty **WBPolicy** object and saves it in the $Policy variable.
    Use the **WBPolicy** object to specify the settings for backup.
