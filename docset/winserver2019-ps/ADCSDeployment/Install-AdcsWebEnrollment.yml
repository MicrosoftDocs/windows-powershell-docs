### YamlMime:PowerShellCmdlet1
uid: ADCSDeployment.Install-AdcsWebEnrollment
name: Install-AdcsWebEnrollment
module: ADCSDeployment
isPreview: false
summary: |-
  Installs the Certification Authority Web Enrollment.
description: |-
  The **Install-AdcsWebEnrollment** cmdlet performs initial installation and configuration of the Certification Authority (CA) Web Enrollment role service.
  To remove the Web Enrollment role service use the **Uninstall-AdcsWebEnrollment** cmdlet.

  You can import the cmdlet by running the following commands from Windows PowerShell:

  - `Import-Module ServerManager`
  - `Add-WindowsFeature Adcs-Web-Enrollment`
notes: |-
  * Ensure you run Windows PowerShell as an administrator. You can use the *Force* parameter to bypass the prompt for confirmation.
  To see parameters, run the following command: `Install-AdcsWebEnrollment -?`
parameters:
  cmdletParameters:
  - name: CAConfig
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the CA config parameter string.
      Do not specify this if there is a local CA installed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PSCredential** object for the CA Web Enrollment.
      To obtain a credential object, use the **Get-Credential** cmdlet.
      For more information, type `Get-Help Get-Credential`.
      If the Web Enrollment service is configured to use Standalone CA, then an account that is a member of the local Administrators on the CA is required.
      If the Web Enrollment service is configured to use an Enterprise CA, then an account that is a member of Domain Admins is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Install-AdcsWebEnrollment
        [-CAConfig <String>]
        [-Force]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSCredential" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.CertificateServices.Deployment.Commands.WebEnrollment.WebEnrollmentResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Install the Web Enrollment role service to a CA with confirmation'
  description: |-
    ```
    PS C:\> Install-AdcsWebEnrollment -CAConfig "<CAComputerName>\<CACommonName>"
    ```

    This command installs the Web Enrollment role service to a CA specified by `<CAComputerName>\<CACommonName>`.
    Replace the computer name of the CA for `<CAComputerName>` and replace the CA common name for `<CACommonName>` when running the command.
- title: 'Example 1: Install the Web Enrollment role service to a CA without confirmation'
  description: |-
    ```
    PS C:\> Install-AdcsWebEnrollment -CAConfig "<CAComputerName>\<CACommonName>" -Force
    ```

    This command installs the Web Enrollment role service to a CA specified by `<CAComputerName>\<CACommonName>` without requiring user confirmation.
    Replace the computer name of the CA for `<CAComputerName>` and replace the CA common name for `<CACommonName>` when running the command.
