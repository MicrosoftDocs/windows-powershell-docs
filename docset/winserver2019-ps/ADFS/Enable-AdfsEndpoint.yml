syntaxes:
- syntax: |-
    ```Syntax
    Enable-AdfsEndpoint
        [[-TargetAddressPath] <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Address
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AdfsEndpoint
