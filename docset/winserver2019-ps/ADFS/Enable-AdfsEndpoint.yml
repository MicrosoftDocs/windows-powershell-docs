examples:
- title: 'Example 1: Enable an endpoint'
  description: |-
    ```
    PS C:\> Enable-AdfsEndpoint -TargetAddress "/adfs/services/trust/13/Windows"
    ```

    This command enables the WS-Trust 1.3 endpoint for AD FS.
