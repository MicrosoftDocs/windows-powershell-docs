  cmdletParameters:
  - name: Application
    type: <xref href="ServerApplication" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the server application to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ApplicationObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
