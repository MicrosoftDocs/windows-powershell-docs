syntaxes:
- syntax: |-
    ```Syntax
    Remove-AdfsRelyingPartyWebTheme
        [-TargetRelyingPartyName] <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierName
