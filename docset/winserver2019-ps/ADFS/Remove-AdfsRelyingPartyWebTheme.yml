examples:
- title: 'Example 1: Remove a web theme'
  description: |-
    ```
    PS C:\> Remove-AdfsRelyingPartyWebTheme -TargetRelyingPartyName "urn:app1"
    ```

    This command removes the relying party web theme for the relying party named urn:app1.
