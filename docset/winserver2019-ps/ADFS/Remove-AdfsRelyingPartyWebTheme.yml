uid: ADFS.Remove-AdfsRelyingPartyWebTheme
name: Remove-AdfsRelyingPartyWebTheme
module: ADFS
isPreview: false
summary: |-
  Removes a web theme to a relying party.
description: |-
  The **Remove-AdfsRelyingPartyWebTheme** cmdlet removes a web theme for a relying party.
