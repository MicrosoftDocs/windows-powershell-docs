    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name.
      The cmdlet removes the theme that you specify by name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifierName
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetWebTheme
    type: <xref href="AdfsWebTheme" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **AdfsWebTheme** object.
      The cmdlet removes the theme that you specify.
      To obtain an **AdfsWebTheme** object, use the **Get-AdfsWebTheme** cmdlet.
