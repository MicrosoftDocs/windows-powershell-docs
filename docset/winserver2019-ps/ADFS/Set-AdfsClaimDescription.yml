examples:
- title: 'Example 1: Change the name of a claim description'
  description: |-
    ```
    PS C:\> Set-AdfsClaimDescription -TargetName "Role" -Name "RoleDesc"
    ```

    This command changes the name of the claim description named Role to RoleDesc.
