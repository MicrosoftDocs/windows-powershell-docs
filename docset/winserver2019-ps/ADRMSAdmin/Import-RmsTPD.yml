syntaxes:
- syntax: |-
    ```Syntax
    Import-RmsTPD
        [-DisplayName] <String>
        [-SourceFile] <String>
        [-Password] <SecureString>
        [-Force]
        [-PassThru]
        [-Path] <String[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
