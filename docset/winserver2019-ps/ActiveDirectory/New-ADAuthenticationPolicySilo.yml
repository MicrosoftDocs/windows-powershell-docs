### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.New-ADAuthenticationPolicySilo
name: New-ADAuthenticationPolicySilo
module: ActiveDirectory
isPreview: false
summary: |-
  Creates an Active Directory Domain Services authentication policy silo object.
description: |-
  The **New-ADAuthenticationPolicySilo** cmdlet creates an authentication policy silo object in Active Directory® Domain Services.
parameters:
  cmdletParameters:
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.
      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerAuthenticationPolicy
    type: <xref href="ADAuthenticationPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication policy that applies to computer accounts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user account that has permission to perform the task.
      The default is the current user.
      Type a user name, such as User01 or Domain01\User01, or enter a **PSCredential** object, such as one generated by the **Get-Credential** cmdlet.

      By default, the cmdlet uses the credentials of the currently logged on user unless the cmdlet is run from an Active Directory Domain Services Windows PowerShell provider drive.
      If you run the cmdlet in a provider drive, the account associated with the drive is the default.

      If you specify credentials that do not have permission to perform the task, the cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description for the object.
      This parameter sets the value of the description property for the object.
      The Lightweight Directory Access Protocol (LDAP) display name (**ldapDisplayName**) for this property is description.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enforce
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the authentication policy silo is enforced.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Instance
    type: <xref href="ADAuthenticationPolicySilo" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an instance of an **ADAuthenticationPolicySilo** object to use as a template for a new **ADAuthenticationPolicySilo** object.
      To get the **ADAuthenticationPolicySilo** object to use as a template, use the Get-ADAuthenticationPolicySilo cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the object.
      This parameter sets the **Name** property of the Active Directory Domain Services object.
      The LDAP display name (**ldapDisplayName**) of this property is name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OtherAttributes
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a list of object attribute values for attributes that are not represented by other parameters.
      You can set one or more attributes at the same time with this parameter, and if an attribute takes more than one value you can assign multiple values.
      To identify an attribute, specify the LDAP display name (**ldapDisplayName**) defined for it in the Active Directory Domain Services schema.

      Specify the attribute and the value of the attribute in the following format: @{'AttributeLDAPDisplayName'=value}.

      To specify multiple values for an attribute, specify a comma separated list the values for the display name.
      You can specify values for more than one attribute by using semicolons to separate attribute value pairs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectedFromAccidentalDeletion
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to prevent the object from being deleted.
      When this property is set to true, you cannot delete the corresponding object without changing the value of the property.
      The acceptable values for this parameter are:

      - $False or 0
      - $True or 1
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Active Directory Domain Services instance to which to connect, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following:  Active Directory Lightweight Domain Services, Active Directory Domain Services or Active Directory snapshot instance.

      Specify the Active Directory Domain Services instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the *Server* value from objects passed through the pipeline
      - By using the server information associated with the Active Directory Domain Services Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceAuthenticationPolicy
    type: <xref href="ADAuthenticationPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication policy that applies to managed service accounts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UserAuthenticationPolicy
    type: <xref href="ADAuthenticationPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication policy that applies to user accounts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-ADAuthenticationPolicySilo
        [-WhatIf]
        [-Confirm]
        [-AuthType <ADAuthType>]
        [-ComputerAuthenticationPolicy <ADAuthenticationPolicy>]
        [-Credential <PSCredential>]
        [-Description <String>]
        [-Enforce]
        [-Instance <ADAuthenticationPolicySilo>]
        [-Name] <String>
        [-OtherAttributes <Hashtable>]
        [-PassThru]
        [-ProtectedFromAccidentalDeletion <Boolean>]
        [-Server <String>]
        [-ServiceAuthenticationPolicy <ADAuthenticationPolicy>]
        [-UserAuthenticationPolicy <ADAuthenticationPolicy>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.ActiveDirectory.Management.ADAuthenticationPolicy" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an authentication policy silo and enforce it'
  description: |-
    ```
    PS C:\> New-ADAuthenticationPolicySilo -Name AuthenticationPolicySilo01 -Enforce
    ```

    This command creates an authentication policy silo object and enforces it.
- title: 'Example 2: Create an authentication policy silo without enforcement'
  description: |-
    ```
    PS C:\> New-ADAuthenticationPolicySilo -Name AuthenticationPolicySilo02
    ```

    This command creates an authentication policy silo object but does not enforce it.
