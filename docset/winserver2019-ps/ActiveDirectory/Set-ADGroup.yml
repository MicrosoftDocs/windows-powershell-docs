### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.Set-ADGroup
name: Set-ADGroup
module: ActiveDirectory
isPreview: false
summary: |-
  Modifies an Active Directory group.
description: |-
  The **Set-ADGroup** cmdlet modifies the properties of an Active Directory group.
  You can modify commonly used property values by using the cmdlet parameters.
  Property values that are not associated with cmdlet parameters can be modified by using the *Add*, *Replace*, *Clear*, and *Remove* parameters.

  The *Identity* parameter specifies the Active Directory group to modify.
  You can identify a group by its distinguished name, GUID, security identifier, or Security Account Manager (SAM) account name.
  You can also set the *Identity* parameter to an object variable such as `$<localGroupObject>`, or you can pass a group object through the pipeline to the *Identity* parameter.
  For example, you can use the **Get-ADGroup** cmdlet to get a group object and then pass the object through the pipeline to the **Set-ADGroup** cmdlet.

  The *Instance* parameter provides a way to update a group object by applying the changes made to a copy of the object.
  When you set the *Instance* parameter to a copy of an Active Directory group object that has been modified, the **Set-ADGroup** cmdlet makes the same changes to the original group object.
  To get a copy of the object to modify, use the **Get-ADGroup** cmdlet.
  The *Identity* parameter is not allowed when you use the *Instance* parameter.
  For more information about the *Instance* parameter, see the *Instance* parameter description.
notes: |-
  * This cmdlet does not work with an Active Directory snapshot.
  * This cmdlet does not work with a read-only domain controller.
parameters:
  cmdletParameters:
  - name: Add
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies values to add to an object property.
      Use this parameter to add one or more values to a property that cannot be modified using a cmdlet parameter.
      To modify an object property, you must use the Lightweight Directory Access Protocol (LDAP) display name.
      You can specify multiple values to a property by specifying a comma-separated list of values and more than one property by separating them using a semicolon.
      The format for this parameter is:

      `-Add @{Attribute1LDAPDisplayName=value1, value2, ...;   Attribute2LDAPDisplayName=value1, value2, ...; AttributeNLDAPDisplayName=value1, value2, ...}`

      When you use the *Add*, *Replace*, *Clear*, and *Remove* parameters together, the operations are performed in the following order:

      - **Remove**
      - **Add**
      - **Replace**
      - **Clear**
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.

      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Clear
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of object properties that are cleared in the directory.
      Use this parameter to clear one or more values of a property that cannot be modified using a cmdlet parameter.
      To modify an object property, you must use the LDAP display name.
      You can modify more than one property by specifying a comma-separated list.
      The format for this parameter is:

      `-Clear Attribute1LDAPDisplayName, Attribute2LDAPDisplayName`

      When you use the *Add*, *Replace*, *Clear*, and *Remove* parameters together, the operations are performed in the following order:

      - **Remove**
      - **Add**
      - **Replace**
      - **Clear**
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user account credentials to use to perform this task.
      The default credentials are the credentials of the currently logged on user unless the cmdlet is run from an Active Directory module for Windows PowerShell provider drive.
      If the cmdlet is run from such a provider drive, the account associated with the drive is the default.

      To specify this parameter, you can type a user name, such as User1 or Domain01\User01 or you can specify a **PSCredential** object.
      If you specify a user name for this parameter, the cmdlet prompts for a password.

      You can also create a **PSCredential** object by using a script or by using the **Get-Credential** cmdlet.
      You can then set the *Credential* parameter to the **PSCredential** object.

      If the acting credentials do not have directory-level permission to perform the task, Active Directory module for Windows PowerShell returns a terminating error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description of the object.
      This parameter sets the value of the **Description** property for the object.
      The Lightweight Directory Access Protocol (LDAP) display name (**ldapDisplayName**) for this property is description.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisplayName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the display name of the object.
      This parameter sets the **DisplayName** property of the object.
      The LDAP display name (**ldapDisplayName**) for this property is displayName.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GroupCategory
    type: <xref href="ADGroupCategory" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the category of the group.
      The acceptable values for this parameter are:

      - Distribution or 0
      - Security or 1

      This parameter sets the **GroupCategory** property of the group.
      This parameter value combined with other group values sets the LDAP display name (**ldapDisplayName**) attribute named groupType.
    acceptedValues:
    - Distribution
    - Security
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GroupScope
    type: <xref href="ADGroupScope" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the group scope of the group.
      The acceptable values for this parameter are:

      - DomainLocal or 0
      - Global or 1
      - Universal or 2

      This parameter sets the **GroupScope** property of a group object to the specified value.
      The LDAP display name of this property is groupType.
    acceptedValues:
    - DomainLocal
    - Global
    - Universal
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HomePage
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URL of the home page of the object.
      This parameter sets the **homePage** property of an Active Directory object.
      The LDAP display name (**ldapDisplayName**) for this property is wWWHomePage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Identity
    type: <xref href="ADGroup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Active Directory group object by providing one of the following values.
      The identifier in parentheses is the LDAP display name for the attribute.
      The acceptable values for this parameter are:

      - A distinguished name
      - A GUID (objectGUID)
      - A security identifier (objectSid)
      - A SAM account name (sAMAccountName)

      The cmdlet searches the default naming context or partition to find the object.
      If two or more objects are found, the cmdlet returns a non-terminating error.

      This parameter can also get this object through the pipeline or you can set this parameter to an object instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Instance
    type: <xref href="ADGroup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a modified copy of a group object to use to update the actual Active Directory group object.
      When this parameter is used, any modifications made to the modified copy of the object are also made to the corresponding Active Directory object.
      The cmdlet only updates the object properties that have changed.

      The *Instance* parameter can only update group objects that have been retrieved by using the **Get-ADGroup** cmdlet.
      When you specify the *Instance* parameter, you cannot specify other parameters that set properties on the object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Instance
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ManagedBy
    type: <xref href="ADPrincipal" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user or group that manages the object by providing one of the following property values.
      Note: The identifier in parentheses is the LDAP display name for the property.
      The acceptable values for this parameter are:

      - A distinguished name
      - A GUID (objectGUID)
      - A security identifier (objectSid)
      - SAM account name (sAMAccountName)

      This parameter sets the Active Directory attribute with an LDAP display name of managedBy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Partition
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the distinguished name of an Active Directory partition.
      The distinguished name must be one of the naming contexts on the current directory server.
      The cmdlet searches this partition to find the object defined by the *Identity* parameter.

      In many cases, a default value is used for the *Partition* parameter if no value is specified.
      The rules for determining the default value are given below.
      Note that rules listed first are evaluated first and once a default value can be determined, no further rules are evaluated.

      In Active Directory Domain Services (AD DS) environments, a default value for *Partition* is set in the following cases:

      - If the *Identity* parameter is set to a distinguished name, the default value of *Partition* is automatically generated from this distinguished name.
      - If running cmdlets from an Active Directory provider drive, the default value of *Partition* is automatically generated from the current path in the drive.
      - If none of the previous cases apply, the default value of *Partition* is set to the default partition or naming context of the target domain.

      In Active Directory Lightweight Directory Services (AD LDS) environments, a default value for *Partition* is set in the following cases:

      - If the *Identity* parameter is set to a distinguished name, the default value of *Partition* is automatically generated from this distinguished name.
      - If running cmdlets from an Active Directory provider drive, the default value of *Partition* is automatically generated from the current path in the drive.
      - If the target AD LDS instance has a default naming context, the default value of *Partition* is set to the default naming context.
      To specify a default naming context for an AD LDS environment, set the **msDS-defaultNamingContext** property of the Active Directory directory service agent object (**nTDSDSA**) for the AD LDS instance.
      - If none of the previous cases apply, the *Partition* parameter does not take a default value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Remove
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that the cmdlet remove values of an object property.
      Use this parameter to remove one or more values of a property that cannot be modified using a cmdlet parameter.
      To remove an object property, you must use the LDAP display name.
      You can remove more than one property by specifying a semicolon-separated list.
      The format for this parameter is:

      `-Remove @{Attribute1LDAPDisplayName=value[];   Attribute2LDAPDisplayName=value[]}`

      When you use the *Add*, *Replace*, *Clear*, and *Remove* parameters together, the operations will be performed in the following order:

      - **Remove**
      - **Add**
      - **Replace**
      - **Clear**
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Replace
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies values for an object property that will replace the current values.
      Use this parameter to replace one or more values of a property that cannot be modified using a cmdlet parameter.
      To modify an object property, you must use the LDAP display name.
      You can specify multiple values to a property by specifying a comma-separated list of values, and more than one property by separating them using a semicolon.
      The format for this parameter is:

      `-Replace @{Attribute1LDAPDisplayName=value1, value2, ...;   Attribute2LDAPDisplayName=value1, value2, ...; AttributeNLDAPDisplayName=value1, value2, ...}`

      When you use the *Add*, *Remove*, *Replace*, and *Clear* parameters together, the operations will be performed in the following order:

      - **Remove**
      - **Add**
      - **Replace**
      - **Clear**
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SamAccountName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Security Account Manager (SAM) account name of the user, group, computer, or service account.
      The maximum length of the description is 256 characters.
      To be compatible with older operating systems, create a SAM account name that is 20 characters or less.
      This parameter sets the **SAMAccountName** for an account object.
      The LDAP display name (**ldapDisplayName**) for this property is sAMAccountName.

      Note: If the string value provided is not terminated with a $ (dollar sign) character, the system adds one if necessary.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Identity
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Active Directory Domain Services (AD DS) instance to connect to, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following: Active Directory Lightweight Domain Services (AD LDS), AD DS, or Active Directory snapshot instance.

      Specify the AD DS instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the **Server** value from objects passed through the pipeline
      - By using the server information associated with the AD DS Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
