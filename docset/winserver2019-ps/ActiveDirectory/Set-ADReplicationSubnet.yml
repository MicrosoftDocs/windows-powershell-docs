syntaxes:
- syntax: |-
    ```Syntax
    Set-ADReplicationSubnet
        [-Identity] <ADReplicationSubnet>
        [-WhatIf]
        [-Confirm]
        [-Add <Hashtable>]
        [-AuthType <ADAuthType>]
        [-Clear <String[]>]
        [-Credential <PSCredential>]
        [-Description <String>]
        [-Location <String>]
        [-PassThru]
        [-Remove <Hashtable>]
        [-Replace <Hashtable>]
        [-Server <String>]
        [-Site <ADReplicationSite>]
        [<CommonParameters>]
    ```
  parameterSetName: Identity
  isDefault: false
- syntax: |-
    ```Syntax
    Set-ADReplicationSubnet
        [-WhatIf]
        [-Confirm]
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-Instance <ADReplicationSubnet>]
        [-PassThru]
        [-Server <String>]
