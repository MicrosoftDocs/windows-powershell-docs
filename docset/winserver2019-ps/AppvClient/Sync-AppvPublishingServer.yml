### YamlMime:PowerShellCmdlet1
uid: AppvClient.Sync-AppvPublishingServer
name: Sync-AppvPublishingServer
module: AppvClient
isPreview: false
summary: |-
  Initiates the App-V Publishing Refresh operation.
description: |-
  The **Sync-AppvPublishingServer** cmdlet initiates the Microsoft Application Virtualization (App-V) publishing refresh operation in the context of the current user.
  The publishing refresh connects to all added servers on the client and expose new App-V packages and their respective extension points to the user.
parameters:
  cmdletParameters:
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet forces all publishes and unpublishes of packages.

      The Force switch specifies whether to suppress warning and confirmation messages. It can be useful in scripting to suppress interactive prompts. If the Force switch isn't provided in the command, you're prompted for administrative input if required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Global
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet synchronizes packages from the App-V publishing server that are provisioned to the computer and are published to all users on the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HidePublishingRefreshUI
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet suppresses the Publishing Refresh Progress bar.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameUrl
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkCostAware
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet is network cost aware.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="AppvPublishingServer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **AppvPublishingServer** object.
      To obtain an **AppvPublishingServer** object, use the **Get-AppvPublishingServer** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier for the App-V Publishing Server.
      This can be queried using the **Get-AppvPublishingServer** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByServerId
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: URL
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URL path of the server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameUrl
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Sync-AppvPublishingServer
        [-ServerId] <UInt32>
        [-Global]
        [-Force]
        [-NetworkCostAware]
        [-HidePublishingRefreshUI]
        [<CommonParameters>]
    ```
  parameterSetName: ByServerId
  isDefault: true
- syntax: |-
    ```Syntax
    Sync-AppvPublishingServer
        [-Server] <AppvPublishingServer>
        [-Global]
        [-Force]
        [-NetworkCostAware]
        [-HidePublishingRefreshUI]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Sync-AppvPublishingServer
        [[-Name] <String>]
        [[-URL] <String>]
        [-Global]
        [-Force]
        [-NetworkCostAware]
        [-HidePublishingRefreshUI]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameUrl
  isDefault: false
examples:
- title: 'Example 1: Start publishing refresh'
  description: |-
    ```
    PS C:\> Sync-AppvPublishingServer -Name "MyServer"
    ```

    This command starts publishing refresh for the current user for the server named MyServer.
