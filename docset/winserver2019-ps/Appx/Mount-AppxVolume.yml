    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Mount-AppxVolume
        [-Volume] <AppxVolume[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Mount a volume by using a path'
  description: |-
    ```
    PS C:\> Mount-AppxVolume -Volume E:\
    ```

    This command mounts a volume at the path E:\.
- title: 'Example 2: Mount a volume by using an ID'
  description: |-
    ```
    PS C:\> Mount-AppxVolume -Volume {7e62a691-398e-4fbe-819a-64f1e407777a}
    ```

    This command mounts a volume that has the specified media ID.
