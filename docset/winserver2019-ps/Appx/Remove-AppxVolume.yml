    supportsWildcards: false
  - name: Volume
    type: <xref href="AppxVolume" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the **AppxVolume** object to remove.
    defaultValue: None
    dontShow: false
