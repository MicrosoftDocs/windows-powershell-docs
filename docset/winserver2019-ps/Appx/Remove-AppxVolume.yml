syntaxes:
- syntax: |-
    ```Syntax
    Remove-AppxVolume
        [-Volume] <AppxVolume[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove a volume by using an ID'
  description: |-
    ```
    PS C:\> Remove-AppxVolume -Volume {984786d3-0cae-49de-a68f-8bedb0ca260b}
    ```

    This command removes a volume that has the specified media ID.
- title: 'Example 2: Remove a volume by using a path'
  description: |-
    ```
    PS C:\> Remove-AppxVolume -Volume E:\
    ```

    This command removes a volume at the path E:\.
