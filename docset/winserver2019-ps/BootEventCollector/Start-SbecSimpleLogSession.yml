syntaxes:
- syntax: |-
    ```Syntax
    Start-SbecSimpleLogSession
        [-Name] <String>
        [[-SessionGuid] <Guid>]
        [[-ProviderName] <String[]>]
        [[-ProviderGuid] <Guid[]>]
        [[-Level] <SeverityLevel>]
        [[-ClockType] <ClientContext>]
        [[-BufferSize] <UInt32>]
        [[-MinimumBufferCount] <UInt32>]
        [[-MaximumBufferCount] <UInt32>]
        [[-FlushSeconds] <UInt32>]
        [[-LogFileMode] <LoggingMode>]
        [[-KernelEnableFlags] <EventTraceFlag>]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
