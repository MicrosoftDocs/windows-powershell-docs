syntaxes:
- syntax: |-
    ```Syntax
    Enable-BCDowngrading
        [[-Version] <PreferredContentInformationVersion>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
