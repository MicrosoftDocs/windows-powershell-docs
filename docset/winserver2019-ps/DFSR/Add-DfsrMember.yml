syntaxes:
- syntax: |-
    ```Syntax
    Add-DfsrMember
        [-GroupName] <String[]>
        [-ComputerName] <String[]>
        [[-Description] <String>]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
