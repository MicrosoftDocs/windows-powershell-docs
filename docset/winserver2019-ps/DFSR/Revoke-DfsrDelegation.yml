syntaxes:
- syntax: |-
    ```Syntax
    Revoke-DfsrDelegation
        [-GroupName] <String[]>
        [-AccountName] <String[]>
        [-Force]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.DistributedFileSystemReplication.DfsReplicationGroup" data-throw-if-not-resolved="False" />
