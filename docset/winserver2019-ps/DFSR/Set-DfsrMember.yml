### YamlMime:PowerShellCmdlet1
uid: DFSR.Set-DfsrMember
name: Set-DfsrMember
module: DFSR
isPreview: false
summary: |-
  Modifies member computer information in a replication group.
description: |-
  The **Set-DfsrMember** cmdlet modifies member computer information in a replication group.
  Members of a replication group host replicated folders.
  You can modify the description of a member.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of member computers.
      You can use a comma separated list and the wildcard character (*).
    aliases:
    - MemberList
    - MemList
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description for a member computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DomainName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the NetBIOS name or fully qualified domain name (FQDN) for the Active Directory Domain Service (AD DS) domain that contains a replication group.
      If you do not specify this parameter, the cmdlet uses the domain of the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "100"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GroupName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of replication groups.
      You can use a comma separated list and the wildcard character (*).
      If you do not specify this parameter, the cmdlet uses all participating replication groups.
    aliases:
    - RG
    - RgName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-DfsrMember
        [-GroupName] <String[]>
        [-ComputerName] <String[]>
        [[-Description] <String>]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.DistributedFileSystemReplication.DfsReplicationGroup" data-throw-if-not-resolved="False" />
- name: <xref href="String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.DistributedFileSystemReplication.DfsrMember" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update the description for a member'
  description: |-
    ```
    PS C:\> Set-DfsrMember -GroupName "RG07" -Member "SRV01" -Description "Waukegan Branch Office Server"
    GroupName                    : RG07
    ComputerName                 : SRV01
    DomainName                   : corp.contoso.com
    Identifier                   : 5ddc94cd-1602-477d-9e50-a66af5892b67
    Description                  : Waukegan Branch Office Server
    DnsName                      : SRV01.corp.contoso.com
    Site                         : Default-First-Site-Name
    NumberOfConnections          : 2
    NumberOfInboundConnections   : 1
    NumberOfOutboundConnections  : 1
    NumberOfInterSiteConnections : -2
    NumberOfIntraSiteConnections : 2
    IsClusterNode                : True
    State                        : Normal
    ```

    This command updates the description for the computer named SRV01 in the group named RG07.
    The console displays the **DfsrMember** object, which includes the updated description.
