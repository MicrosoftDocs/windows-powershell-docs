- syntax: |-
    ```Syntax
    Sync-DfsReplicationGroup
        [-GroupName] <String[]>
        [-SourceComputerName] <String>
        [-DestinationComputerName] <String>
        [-DurationInMinutes] <UInt32>
        [-WhatIf]
        [-Confirm]
