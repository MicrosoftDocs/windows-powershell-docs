    ```Syntax
    Mount-WindowsImage
        -Path <String>
        -ImagePath <String>
        -Index <UInt32>
        [-ReadOnly]
        [-Optimize]
        [-CheckIntegrity]
        [-LogPath <String>]
        [-ScratchDirectory <String>]
        [-LogLevel <LogLevel>]
        [<CommonParameters>]
    ```
  parameterSetName: OfflineIndex
  isDefault: false
- syntax: |-
    ```Syntax
    Mount-WindowsImage
        -Path <String>
        -ImagePath <String>
        -Name <String>
        [-ReadOnly]
        [-Optimize]
        [-CheckIntegrity]
        [-LogPath <String>]
        [-ScratchDirectory <String>]
        [-LogLevel <LogLevel>]
        [<CommonParameters>]
    ```
  parameterSetName: OfflineName
  isDefault: false
- syntax: |-
