syntaxes:
- syntax: |-
    ```Syntax
    New-NetQosTrafficClass
        [-Name] <String>
        [-Algorithm] <Algorithm>
        [-Priority] <Byte[]>
        [-BandwidthPercentage <Byte>]
        [-InterfaceAlias <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIfAlias
  isDefault: true
- syntax: |-
    ```Syntax
    New-NetQosTrafficClass
        [-Name] <String>
        [-Algorithm] <Algorithm>
        [-Priority] <Byte[]>
        [-BandwidthPercentage <Byte>]
        [-InterfaceIndex <UInt32>]
        [-CimSession <CimSession[]>]
