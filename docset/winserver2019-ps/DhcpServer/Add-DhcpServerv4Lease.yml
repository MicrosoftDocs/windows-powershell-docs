syntaxes:
- syntax: |-
    ```Syntax
    Add-DhcpServerv4Lease
        [-IPAddress] <IPAddress>
        [-ScopeId] <IPAddress>
        [-ClientId] <String>
        [-AddressState <String>]
        [-HostName <String>]
        [-Description <String>]
        [-ComputerName <String>]
        [-PassThru]
        [-DnsRR <String>]
        [-DnsRegistration <String>]
        [-ClientType <String>]
        [-LeaseExpiryTime <DateTime>]
        [-NapCapable <Boolean>]
        [-NapStatus <String>]
        [-ProbationEnds <DateTime>]
        [-PolicyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
