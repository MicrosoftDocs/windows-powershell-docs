syntaxes:
- syntax: |-
    ```Syntax
    Export-DhcpServer
        [-File] <String>
        [-ScopeId <IPAddress[]>]
        [-Prefix <IPAddress[]>]
        [-Leases]
        [-Force]
        [-ComputerName <String>]
        [-CimSession <CimSession>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
