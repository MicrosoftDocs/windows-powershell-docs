syntaxes:
- syntax: |-
    ```Syntax
    Get-DhcpServerv6OptionValue
        [-ComputerName <String>]
        [-VendorClass <String>]
        [[-Prefix] <IPAddress>]
        [-ReservedIP <IPAddress>]
        [-UserClass <String>]
        [[-OptionId] <UInt32[]>]
        [-All]
        [-Brief]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
