syntaxes:
- syntax: |-
    ```Syntax
    Remove-DhcpServerv4Reservation
        -IPAddress <IPAddress[]>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IPAddress
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-DhcpServerv4Reservation
        [-ScopeId] <IPAddress>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
