        [-Value] <String[]>
        [-OptionId] <UInt32>
        [-PolicyName <String>]
        [-PassThru]
        [-Force]
        [-ReservedIP <IPAddress>]
        [-UserClass <String>]
        [-ComputerName <String>]
        [-VendorClass <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: OptionIds
  isDefault: true
