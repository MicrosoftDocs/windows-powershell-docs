syntaxes:
- syntax: |-
    ```Syntax
    Import-DnsServerTrustAnchor
        [-KeySetFile] <String>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: KeySet
  isDefault: true
- syntax: |-
    ```Syntax
    Import-DnsServerTrustAnchor
        -DSSetFile <String>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DSSet
  isDefault: false
