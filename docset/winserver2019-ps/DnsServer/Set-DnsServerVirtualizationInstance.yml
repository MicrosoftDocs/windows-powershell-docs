syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsServerVirtualizationInstance
        [-ComputerName <String>]
        [-Name] <String>
        [-PassThru]
        [-Description <String>]
        [-FriendlyName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
