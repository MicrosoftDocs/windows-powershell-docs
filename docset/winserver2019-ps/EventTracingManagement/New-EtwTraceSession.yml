    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-EtwTraceSession
        [-Name] <String>
        [-LogFileMode <UInt32>]
        [-LocalFilePath <String>]
        [-MaximumFileSize <UInt32>]
        [-BufferSize <UInt32>]
        [-MinimumBuffers <UInt32>]
        [-MaximumBuffers <UInt32>]
        [-FlushTimer <UInt32>]
        [-ClockType <ClockType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create an ETW trace session'
  description: |-
    ```
    PS C:\> New-EtwTraceSession -Name "NetCfgTrace" -MaximumBuffers 24
    ```

    This command creates an ETW trace session named NetCfgTrace that has a value of 24 for the *MaximumBuffers* parameter.
