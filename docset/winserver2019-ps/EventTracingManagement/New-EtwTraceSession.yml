### YamlMime:PowerShellCmdlet1
uid: EventTracingManagement.New-EtwTraceSession
name: New-EtwTraceSession
module: EventTracingManagement
isPreview: false
summary: |-
  Creates an ETW trace session.
description: |-
  The Start-EtwTraceSession cmdlet replaces this cmdlet as the recommended method of starting an ETW session.
  It provides an easier way to specify common *LogFileMode* settings and other parameters.

  The **New-EtwTraceSession** cmdlet creates an Event Trace for Windows (ETW) trace session.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BufferSize
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ETW session buffer size, in kilobytes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClockType
    type: <xref href="ClockType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of timestamp that will be used for each event logged to this ETW session.

      This is an advanced session configuration option, and it is not recommended that this parameter be set.

      For more information, see the description of the **ClientContext** field in the topic [WNODE_HEADER structure](https://msdn.microsoft.com/en-us/library/windows/desktop/aa364160.aspx) for a description of the different clock types available.
    acceptedValues:
    - Performance
    - System
    - Cycle
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FlushTimer
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      When set, all active buffers in the session will be flushed at this interval, in seconds.

      This is an advanced session configuration option, and it is not recommended that this parameter be set.

      If it is not set, the ETW will select an appropriate default based on the LogFileMode.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path to the file the ETW session should write to.
      For non-buffering mode sessions only.

      When creating a new-file file mode session, the file path must contain a %d in the file name.

      Do not use this parameter if the session is configured as a buffering mode session.
      Use **Save-EtwTraceSession** to save a buffering mode session to disk instead.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogFileMode
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ETW session logging mode.
      The value is a bitmask of the ETW logging mode constants.
      For valid values, see [Logging Mode Constants](https://msdn.microsoft.com/library/windows/desktop/aa364080.aspx).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumBuffers
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of buffers the ETW session should use.

      The ETW session will use a maximum of (BufferSize * MaximumBuffers) kilobytes of memory.
      Depending on the specified *LogFileMode* this may be pageable or non-paged memory.

      If the session is losing events because the buffers cannot be flushed quickly enough to keep up with the incoming event rate, try increasing this value.

      Configuring a session to use too many buffers may affect system performance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumFileSize
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum file size for the output .etl file to grow to, in megabytes.

      The parameter must be set for a circular, new-file, or sequential file mode ETW session.

      For circular sessions, once the file reaches this size the oldest buffers will be overwritten by the new buffers.

      For new-file sessions, once the file reaches this size a new file will be created and all new events will be written to that file.

      For sequential file sessions, once the file reaches this size the session will stop.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumBuffers
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum number of buffers the ETW session should use.

      The ETW session will use a minimum of (BufferSize * MinimumBuffers) kilobytes of memory.
      Depending on the specified *LogFileMode* this may be pageable or non-paged memory.

      If the session is losing events because the buffers cannot be flushed quick enough to keep up with the incoming event rate, try increasing this value.

      Configuring a session to use too many buffers may affect system performance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the new ETW trace session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
