syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusterGenericScriptRole
        -ScriptFilePath <String>
        [-Storage <StringCollection>]
        [-StaticAddress <StringCollection>]
        [-IgnoreNetwork <StringCollection>]
        [[-Name] <String>]
        [-Wait <Int32>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
