    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet.
      If the input for this parameter is `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Infrastructure
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to create an infrastructure file server scale-out file server role.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster on which to create the highly available scale-out file server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the highly available scale-out file server being created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Wait
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time in seconds to wait for the cmdlet.
      If the **Wait** parameter is not specified, then the cmdlet waits for completion.
      If `-Wait 0` is specified, then the call is initiated and the cmdlet returns without waiting.
    defaultValue: None
