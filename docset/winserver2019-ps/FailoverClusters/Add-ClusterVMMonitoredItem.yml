syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusterVMMonitoredItem
        [[-VirtualMachine] <String>]
        [-Service <StringCollection>]
        [-EventLog <String>]
        [-EventSource <String>]
        [-EventId <Int32>]
        [-OverrideServiceRecoveryActions]
        [-Wait <Int32>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VirtualMachine
  isDefault: true
- syntax: |-
    ```Syntax
    Add-ClusterVMMonitoredItem
        [-Service <StringCollection>]
        [-EventLog <String>]
        [-EventSource <String>]
        [-EventId <Int32>]
        [-OverrideServiceRecoveryActions]
        [-VMId <Guid>]
        [-Wait <Int32>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VMId
  isDefault: false
- syntax: |-
    ```Syntax
    Add-ClusterVMMonitoredItem
        [-Service <StringCollection>]
        [-EventLog <String>]
        [-EventSource <String>]
        [-EventId <Int32>]
        [-OverrideServiceRecoveryActions]
        [-Wait <Int32>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterGroup" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterResource" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterVMMonitoredItem" data-throw-if-not-resolved="False" />
