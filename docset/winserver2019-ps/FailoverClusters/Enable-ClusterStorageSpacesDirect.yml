### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Enable-ClusterStorageSpacesDirect
name: Enable-ClusterStorageSpacesDirect
module: FailoverClusters
isPreview: false
summary: |-
  Enables Storage Spaces Direct on a Fail-Over Cluster.
description: |-
  The **Enable-ClusterStorageSpacesDirect** cmdlet enables highly available Storage Spaces that use directly attached storage Storage Spaces Direct (S2D) on a cluster.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Autoconfig
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet that the pool should be automatically created and configured.
      When a pool already exists before Storage Spaces Direct is enabled the *AutoConfig* parameter becomes a no-op.
      *AutoConfig* is set to true by default.
      If you do not want the pool to be automatically created, but created manually, you should set *AutoConfig* to false.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheDeviceModel
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a list of disk models that should be used by Storage Spaces Direct cache.
      When this parameter is omitted the system automatically determines which disks to use for the operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WithCacheDeviceModel
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheMetadataReserveBytes
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CachePageSizeKBytes
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the page size used by Storage Spaces Direct cache.
      This parameter is useful to control the memory footprint used to manage the pages.
      To reduce the memory overhead on systems with considerably large amounts of storage the page size can be increased to 32 kilobytes (KB) or even 64 KB.
      The default value is 16 KB, which represents a good tradeoff on most systems.
    acceptedValues:
    - "8"
    - "16"
    - "32"
    - "64"
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheState
    type: <xref href="CacheStateType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Storage Spaces Direct cache state.
      The acceptable values for this parameter are: Enabled or Disabled.
      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PoolFriendlyName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the Storage Spaces Direct pool when it is created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SkipEligibilityChecks
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet skips cache eligibility checks.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: XML
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the XML file that contains the storage supported configuration information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WithXML
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-ClusterStorageSpacesDirect
        [-PoolFriendlyName <String>]
        [-Autoconfig <Boolean>]
        [-CacheState <CacheStateType>]
        [-CacheMetadataReserveBytes <UInt64>]
        [-CachePageSizeKBytes <UInt32>]
        [-SkipEligibilityChecks]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Auto
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-ClusterStorageSpacesDirect
        -XML <String>
        [-PoolFriendlyName <String>]
        [-Autoconfig <Boolean>]
        [-CacheState <CacheStateType>]
        [-CacheMetadataReserveBytes <UInt64>]
        [-CachePageSizeKBytes <UInt32>]
        [-SkipEligibilityChecks]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WithXML
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-ClusterStorageSpacesDirect
        -CacheDeviceModel <String[]>
        [-PoolFriendlyName <String>]
        [-Autoconfig <Boolean>]
        [-CacheState <CacheStateType>]
        [-CacheMetadataReserveBytes <UInt64>]
        [-CachePageSizeKBytes <UInt32>]
        [-SkipEligibilityChecks]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WithCacheDeviceModel
  isDefault: false
examples:
- title: 'Example 1: Enable Storage Spaces Direct'
  description: |-
    ```powershell
    PS C:\> Enable-ClusterStorageSpacesDirect
    ```

    This command enables S2D on the cluster.
- title: 'Example 2: Enable Storage Spaces Direct specifying a Friendly Name'
  description: |-
    ```powershell
    PS C:\> Enable-ClusterStorageSpacesDirect -PoolFriendlyName 'Sales'
    ```

    This command enables S2d on the cluster and sets a friendly name for the Storage Spaces Direct pool.
