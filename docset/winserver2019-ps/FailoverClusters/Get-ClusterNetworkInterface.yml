### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Get-ClusterNetworkInterface
name: Get-ClusterNetworkInterface
module: FailoverClusters
isPreview: false
summary: |-
  Gets information about one or more network adapters in a failover cluster.
description: |-
  The **Get-ClusterNetworkInterface** cmdlet gets information about one or more network adapters in a failover cluster.
  A failover cluster requires network connectivity among nodes and between clients and nodes.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet.
      If the input for this parameter is `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster on which to enumerate the cluster network interfaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster network interface to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Network
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster network for which to enumerate the network interfaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Node
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster node on which to enumerate the network interfaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ClusterNetworkInterface
        [[-Name] <StringCollection>]
        [-Node <StringCollection>]
        [-Network <StringCollection>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterNetwork" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterNetworkInterface" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-ClusterNetworkInterface
    Name                Node                Network                           State
    ----                ----                -------                           -----
    node1 - Local A ...  node1               Cluster Network 1                    Up
    node2 - Local A ...  node2               Cluster Network 1                    Up
    node1 - Local A ...  node1               Cluster Network 2                    Up
    node2 - Local A ...  node2               Cluster Network 2                    Up
    ```

    This example displays information about the physical network adapters used by the local cluster.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-ClusterNode -Name node1 | Get-ClusterNetworkInterface
    Name                Node                Network                           State
    ----                ----                -------                           -----
    node1 - Local A ...  node1               Cluster Network 1                    Up
    node1 - Local A ...  node1               Cluster Network 2                    Up
    ```

    This example displays information about the physical network adapters used by node1 in the local cluster.
    This cmdlet is equivalent to `Get-ClusterNetworkInterface -Node node1`.
