syntaxes:
- syntax: |-
    ```Syntax
    Set-ClusterFaultDomain
        [[-Name] <String[]>]
        [-Id <String[]>]
        [-NewName <String>]
        [-Location <String>]
        [-Description <String>]
        [-FaultDomain <String>]
        [-Flags <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Set-ClusterFaultDomain
        -InputObject <CimInstance[]>
        [-NewName <String>]
        [-Location <String>]
        [-Description <String>]
        [-FaultDomain <String>]
        [-Flags <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Update an existing fault domain'
  description: |-
    ```
    PS C:\> Set-ClusterFaultDomain -Name "NMALIWA-VM-1101" -FaultDomain "Rack1"
    ```

    This command sets the parent of the fault domain named NMALIWA-VM-1101 to the fault domain named Rack1.
