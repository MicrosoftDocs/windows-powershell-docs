syntaxes:
- syntax: |-
    ```Syntax
    Stop-Cluster
        [[-Cluster] <String>]
        [-Force]
        [-Wait <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Cluster name
  isDefault: true
