syntaxes:
- syntax: |-
    ```Syntax
    Suspend-ClusterResource
        [[-Name] <String>]
        [-VolumeName <String>]
        [-RedirectedAccess]
        [-Force]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
