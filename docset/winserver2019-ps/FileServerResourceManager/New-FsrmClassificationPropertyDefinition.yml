syntaxes:
- syntax: |-
    ```Syntax
    New-FsrmClassificationPropertyDefinition
        [-Name] <String>
        [-DisplayName <String>]
        [-Description <String>]
        -Type <PropertyDefinitionTypeEnum>
        [-PossibleValue <CimInstance[]>]
        [-Parameters <String[]>]
        [-CimSession <CimSession[]>]
