syntaxes:
- syntax: |-
    ```Syntax
    Remove-FsrmAutoQuota
        [-Path] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-FsrmAutoQuota
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove an auto apply quota'
  description: |-
    ```
    PS C:\> Remove-FsrmAutoQuota -Path "C:\Shares\NFSShare01"
    ```

    This command removes the auto apply quota in the path C:\Shares\NFSShare01 and removes the quotas from the subfolders that were derived from the quota template associated with C:\Shares\NFSShare01.
