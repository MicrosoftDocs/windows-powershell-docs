- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_FSRMFileScreen" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change the include group for a file screen'
  description: |-
    ```
    PS C:\> Set-FsrmFileScreen -Path "C:\share1" -IncludeGroup @("Media Files", "Text Files")
    ```

    This command changes the file screen on c:\share1 to include both Media Files and Text Files.
