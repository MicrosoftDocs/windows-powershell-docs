syntaxes:
- syntax: |-
    ```Syntax
    Set-FsrmFileScreen
        [-Path] <String>
        [-Description <String>]
        [-IncludeGroup <String[]>]
        [-Active]
        [-Notification <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Set-FsrmFileScreen
        -InputObject <CimInstance[]>
        [-Description <String>]
        [-IncludeGroup <String[]>]
        [-Active]
        [-Notification <CimInstance[]>]
        [-CimSession <CimSession[]>]
