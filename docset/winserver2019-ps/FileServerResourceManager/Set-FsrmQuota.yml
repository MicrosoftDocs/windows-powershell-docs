syntaxes:
- syntax: |-
    ```Syntax
    Set-FsrmQuota
        [-Path] <String>
        [-Description <String>]
        [-Size <UInt64>]
        [-SoftLimit]
        [-Disabled]
        [-Threshold <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Set-FsrmQuota
        -InputObject <CimInstance[]>
        [-Description <String>]
        [-Size <UInt64>]
        [-SoftLimit]
        [-Disabled]
        [-Threshold <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_FSRMQuota" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change the size limit of a quota'
  description: |-
    ```
    PS C:\> Set-FsrmQuota -Path "C:\Shares" -Description "limit usage to 1.5 GB" -Size 1.5GB
    ```

    This command changes the quota on C:\Shares to have a 1.5 GB limit.
