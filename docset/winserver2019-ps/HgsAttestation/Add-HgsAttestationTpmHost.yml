syntaxes:
- syntax: |-
    ```Syntax
    Add-HgsAttestationTpmHost
        -Path <String>
        [-Name <String>]
        [-ForeignKey <String>]
        [-Force]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
- syntax: |-
    ```Syntax
    Add-HgsAttestationTpmHost
        -Xml <XmlDocument>
        [-Name <String>]
        [-ForeignKey <String>]
        [-Force]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Console
  isDefault: false
outputs:
- name: <xref href="String" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a string.
examples:
- title: 'Example 1: Add a TPM host'
  description: |-
    ```
    PS C:\> Add-HgsAttestationTpmHost -Name "TpmHost21" -Path "C:\TpmHost21.xml"
    ```

    This command adds a TPM host to the Attestation service.
    This command uses an .xml file that is output of the **Get-PlatformIdentifier** cmdlet.
