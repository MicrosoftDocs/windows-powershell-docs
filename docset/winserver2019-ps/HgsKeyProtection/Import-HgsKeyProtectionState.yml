    ```Syntax
    Import-HgsKeyProtectionState
        [[-Path] <String>]
        -Password <SecureString>
        [-Force]
        [-IgnoreImportFailures]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
