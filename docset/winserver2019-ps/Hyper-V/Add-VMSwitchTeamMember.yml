syntaxes:
- syntax: |-
    ```Syntax
    Add-VMSwitchTeamMember
        [-VMSwitchName] <String[]>
        [-ComputerName <String[]>]
        [-NetAdapterName <String[]>]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SwitchName_NetAdapterName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMSwitchTeamMember
        [-VMSwitchName] <String[]>
        [-ComputerName <String[]>]
        [-NetAdapterInterfaceDescription <String[]>]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SwitchName_NetAdapterInterfaceDescription
  isDefault: false
- syntax: |-
