uid: Hyper-V.Add-VMSwitchTeamMember
name: Add-VMSwitchTeamMember
module: Hyper-V
isPreview: false
summary: |-
  Adds members to a virtual switch team.
description: |-
  The **Add-VMSwitchTeamMember** cmdlet adds adapters as members to a virtual switch team.
