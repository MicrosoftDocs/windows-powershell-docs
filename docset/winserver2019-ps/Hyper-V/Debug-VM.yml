syntaxes:
- syntax: |-
    ```Syntax
    Debug-VM
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Force]
        [-AsJob]
        [-Passthru]
        [-InjectNonMaskableInterrupt]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Debug-VM
        [-VM] <VirtualMachine[]>
        [-Force]
        [-AsJob]
        [-Passthru]
        [-InjectNonMaskableInterrupt]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> debug-vm "VM to Debug" -InjectNonMaskableInterrupt -Force
    ```

    This example injects a non-maskable interrupt into the virtual machine named "VM to Debug".
    A kernel debugger should be connected to the guest operating system before attempting to do this.
