    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-VMRemoteFXPhysicalVideoAdapter
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GPUByName
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-VMRemoteFXPhysicalVideoAdapter
        [-GPU] <VMRemoteFXPhysicalVideoAdapter[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GPUByObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMRemoteFXPhysicalVideoAdapter" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.VMRemoteFXPhysicalVideoAdapter" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Disable-VMRemoteFXPhysicalVideoAdapter -Name *Nvidia*
    ```

    This example disables all RemoteFX physical video adapters that include the string "Nvidia" in their names.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VMRemoteFXPhysicalVideoAdapter -Name *Nvidia* | Disable-VMRemotePhysicalVideoAdapter
    ```

    This example disables all RemoteFX physical video adapters that include the string "Nvidia" in their names.
