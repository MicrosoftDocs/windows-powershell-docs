syntaxes:
- syntax: |-
    ```Syntax
    Disable-VMSwitchExtension
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ExtensionName
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-VMSwitchExtension
        [-Name] <String[]>
        [-VMSwitchName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ExtensionNameSwitchName
  isDefault: false
- syntax: |-
