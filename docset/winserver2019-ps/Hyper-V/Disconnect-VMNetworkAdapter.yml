    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disconnect-VMNetworkAdapter
        [-VMName] <String[]>
        [[-Name] <String[]>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Disconnect-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapter[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Obj
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.VMNetworkAdapter" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Disconnect-VMNetworkAdapter -VMNetworkAdapter Test1
    ```

    Disconnects virtual network adapter Test1.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VMNetworkAdapter -VMName * | Where-Object {$_.SwitchName -eq 'InternetAccess'} | Disconnect-VMNetworkAdapter
    ```

    Disconnects all virtual network adapters whose SwitchName is InternetAccess in all virtual machines on the local server that runs Hyper-V.
