      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMNetworkAdapter
    type: <xref href="VMNetworkAdapter" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual network adapter to be disconnected.
    defaultValue: None
    dontShow: false
    isDynamic: false
