  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the virtual machine in which the virtual network adapter is to be disconnected.
    defaultValue: None
    dontShow: false
