syntaxes:
- syntax: |-
    ```Syntax
    Enable-VMResourceMetering
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-VMResourceMetering
        [-ResourcePoolName] <String>
        [[-ResourcePoolType] <VMResourcePoolType>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourcePool
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-VMResourceMetering
        [-VM] <VirtualMachine[]>
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
