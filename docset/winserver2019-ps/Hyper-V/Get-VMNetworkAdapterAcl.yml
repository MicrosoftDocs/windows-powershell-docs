  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMNetworkAdapterAclSetting" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-VMNetworkAdapterAcl -VMName Redmond
    ```

    Gets all the port ACLs configured on virtual machine Redmond.
