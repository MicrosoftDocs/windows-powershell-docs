syntaxes:
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterVlan
        [[-VMName] <String[]>]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterVlan
        [-VMSnapshot] <VMSnapshot>
        [<CommonParameters>]
    ```
  parameterSetName: VMSnapshot
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterVlan
        [-VMNetworkAdapter] <VMNetworkAdapterBase[]>
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterVlan
        [-ManagementOS]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ManagementOS
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterVlan
        [-VM] <VirtualMachine[]>
        [-VMNetworkAdapterName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMNetworkAdapterVlanSetting" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-VMNetworkAdapterVlan
    ```

    Gets the virtual LAN settings for each virtual network adapter in all virtual machines on the system.
