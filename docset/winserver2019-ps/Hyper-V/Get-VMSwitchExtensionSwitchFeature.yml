syntaxes:
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionSwitchFeature
        [-SwitchName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SwitchName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionSwitchFeature
        [-VMSwitch] <VMSwitch[]>
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
