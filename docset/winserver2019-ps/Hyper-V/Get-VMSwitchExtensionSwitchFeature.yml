outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMSwitchExtensionSwitchFeature" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-VMSwitchExtensionSwitchFeature -SwitchName MySwitch
    ```

    The following command returns all the configured features on the switch named MySwitch.
