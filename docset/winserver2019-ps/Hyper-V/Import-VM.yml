### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Import-VM
name: Import-VM
module: Hyper-V
isPreview: false
summary: |-
  Imports a virtual machine from a file.
description: |-
  The **Import-VM** cmdlet imports a virtual machine from a file.
