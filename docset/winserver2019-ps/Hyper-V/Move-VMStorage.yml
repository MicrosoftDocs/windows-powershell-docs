### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Move-VMStorage
name: Move-VMStorage
module: Hyper-V
isPreview: false
summary: |-
  Moves the storage of a virtual machine.
description: |-
  The **Move-VMStorage** cmdlet moves the storage of a virtual machine.
parameters:
  cmdletParameters:
  - name: AllowUnverifiedPaths
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Allows the move operation to be attempted even if the paths specified for the destination computer cannot be verified prior to attempting the move operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSingleDestination
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more virtual machine hosts on which the virtual machine storage is to be moved.
      NetBIOS names, IP addresses, and fully-qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSingleDestination
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSingleDestination
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationStoragePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a destination storage path to which all virtual machine storage is to be moved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSingleDestination
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMSingleDestination
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name.
    aliases:
    - VMName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSingleDestination
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: NameMultipleDestinations
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoveSourceUnmanagedVhds
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that Hyper-V deletes the parent virtual hard disk on the source after this cmdlet moves a differencing virtual hard disk, when the migration is finished.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the storage resource pool to use after the move operation is complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetainVhdCopiesOnSource
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specify **$true** to keep any parent virtual hard disks on the source computer.
      If not specified, all virtual hard disks will be removed from the source computer once the virtual machine is successfully moved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SmartPagingFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new path to use for a smart paging file, if one is needed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SnapshotFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new path for any snapshot files associated with the virtual machine.
    aliases:
    - CheckpointFileLocation
    - SnapshotFileLocation
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Vhds
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of hashtables that contain locations for each individual virtual hard disk to be moved.
      Each hashtable should have two entries.
      The first entry specifies the current location of the virtual hard disk to move, and has a key of SourceFilePath.
      The second entry specifies the new location for the virtual hard disk, and has a key of DestinationFilePath.
      The virtual hard disk name must be identical in both entries.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualMachinePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the virtual machine configuration file and associated memory files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMMultipleDestinations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="VirtualMachine" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual machine whose storage is to be moved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMSingleDestination
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMMultipleDestinations
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Move-VMStorage
        [-Name] <String>
        [-DestinationStoragePath] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-ResourcePoolName <String>]
        [-RetainVhdCopiesOnSource]
        [-RemoveSourceUnmanagedVhds]
        [-AllowUnverifiedPaths]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameSingleDestination
  isDefault: true
- syntax: |-
    ```Syntax
    Move-VMStorage
        [-Name] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-VirtualMachinePath <String>]
        [-SnapshotFilePath <String>]
        [-SmartPagingFilePath <String>]
        [-Vhds <Hashtable[]>]
        [-ResourcePoolName <String>]
        [-RetainVhdCopiesOnSource]
        [-RemoveSourceUnmanagedVhds]
        [-AllowUnverifiedPaths]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameMultipleDestinations
  isDefault: false
- syntax: |-
    ```Syntax
    Move-VMStorage
        [-VM] <VirtualMachine>
        [-DestinationStoragePath] <String>
        [-ResourcePoolName <String>]
        [-RetainVhdCopiesOnSource]
        [-RemoveSourceUnmanagedVhds]
        [-AllowUnverifiedPaths]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMSingleDestination
  isDefault: false
- syntax: |-
    ```Syntax
    Move-VMStorage
        [-VM] <VirtualMachine>
        [-VirtualMachinePath <String>]
        [-SnapshotFilePath <String>]
        [-SmartPagingFilePath <String>]
        [-Vhds <Hashtable[]>]
        [-ResourcePoolName <String>]
        [-RetainVhdCopiesOnSource]
        [-RemoveSourceUnmanagedVhds]
        [-AllowUnverifiedPaths]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMMultipleDestinations
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Move-VMStorage "Test VM" -DestinationStoragePath D:\TestVM
    ```

    Moves all files associated with a virtual machine test VM to D:\TestVM
- title: Example 2
  description: |-
    ```
    PS C:\> Move-VMStorage "Test VM" -VirtualMachinePath D:\TestVM\Config -SnapshotFilePath D:\TestVM\Snapshots -SmartPagingFilePath D:\TestVM\SmartPaging -VHDs @(@{"SourceFilePath" = "C:\TestVM\Disk1.VHDX"; "DestinationFilePath" = "D:\TestVM\Disks\Disk1.VHDX"}, @{"SourceFilePath" = "C:\TestVM\Disk2.VHDX"; "DestinationFilePath" = "D:\TestVM\Disks\Disk2.VHDX"})
    ```

    Moves all files associated with a virtual machine test VM to different locations under D:\TestVM.
