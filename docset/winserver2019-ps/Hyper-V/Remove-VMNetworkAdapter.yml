    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMNetworkAdapter
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Name <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapterBase[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMNetworkAdapter
        [-ManagementOS]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Name <String>]
        [-SwitchName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ManagementOS
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMNetworkAdapter
        [-VM] <VirtualMachine[]>
        [-Name <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <span>undefined</span>
  description: |-
    None by default.
    if *PassThru* is specified, **Microsoft.HyperV.PowerShell.VMInternalNetworkAdapter**, if **-ManagementOS** is also specified;otherwise **Microsoft.HyperV.PowerShell.VMNetworkAdapter**.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Remove-VMNetworkAdapter -VMName Redmond -VMNetworkAdapterName Redmond_NIC1
    ```

    This example removes network adapter Redmond_NIC1 from a virtual machine named Redmond.
