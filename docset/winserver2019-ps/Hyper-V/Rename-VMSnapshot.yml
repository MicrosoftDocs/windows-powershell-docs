syntaxes:
- syntax: |-
    ```Syntax
    Rename-VMSnapshot
        [-Name] <String>
        [-VMName] <String>
        [-NewName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotName
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-VMSnapshot
        [-VMSnapshot] <VMSnapshot>
        [-NewName] <String>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotObject
  isDefault: false
- syntax: |-
    ```Syntax
    Rename-VMSnapshot
        [-VM] <VirtualMachine>
        [-Name] <String>
        [-NewName] <String>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VM
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="VMSnapshot" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Rename-VMSnapshot -VMName TestVM -Name "Configuration 2" -NewName "Configuration 2: applied all updates"
    ```

    Renames checkpoint Configuration 2 of virtual machine TestVM to Configuration 2: applied all updates.
