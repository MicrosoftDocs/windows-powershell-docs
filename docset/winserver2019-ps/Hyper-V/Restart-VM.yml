syntaxes:
- syntax: |-
    ```Syntax
    Restart-VM
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Force]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-VM
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Force]
        [-AsJob]
        [-Passthru]
        [-Wait]
        [-For <WaitVMTypes>]
        [-Delay <UInt16>]
        [-Timeout <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameWait
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-VM
        [-VM] <VirtualMachine[]>
        [-Force]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-VM
        [-VM] <VirtualMachine[]>
        [-Force]
        [-AsJob]
        [-Passthru]
        [-Wait]
        [-For <WaitVMTypes>]
        [-Delay <UInt16>]
        [-Timeout <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObjectWait
  isDefault: false
outputs:
- name: <span>undefined</span>
  description: |-
    None by default, **Microsoft.HyperV.Powershell.VirtualMachine** if *PassThru* is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Restart-VM Win7
    Confirm
    Are you sure you want to restart virtual machine "win7"?
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): y
    ```

    Performs a hard restart of virtual machine Win7.
    This is equivalent to turning off the power to the virtual machine and then restarting it.
