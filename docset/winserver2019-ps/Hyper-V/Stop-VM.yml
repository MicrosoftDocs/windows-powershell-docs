### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Stop-VM
name: Stop-VM
module: Hyper-V
isPreview: false
summary: |-
  Shuts down, turns off, or saves a virtual machine.
description: |-
  The **Stop-VM** cmdlet shuts down, turns off, or saves a virtual machine.
