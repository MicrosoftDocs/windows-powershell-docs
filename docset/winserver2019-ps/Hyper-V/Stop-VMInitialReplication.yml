syntaxes:
- syntax: |-
    ```Syntax
    Stop-VMInitialReplication
        [-VMName] <String[]>
        [-ComputerName <String[]>]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-VMInitialReplication
        [-VM] <VirtualMachine[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-VMInitialReplication
        [-VMReplication] <VMReplication[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
