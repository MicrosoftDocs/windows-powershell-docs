### YamlMime:PowerShellCmdlet1
uid: IISAdministration.Clear-IISConfigCollection
name: Clear-IISConfigCollection
module: IISAdministration
isPreview: false
summary: |-
  Clears an IIS configuration collection.
description: |-
  The **Clear-IISConfigCollection** cmdlet clears a given Internet Information Services (IIS) collection by removing all the elements and putting a clear tag, which is generally \<clear\>.
  This prevents from the collection to inherit collection elements from higher levels, if any.
parameters:
  cmdletParameters:
  - name: ConfigCollection
    type: <xref href="ConfigurationElementCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **ConfigurationCollection** object for which the collection elements will be cleared.
      If a **ConfigurationCollection** is previously obtained and assigned to a variable, you cannot pass it to this cmdlet through the pipeline because the pipeline engine will try to enumerate, passing **ConfigurationElement** objects instead.
      Try either passing the whole **Get-IISConfigCollection** cmdlet into the pipeline or use it as a parameter for correct results.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Clear-IISConfigCollection
        [-ConfigCollection] <ConfigurationElementCollection>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Web.Administration.ConfigurationElementCollection" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Clear the defaultDocument settings for Default Web Site, which inherits from Server level and defined in applicationHost.config.'
  description: |-
    ```
    PS C:\> Get-IISConfigSection -SectionPath "system.webServer/defaultDocument" -CommitPath "Default Web Site" | Get-IISConfigCollection -CollectionName "files" | Clear-IISConfigCollection -Confirm:$False
    ```

    This command adds lines in web.config which is the configuration file of Default Web Site.
