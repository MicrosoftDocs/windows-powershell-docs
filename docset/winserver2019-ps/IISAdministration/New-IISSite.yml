### YamlMime:PowerShellCmdlet1
uid: IISAdministration.New-IISSite
name: New-IISSite
module: IISAdministration
isPreview: false
summary: |-
  Creates an IIS Website.
description: |-
  The **New-IISSite** cmdlet is used to create an Internet Information Services (IIS) website with the given physical site as the root and binding information to listen on a specific IP:Port:Hostname binding.
parameters:
  cmdletParameters:
  - name: BindingInformation
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the binding information string to use for the new site.
      The binding information of the form IP:Port:hostname such as 192.168.0.1:80:www.contoso.com and one or more of the fields can be left blank, which is equivalent to using a wildcard character such as *:443:.
      In this representation *  indicates all IP addresses and all hostnames are indicated by leaving the corresponding field blank.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CertificateThumbPrint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a certificate thumbprint, which is used to add a new HTTPS binding
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CertStoreLocation
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the certificate store path of the certificate, which is used to add a new HTTPS binding
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the IIS website.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Passthru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical path to the new IIS website.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The protocol for which the binding is configured, usually http, https or ftp.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SslFlag
    type: <xref href="SslFlags" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the SSL flag settings of the new binding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-IISSite
        -Name <String>
        -PhysicalPath <String>
        -BindingInformation <String>
        [-Protocol <String>]
        [-CertificateThumbPrint <String>]
        [-SslFlag <SslFlags>]
        [-CertStoreLocation <String>]
        [-Force]
        [-Passthru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Web.Administration.Site" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a new IIS web site'
  description: |-
    ```
    PS C:\> New-IISSite -Name "TestSite" -BindingInformation "*:8080:" -PhysicalPath "$env:systemdrive\inetpub\testsite"
    ```

    This command creates a new website named TestSite.
- title: 'Example 2: Add a new website and set application pool of the site default application to a custom name'
  description: |-
    ```
    PS C:\> Start-IISCommitDelay
    PS C:\> $TestSite = New-IISSite -Name TestSite -BindingInformation "*:8080:" -PhysicalPath "$env:systemdrive\inetpub\testsite" -Passthru
    PS C:\> $TestSite.Applications["/"].ApplicationPoolName = "TestSiteAppPool"
    PS C:\> Stop-IISCommitDelay
    ```

    This command creates a website named TestSite with default application assigned to the TestSiteAppPool application pool.
- title: 'Example 3: Add a new website of HTTPS binding'
  description: |-
    ```
    PS C:\> New-IISSite -Name "TestSite" -PhysicalPath "$env:systemdrive\inetpub\testsite" -BindingInformation "*:443:" -CertificateThumbPrint "D043B153FCEFD5011B9C28E186A60B9F13103363" -CertStoreLocation "Cert:\LocalMachine\Webhosting" -Protocol https
    ```

    This command creates a website named TestSite with HTTPS binding
