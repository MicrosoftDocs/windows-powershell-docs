syntaxes:
- syntax: |-
    ```Syntax
    Enable-IpamCapability
        [-Capability] <Capability>
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
