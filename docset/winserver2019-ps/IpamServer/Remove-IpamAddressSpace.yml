outputs:
- name: <xref href="IpamAddressSpace" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns the address space that the cmdlet removed from the IPAM server.
examples:
- title: 'Example 1: Remove an address space'
  description: |-
    ```
    PS C:\> Remove-IpamAddressSpace -Name "CustomerAddSpace01"
    ```

    This command removes the address space named CustomerAddSpace01.
