        [-Owner <String>]
        [-Description <String>]
        [-VlanId <UInt16[]>]
        [-VmmLogicalNetwork <String>]
        [-NetworkSite <String>]
        [-VirtualSubnetId <Int32>]
        [-AddCustomConfiguration <String>]
        [-RemoveCustomConfiguration <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
