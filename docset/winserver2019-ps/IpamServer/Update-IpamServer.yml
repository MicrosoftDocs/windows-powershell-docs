syntaxes:
- syntax: |-
    ```Syntax
    Update-IpamServer
        [-DeleteSystemCheckFailureRows]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
