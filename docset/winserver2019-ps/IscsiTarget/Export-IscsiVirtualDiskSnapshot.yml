syntaxes:
- syntax: |-
    ```Syntax
    Export-IscsiVirtualDiskSnapshot
        [-SnapshotId] <String>
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotId
  isDefault: true
- syntax: |-
    ```Syntax
    Export-IscsiVirtualDiskSnapshot
        -InputObject <IscsiVirtualDiskSnapshot>
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.VirtualDiskSnapshot" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDisk" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Expose a snapshot as a virtual disk'
  description: |-
    ```
    PS C:\> Export-IscsiVirtualDiskSnapshot -Snapshot "{E9A5BA03-85B9-40CA-85DF-DC1695690B40}"
    ```

    This example exposes a snapshot with the Id {E9A5BA03-85B9-40CA-85DF-DC1695690B40} as a virtual disk object.
    To access it, assign the virtual disk with path \\\\?\GLOBALROOT\Device\HarddiskVolumeShadowCopy{41667F16-0FDD-11E1-BA2A-0010184F53D6}\vhd01 to a target.
