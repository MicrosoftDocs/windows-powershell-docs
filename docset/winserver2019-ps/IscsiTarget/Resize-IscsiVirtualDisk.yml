examples:
- title: 'Example 1: Resize a virtual disk'
  description: |-
    ```
    PS C:\> Resize-IscsiVirtualDisk -Path "E:\temp\test06.vhdx" -Size 20GB
    ```

    This command resizes the virtual disk at the path E:\temp\test06.vhdx to 20GB.
