  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-MPIOAvailableHW
        [[-VendorId] <String[]>]
        [[-ProductId] <String[]>]
        [-BusType <BusType[]>]
        [-IsMultipathed <Boolean[]>]
        [-IsSPC3Supported <Boolean[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get connected multipath-capable devices'
  description: |-
    ```
    PS C:\> Get-MPIOAvailableHW
    ```

    This example returns a list of multipath-capable devices currently connected to the system.
- title: 'Example 2: Get connected multipath-capable devices for a bus type'
  description: |-
    ```
    PS C:\> Get-MPIOAvailableHW -BusType iSCSI
    ```

    This example returns a list of multipath-capable devices currently connected to the system via iSCSI.
