syntaxes:
- syntax: |-
    ```Syntax
    Remove-MSDSMSupportedHW
        [-VendorId] <String[]>
        [-ProductId] <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByVendorProductId
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-MSDSMSupportedHW
        -InputObject <CimInstance[]>
