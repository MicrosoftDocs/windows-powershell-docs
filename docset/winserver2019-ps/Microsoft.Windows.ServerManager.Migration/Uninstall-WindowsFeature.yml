syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-WindowsFeature
        [-Name] <Feature[]>
        [-Restart]
        [-IncludeManagementTools]
        [-Remove]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [-LogPath <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunningComputer
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-WindowsFeature
        [-Name] <Feature[]>
        [-Vhd <String>]
        [-IncludeManagementTools]
        [-Remove]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [-LogPath <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VhdPath
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Windows.ServerManager.Commands.Feature" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Windows.ServerManager.Commands.FeatureOperationResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Uninstall various roles and features installed on the target server'
  description: |-
    ```
    PS C:\> Get-WindowsFeature | Where-Object -FilterScript { $_.Installed -Eq $TRUE } | Uninstall-WindowsFeature
    ```

    This command uninstalls any roles or features that are currently installed on the target server.
- title: 'Example 2: Remove all role services from the specified server'
  description: |-
    ```
    PS C:\> Uninstall-WindowsFeature -Name "Web-Server" -ComputerName "Server1" -Credential "contoso\user1"
    ```

    This command removes Web Server (IIS) from Server1, including all role services.
    The user account specified to perform the operation is contoso\user1.
- title: 'Example 3: Remove feature files for any roles or features currently not installed on the local server'
  description: |-
    ```
    PS C:\> Get-WindowsFeature | Where-Object -FilterScript { $_.Installed -Eq $FALSE } | Uninstall-WindowsFeature -Remove
    ```

    This command removes the feature files for any roles or features that currently are not installed on the local server.
