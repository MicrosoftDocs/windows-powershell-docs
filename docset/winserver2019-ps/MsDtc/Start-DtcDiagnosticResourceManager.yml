### YamlMime:PowerShellCmdlet1
uid: MsDtc.Start-DtcDiagnosticResourceManager
name: Start-DtcDiagnosticResourceManager
module: MsDtc
isPreview: false
summary: |-
  Starts a diagnostic Resource Manager.
description: |-
  The **Start-DtcDiagnosticResourceManager** cmdlet starts a diagnostic Resource Manager (RM) as a Windows PowerShell® background job.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name for the diagnostic resource manager to start.
      You can later refer to the RM by using this name.
      If you do not specify a name, the RM instance ID, a GUID, is always assigned to the RM and you can refer to it by that ID.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the listening port of the test RM.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Start-DtcDiagnosticResourceManager
        [[-Port] <Int32>]
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Start a diagnostic resource manager'
  description: |-
    ```
    PS C:\> Start-DtcDiagnosticResourceManager -Port 17124 -Name "testRM"
    ```

    This example starts a DTC diagnostic resource manager.
