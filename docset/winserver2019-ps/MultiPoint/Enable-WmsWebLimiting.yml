### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Enable-WmsWebLimiting
name: Enable-WmsWebLimiting
module: MultiPoint
isPreview: false
summary: |-
  Enables web limiting for a session.
description: |-
  The **Enable-WmsWebLimiting** cmdlet enables web limiting for the specified sessions.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WebLimitAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint system that is the target of the command.
      The parameter is optional and if omitted defaults to localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of MultiPoint session IDs that are the target of the command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WebLimitSession
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-WmsWebLimiting
        [-SessionId] <UInt32[]>
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WebLimitSession
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-WmsWebLimiting
        [-All]
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WebLimitAll
  isDefault: false
inputs:
- name: <xref href="SessionId" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable web limiting for a session'
  description: |-
    ```
    PS C:\> Enable-WmsWebLimiting -SessionId 2
    ```

    This command enables web access restrictions for session 2 on the local computer.
- title: 'Example 2: Enable web limiting for all sessions'
  description: |-
    ```
    PS C:\> Enable-WmsWebLimiting -Server "Sample.microsoft.com" -All
    ```

    This command enables web access restrictions for all sessions on the computer Sample.microsoft.com.
