### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Set-WmsWebLimiting
name: Set-WmsWebLimiting
module: MultiPoint
isPreview: false
summary: |-
  Configures web limiting for standard user sessions.
description: |-
  The **Set-WmsWebLimiting** cmdlet configures web limiting for standard user sessions on the current Windows MultiPoint Server system.
parameters:
  cmdletParameters:
  - name: Allow
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation allows the specified web sites.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllowList
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Block
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation blocks the specified web sites.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlockList
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Sites
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of web sites.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-WmsWebLimiting
        [-Sites] <String[]>
        [-Allow]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: AllowList
  isDefault: false
- syntax: |-
    ```Syntax
    Set-WmsWebLimiting
        [-Sites] <String[]>
        [-Block]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: BlockList
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Block access to web sites'
  description: |-
    ```
    PS C:\> Set-WmsWebLimiting -Sites "www.test.com", "www.test1.com" -Block
    ```

    This command blocks access to the specified URLs.
