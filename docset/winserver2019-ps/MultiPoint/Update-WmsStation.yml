### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Update-WmsStation
name: Update-WmsStation
module: MultiPoint
isPreview: false
summary: |-
  Forces a station to reload its configuration settings.
description: |-
  The **Update-WmsStation** cmdlet forces the specified station to reload its configuration settings.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UpdateAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of station IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UpdateById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Update-WmsStation
        [-StationId] <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateById
  isDefault: false
- syntax: |-
    ```Syntax
    Update-WmsStation
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateAll
  isDefault: false
examples:
- title: 'Example 1: Update station settings'
  description: |-
    ```
    PS C:\> Update-WmsStation -StationId 2
    ```

    This command forces station 2 to reload its configuration settings.
