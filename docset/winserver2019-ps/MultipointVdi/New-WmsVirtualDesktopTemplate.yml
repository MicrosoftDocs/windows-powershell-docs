syntaxes:
- syntax: |-
    ```Syntax
    New-WmsVirtualDesktopTemplate
        -InputFilePath <String>
        -TemplatePrefix <String>
        -AdministratorUser <String>
        -AdministratorPassword <String>
        [-VhdLocation <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NonDomainJoin
  isDefault: false
- syntax: |-
    ```Syntax
    New-WmsVirtualDesktopTemplate
        -InputFilePath <String>
        -TemplatePrefix <String>
        -AdministratorUser <String>
        -Domain <String>
        [-VhdLocation <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DomainJoin
  isDefault: false
