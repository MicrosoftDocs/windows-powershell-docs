syntaxes:
- syntax: |-
    ```Syntax
    New-NfsNetgroup
        [-NetGroupName] <String>
        [[-AddMember] <String[]>]
        [[-LdapServer] <String>]
        [[-LdapNamingContext] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
