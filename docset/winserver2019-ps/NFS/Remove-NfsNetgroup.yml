syntaxes:
- syntax: |-
    ```Syntax
    Remove-NfsNetgroup
        [-NetGroupName] <String>
        [[-LdapServer] <String>]
        [[-LdapNamingContext] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
