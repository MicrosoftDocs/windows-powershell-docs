syntaxes:
- syntax: |-
    ```Syntax
    Set-NfsMappedIdentity
        -UserName <String>
        [-MappingStore <MappingStoreType>]
        [-Server <String>]
        [-LdapNamingContext <String>]
        [-UserIdentifier <Int32>]
        [-GroupIdentifier <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: User
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NfsMappedIdentity
        -GroupName <String>
        -GroupIdentifier <Int32>
        [-MappingStore <MappingStoreType>]
        [-Server <String>]
        [-LdapNamingContext <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Group
  isDefault: false
