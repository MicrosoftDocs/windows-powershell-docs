- syntax: |-
    ```Syntax
    Get-NetAdapterAdvancedProperty
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-AllProperties]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
