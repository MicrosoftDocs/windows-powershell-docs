    ```Syntax
    Get-NetAdapterAdvancedProperty
        [[-Name] <String[]>]
        [-IncludeHidden]
        [-AllProperties]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetAdapterAdvancedProperty
        [[-Name] <String[]>]
        -RegistryKeyword <String[]>
        [-IncludeHidden]
        [-AllProperties]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameRegistryKeyword
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetAdapterAdvancedProperty
        [[-Name] <String[]>]
        -DisplayName <String[]>
