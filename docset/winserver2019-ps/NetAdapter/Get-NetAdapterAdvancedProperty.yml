        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceIDKeyword
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetAdapterAdvancedProperty
        -InterfaceDescription <String[]>
        -DisplayName <String[]>
