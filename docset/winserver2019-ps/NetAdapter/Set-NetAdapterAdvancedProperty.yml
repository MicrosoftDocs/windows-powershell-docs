syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterAdvancedProperty
        [[-Name] <String[]>]
        [-DisplayName <String[]>]
        [-RegistryKeyword <String[]>]
        [-IncludeHidden]
        [-AllProperties]
        [-DisplayValue <String>]
        [-RegistryValue <String[]>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterAdvancedProperty
        -InterfaceDescription <String[]>
        [-DisplayName <String[]>]
        [-RegistryKeyword <String[]>]
        [-IncludeHidden]
        [-AllProperties]
        [-DisplayValue <String>]
        [-RegistryValue <String[]>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterAdvancedProperty
        -InputObject <CimInstance[]>
        [-DisplayValue <String>]
        [-RegistryValue <String[]>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapterAdvancedPropertySettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapterAdvancedPropertySettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Set the value of an advanced property on the specified network adapter'
  description: |-
    ```
    PS C:\> Set-NetAdapterAdvancedProperty -Name "MyAdapter" -DisplayName "Flow Control" -DisplayValue "Rx and Tx Enabled"
    ```

    This command sets the value of the Flow Control advanced property on the network adapter named MyAdapter.
- title: 'Example 2: Set the value of an registry value on the specified network adapter'
  description: |-
    ```
    PS C:\> Set-NetAdapterAdvancedProperty -Name "MyAdapter" -RegistryKeyword "*Flo*rol" -RegistryValue 0
    ```

    This command sets the value of the Flow Control registry value on the network adapter named MyAdapter using wildcard characters in the keyword name.
