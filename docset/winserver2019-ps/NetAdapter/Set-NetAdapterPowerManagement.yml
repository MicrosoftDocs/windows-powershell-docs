syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterPowerManagement
        [-Name] <String[]>
        [-IncludeHidden]
        [-ArpOffload <Setting>]
        [-D0PacketCoalescing <Setting>]
        [-DeviceSleepOnDisconnect <Setting>]
        [-NSOffload <Setting>]
        [-RsnRekeyOffload <Setting>]
        [-SelectiveSuspend <Setting>]
        [-WakeOnMagicPacket <Setting>]
        [-WakeOnPattern <Setting>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterPowerManagement
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-ArpOffload <Setting>]
        [-D0PacketCoalescing <Setting>]
        [-DeviceSleepOnDisconnect <Setting>]
        [-NSOffload <Setting>]
        [-RsnRekeyOffload <Setting>]
        [-SelectiveSuspend <Setting>]
        [-WakeOnMagicPacket <Setting>]
        [-WakeOnPattern <Setting>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterPowerManagement
        -InputObject <CimInstance[]>
        [-ArpOffload <Setting>]
        [-D0PacketCoalescing <Setting>]
        [-DeviceSleepOnDisconnect <Setting>]
        [-NSOffload <Setting>]
        [-RsnRekeyOffload <Setting>]
        [-SelectiveSuspend <Setting>]
        [-WakeOnMagicPacket <Setting>]
        [-WakeOnPattern <Setting>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter PowerManagementSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter PowerManagementSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Enable device sleep on the disconnect feature on the specified network adapter'
  description: |-
    ```
    PS C:\> Set-NetAdapterPowerManagement -Name "Ethernet" -DeviceSleepOnDisconnect Enabled
    ```

    This command enables the device sleep on disconnect feature on the network adapter named Ethernet and restarts the network adapter.
