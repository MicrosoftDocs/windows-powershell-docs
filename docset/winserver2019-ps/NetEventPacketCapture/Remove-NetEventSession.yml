syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetEventSession
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
