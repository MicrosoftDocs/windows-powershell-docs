### YamlMime:PowerShellCmdlet1
uid: NetEventPacketCapture.Set-NetEventProvider
name: Set-NetEventProvider
module: NetEventPacketCapture
isPreview: false
summary: |-
  Modifies settings for an ETW provider.
description: |-
  The **Set-NetEventProvider** cmdlet modifies settings for an Event Tracing for Windows (ETW) provider.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssociatedCaptureTarget
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the associated capture target as a CIM object.
      The capture target is one of the three following objects:

      - **MSFT_NetEventNetworkAdapter**
      - **MSFT_NetEventVmNetworkAdapter**
      - **MSFT_NetEventVmSwitch**

      To obtain a capture target, use the Get-NetEventNetworkAdapter cmdlet, the Get-NetEventVmNetworkAdapter cmdlet, or the Get-NetEventVmSwitch cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByTargetOfTheProvider
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssociatedEventSession
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the associated network event session, as a CIM object.
      To obtain the network event session, use the Get-NetEventSession cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySessionOfTheProvider
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Level
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the level of Event Tracing for Windows (ETW) events for the provider.
      Use the level of detail for the event to filter the events that are logged.
      The default value for this parameter is 0x4.
      The acceptable values for this parameter are:

      - 0x5.
      Verbose
      - 0x4.
      Informational
      - 0x3.
      Warning
      - 0x2.
      Error
      - 0x1.
      Critical
      - 0x0.
      LogAlways

      The provider must log the event if the value of the event is less than or equal to the value of this parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchAllKeyword
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a bitmask that restricts the events that the provider logs.
      Set the **MatchAnyKeyword** parameter value to 0 (zero) to match all keywords.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchAnyKeyword
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies keywords as a set of hexadecimal values.
      Keywords are flags that you can combine to generate values.
      Use a set of hexadecimal values of the keywords instead of the keyword names, and apply a filter to write ETW events for keyword matches.
      For more information, see [CLR ETW Keywords and Levels](https://msdn.microsoft.com/en-us/library/ff357720.aspx) in the Microsoft Developer Network library.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names that identify ETW providers.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-NetEventProvider
        [[-Name] <String[]>]
        [[-Level] <Byte>]
        [[-MatchAnyKeyword] <UInt64>]
        [[-MatchAllKeyword] <UInt64>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetEventProvider
        [[-Level] <Byte>]
        [[-MatchAnyKeyword] <UInt64>]
        [[-MatchAllKeyword] <UInt64>]
        [-AssociatedEventSession <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySessionOfTheProvider
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetEventProvider
        [[-Level] <Byte>]
        [[-MatchAnyKeyword] <UInt64>]
        [[-MatchAllKeyword] <UInt64>]
        [-AssociatedCaptureTarget <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByTargetOfTheProvider
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetEventProvider
        [[-Level] <Byte>]
        [[-MatchAnyKeyword] <UInt64>]
        [[-MatchAllKeyword] <UInt64>]
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Modify an ETW provider'
  description: |-
    ```
    PS C:\>New-NetEventSession -SessionName "Session01"
    PS C:\> Add-NetEventProvider -Name "Microsoft-Windows-TCPIP" -SessionName "Session01"
    PS C:\> Set-NetEventProvider -Name "Microsoft-Windows-TCPIP" -Level 3
    ```

    This example modifies an ETW provider.

    The first command uses the New-NetEventSession cmdlet to create a new session named Session01.

    The second command uses the Add-NetEventProvider cmdlet to add a provider named Microsoft-Windows-TCPIP to the session named Session01.

    The third command modifies the logging level for the provider named Microsoft-Windows-TCPIP.
