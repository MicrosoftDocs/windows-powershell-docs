syntaxes:
- syntax: |-
    ```Syntax
    Set-NetLbfoTeamNic
        [[-Name] <String[]>]
        [[-Team] <String[]>]
        [-VlanID <UInt32>]
        [-Default]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameOrTeam
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetLbfoTeamNic
        [-TeamOfTheTeamNic <CimInstance>]
        [-VlanID <UInt32>]
        [-Default]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByTeamOfTheTeamNic
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetLbfoTeamNic
        -InputObject <CimInstance[]>
        [-VlanID <UInt32>]
        [-Default]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
