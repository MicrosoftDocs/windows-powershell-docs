### YamlMime:PowerShellCmdlet1
uid: NetSwitchTeam.Remove-NetSwitchTeamMember
name: Remove-NetSwitchTeamMember
module: NetSwitchTeam
isPreview: false
summary: |-
  Removes a network adapter member from a switch team.
description: |-
  The **Remove-NetSwitchTeamMember** cmdlet removes a network adapter team member from the specified switch team.
  The specified switch team must be an existing switch team.
  The member designated must exist in the specified switch team.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the switch team member or an object that represents a part of a switch team.
      The adapter names are the **IfAlias** names, such as Ethernet 2.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Team
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of switch team from which to remove the network adapter.
      The switch team must already exist and must be a switch team.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetSwitchTeamMember
        [-Name] <String>
        [-Team] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a member from a team'
  description: |-
    ```
    PS C:\>Remove-NetSwitchTeamMember -Team "SwitchTeam01" -Member "Ethernet 2"
    ```

    This command removes the network adapter named Ethernet 2 from the switch team named SwitchTeam01.
