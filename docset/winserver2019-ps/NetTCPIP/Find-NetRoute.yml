syntaxes:
- syntax: |-
    ```Syntax
    Find-NetRoute
        [-InterfaceIndex <UInt32>]
        [-LocalIPAddress <String>]
        -RemoteIPAddress <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
