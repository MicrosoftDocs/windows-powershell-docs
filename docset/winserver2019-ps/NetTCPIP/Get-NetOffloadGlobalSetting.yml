### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Get-NetOffloadGlobalSetting
name: Get-NetOffloadGlobalSetting
module: NetTCPIP
isPreview: false
summary: |-
  Gets the global TCP/IP offload settings.
description: |-
  The **Get-NetOffloadGlobalSetting** cmdlet gets the global TCP/IP offload settings.
  These settings include Receive Side Scaling, Receive Segment Coalescing, task offload, and NetworkDirect.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Chimney
    type: <xref href="ChimneyEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values of TCP Chimney global state on the computer.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled
      - Automatic

      The default value is Disabled.

      In Automatic mode, TCP Chimney Offload offloads the processing for a connection only if certain following criteria are met.
      In enabled mode, TCP Chimney Offload offloads the processing for connections on a first-come, first-served basis.
      For more information, see [Using TCP Chimney Offload](https://technet.microsoft.com/en-us/library/gg162709(v=ws.10)) in the TechNet library.
    acceptedValues:
    - Disabled
    - Enabled
    - Automatic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkDirect
    type: <xref href="EnabledDisabledEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of NetworkDirect Remote Direct Memory Access (RDMA) values on the computer.
      Use this parameter only on servers.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkDirectAcrossIPSubnets
    type: <xref href="AllowedBlockedEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of NetworkDirect connectivity values from outside a local IP network.
      The acceptable values for this parameter are:

      - Allowed
      - Blocked
    acceptedValues:
    - Blocked
    - Allowed
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PacketCoalescingFilter
    type: <xref href="EnabledDisabledEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the values for a packet-coalescing filter on the computer.
      To reduce the number of interrupts that a computer processes, the packet-coalescing filter combines random broadcast and multicast packets, such as Address Resolution Protocol (ARP) requests, Neighbor Discovery messages, and Simple Service Discovery Protocol (SSDP) requests, into a single packet.
      Use this parameter only on client computers.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReceiveSegmentCoalescing
    type: <xref href="EnabledDisabledEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the Receive Segment Coalescing settings on the network adapter.
      Receive Segment Coalescing parses small packets of data and combines the data into a single packet.
      Coalescing small packets into a single packet reduces the overhead that is required to process packets.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReceiveSideScaling
    type: <xref href="EnabledDisabledEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the Receive Side Scaling settings on the computer.
      Receive Side Scaling distributes the network processing load across multiple processor cores.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TaskOffload
    type: <xref href="EnabledDisabledEnum" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the global TCP/IP task offload settings on the computer.
      Task offload settings include IP checksum offload, Internet Protocol security (IPsec) task offload, and Large Send Offload.
      These features reduce the overhead of per-packet processing by distributing packet processing tasks, such as checksum calculation, to a network adapter.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetOffloadGlobalSetting
        [-ReceiveSideScaling <EnabledDisabledEnum[]>]
        [-ReceiveSegmentCoalescing <EnabledDisabledEnum[]>]
        [-Chimney <ChimneyEnum[]>]
        [-TaskOffload <EnabledDisabledEnum[]>]
        [-NetworkDirect <EnabledDisabledEnum[]>]
        [-NetworkDirectAcrossIPSubnets <AllowedBlockedEnum[]>]
        [-PacketCoalescingFilter <EnabledDisabledEnum[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetOffloadGlobalSetting" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get global TCP/IP offload settings'
  description: |-
    ```
    PS C:\>Get-NetOffloadGlobalSetting
    ```

    This command gets the global TCP/IP offload settings on the computer.
