      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreationTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **DateTime** objects.
      To get a **DateTime** object, use the Get-Date cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of local IP addresses.
      The cmdlet gets the UDP endpoint statistics that have these values.
