syntaxes:
- syntax: |-
    ```Syntax
    Set-NetIPv4Protocol
        [-InputObject <CimInstance[]>]
        [-DefaultHopLimit <UInt32>]
        [-NeighborCacheLimitEntries <UInt32>]
        [-RouteCacheLimitEntries <UInt32>]
        [-ReassemblyLimitBytes <UInt32>]
        [-IcmpRedirects <IcmpRedirects>]
        [-SourceRoutingBehavior <SourceRoutingBehavior>]
        [-DhcpMediaSense <DhcpMediaSense>]
        [-MediaSenseEventLog <MediaSenseEventLog>]
        [-IGMPLevel <MldLevel>]
        [-IGMPVersion <MldVersion>]
        [-MulticastForwarding <MulticastForwarding>]
        [-GroupForwardedFragments <GroupForwardedFragments>]
        [-RandomizeIdentifiers <RandomizeIdentifiers>]
        [-AddressMaskReply <AddressMaskReply>]
        [-MinimumMtu <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetIPv4Protocol" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable the DHCP Media Sense event log'
  description: |-
    ```
    PS C:\>Set-NetIPv4Protocol -MediaSenseEventLog Enabled
    ```

    This command enables the DHCP Media Sense event log.
- title: 'Example 2: Increase the number of neighbors'
  description: |-
    ```
    PS C:\>Set-NetIPv4Protocol -NeighborCacheLimitEntries 1000
    ```

    This command increases the size of the cache of on-link neighbors on the subnet that are no longer referenced to 1,000.
    The default value is 256.
