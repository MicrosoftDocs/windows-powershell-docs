syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerGateway
        [-ResourceId] <String>
        [[-Tags] <PSObject>]
        [-Properties] <GatewayProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
