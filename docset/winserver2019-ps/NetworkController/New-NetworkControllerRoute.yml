syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerRoute
        -ConnectionUri <Uri>
        -Properties <RouteProperties>
        -ResourceId <string>
        -RouteTableId <string>
        [-CertificateThumbPrint <string>]
        [-Credential <PSCredential>]
        [-Etag <string>]
        [-Force]
        [-ResourceMetadata <ResourceMetadata>]
    ```
  parameterSetName: Default
