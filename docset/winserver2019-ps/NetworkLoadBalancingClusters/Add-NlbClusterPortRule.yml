syntaxes:
- syntax: |-
    ```Syntax
    Add-NlbClusterPortRule
        [-StartPort] <Int32>
        [-EndPort] <Int32>
        -InterfaceName <String>
        [-HostName <String>]
        [-IP <IPAddress>]
        [-Protocol <PortRuleProtocol>]
        [-Mode <PortRuleFilteringMode>]
        [-Affinity <PortRuleAffinity>]
        [-Timeout <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Add-NlbClusterPortRule
        [-StartPort] <Int32>
        [-EndPort] <Int32>
        -InputObject <Cluster[]>
        [-IP <IPAddress>]
        [-Protocol <PortRuleProtocol>]
        [-Mode <PortRuleFilteringMode>]
        [-Affinity <PortRuleAffinity>]
        [-Timeout <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
