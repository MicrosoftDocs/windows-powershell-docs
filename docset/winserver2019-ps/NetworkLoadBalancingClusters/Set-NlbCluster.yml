### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Set-NlbCluster
name: Set-NlbCluster
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Edits the configuration of a NLB cluster.
description: |-
  The **Set-NlbCluster** cmdlet edits the configuration of a Network Load Balancing (NLB) cluster.
  The configuration changes you can make include the cluster operation mode, the cluster name, and the cluster primary IP address.

  This operation changes the configuration on all cluster nodes.
  As a result, the NLB cluster restarts the convergence process on all nodes to guarantee that configuration changes have been applied on all nodes and that a consistent state is reached.
  Any additional operations on the NLB cluster should not be initiated until all cluster nodes have completed the convergence process and are back to the converged state.

  ps_nlbc_checkstate_remark
parameters:
  cmdletParameters:
  - name: ClusterPrimaryIP
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address to use as the cluster primary IP address.
      The IP address must be one of the existing virtual IP addresses on the cluster.
    aliases:
    - PrimaryIP
    - PIP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Cluster" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the cluster to set.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new name of the cluster that this cmdlet sets.
    aliases:
    - ClusterName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OperationMode
    type: <xref href="ClusterMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new operation mode for the cluster.
      The acceptable values for this parameter are:

      - IGMPMULTICAST
      - MULTICAST
      - UNICAST
    acceptedValues:
    - Unicast
    - Multicast
    - IgmpMulticast
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-NlbCluster
        [[-HostName] <String>]
        [-InterfaceName] <String>
        [-ClusterPrimaryIP <IPAddress>]
        [-Name <String>]
        [-OperationMode <ClusterMode>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NlbCluster
        -InputObject <Cluster[]>
        [-ClusterPrimaryIP <IPAddress>]
        [-Name <String>]
        [-OperationMode <ClusterMode>]
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change the cluster name'
  description: |-
    ```
    PS C:\>Get-NlbCluster | Set-NlbCluster -Name " NewCluster001"
    Name                IPAddress           SubnetMask          Mode
    ----                ---------           ----------          ----
    NewCluster001       fe80::b349:6945:... ::                  UNICAST
    ```

    This command changes the cluster name to NewCluster001.
- title: 'Example 2: Change the cluster operation mode'
  description: |-
    ```
    PS C:\>Get-NlbCluster | Set-NlbCluster -OperationMode MULTICAST
    Name                IPAddress           SubnetMask          Mode
    ----                ---------           ----------          ----
    newcluster          fe80::b349:6945:... ::                  MULTICAST
    ```

    This command changes the cluster operation mode to MULTICAST.
- title: 'Example 3: Change the cluster primary IP address'
  description: |-
    ```
    PS C:\>Get-NlbCluster | Set-NlbCluster -ClusterPrimaryIP 2.53.0.120

    Name                IPAddress           SubnetMask          Mode
    ----                ---------           ----------          ----
    newcluster          2.53.0.120          255.0.0.0           MULTICAST
    ```

    This command changes the cluster primary IP address to one of the other cluster virtual IP addresses on the cluster.
