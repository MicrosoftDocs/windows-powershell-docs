### YamlMime:PowerShellCmdlet1
uid: NetworkSwitchManager.Get-NetworkSwitchFeature
name: Get-NetworkSwitchFeature
module: NetworkSwitchManager
isPreview: false
summary: |-
  Gets features of a network switch.
description: |-
  The **Get-NetworkSwitchFeature** cmdlet gets features of a network switch.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **CimSession** that this cmdlet uses to connect to the network switch.
      For more information about **CimSession** objects, type `Get-Help New-CimSession`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Disabled
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets only disabled features.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisabledSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enabled
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets only enabled features.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnabledSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a feature to get.
      Use wildcard characters to specify multiple features.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NameSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
