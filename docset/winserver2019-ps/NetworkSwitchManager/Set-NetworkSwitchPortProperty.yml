syntaxes:
- syntax: |-
    ```Syntax
    Set-NetworkSwitchPortProperty
        [-CimSession] <CimSession>
        [[-Property] <Hashtable>]
        [-InputObject] <CimInstance[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
