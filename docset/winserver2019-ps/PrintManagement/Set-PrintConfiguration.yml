        [-DuplexingMode <DuplexingModeEnum>]
        [-PaperSize <PaperSizeEnum>]
        [-PrintTicketXml <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PrinterObject
  isDefault: false
