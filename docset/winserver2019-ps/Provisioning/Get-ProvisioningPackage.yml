### YamlMime:PowerShellCmdlet1
uid: Provisioning.Get-ProvisioningPackage
name: Get-ProvisioningPackage
module: Provisioning
isPreview: false
summary: |-
  Gets information about the installed provisioning package.
description: |-
  The **Get-ProvisioningPackage** cmdlet gets information about the installed provisioning package.

  The **Get-ProvisioningPackage** cmdlet is supported on Windows 10 client operating system only.
parameters:
  cmdletParameters:
  - name: AllInstalledPackages
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Gets all the installed packages information.
    aliases:
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Installed
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectedDevice
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Gets the connected device information.
    aliases:
    - Device
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogsDirectoryPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the logs directory path.
    aliases:
    - Logs
    defaultValue: None
    dontShow: false
    isDynamic: false
