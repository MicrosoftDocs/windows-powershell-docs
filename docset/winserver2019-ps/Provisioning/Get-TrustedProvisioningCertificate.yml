syntaxes:
- syntax: |-
    ```Syntax
    Get-TrustedProvisioningCertificate
        [[-Thumbprint] <String>]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
