### YamlMime:PowerShellCmdlet1
uid: Provisioning.Uninstall-ProvisioningPackage
name: Uninstall-ProvisioningPackage
module: Provisioning
isPreview: false
summary: |-
  Uninstalls .PPKG package from the local machine.
description: |-
  Unintalls .PPKG package based on package ID, path, metadata, or all packages.

  The **Uninstall-ProvisioningPackage** cmdlet is supported on Windows 10 client operating system only.
parameters:
  cmdletParameters:
  - name: AllInstalledPackages
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Removes all installed packages.
    aliases:
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Installed
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectedDevice
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If enabled, specifies that the device type is mobile.
    aliases:
    - Device
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogsDirectoryPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
