syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-ProvisioningPackage
        [-PackageId] <String>
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Uninstall-ProvisioningPackage
        -PackagePath <String>
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Path
  isDefault: false
- syntax: |-
    ```Syntax
    Uninstall-ProvisioningPackage
        [-AllInstalledPackages]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Installed
  isDefault: false
- syntax: |-
    ```Syntax
    Uninstall-ProvisioningPackage
        [-RuntimeMetadata] <RuntimeProvPackageMetadata>
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Metadata
  isDefault: false
inputs:
- name: <xref href="Microsoft.Windows.Provisioning.ProvCommon.RuntimeProvPackageMetadata" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Uninstall all provisioning packages'
  description: |-
    ```powershell
    PS C:\> Uninstall-ProvisioningPackage -AllInstalledPackages
    ```

    Uninstalls all provisioning packages.
