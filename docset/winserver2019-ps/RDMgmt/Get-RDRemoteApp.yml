### YamlMime:PowerShellCmdlet1
uid: RDMgmt.Get-RDRemoteApp
name: Get-RDRemoteApp
module: RDMgmt
isPreview: false
summary: |-
  Gets RemoteApp programs in a Remote Desktop deployment.
description: |-
  The **Get-RDRemoteApp** cmdlet gets Windows Server 2012 RemoteApp programs in a Remote Desktop deployment.
  You can specify a collection name, an alias, or one or more display names.

  RemoteApp allows Remote Desktop Services (RDS) to run a program remotely that appears as if it runs locally on a client computer.
  A RemoteApp program runs in its own resizable window and has its own entry on the taskbar.
parameters:
  cmdletParameters:
  - name: Alias
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an alias for a RemoteApp program.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a personal virtual desktop collection or session collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a Remote Desktop deployment.
      If you do not specify a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisplayName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names to display to users for RemoteApp programs.
      You can use a wildcard character.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-RDRemoteApp
        [[-CollectionName] <String>]
        [[-Alias] <String>]
        [-DisplayName <String[]>]
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.RemoteDesktopServices.Management.RemoteApp" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get RemoteApp programs for a collection'
  description: |-
    ```
    PS C:\> Get-RDRemoteApp -CollectionName "Session Collection"
    ```

    This command gets RemoteApp programs for the collection named Session Collection, as specified by the **CollectionName** parameter.
- title: 'Example 2: Get RemoteApp programs by using a display name'
  description: |-
    ```
    PS C:\> Get-RDRemoteApp -DisplayName Note*
    ```

    This command gets RemoteApp programs that begin with the string Note.
