### YamlMime:PowerShellCmdlet1
uid: RDMgmt.Get-RDVirtualDesktopCollection
name: Get-RDVirtualDesktopCollection
module: RDMgmt
isPreview: false
summary: |-
  Gets a list of virtual desktop collections in a remote desktop deployment.
description: |-
  The **Get-RDVirtualDesktopCollection** cmdlet gets a list of existing virtual desktop collections in a remote desktop deployment.
parameters:
  cmdletParameters:
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a remote desktop deployment.
      If you do not specify a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-RDVirtualDesktopCollection
        [[-CollectionName] <String>]
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
  description: |-
    The output type is **Microsoft.RemoteDesktopServices.Management.RDVirtualDesktopCollection**.
examples:
- title: 'Example 1: Get the list of the virtual desktop collections in a remote desktop deployment'
  description: |-
    ```
    PS C:\> Get-RDVirtualDesktopCollection -ConnectionBroker "rdcb.contoso.com"
    ```

    This command lists the virtual desktop collections associated with the RD Connection Broker named rdcb.contoso.com.
