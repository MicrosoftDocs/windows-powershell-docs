### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Get-BgpRouteInformation
name: Get-BgpRouteInformation
module: RemoteAccess
isPreview: false
summary: |-
  Retrieves BGP route information for one or more network prefixes from the BGP routing table.
description: |-
  The **Get-BgpRouteInformation** cmdlet retrieves Border Gateway Protocol (BGP) route information for one or more network prefixes.
  This cmdlet returns error information if errors occur while retrieving the BGP route information.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Network
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a string array of CIDR IPv4 and IPv6 network prefixes along with network masks for which the BGP routing information is to be retrieved.
    aliases:
    - DestinationNetwork
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user-defined unique alphanumeric identifier for the routing domain.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent connections that can be established to run this command.
      If you omit this parameter or enter a value of 0, the default value, 32, is used.

      The throttle limit applies only to the current command, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="RouteType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of routes for which the information needs to be retrieved or listed.
    acceptedValues:
    - All
    - Best
    - Damped
    - Suppressed
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpRouteInformation
        [-Network <String[]>]
        [-RoutingDomain <String>]
        [-Type <RouteType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpRouteInfo" data-throw-if-not-resolved="False" />
examples:
- title: Example 1:Get all BGP learned routes
  description: |-
    ```
    PS C:\>Get-BgpRouteInformation
    DestinationNetwork      NextHop                 Origin                  LocalPref               MED
    ------------------      -------                 ------                  ---------               ---
    172.23.90.0/28          172.23.90.9             INCOMPLETE
    172.23.90.15/32         172.23.90.9             INCOMPLETE
    ```

    This command gets the BGP learned routes
- title: 'Example 2: Get the BGP learned routes for a specified routing domain'
  description: |-
    ```
    PS C:\>Get-BgpRouteInformation -RoutingDomain Rd_002
    DestinationNetwork      NextHop                 Origin                  LocalPref               MED
    ------------------      -------                 ------                  ---------               ---
    100.0.0.0/24            172.23.90.5             INCOMPLETE
    100.0.0.5/32            172.23.90.5             INCOMPLETE
    100.0.0.6/32            172.23.90.5             INCOMPLETE
    100.0.0.255/32          172.23.90.5             INCOMPLETE
    ```

    This command gets the BGP learned routes for the specified routing domain in Multi-Tenant Environment.
