### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Get-BgpRouter
name: Get-BgpRouter
module: RemoteAccess
isPreview: false
summary: |-
  Gets configuration information for BGP routers.
description: |-
  The **Get-BgpRouter** cmdlet gets router configuration information for Border Gateway Protocol (BGP) routers.
  In a multitenant deployment, the cmdlet adds a BGP router for the routing domain or a tenant.
  In a non-multitenant deployment, the cmdlet configures the BGP router for the local computer.
  In a multitenant deployment, you must specify the **RoutingDomain** parameter.
  In a non-multitenant deployment, do not specify the **RoutingDomain** parameter.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an name, as a string, of a routing domain.
      The name of a routing domain is a unique user-defined alphanumeric string.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpRouter
        [-RoutingDomain <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpRouterConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get configuration information of a BGP router'
  description: |-
    ```
    PS C:\> Get-BgpRouter



    RoutingDomain         :
    BgpIdentifier         : 192.168.1.10
    LocalASN              : 64513
    CompareMEDAcrossASN   : False
    DefaultGatewayRouting : False
    IPv6Routing           : Disabled
    LocalIPv6Address      :
    PeerName              :
    PolicyName            :
    ```

    This command gets the configuration information of the local BGP router.
- title: 'Example 2: Get configuration information of a router for a routing domain'
  description: |-
    ```
    PS C:\> Get-BgpRouter -RoutingDomain "Rd_001"




    RoutingDomain         : Rd_001
    BgpIdentifier         : 172.22.226.39
    LocalASN              : 64522
    CompareMEDAcrossASN   : False
    DefaultGatewayRouting : False
    IPv6Routing           : Disabled
    LocalIPv6Address      :
    PeerName              : {Tenant01}
    PolicyName            :
    ```

    This command gets the configuration information of the BGP router for the routing domain that has the ID Rd_001.
