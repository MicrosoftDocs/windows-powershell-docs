### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Get-BgpStatistics
name: Get-BgpStatistics
module: RemoteAccess
isPreview: false
summary: |-
  Retrieves BGP peering-related message and route advertisement statistics.
description: |-
  The **Get-BgpStatistics** cmdlet retrieves Border Gateway Protocol (BGP) peering-related message and route advertisement statistics.
parameters:
  cmdletParameters:
  - name: AllRoutingDomains
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Use this command to retrieve details about all routing domains.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllRoutingDomains
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of peer names for which to retrieve the BGP message and route statistics.
    aliases:
    - PeerId
    - PeerList
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an ID, as a string, for a routing domain.
      The ID of a routing domain is a unique user-defined alphanumeric string.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpStatistics
        [-RoutingDomain <String>]
        [-PeerName <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: RoutingDomain
  isDefault: false
- syntax: |-
    ```Syntax
    Get-BgpStatistics
        [-AllRoutingDomains]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: AllRoutingDomains
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpStatistics" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Retrieve all BPG message and route statistics'
  description: |-
    ```
    PS C:\> Get-BgpStatistics




    PeerName                 : Tenant-01
    TcpConnectionEstablished : 14-03-2013 02:57:04
    TcpConnectionClosed      : 14-03-2013 02:56:34
    OpenMessage:
              LastSent                 : 14-03-2013 02:57:04
              LastReceived             : 14-03-2013 02:57:04
              SentCount                : 4
              ReceivedCount            : 4
    UpdateMessage:
              LastSent                 : 14-03-2013 02:57:04
              LastReceived             : 14-03-2013 02:57:04
              SentCount                : 4
              ReceivedCount            : 4
    NotificationMessage:
              LastSent                 : 01-01-0001 00:00:00
              LastReceived             : 13-03-2013 08:24:46
              SentCount                : 0
              ReceivedCount            : 2
    KeepAliveMessage:
              LastSent                 : 14-03-2013 03:00:31
              LastReceived             : 14-03-2013 03:00:32
              SentCount                : 1277
              ReceivedCount            : 1273
    RouteRefreshMessage:
              LastSent                 : 01-01-0001 00:00:00
              LastReceived             : 01-01-0001 00:00:00
              SentCount                : 0
              ReceivedCount            : 0
    IPv4Route:
              UpdateSentCount          : 4
              UpdateReceivedCount      : 4
              WithdrawalSentCount      : 0
              WithdrawalReceivedCount  : 0
    IPv6Route:
              UpdateSentCount          : 0
              UpdateReceivedCount      : 0
              WithdrawalSentCount      : 0
              WithdrawalReceivedCount  : 0
    ```

    This command retrieves the BGP message and route statistics.
- title: 'Example 2: Retrieve BGP message and route statistics for a routing domain'
  description: |-
    ```
    PS C:\> Get-BgpStatistics -RoutingDomain Rd_02
    PeerName                 : Tenant-01
    TcpConnectionEstablished : 14-03-2013 02:57:04
    TcpConnectionClosed      : 14-03-2013 02:56:34
    OpenMessage:
              LastSent      : 14-03-2013 02:57:04
              LastReceived  : 14-03-2013 02:57:04
              SentCount     : 4
              ReceivedCount : 4
    UpdateMessage:
              LastSent      : 14-03-2013 02:57:04
              LastReceived  : 14-03-2013 02:57:04
              SentCount     : 4
              ReceivedCount : 4
    NotificationMessage:
              LastSent      : 01-01-0001 00:00:00
              LastReceived  : 13-03-2013 08:24:46
              SentCount     : 0
              ReceivedCount : 2
    KeepAliveMessage:
              LastSent      : 14-03-2013 03:00:31
              LastReceived  : 14-03-2013 03:00:32
              SentCount     : 1277
              ReceivedCount : 1273
    RouteRefreshMessage:
              LastSent      : 01-01-0001 00:00:00
              LastReceived  : 01-01-0001 00:00:00
              SentCount     : 0
              ReceivedCount : 0
    IPv4Route:
              UpdateSentCount         : 4
              UpdateReceivedCount     : 4
              WithdrawalSentCount     : 0
              WithdrawalReceivedCount : 0
    IPv6Route:
              UpdateSentCount         : 0
              UpdateReceivedCount     : 0
              WithdrawalSentCount     : 0
              WithdrawalReceivedCount : 0
    ```

    This command retrieves the BGP message and route statistics for a routing domain named Rd_02.
