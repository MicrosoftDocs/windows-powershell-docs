syntaxes:
- syntax: |-
    ```Syntax
    Get-VpnS2SInterfaceStatistics
        [-Name] <String>
        [-Clear]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VpnS2SInterfaceStatistics
        [-Clear]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#VpnS2SInterfaceStatistics" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\> Get-VpnS2SInterfaceStatistics -Name 2-edge1
    BytesTransmitted      : 2874
    BytesReceived         : 14701
    FramesTransmitted     : 39
    FramesReceived        : 193
    CrcErrors             : 0
    TimeoutErrors         : 0
    AlignmentErrors       : 0
    HardwareOverrunErrors : 0
    FramingErrors         : 0
    BufferOverrunErrors   : 0
    ```

    This example retrieves statistics for the S2S VPN interface named 2-edge1.
