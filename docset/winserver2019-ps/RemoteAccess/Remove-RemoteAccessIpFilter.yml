### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Remove-RemoteAccessIpFilter
name: Remove-RemoteAccessIpFilter
module: RemoteAccess
isPreview: false
summary: |-
  Removes an IP filter for an interface.
description: |-
  The **Remove-RemoteAccessIpFilter** cmdlet removes an IP filter for an interface.
parameters:
  cmdletParameters:
  - name: AddressFamily
    type: <xref href="AddressFamily" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address family for which to remove filters.
    acceptedValues:
    - IPv4
    - IPv6
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
