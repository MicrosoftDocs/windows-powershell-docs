syntaxes:
- syntax: |-
    ```Syntax
    Remove-RemoteAccessIpFilter
        [-InterfaceAlias] <String>
        [-Direction] <Direction>
        [-List] <String[]>
        [-PassThru]
        [-Force]
        [-AddressFamily] <AddressFamily>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#InterfaceIpFilter" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove an IP address filter'
  description: |-
    ```
    PS C:\> Remove-RoutingIpFilter -InterfaceAlias Interface01 -Direction Outbound -Force
    ```

    This command removes an IP filter for an interface named Interface01, and traffic that flows in a specific direction.
    The command also displays the details of the removed filter.
