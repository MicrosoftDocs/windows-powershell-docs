syntaxes:
- syntax: |-
    ```Syntax
    Remove-VpnSstpProxyRule
        [-TenantID] <String[]>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove one or more VPN SSTP proxy rules from the server'
  description: |-
    ```
    PS C:\>Remove-VpnSstpProxyRule -TenantID "Contoso", "Woodgrove" -Force
    ```

    This command removes VPN SSTP proxy rules named Contoso and Woodgrove from the server.
