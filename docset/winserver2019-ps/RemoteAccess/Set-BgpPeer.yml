### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Set-BgpPeer
name: Set-BgpPeer
module: RemoteAccess
isPreview: false
summary: |-
  Updates the configuration of the specified BGP peer.
description: |-
  The **Set-BgpPeer** cmdlet updates the Border Gateway Protocol (BGP) peer configuration.
  This cmdlet returns error information if errors occur while modifying the BGP peer configuration.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClearPrefixLimit
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet clears the maximum limit on prefixes learned from the peer.
      The cmdlet will reset the prefix learning to an unlimited number.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HoldTimeSec
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the configured value of the **HoldTime** parameter in seconds after which the BGP Session expires if no BGP message is received.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IdleHoldTimeSec
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the configured value of the **IdleHoldTime** in seconds after which the BGP Session expires if no BGP message is received.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalASN
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local autonomous systems (AS) number of the BGP Router instance for this peer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalIPAddress
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local BGP router's peering IP address.
      It can be of IPv4 or IPv6 address type.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxAllowedPrefix
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of allowed IPv4 or IPv6 network prefixes that can be learned from the given neighbor.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the peer name for which the configuration is to be modified.
    aliases:
    - PeerId
    - PeerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OperationMode
    type: <xref href="OperationMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the BGP router's mode of operation.
      The acceptable values for this parameter are:
      - Peering Initiator as well as peering acceptor
      - Only acting as a passive peering request acceptor.
    acceptedValues:
    - Mixed
    - Server
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerASN
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the neighbor BGP router's AS number.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeeringMode
    type: <xref href="PeeringMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value to configure peering mode for the given peer.
      The acceptable values for this parameter are:

      - Automatic
      - Manual
    acceptedValues:
    - Automatic
    - Manual
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerIPAddress
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the neighbor BGP router's peering IP address.
      Acceptable values are an IPv4 or IPv6 address type.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteReflectorClient
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether peer is a client peer or non-client peer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user-defined unique alphanumeric identifier for the routing domain.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent connections that can be established to run this command.
      If you omit this parameter or enter a value of 0, the default value, 32, is used.

      The throttle limit applies only to the current command, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Weight
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies administrative preference assigned to the routes received from this peer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-BgpPeer
        [-Name] <String>
        [-LocalIPAddress <IPAddress>]
        [-PeerIPAddress <IPAddress>]
        [-LocalASN <UInt32>]
        [-PeerASN <UInt32>]
        [-OperationMode <OperationMode>]
        [-PeeringMode <PeeringMode>]
        [-HoldTimeSec <UInt16>]
        [-IdleHoldTimeSec <UInt16>]
        [-MaxAllowedPrefix <UInt32>]
        [-RoutingDomain <String>]
        [-PassThru]
        [-Force]
        [-ClearPrefixLimit]
        [-Weight <UInt16>]
        [-RouteReflectorClient <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpPeerConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update the BGP peer configuration for the specified neighbor'
  description: |-
    ```
    PS C:\>Set-BgpPeer -Name "TenantSite1" -PeeringMode Automatic -PassThru
    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    TenantSite1      192.168.1.10        10.1.1.10           64512               Server              Connecting
    ```

    This command updates and modifies the BGP peer configuration for the specified neighbor.
- title: 'Example 2: Update and modify the BGP peer configuration and prompt the user for confirmation'
  description: |-
    ```
    PS C:\>Set-BgpPeer -Name "TenantSite1" -OperationMode Mixed -PeeringMode Automatic -PassThru
    Confirm
    BGP peering session is active for peer TenantSite1. Do you want to apply settings and restart peering?
     [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): y

    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    TenantSite1      192.168.1.10        10.1.1.10           64512               Mixed               Connecting
    ```

    This command prompts the user for confirmation and upon confirmation, updates and modifies the BGP peer configuration for the specified neighbor, which is active.
- title: 'Example 3: Update and modify the BGP peer configuration for the specified neighbor'
  description: |-
    ```
    PS C:\>Set-BgpPeer -RoutingDomain "Rd_002" -Name "Tenant1" -PeerASN 64515  -PassThru
    Confirm
    BGP peering session is active for RedTenant1 for routing domain Rd_002. Do you want to apply settings and restart
    peering?
    [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"):

    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    Tenant1          14.1.1.10           192.168.1.2         64515               Mixed               Connecting
    ```

    This command prompts the user for confirmation and upon confirmation, updates and modifies the BGP peer configuration for the specified neighbor of a specified routing domain in multi-tenant environment.
