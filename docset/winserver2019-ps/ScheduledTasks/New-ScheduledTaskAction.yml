syntaxes:
- syntax: |-
    ```Syntax
    New-ScheduledTaskAction
        [-Id <String>]
        [-Execute] <String>
        [[-Argument] <String>]
        [[-WorkingDirectory] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
