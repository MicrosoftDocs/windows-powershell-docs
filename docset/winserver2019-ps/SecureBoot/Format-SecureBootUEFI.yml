    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the file that contains the contents of the data that is ready to be signed.

      If only the name is specified, the file must be in the current working directory.
      Otherwise, specify the full path of the file.
    aliases:
    - s
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SignatureOwner
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the GUID of the signature owner.
    aliases:
    - g
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FormatForCertificates
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: FormatForHashes
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Time
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the timestamp that is used in the signature.
      Format this value as follows so that it is accepted as a **DateTime** object:

      `"2011-11-01T13:30:00Z"`
    aliases:
    - t
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
