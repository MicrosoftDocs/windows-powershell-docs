syntaxes:
- syntax: |-
    ```Syntax
    Remove-SmbMultichannelConstraint
        [-ServerName] <String[]>
        [[-InterfaceIndex] <UInt32[]>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInterfaceIndex
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-SmbMultichannelConstraint
        [-ServerName] <String[]>
        [[-InterfaceAlias] <String[]>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInterfaceAlias
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-SmbMultichannelConstraint
        -InputObject <CimInstance[]>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
