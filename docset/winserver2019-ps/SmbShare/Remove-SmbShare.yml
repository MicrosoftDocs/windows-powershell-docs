syntaxes:
- syntax: |-
    ```Syntax
    Remove-SmbShare
        [-Name] <String[]>
        [[-ScopeName] <String[]>]
        [-SmbInstance <SmbInstance>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-SmbShare
        -InputObject <CimInstance[]>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
