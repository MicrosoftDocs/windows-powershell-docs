### YamlMime:PowerShellCmdlet1
uid: SmbShare.Set-SmbShare
name: Set-SmbShare
module: SmbShare
isPreview: false
summary: |-
  Modifies the properties of the SMB share.
description: |-
  The **Set-SmbShare** cmdlet modifies the properties of the Server Message Block (SMB) share.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CachingMode
    type: <xref href="CachingMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the caching mode of the offline files for the SMB share.
      There are five caching modes:

      - None.
      Prevents users from storing documents and programs offline.
      - Manual.
      Allows users to identify the documents and programs that they want to store offline.
      - Programs.
      Automatically stores documents and programs offline.
      - Documents.
      Automatically stores documents offline.
      - BranchCache.
      Enables BranchCache and manual caching of documents on the shared folder.
    acceptedValues:
    - None
    - Manual
    - Documents
    - Programs
    - BranchCache
    - Unknown
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CATimeout
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the continuous availability time-out of the SMB share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentUserLimit
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrently connected users that the SMB share may accommodate.
      If this parameter is set to zero (0), then the number of users is unlimited.
      By default, new SMB shares have no limit on the number of concurrent connections.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContinuouslyAvailable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the share is continuously available.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an optional description of the SMB share.
      A description of the share can be displayed by running the Get-SmbShare cmdlet.
      Specify an empty string to clear the current description.
      The description may not contain more than 256 characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptData
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the SMB share is encrypted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FolderEnumerationMode
    type: <xref href="FolderEnumerationMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies which files and folders in the new SMB share will be visible to the users.
      The acceptable values for this parameter are:

      - AccessBased.
      SMB does not the display the files and folders for a share to a user unless that user has rights to access the files and folders.
      By default, access-based enumeration is disabled for new SMB shares.
      - Unrestricted.
      SMB displays files and folders to a user even when the user does not have permission to access those items.

      The default value is Unrestricted.
    acceptedValues:
    - AccessBased
    - Unrestricted
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LeasingMode
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Allow admins to stop leases and oplocks.

      - Full = default SMB3
      - Shared = grant read-caching lease but not write or handle-caching
      - None = no oplocks or leases, like modified SMB1/3

      > [!IMPORTANT]
      > We do not recommend disabling oplocks, but may be required in some scenarios. For more information, see [SMB1 Product Clearinghouse](https://techcommunity.microsoft.com/t5/Storage-at-Microsoft/SMB1-Product-Clearinghouse/ba-p/426008).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of one or more SMB shares.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScopeName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the scope name of the SMB share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecurityDescriptor
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the security descriptor for the SMB share in string format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SmbInstance
    type: <xref href="SmbInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the input to this cmdlet.
      You can use this parameter, or you can pipe the input to this cmdlet.
    acceptedValues:
    - Default
    - CSV
    - SBL
    - SR
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
