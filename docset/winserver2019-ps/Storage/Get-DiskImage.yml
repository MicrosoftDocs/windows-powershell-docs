### YamlMime:PowerShellCmdlet1
uid: Storage.Get-DiskImage
name: Get-DiskImage
module: Storage
isPreview: false
summary: |-
  Gets one or more disk image objects (virtual hard disk or ISO).
description: |-
  The **Get-DiskImage** cmdlet gets the objects associated with one or more disk images (virtual hard disk or ISO).
  This cmdlet requires either the full image path of the ISO or VHD file, or the device path.

  This cmdlet reports whether the specified ISO or VHD file is currently attached.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DevicePath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the device path of the ISO or VHD file.
      You cannot use this parameter with the *ImagePath* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDevicePath
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ImagePath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the path of the ISO or VHD file.
      You cannot use this parameter with the *DevicePath* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByImagePath
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageType
    type: <xref href="StorageType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of a disk image: ISO, VHD, VHDx, or Unknown.
      If the *StorageType* parameter is not specified or the Unknown type is provided, the storage type is determined by file extension.
    acceptedValues:
    - Unknown
    - ISO
    - VHD
    - VHDX
    - VHDSet
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Volume
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Gets the disk image associated with the specified Volume object.
      Enter a Volume CIM object, which can be obtained by using the Get-Volume cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByVolume
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-DiskImage
        [-ImagePath] <String[]>
        [-StorageType <StorageType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByImagePath
  isDefault: true
- syntax: |-
    ```Syntax
    Get-DiskImage
        [-Volume <CimInstance>]
        [-StorageType <StorageType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVolume
  isDefault: false
- syntax: |-
    ```Syntax
    Get-DiskImage
        -DevicePath <String[]>
        [-StorageType <StorageType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByDevicePath
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_Volume" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a Volume object to the *Volume* parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_DiskImage" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an object that represents the specified disk image.
examples:
- title: 'Example 1: Get a disk image by path'
  description: |-
    ```
    PS C:\>Get-DiskImage -ImagePath "E:\ISO-Files\My US Visit Fall 2010 Pictures.iso"
    ```

    This example gets an ISO disk image specified by path and displays information about the disk image.
- title: 'Example 2: Get a disk image by device path'
  description: |-
    ```
    PS C:\>Get-DiskImage -DevicePath \\.\CDROM1
    ```

    This example gets an ISO disk image specified by device path and displays information about the disk image.
- title: 'Example 3: Get the drive letter associated with a mounted ISO'
  description: |-
    ```
    PS C:\>Get-DiskImage -DevicePath \\.\CDROM1 | Get-Volume
    ```

    This example displays the drive letter associated with an ISO file.
- title: 'Example 4: Get the drive letter associated with a mounted VHD'
  description: |-
    ```
    PS C:\>Get-DiskImage -ImagePath E:\vhd1.vhdx | Get-Disk | Get-Partition | Get-Volume
    DriveLetter       FileSystemLabel   FileSystem        DriveType         HealthStatus        SizeRemaining             Size
    -----------       ---------------   ----------        ---------         ------------        -------------             ----
    F                 New Volume        NTFS              Fixed             Healthy                  19.27 GB         19.87 GB
    ```

    This example displays one or more drive letters associated with volumes in a VHD file.
