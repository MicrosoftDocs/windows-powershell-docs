### YamlMime:PowerShellCmdlet1
uid: Storage.Get-InitiatorId
name: Get-InitiatorId
module: Storage
isPreview: false
summary: |-
  Gets the InitiatorID objects for the specified iSCSI initiators.
description: |-
  The **Get-InitiatorId** cmdlet gets the InitiatorID objects for the specified iSCSI initiators.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostType
    type: <xref href="HostType" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the host operating system or other host environmental factors that may influence the behavior that the storage system should have when showing a virtual disk to an initiator.
      If the HostType property is blank for the object you want to get, omit this parameter.
    acceptedValues:
    - Unknown
    - Other
    - Standard
    - Solaris
    - HPUX
    - OpenVMS
    - Tru64
    - Netware
    - Sequent
    - AIX
    - DGUX
    - Dynix
    - Irix
    - CiscoISCSIStorageRouter
    - Linux
    - MicrosoftWindows
    - OS400
    - TRESPASS
    - HIUX
    - VMwareESXi
    - MicrosoftWindowsServer2008
    - MicrosoftWindowsServer2003
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAddress
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InitiatorAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the address of the InitiatorID object you want to get.
      These are the port addresses of the hosts to which the virtual disks will be made available.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAddress
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaskingSet
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Gets the InitiatorID objects associated with the specified MaskingSet object.
      Enter a MaskingSet CIM object, which is exposed by the Get-MaskingSet cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByMaskingSet
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageSubSystem
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Gets the InitiatorID objects associated with the specified StorageSubsystem object.
      Enter a StorageSubsystem CIM object, which is exposed by the Get-StorageSubSystem cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByStorageSubSystem
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UniqueId
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the UniqueID(s) of the InitiatorID(s) you want to get.
      Separate multiple UniqueIDs with commas, and enclose brackets in quotation marks.
    aliases:
    - Id
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByUniqueId
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualDisk
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Gets the InitiatorID objects associated with the specified VirtualDisk object.
      Enter a VirtualDisk CIM object, which is exposed by the Get-VirtualDisk cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByVirtualDisk
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-InitiatorId
        [[-InitiatorAddress] <String[]>]
        [-HostType <HostType[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByAddress
  isDefault: true
- syntax: |-
    ```Syntax
    Get-InitiatorId
        [-UniqueId <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-InitiatorId
        [-MaskingSet <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByMaskingSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-InitiatorId
        [-VirtualDisk <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByVirtualDisk
  isDefault: false
- syntax: |-
    ```Syntax
    Get-InitiatorId
        [-StorageSubSystem <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByStorageSubSystem
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_MaskingSet" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a MaskingSet object to the *MaskingSet* parameter.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StorageSubsystem" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a StorageSubsystem object to the *StorageSubsystem* parameter.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_VirtualDisk" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a VirtualDisk object to the *VirtualDisk* parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_InitiatorId" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an object that represents an initiator ID.
examples:
- title: 'Example 1: Get all InitiatorIDs'
  description: |-
    ```
    PS C:\>Get-InitiatorID
    ```

    This example gets and displays all iSCSI initiator IDs on the computer.
- title: 'Example 2: Get the storage providers for each InitiatorID'
  description: |-
    ```
    PS C:\>Get-InitiatorId | Get-StorageSubSystem | Get-StorageProvider
    ```

    This example gets and displays the storage providers for each InitiatorID by piping the output from the **Get-InitiatorId** cmdlet to the **Get-StorageSubSystem** cmdlet, and then piping that cmdlet's output to the **Get-StorageProvider** cmdlet.
- title: Example 3:Get the InitiatorID objects for a masking set
  description: |-
    ```
    PS C:\>Get-InitiatorId -MaskingSet (Get-MaskingSet -FriendlyName *EQLV1)
    ```

    This example uses the **Get-MaskingSet** cmdlet to get the masking set with a friendly name that ends with EQLV1, and then gets all associated InitiatorID objects.
