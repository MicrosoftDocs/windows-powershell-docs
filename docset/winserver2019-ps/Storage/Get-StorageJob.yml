inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StoragePool" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an MSFT_StoragePool object to the *StoragePool* parameter to specify the storage pool in which to get storage jobs.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StorageSubsystem" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an MSFT_StorageSubsystem object to the *StorageSubsystem* parameter to specify the storage subsystem for which to get storage jobs.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_VirtualDisk" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an MSFT_VirtualDisk object to the *VirtualDisk* parameter to specify the virtual disk for which to get storage jobs.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StorageJob" data-throw-if-not-resolved="False" />
  description: |-
    The Get-StorageJob cmdlet returns objects that represent storage jobs.
examples:
- title: 'Example 1: Get all current storage jobs'
  description: |-
    ```
    PS C:\>Get-StorageJob
    Name                  ElapsedTime           JobState              PercentComplete       IsBackgroundTask
    ----                  -----------           --------              ---------------       ----------------
    Regeneration          00:00:00              Running               50                    True
    ```

    This example displays a list of all current storage jobs.
- title: 'Example 2: Get all storage jobs on the Windows Storage subsystem'
  description: |-
    ```
    PS C:\>Get-StorageJob -StorageSubsystem (Get-StorageSubSystem -FriendlyName "Storage Spaces*")
    ```

    This example gets all storage jobs on the Storage Spaces subsystem, using the **Get-StorageSubSystem** cmdlet to get the StorageSubsystem object.
