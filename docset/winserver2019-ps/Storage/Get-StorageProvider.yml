syntaxes:
- syntax: |-
    ```Syntax
    Get-StorageProvider
        [[-Name] <String[]>]
        [-Manufacturer <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-StorageProvider
        [-UniqueId <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageProvider
        [-Manufacturer <String[]>]
        [-URI <Uri[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByURI
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageProvider
        [-StorageSubSystem <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByStorageSubSystem
  isDefault: false
