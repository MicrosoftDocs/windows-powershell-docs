syntaxes:
- syntax: |-
    ```Syntax
    Get-SupportedClusterSizes
        [-DriveLetter] <Char[]>
        -FileSystem <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByDriveLetter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-SupportedClusterSizes
        -ObjectId <String[]>
        -FileSystem <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-SupportedClusterSizes
        -Path <String[]>
        -FileSystem <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByPaths
  isDefault: false
- syntax: |-
    ```Syntax
    Get-SupportedClusterSizes
        -FileSystemLabel <String[]>
        -FileSystem <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByLabel
  isDefault: false
- syntax: |-
    ```Syntax
    Get-SupportedClusterSizes
        -InputObject <CimInstance[]>
        -FileSystem <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Get supported cluster sizes'
  description: |-
    ```
    PS C:\>Get-Volume H | Get-SupportedClusterSizes -Filesystem NTFS
    512
    1024
    2048
    4096
    8192
    16384
    32768
    65536
    ```

    This command gets the supported cluster sizes for the NTFS file systems on the volume named H.
