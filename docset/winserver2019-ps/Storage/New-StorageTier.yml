### YamlMime:PowerShellCmdlet1
uid: Storage.New-StorageTier
name: New-StorageTier
module: Storage
isPreview: false
summary: |-
  Creates a storage tier.
description: |-
  The **New-StorageTier** cmdlet creates a storage tier in a storage pool.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ColumnIsolation
    type: <xref href="FaultDomainType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies at which level columns within a virtual disk should be isolated from each other.
      We recommend omitting this parameter and using the defaults.
      The acceptable values for this parameter are:

      - PhysicalDisk
      - StorageScaleUnit
      - StorageChassis
      - StorageEnclosure
      - StorageRack
    acceptedValues:
    - PhysicalDisk
    - StorageEnclosure
    - StorageScaleUnit
    - StorageChassis
    - StorageRack
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description for the storage tier that you create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FaultDomainAwareness
    type: <xref href="FaultDomainType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies at what level you want the virtual disk to be fault tolerant.
      The acceptable values for this parameter are:

      - PhysicalDisk
      - StorageScaleUnit
      - StorageChassis
      - StorageEnclosure
      - StorageRack

      For example, specify StorageScaleUnit to store data copies on separate nodes of a Storage Spaces Direct cluster.
      This cmdlet refers to nodes of a Storage Spaces Direct cluster as storage scale units because you can expand the scale of the cluster by adding more nodes.
    acceptedValues:
    - PhysicalDisk
    - StorageEnclosure
    - StorageScaleUnit
    - StorageChassis
    - StorageRack
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a friendly name for the storage tier.
    aliases:
    - StorageTierFriendlyName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Interleave
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interleave value to use during the creation of a storage tier.
      The interleave value represents the number of bytes that is written to a single physical disk.
      Thus `Interleave * NumberOfColumns` yields the size of one stripe of user data.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MediaType
    type: <xref href="MediaType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the media type of the storage tier.
      The cmdlet creates the storage tier for the media type that you specify.
      The acceptable values for this parameter are:

      - SSD
      - SCM
      - HDD

      Use SCM for storage-class memory such as NVDIMMs.
    acceptedValues:
    - HDD
    - SSD
    - SCM
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfColumns
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of columns to use for the storage tier.
      Columns represent the number of underlying physical disks in a tier across which one stripe of data for a virtual disk is written.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfDataCopies
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of data copies to create.
      Specify 2 to create a two-way mirror, or 3 to specify a three-way mirror or for dual-parity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfGroups
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifics the number of groups used by Local Reconstruction Coding (LRC) with a dual parity virtual disk.
      We recommend omitting this parameter and using the defaults.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalDiskRedundancy
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical disk redundancy value to use during the creation of a virtual disk.
      This value represents how many failed physical disks the virtual disk can tolerate without data loss.
      The redundancy values are as follows:

      - For two-way mirror spaces, the virtual disk can tolerate 1 failed physical disk without data loss.
      - For three-way mirror spaces, the virtual disk can tolerate 2 failed physical disks without data loss.
      - For single-parity spaces, the virtual disk can tolerate 1 failed physical disk without data loss.
      - For dual-parity spaces the virtual disk can tolerate 2 failed physical disks without data loss.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResiliencySettingName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resiliency setting, or storage layout, to use for the virtual disk.
      The acceptable values for this parameter are: Simple, Mirror, and Parity.

      By default, when you specify Mirror, Storage Spaces creates a two-way mirror.
      When you specify Parity, Storage Spaces creates a single-parity space.

      To create a three-way mirror space, specify 3 for the *NumberofDataCopies* parameter or 2 for the *PhysicalDiskRedundancy* parameter.

      To create a dual-parity space, specify 2 for the *PhysicalDiskRedundancy* parameter and Fixed provisioning for the *ProvisioningType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StoragePoolFriendlyName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the friendly name of a storage pool.
      The cmdlet creates the storage tier in the storage pool that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFriendlyName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StoragePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of a storage pool.
      The cmdlet creates the storage tier in the storage pool that you specify.
      This human-readable name is not necessarily unique.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StoragePoolUniqueId
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the unique ID, as a string, of a storage pool.
      The cmdlet creates the storage tiers in the storage pool that has the ID that you specify.
    aliases:
    - StoragePoolId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByUniqueId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-StorageTier
        [-StoragePoolFriendlyName] <String[]>
        -FriendlyName <String>
        [-MediaType <MediaType>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-ColumnIsolation <FaultDomainType>]
        [-ResiliencySettingName <String>]
        [-PhysicalDiskRedundancy <UInt16>]
        [-NumberOfDataCopies <UInt16>]
        [-NumberOfGroups <UInt16>]
        [-NumberOfColumns <UInt16>]
        [-Interleave <UInt64>]
        [-Description <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    New-StorageTier
        -StoragePoolUniqueId <String[]>
        -FriendlyName <String>
        [-MediaType <MediaType>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-ColumnIsolation <FaultDomainType>]
        [-ResiliencySettingName <String>]
        [-PhysicalDiskRedundancy <UInt16>]
        [-NumberOfDataCopies <UInt16>]
        [-NumberOfGroups <UInt16>]
        [-NumberOfColumns <UInt16>]
        [-Interleave <UInt64>]
        [-Description <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    New-StorageTier
        -StoragePoolName <String[]>
        -FriendlyName <String>
        [-MediaType <MediaType>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-ColumnIsolation <FaultDomainType>]
        [-ResiliencySettingName <String>]
        [-PhysicalDiskRedundancy <UInt16>]
        [-NumberOfDataCopies <UInt16>]
        [-NumberOfGroups <UInt16>]
        [-NumberOfColumns <UInt16>]
        [-Interleave <UInt64>]
        [-Description <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    New-StorageTier
        -InputObject <CimInstance[]>
        -FriendlyName <String>
        [-MediaType <MediaType>]
        [-FaultDomainAwareness <FaultDomainType>]
        [-ColumnIsolation <FaultDomainType>]
        [-ResiliencySettingName <String>]
        [-PhysicalDiskRedundancy <UInt16>]
        [-NumberOfDataCopies <UInt16>]
        [-NumberOfGroups <UInt16>]
        [-NumberOfColumns <UInt16>]
        [-Interleave <UInt64>]
        [-Description <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StoragePool" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass a MSFT_StoragePool object to the **InputObject** parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/microsoft/windows/storage/MSFT_StorageTier" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet outputs an object that represents the storage tier
examples:
- title: 'Example 1: Create a storage tier'
  description: |-
    ```
    PS C:\> New-StorageTier -StoragePoolFriendlyName "TierPool01" -FriendlyName "Tier11" -MediaType HDD
    ```

    This command creates a storage tier for hard disk drives named Tier11 in the storage pool named TierPool01.
