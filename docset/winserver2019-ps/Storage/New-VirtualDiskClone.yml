syntaxes:
- syntax: |-
    ```Syntax
    New-VirtualDiskClone
        -VirtualDiskUniqueId <String[]>
        -FriendlyName <String>
        [-TargetStoragePoolName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    New-VirtualDiskClone
        [-VirtualDiskFriendlyName] <String[]>
        -FriendlyName <String>
        [-TargetStoragePoolName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: false
- syntax: |-
    ```Syntax
    New-VirtualDiskClone
        -VirtualDiskName <String[]>
        -FriendlyName <String>
        [-TargetStoragePoolName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    New-VirtualDiskClone
        -InputObject <CimInstance[]>
        -FriendlyName <String>
        [-TargetStoragePoolName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_VirtualDisk" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_VirtualDisk" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\>New-VirtualDiskClone -VirtualDiskFriendlyName "SQLData5" -TargetVirtualDiskName "SQLData5Clone" -TargetStoragePoolName "ClonePool"
    ```

    This example creates a full clone of the specified Virtual Disk object.
    Note: This cmdlet requires support from the Storage Management Provider.
    This cmdlet returns the Virtual Disk object for the newly clone.
