    description: |-
      Specifies the name of the virtual disk.
      This parameter is typically read-only.
      This parameter is not equivalent to the *VirtualDiskFriendlyName* parameter that can be set by a user.
    defaultValue: None
    dontShow: false
    isDynamic: false
