syntaxes:
- syntax: |-
    ```Syntax
    Set-ResiliencySetting
        -Name <String[]>
        -StoragePool <CimInstance>
        [-NumberOfDataCopiesDefault <UInt16>]
        [-PhysicalDiskRedundancyDefault <UInt16>]
        [-NumberOfColumnsDefault <UInt16>]
        [-AutoNumberOfColumns]
        [-InterleaveDefault <UInt64>]
        [-NumberOfGroupsDefault <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-ResiliencySetting
        -UniqueId <String[]>
        [-NumberOfDataCopiesDefault <UInt16>]
        [-PhysicalDiskRedundancyDefault <UInt16>]
        [-NumberOfColumnsDefault <UInt16>]
        [-AutoNumberOfColumns]
        [-InterleaveDefault <UInt64>]
        [-NumberOfGroupsDefault <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Set-ResiliencySetting
        -InputObject <CimInstance[]>
        [-NumberOfDataCopiesDefault <UInt16>]
        [-PhysicalDiskRedundancyDefault <UInt16>]
        [-NumberOfColumnsDefault <UInt16>]
        [-AutoNumberOfColumns]
        [-InterleaveDefault <UInt64>]
        [-NumberOfGroupsDefault <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_ResiliencySetting" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass an MSFT_ResiliencySetting object to the *InputObject* parameter.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StoragePool" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass an MSFT_StoragePool object to the *StoragePool* parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_ResiliencySetting" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet generates an object that represents resiliency settings if you specify the *PassThru* parameter.
examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\>Set-ResiliencySetting -Name "Mirror" -StoragePool (Get-StoragePool -FriendlyName "CompanyData") -NumberofColumnsDefault 8 -NumberofDataCopies 2
    ```

    This example sets the default number of columns to eight on virtual disks that use the Mirror setting, with the number of data copies set to two, indicating a two-way mirror, instead of a three-way mirror.
    The command uses the Get-StoragePool cmdlet to obtain the storage pool that has the friendly name CompanyData as a value for the *StoragePool* parameter.
    A two-way mirror with eight columns requires 16 physical disks to create.
