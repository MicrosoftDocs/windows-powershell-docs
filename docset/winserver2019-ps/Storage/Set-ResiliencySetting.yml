### YamlMime:PowerShellCmdlet1
uid: Storage.Set-ResiliencySetting
name: Set-ResiliencySetting
module: Storage
isPreview: false
summary: |-
  Modifies the properties of the specified resiliency setting name.
description: |-
  The **Set-ResiliencySetting** cmdlet modifies the properties of the specified resiliency setting name.
  For example, the user can specify that when creating any new virtual disk using the resiliency setting named Mirror, that the default interleave value would be 128K, or to define the default number of columns to use when creating a Simple (stripe without parity) virtual disk.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutoNumberOfColumns
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the provider automatically determines the best possible column count for a resiliency setting on a storage pool.
      The value ranges are:

      - Mirror.
      The minimum is two for two-way mirror or three for three-way mirror.
      The maximum is eight times the number of data copies.
      - Parity.
      The minimum is three for single parity and seven for dual parity.
      The maximum is eight for single parity and 17 for dual parity.
      - Simple.
      The minimum is one.
      The maximum is eight.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterleaveDefault
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the default interleave value to use.
      The interleave value represents the number of bytes that is written to a single physical disk.
      Therefore, `Interleave * NumberOfColumns` yields the size of one stripe of user data.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of an object or setting.
      The acceptable values for this parameter are:simple, mirror, or parity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfColumnsDefault
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the default number of columns to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfDataCopiesDefault
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the default number of data copies to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfGroupsDefault
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the default number of groups used by Local Reconstruction Coding (LRC) with a dual parity virtual disk.
      We recommend omitting this parameter and using the defaults.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
