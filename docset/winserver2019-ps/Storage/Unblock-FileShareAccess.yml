syntaxes:
- syntax: |-
    ```Syntax
    Unblock-FileShareAccess
        -Name <String[]>
        -AccountName <String[]>
        [-FileServer <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Unblock-FileShareAccess
        -UniqueId <String[]>
        -AccountName <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Unblock-FileShareAccess
        -InputObject <CimInstance[]>
        -AccountName <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Unblock file share access'
  description: |-
    ```
    PS C:\>Unblock-FileShareAccess -Name "VMFiles" -AccountName "Guest Users"
    Confirm
    Are you sure you want to perform this action?
    Performing operation 'Modify' on Target 'Contoso-SO,VMFiles'.
     [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): Y

    Name                    ScopeName               AccountName             AccessControlType       AccessRight
    ----                    ---------               -----------             -----------------       -----------
    VMFiles                 Contoso-SO              Contoso\Guest           Deny                    Full
    VMFiles                 Contoso-SO              Contoso\Administrator   Allow                   Full
    VMFiles                 Contoso-SO              Contoso\Contoso-HV1$    Allow                   Full
    ```

    This command unblocks access to VMFiles for the Guest Users account.
