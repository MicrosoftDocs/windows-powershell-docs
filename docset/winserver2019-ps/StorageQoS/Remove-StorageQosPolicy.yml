syntaxes:
- syntax: |-
    ```Syntax
    Remove-StorageQosPolicy
        -Name <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-StorageQosPolicy
        -PolicyId <Guid[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-StorageQosPolicy
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove a Storage QoS policy'
  description: |-
    ```
    PS C:\>Get-StorageQosPolicy -Name "Policy02" | Remove-StorageQosPolicy



    Confirm

    Are you sure you want to perform this action?

    Performing the operation "DeletePolicy" on target "MSFT_StorageQoSPolicy (PolicyId =

    "9db17c75-7c2e-470d-a9a3-b0cf8795babf")".

    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): y
    ```

    This command removes a policy named Policy02.
