### YamlMime:PowerShellCmdlet1
uid: TLS.Get-TlsEccCurve
name: Get-TlsEccCurve
module: TLS
isPreview: false
summary: |-
  Gets the list of Elliptic Curve Cryptography (ECC) cipher suites available for TLS for a computer.
description: |-
  Gets the list of Elliptic Curve Cryptography (ECC) cipher suites available for TLS for a computer.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the ECC curve to get. The cmdlet gets ECC curves that match the string that
      this cmdlet specifies, so you can specify a partial name. This parameter is case-sensitive.
    aliases:
    - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-TlsEccCurve
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all ECC curves'
  description: |-
    ```powershell
    Get-TlsEccCurve
    ```

    ```output
    curve25519
    NistP256
    NistP384
    ```

    This command gets all ECC curves for the computer.
- title: 'Example 2: Get the ECC curves that match a string'
  description: |-
    ```powershell
    Get-TlsEccCurve -Name 'Nist'
    ```

    ```output
    NistP256
    NistP384
    ```

    This command gets all the ECC curves that have names that contain the string 'Nist'
    (case-sensitive).
