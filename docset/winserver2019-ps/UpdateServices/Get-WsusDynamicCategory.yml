syntaxes:
- syntax: |-
    ```Syntax
    Get-WsusDynamicCategory
        [-UpdateServer <IUpdateServer>]
        [-DynamicCategoryTypeFilter <DynamicCategoryType>]
        [-First <Int64>]
        [-Skip <Int64>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Filter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WsusDynamicCategory
        -DynamicCategoryType <DynamicCategoryType>
        -Name <String>
        [-UpdateServer <IUpdateServer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
