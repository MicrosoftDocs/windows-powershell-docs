syntaxes:
- syntax: |-
    ```Syntax
    Get-UalDailyAccess
        [-ProductName <String[]>]
        [-RoleName <String[]>]
        [-RoleGuid <String[]>]
        [-TenantIdentifier <String[]>]
        [-IPAddress <String[]>]
        [-Username <String[]>]
        [-AccessDate <DateTime[]>]
        [-AccessCount <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get daily access for specific IP address'
  description: |-
    ```
    PS C:\>Get-UalDailyAccess -IPAddress 10.17.44.6

    AccessCount      : 2

    AccessDate       : 9/19/2012

    IPAddress        : 10.17.44.6

    UserName         : western\_sersvc

    TenantIdentifier : 00000000-0000-0000-0000-000000000000

    ProductName      : Windows Server 2012 Datacenter

    RoleGuid         : 10a9226f-50ee-49d8-a393-9a501d47ce04

    RoleName         : File Server

    PSComputerName   :



    AccessCount      : 2

    AccessDate       : 9/26/2012

    IPAddress        : 10.17.44.6

    UserName         : western\_sersvc

    TenantIdentifier : 00000000-0000-0000-0000-000000000000

    ProductName      : Windows Server 2012 Datacenter

    RoleGuid         : 10a9226f-50ee-49d8-a393-9a501d47ce04

    RoleName         : File Server

    PSComputerName   :
    ```

    This command gets UAL daily access requests for a client with the specified IP address.
    This request returns two client request objects.
