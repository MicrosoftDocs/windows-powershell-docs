syntaxes:
- syntax: |-
    ```Syntax
    Get-UalDeviceAccess
        [-ProductName <String[]>]
        [-RoleName <String[]>]
        [-RoleGuid <String[]>]
        [-TenantIdentifier <String[]>]
        [-IPAddress <String[]>]
        [-ActivityCount <UInt32[]>]
        [-FirstSeen <DateTime[]>]
        [-LastSeen <DateTime[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get access information for a specified device'
  description: |-
    ```
    PS C:\>Get-UalDeviceAccess -IPAddress "10.17.44.6"
    ActivityCount    : 45

    FirstSeen        : 8/25/2012 4:37:23 PM

    IPAddress        : 10.17.44.6

    LastSeen         : 9/1/2012 9:30:09 PM

    ProductName      : Windows Server 2012 Datacenter

    RoleGuid         : 10a9226f-50ee-49d8-a393-9a501d47ce04

    RoleName         : File Server

    TenantIdentifier : 00000000-0000-0000-0000-000000000000

    PSComputerName   :
    ```

    This command gets UAL records for a client device with a specified IP address.
    The results show a single service that the devices accesses for the first time on 8/25/2012 and most recently on 9/1/2012.
