### YamlMime:PowerShellCmdlet1
uid: UserAccessLogging.Get-UalSystemId
name: Get-UalSystemId
module: UserAccessLogging
isPreview: false
summary: |-
  Gets information that can uniquely identify a server.
description: |-
  The **Get-UalSystemId** cmdlet gets information that can uniquely identify a server.
  Use the *CimSession* parameter to run the cmdlet on a remote server.
  Otherwise, the cmdlet refers to the local server.

  This cmdlet returns an **MsftUal_SystemId** object.
  You can specify one or more parameters, such as the *CoresPerPhysicalProcessor* parameter.
  If you do so, the cmdlet only returns an object if it matches the specified value.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CoresPerPhysicalProcessor
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values.
      Each value specifies the number of cores for the physical processor of the system.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreationTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **DateTime** objects.
      Each object is the date and time that the current operating system became operational with this set of system identity properties.
      If the properties of a system change, the operating system creates a new **MsftUal_SystemId** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogicalProcessorsPerPhysicalProcessor
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values.
      Each value specifies the number of logical processors for an instance of a Hyper-Thread capable physical processor in the system.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumMemory
    type: <xref href="UInt64" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values.
      Each value represents the maximum memory size, in bytes, for the system.
      For a virtual machine, this value represents the memory size of the virtual machine as configured by the hypervisor.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OSBuildNumber
