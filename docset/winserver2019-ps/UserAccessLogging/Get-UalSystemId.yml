    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OSDaylightInEffect
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of Boolean values.
      If a value is $True, daylight saving time is in effect.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OSLastBootUpTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **DateTime** objects.
