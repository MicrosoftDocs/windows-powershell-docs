    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values.
      Each value represents an operating system product type.
      The acceptable values for this parameter are:

      - 1 - Standard Edition of a server product.
      - 2 - Enterprise Edition of a server product.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
