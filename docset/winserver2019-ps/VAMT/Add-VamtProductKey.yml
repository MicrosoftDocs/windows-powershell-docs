### YamlMime:PowerShellCmdlet1
uid: VAMT.Add-VamtProductKey
name: Add-VamtProductKey
module: VAMT
isPreview: false
summary: |-
  Adds the user-specified product key to a VAMT database.
description: |-
  The **Add-VamtProductKey** cmdlet adds the user-specified product key to a dep_firstref_vamt database.
  If a list of product keys must be added to a dep_nextref_vamt database, you can use this cmdlet in a script to add the product keys.
parameters:
  cmdletParameters:
  - name: DbCommandTimeout
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Indicates how long dep_nextref_vamt waits for a response from the database before timing out.
      The default value is 30 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DbConnectionString
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the database that the product key is added to.
      If no database connection string is provided, dep_nextref_vamt attempts to use the database that the dep_nextref_vamt user console used on the local computer.
      If dep_nextref_vamt does not find a database, it returns an error.
      You can find the connection string in the dep_nextref_vamt UI in the Preferences dialog box.
      On the menu bar, click View, and then click Preferences to open the Volume Activation Management Tool Preferences dialog box.
      The connection string is in the Database Settings section under Current connection string.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProductKey
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the product key to be added to the dep_nextref_vamt database.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-VamtProductKey
        -ProductKey <String>
        [-DbConnectionString <String>]
        [-DbCommandTimeout <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a product key to a database'
  description: |-
    ```
    PS C:\> add-vamtproductkey -ProductKey "12345-456789-12345-456789-12345" -DbConnectionString "data source=.\adk;initial catalog=test;integrated security=true;multipleactiveresultsets=true"
    ```

    This command adds a product key to the specified dep_nextref_vamt database.
