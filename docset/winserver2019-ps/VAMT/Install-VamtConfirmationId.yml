  cmdletParameters:
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides a password for password-protected environments.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Products
    type: <xref href="Product" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the product or products to install the CIDs on during the proxy activation process.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Username
    type: <xref href="String" data-throw-if-not-resolved="False" />
