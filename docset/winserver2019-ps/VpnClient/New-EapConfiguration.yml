syntaxes:
- syntax: |-
    ```Syntax
    New-EapConfiguration
        [-UseWinlogonCredential]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EapMsChapv2Auth
  isDefault: true
- syntax: |-
    ```Syntax
    New-EapConfiguration
        [[-TunneledEapAuthMethod] <XmlDocument>]
        [-UseWinlogonCredential]
        [-Ttls]
        [-TunneledNonEapAuthMethod <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EapTtlsAuth
  isDefault: false
- syntax: |-
    ```Syntax
    New-EapConfiguration
        [-Tls]
        [-UserCertificate]
        [-VerifyServerIdentity]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EapTlsAuth
  isDefault: false
- syntax: |-
    ```Syntax
    New-EapConfiguration
