syntaxes:
- syntax: |-
    ```Syntax
    Remove-VpnConnectionTriggerTrustedNetwork
        [-ConnectionName] <String>
        [-DnsSuffix] <String[]>
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
