### YamlMime:PowerShellCmdlet1
uid: VpnClient.Set-VpnConnectionIPsecConfiguration
name: Set-VpnConnectionIPsecConfiguration
module: VpnClient
isPreview: false
summary: |-
  Sets the IPsec parameters of a VPN connection.
description: |-
  The **Set-VpnConnectionIpsecConfiguration** cmdlet sets the IPsec parameters of a VPN connection.
  The settings apply only to IKEv2 and L2TP VPN connections.
parameters:
  cmdletParameters:
  - name: AllUserConnection
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the VPN connection being modified is in the global phone book.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthenticationTransformConstants
    type: <xref href="AuthenticationTransformConstants" data-throw-if-not-resolved="False" />
    description: |-
      Specifies authentication header (AH) transform in the IPsec policy.
      For more information, see the Set-VpnServerIPsecConfiguration cmdlet.
      The acceptable values for this parameter are:

      - MD596
      - SHA196
      - SHA256128
      - GCMAES128
      - GCMAES192
      - GCMAES256
      - None
    acceptedValues:
    - MD596
    - SHA196
    - SHA256128
    - GCMAES128
    - GCMAES192
    - GCMAES256
    - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CipherTransformConstants
    type: <xref href="CipherTransformConstants" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Encapsulating Security Payload (ESP) cipher transform in the IPsec policy.
      Acceptable values for this parameter are:

      - DES
      - DES3
      - AES128
      - AES192
      - AES256
      - GCMAES128
      - GCMAES192
      - GCMAES256
      - None
    acceptedValues:
    - DES
    - DES3
    - AES128
    - AES192
    - AES256
    - GCMAES128
    - GCMAES192
    - GCMAES256
    - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
