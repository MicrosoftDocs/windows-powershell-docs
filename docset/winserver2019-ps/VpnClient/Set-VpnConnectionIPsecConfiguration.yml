      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DHGroup
    type: <xref href="DHGroup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Diffie-Hellman (DH) Group to use during IKE key exchanges.
      The acceptable values for this parameter are:

      - None
      - Group1
      - Group2
      - Group14
      - ECP256
      - ECP384
      - Group24
    acceptedValues:
    - None
    - Group1
    - Group2
    - Group14
    - ECP256
    - ECP384
    - Group24
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: "4"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptionMethod
    type: <xref href="EncryptionMethod" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the encryption method.
      The acceptable values for this parameter are:

      - DES
      - DES3
      - AES128
      - AES192
      - AES256
      - GCMAES128
      - GCMAES256
    acceptedValues:
    - DES
    - DES3
    - AES128
    - AES192
    - AES256
    - GCMAES128
    - GCMAES256
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
