    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IntegrityCheckMethod
    type: <xref href="IntegrityCheckMethod" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the integrity check method used to protect data from tampering.
      The acceptable values for this parameter are:

      - MD5
      - SHA1
      - SHA256
      - SHA384
    acceptedValues:
    - MD5
    - SHA1
    - SHA256
    - SHA384
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: "6"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
      If you specify this parameter, the cmdlet returns the **VpnConnection** object that contains the **VpnConnection** configuration settings.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CustomPolicy
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfsGroup
    type: <xref href="PfsGroup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Perfect Forwarding Secrecy (PFS) Group in the IPsec policy.
      The acceptable values for this parameter are:

