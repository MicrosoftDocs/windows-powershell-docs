syntaxes:
- syntax: |-
    ```Syntax
    Export-WdsInstallImage
        -Destination <String>
        [-NewImageName <String>]
        [-NewDescription <String>]
        [-Append]
        [-Force]
        -ImageName <String>
        [-ImageGroup <String>]
        [-FileName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_WdsInstallImage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Export an image'
  description: |-
    ```
    PS C:\> Export-WdsInstallImage -Append -Destination "D:\images\exported.wim" -ImageName "Windows Latest with LOB apps" -FileName "install-3.wim" -ImageGroup "Fabrikam Latest Images" -NewImageName "Fabrikam Latest"
    ```

    This command exports an image and appends the image to an existing file, if it exists.
