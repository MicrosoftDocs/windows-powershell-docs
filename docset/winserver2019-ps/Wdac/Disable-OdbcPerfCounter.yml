syntaxes:
- syntax: |-
    ```Syntax
    Disable-OdbcPerfCounter
        [-InputObject] <CimInstance[]>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-OdbcPerfCounter
        [[-Platform] <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Platform
  isDefault: false
