### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Disable-WebCentralCertProvider
name: Disable-WebCentralCertProvider
module: WebAdministration
isPreview: false
summary: |-
  Takes the central certificate provider offline.
description: |-
  The **Disable-WebCentralCertProvider** cmdlet takes the central certificate provider offline.
  Use the [Set-WebCentralCertProvider](./Set-WebCentralCertProvider.yml) cmdlet to re-enable the provider.
syntaxes:
- syntax: |-
    ```Syntax
    Disable-WebCentralCertProvider
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Disable the central certificate provider'
  description: |-
    ```
    PS C:\> Disable-WebCentralCertProvider
    ```

    This command takes the central certificate provider offline.
