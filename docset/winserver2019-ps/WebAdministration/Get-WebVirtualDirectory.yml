### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebVirtualDirectory
name: Get-WebVirtualDirectory
module: WebAdministration
isPreview: false
summary: |-
  Gets a list of the virtual directories on the specified site.
description: |-
  The **Get-WebVirtualDirectory** cmdlet gets a list of the virtual directories on the specified site.
parameters:
  cmdletParameters:
  - name: Application
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a web application associated with virtual directories to return.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a virtual directory that this cmdlet returns.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Site
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site for which this cmdlet returns a list of virtual directories.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebVirtualDirectory
        [-Site <String>]
        [-Application <String>]
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Getting a virtual directory'
  description: |-
    ```
    IIS:\> Get-WebVirtualDirectory -Site "Default Web Site" -Application "TestApp"
    ```

    This command returns the list of virtual directories on the default website on which the application named TestApp is configured.
