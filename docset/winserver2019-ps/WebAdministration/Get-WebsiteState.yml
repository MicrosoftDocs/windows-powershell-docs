### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebsiteState
name: Get-WebsiteState
module: WebAdministration
isPreview: false
summary: |-
  Gets the state of an IIS website.
description: |-
  The **Get-WebsiteState** cmdlet gets the state of an Internet Information Services (IIS) website.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the website about which this cmdlet gets information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebsiteState
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the state of a website'
  description: |-
    ```
    IIS:\> Get-WebsiteState -Name "Default Web Site"
    Value
    -----
    Started
    ```

    This command returns the state of the default website.
