### YamlMime:PowerShellCmdlet1
uid: WebAdministration.New-WebGlobalModule
name: New-WebGlobalModule
module: WebAdministration
isPreview: false
summary: |-
  Creates an IIS global module.
description: |-
  The **New-WebGlobalModule** cmdlet creates an Internet Information Services (IIS) global module.
parameters:
  cmdletParameters:
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the creation of the new module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Image
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a DLL image file (native modules only) for the new module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the new module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Precondition
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies any preconditions to be used for the new module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-WebGlobalModule
        [-Name] <String>
        [-Image <String>]
        [-Precondition <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a new module'
  description: |-
    ```
    IIS:\> New-WebGlobalModule -Name "testGlobalModule" -Image "c:\test\test.dll"
    ```

    This command adds a new module to the global Modules list.
