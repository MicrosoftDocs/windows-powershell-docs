syntaxes:
- syntax: |-
    ```Syntax
    New-WebManagedModule
        [-Name] <String>
        [-Type <String>]
        [-Precondition <String>]
        [-Force]
        [-Location <String[]>]
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a new managed module to the default website'
  description: |-
    ```
    IIS:\> New-WebManagedModule -Name "ContosoModule" -Type "Contoso.MyModule"
    ```

    This command adds a new module named ContosoModule to the default website.
