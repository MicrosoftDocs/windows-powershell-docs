### YamlMime:PowerShellCmdlet1
uid: WebAdministration.New-WebVirtualDirectory
name: New-WebVirtualDirectory
module: WebAdministration
isPreview: false
summary: |-
  Creates a virtual directory in IIS.
description: |-
  The **New-WebVirtualDirectory** cmdlet creates a virtual directory in Internet Information Services (IIS).
parameters:
  cmdletParameters:
  - name: Application
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a web application under which this cmdlet creates the virtual directory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the new virtual directory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical path to the folder in which this cmdlet creates the virtual directory.
      The specified folder must already exist.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Site
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site under which this cmdlet creates the virtual directory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-WebVirtualDirectory
        [-Site <String>]
        [-Application <String>]
        [-Name] <String>
        [-PhysicalPath <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create a virtual directory'
  description: |-
    ```
    IIS:\> New-WebVirtualDirectory -Site "Default Web Site" -Name "ContosoVDir" -PhysicalPath "c:\inetpub\contoso"
    ```

    This command creates a virtual directory named ContosoVDir on the default website.
