syntaxes:
- syntax: |-
    ```Syntax
    Remove-WBVirtualMachine
        [-Policy] <WBPolicy>
        [[-VirtualMachine] <WBVirtualMachine[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WBVirtualMachine
