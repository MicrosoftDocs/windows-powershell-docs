syntaxes:
- syntax: |-
    ```Syntax
    Register-IscsiSession
        -SessionIdentifier <String[]>
        [-IsMultipathEnabled <Boolean>]
        [-ChapUsername <String>]
        [-ChapSecret <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: BySessionIdentifier
  isDefault: true
- syntax: |-
    ```Syntax
    Register-IscsiSession
        -InputObject <CimInstance[]>
        [-IsMultipathEnabled <Boolean>]
        [-ChapUsername <String>]
        [-ChapSecret <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
