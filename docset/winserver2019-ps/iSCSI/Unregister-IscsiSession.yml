syntaxes:
- syntax: |-
    ```Syntax
    Unregister-IscsiSession
        -SessionIdentifier <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: BySessionIdentifier
  isDefault: true
- syntax: |-
    ```Syntax
    Unregister-IscsiSession
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
