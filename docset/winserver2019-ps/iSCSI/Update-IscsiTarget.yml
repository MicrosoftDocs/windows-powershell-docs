    description: |-
      Accepts a MSFT iSCSI target portal object as an input.
      The MSFT iSCSI target portal object is output from the **Get-IscsiTargetPortal** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
