syntaxes:
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        [-NodeAddress <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByNodeAddress
  isDefault: true
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        [-IscsiConnection <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByiSCSIConnection
  isDefault: false
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        [-IscsiSession <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByiSCSISession
  isDefault: false
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        [-IscsiTargetPortal <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByiSCSITargetPortal
  isDefault: false
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        [-InitiatorPort <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByInitiatorPort
  isDefault: false
- syntax: |-
    ```Syntax
    Update-IscsiTarget
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_InitiatorPort" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
