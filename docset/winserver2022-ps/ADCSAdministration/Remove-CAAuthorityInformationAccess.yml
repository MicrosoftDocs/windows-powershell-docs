syntaxes:
- syntax: |-
    ```Syntax
    Remove-CAAuthorityInformationAccess
        [-Uri] <String>
        [-AddToCertificateAia]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveAsAIA
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-CAAuthorityInformationAccess
        [-Uri] <String>
        [-AddToCertificateOcsp]
