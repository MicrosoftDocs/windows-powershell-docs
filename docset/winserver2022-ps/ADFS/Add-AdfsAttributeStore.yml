syntaxes:
- syntax: |-
    ```Syntax
    Add-AdfsAttributeStore
        -Name <String>
        -StoreType <String>
        -Configuration <Hashtable>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Predefined
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AdfsAttributeStore
        -Name <String>
        -TypeQualifiedName <String>
