syntaxes:
- syntax: |-
    ```Syntax
    Add-AdfsWebApplicationProxyRelyingPartyTrust
        [-Name] <String>
        [-Identifier] <String[]>
        [-AlwaysRequireAuthentication]
        [-Enabled <Boolean>]
        [-AccessControlPolicyName <String>]
        [-AccessControlPolicyParameters <Object>]
        [-AdditionalAuthenticationRules <String>]
        [-AdditionalAuthenticationRulesFile <String>]
        [-NotBeforeSkew <Int32>]
        [-Notes <String>]
        [-PassThru]
        [-TokenLifetime <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a relying party trust'
  description: |-
    ```
    PS C:\> Add-AdfsWebApplicationProxyRelyingPartyTrust
    ```

    This command adds the Web Application Proxy relying party trust.
    When you first deploy the Web Application Proxy role service, the trust exists by default.
    Use this example only if you deleted the Web Application Proxy relying party trust.
