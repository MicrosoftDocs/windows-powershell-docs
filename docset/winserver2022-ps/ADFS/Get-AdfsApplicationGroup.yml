### YamlMime:PowerShellCmdlet1
uid: ADFS.Get-AdfsApplicationGroup
name: Get-AdfsApplicationGroup
module: ADFS
isPreview: false
summary: |-
  Gets an application group.
description: |-
  The **Get-AdfsApplicationGroup** cmdlet gets an Active Directory Federation Services (AD FS) application group.
parameters:
  cmdletParameters:
  - name: ApplicationGroup
    type: <xref href="ApplicationGroup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an application group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ApplicationGroupObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ApplicationGroupIdentifier
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the ID of an application group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ApplicationGroupIdentifier
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of application groups.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Name
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
