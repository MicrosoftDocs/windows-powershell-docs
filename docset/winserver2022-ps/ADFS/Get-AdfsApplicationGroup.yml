syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsApplicationGroup
        [[-ApplicationGroupIdentifier] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationGroupIdentifier
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AdfsApplicationGroup
        [-Name] <String[]>
        [<CommonParameters>]
    ```
