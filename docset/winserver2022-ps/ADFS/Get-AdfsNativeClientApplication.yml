syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsNativeClientApplication
        [[-Identifier] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Identifier
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AdfsNativeClientApplication
        [-Name] <String[]>
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AdfsNativeClientApplication
        [-Application] <NativeClientApplication>
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AdfsNativeClientApplication
        [-ApplicationGroupIdentifier] <String>
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationGroupIdentifier
  isDefault: false
- syntax: |-
    ```Syntax
