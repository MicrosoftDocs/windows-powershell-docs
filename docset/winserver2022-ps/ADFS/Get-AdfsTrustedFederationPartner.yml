### YamlMime:PowerShellCmdlet1
uid: ADFS.Get-AdfsTrustedFederationPartner
name: Get-AdfsTrustedFederationPartner
module: ADFS
isPreview: false
summary: |-
  Gets a trusted federation partner in AD FS.
description: |-
  The **Get-AdfsTrustedFederationPartner** cmdlet gets federation partners that are trusted by this instance of Active Directory Federation Services (AD FS).
parameters:
  cmdletParameters:
  - name: FederationPartnerHostName
    type: <xref href="Uri" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of URIs of federation partners to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FederationPartnerHostName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of federation partners to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Name
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AdfsTrustedFederationPartner
        [[-Name] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AdfsTrustedFederationPartner
        [-FederationPartnerHostName] <Uri[]>
        [<CommonParameters>]
    ```
  parameterSetName: FederationPartnerHostName
  isDefault: false
