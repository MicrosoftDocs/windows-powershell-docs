### YamlMime:PowerShellCmdlet1
uid: ADFS.New-AdfsAccessControlPolicy
name: New-AdfsAccessControlPolicy
module: ADFS
isPreview: false
summary: |-
  Creates an AD FS access control policy.
description: |-
  The **New-AdfsAccessControlPolicy** cmdlet creates an Active Directory Federation Services (AD FS) access control policy from a policy metadata file.

  **How to create a federation metadata file**

  The federation metadata document is an XML file that is available for [download](/windows-server/identity/ad-fs/operations/offline-tools). To retrieve your document, enter your federation service name, and then select the **Get federation metadata** button.
