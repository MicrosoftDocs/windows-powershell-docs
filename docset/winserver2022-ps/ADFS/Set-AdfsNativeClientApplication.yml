syntaxes:
- syntax: |-
    ```Syntax
    Set-AdfsNativeClientApplication
        [-TargetIdentifier] <String>
        [-Identifier <String>]
        [-Name <String>]
        [-RedirectUri <String[]>]
        [-Description <String>]
        [-LogoutUri <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Identifier
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AdfsNativeClientApplication
        [-TargetName] <String>
        [-Identifier <String>]
        [-Name <String>]
        [-RedirectUri <String[]>]
        [-Description <String>]
        [-LogoutUri <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AdfsNativeClientApplication
        [-TargetApplication] <NativeClientApplication>
        [-Identifier <String>]
        [-Name <String>]
        [-RedirectUri <String[]>]
        [-Description <String>]
        [-LogoutUri <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationObject
  isDefault: false
