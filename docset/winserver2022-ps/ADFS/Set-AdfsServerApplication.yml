    Set-AdfsServerApplication
        [-TargetApplication] <ServerApplication>
        [-Identifier <String>]
        [-Name <String>]
        [-RedirectUri <String[]>]
        [-Description <String>]
        [-ADUserPrincipalName <String>]
        [-JWTSigningCertificate <X509Certificate2[]>]
        [-JWTSigningCertificateRevocationCheck <RevocationSetting>]
        [-ChangeClientSecret]
        [-ResetClientSecret]
        [-JWKSUri <Uri>]
        [-ReloadJWTSigningKeys]
        [-JWKSFile <String>]
        [-LogoutUri <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationObject
  isDefault: false
