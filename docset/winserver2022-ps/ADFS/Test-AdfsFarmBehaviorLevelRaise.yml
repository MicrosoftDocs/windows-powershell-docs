    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Test-AdfsFarmBehaviorLevelRaise
        [-Member <String[]>]
        [-Credential <PSCredential>]
        [-ServiceAccountCredential <PSCredential>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: AdfsUpgradeServiceAccount
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AdfsFarmBehaviorLevelRaise
        [-Member <String[]>]
        [-Credential <PSCredential>]
        [-GroupServiceAccountIdentifier <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: AdfsUpgradeGmsaAccount
  isDefault: false
examples:
- title: 'Example 1: Test raising the farm behavior level'
  description: |-
    ```
    PS C:\> Test-AdfsFarmBehaviorLevelRaise
    ```

    This command tests whether you can raise the farm behavior level.
