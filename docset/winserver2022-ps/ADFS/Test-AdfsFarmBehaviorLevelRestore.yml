syntaxes:
- syntax: |-
    ```Syntax
    Test-AdfsFarmBehaviorLevelRestore
        [-Member <String[]>]
        [-Credential <PSCredential>]
        -FarmBehavior <Int32>
        [-Force]
        [<CommonParameters>]
    ```
