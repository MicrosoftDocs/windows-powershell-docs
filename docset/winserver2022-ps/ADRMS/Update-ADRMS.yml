syntaxes:
- syntax: |-
    ```Syntax
    Update-ADRMS
        [-ServiceAccount] <PSCredential>
        [[-PrivateKeyPassword] <SecureString>]
        [[-NewCspName] <String>]
        [-UpdateCryptographicModeOnly]
        [-Credential <PSCredential>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
