syntaxes:
- syntax: |-
    ```Syntax
    Get-RmsRequestInfo
        -RequestId <Int64>
        [-Path] <String[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
