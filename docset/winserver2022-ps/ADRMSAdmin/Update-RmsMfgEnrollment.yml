syntaxes:
- syntax: |-
    ```Syntax
    Update-RmsMfgEnrollment
        [-TokenCert]
        [-SigningCert]
        [-SetCertificatePermissions]
        [-Force]
        [-GetDefaultCertificate]
        [-CertificateThumbprint <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
