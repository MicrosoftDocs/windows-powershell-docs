### YamlMime:PowerShellCmdlet1
uid: ActiveDirectory.Get-ADReplicationFailure
name: Get-ADReplicationFailure
module: ActiveDirectory
isPreview: false
summary: |-
  Returns a collection of data describing an Active Directory replication failure.
description: |-
  The **Get-ADReplicationFailure** cmdlet returns all failures currently associated with a given domain controller or Active Directory Lightweight Directory Services (AD LDS) instance.
  The return object is of type **ADReplicationFailure**.
  This cmdlet returns the list of failures in the **ADReplicationSummary** object for a specific server.
parameters:
  cmdletParameters:
  - name: AuthType
    type: <xref href="ADAuthType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication method to use.
      The acceptable values for this parameter are:

      - Negotiate or 0
      - Basic or 1

      The default authentication method is Negotiate.

      A Secure Sockets Layer (SSL) connection is required for the Basic authentication method.
    acceptedValues:
    - Negotiate
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user account that has permission to perform this action.
      The default is the current user.

      Type a user name, such as User01 or Domain01\User01, or enter a **PSCredential** object, such as one generated by the **Get-Credential** cmdlet.
      If you type a user name, you will be prompted for a password.

      This parameter is not supported by any providers installed with Windows PowerShell.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnumeratingServer
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Active Directory Domain Services (AD DS) instance to connect to, by providing one of the following values for a corresponding domain name or directory server.
      The service may be any of the following: Active Directory Lightweight Domain Services (AD LDS), AD DS, or Active Directory snapshot instance.

      Specify the instance in one of the following ways:

      Domain name values:

      - Fully qualified domain name
      - NetBIOS name

      Directory server values:

      - Fully qualified directory server name
      - NetBIOS name
      - Fully qualified directory server name and port

      The default value for this parameter is determined by one of the following methods in the order that they are listed:

      - By using the *Server* value from objects passed through the pipeline
      - By using the server information associated with the AD DS Windows PowerShell provider drive, when the cmdlet runs in that drive
      - By using the domain of the computer running Windows PowerShell
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a filter in the provider's format or language.
      The value of this parameter qualifies the *Path* parameter.
      The syntax of the filter, including the use of wildcards, depends on the provider.
      Filters are more efficient than other parameters, because the provider applies them when retrieving the objects, rather than having Windows PowerShell filter the objects after they are retrieved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="ADScopeType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of object used as input by the *Target* parameter.
      The acceptable values for this parameter are:

      - Server
      - Site
      - Domain
      - Forest
    acceptedValues:
    - Server
    - Domain
    - Forest
    - Site
    aliases:
    - ReplicationSite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scope
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Target
    type: <xref href="Object" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies either one or more (using a comma separated list) of Active Directory domain controllers, sites, domains, or forests.
      It returns results for all the domain controllers that are specified or that are part of the specified container.
    aliases:
    - Name
    - HostName
    - Site
    - Domain
    - Forest
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Target
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ADReplicationFailure
        [-Target] <Object[]>
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-EnumeratingServer <String>]
        [-Filter <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Target
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ADReplicationFailure
        [-Scope] <ADScopeType>
        [[-Target] <Object[]>]
        [-AuthType <ADAuthType>]
        [-Credential <PSCredential>]
        [-EnumeratingServer <String>]
        [-Filter <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Scope
  isDefault: false
inputs:
- name: <xref href="Microsoft.ActiveDirectory.Management.ADDirectoryServer" data-throw-if-not-resolved="False" />
  description: |-
    A class structure that contains one or more Active Directory server objects.
outputs:
- name: <xref href="Microsoft.ActiveDirectory.Management.ADReplicationFailure" data-throw-if-not-resolved="False" />
  description: |-
    A class structure that represents Active Directory replication failure objects.
examples:
- title: 'Example 1: Get replication failure data for a domain controller'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target corp-DC01
    ```

    This command gets a collection of data that describes an Active Directory replication failure for corp-DC01.
- title: 'Example 2: Get replication failure data for a server'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target corp-DC01 -Scope Server
    ```

    This command gets a collection of data that describes an Active Directory replication failure from corp-DC01.
- title: 'Example 3: Get replication failure data for multiple domain controllers'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target corp-DC01,corp-DC02
    ```

    This command gets a collection of data describing an Active Directory replication failure from corp-DC01 and corp-DC02.
- title: 'Example 4: Get replication failure data for a site'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target NorthAmerica -Scope Site
    ```

    This command gets a collection of data describing Active Directory replication failures from all the domain controllers in the site NorthAmerica.
- title: 'Example 5: Get replication failure data for all domain controllers in a domain'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target "corp.contoso.com" -Scope Domain
    ```

    This command gets a collection of data describing Active Directory replication failures from all the domain controllers in the domain corp.contoso.com.
- title: 'Example 6: Get replication failure data for all domain controllers in a forest'
  description: |-
    ```
    PS C:\> Get-ADReplicationFailure -Target "corp.contoso.com" -Scope Forest
    ```

    This command gets a collection of data describing Active Directory replication failures from all the domain controllers in the forest corp.contoso.com.
