syntaxes:
- syntax: |-
    ```Syntax
    New-ADUser
        [-AccountExpirationDate <DateTime>]
        [-AccountNotDelegated <Boolean>]
        [-AccountPassword <SecureString>]
        [-AllowReversiblePasswordEncryption <Boolean>]
        [-AuthenticationPolicy <ADAuthenticationPolicy>]
        [-AuthenticationPolicySilo <ADAuthenticationPolicySilo>]
        [-AuthType <ADAuthType>]
        [-CannotChangePassword <Boolean>]
        [-Certificates <X509Certificate[]>]
        [-ChangePasswordAtLogon <Boolean>]
        [-City <String>]
        [-Company <String>]
        [-CompoundIdentitySupported <Boolean>]
        [-Country <String>]
        [-Credential <PSCredential>]
        [-Department <String>]
        [-Description <String>]
        [-DisplayName <String>]
        [-Division <String>]
        [-EmailAddress <String>]
        [-EmployeeID <String>]
        [-EmployeeNumber <String>]
        [-Enabled <Boolean>]
        [-Fax <String>]
        [-GivenName <String>]
        [-HomeDirectory <String>]
        [-HomeDrive <String>]
        [-HomePage <String>]
        [-HomePhone <String>]
        [-Initials <String>]
        [-Instance <ADUser>]
        [-KerberosEncryptionType <ADKerberosEncryptionType>]
        [-LogonWorkstations <String>]
        [-Manager <ADUser>]
        [-MobilePhone <String>]
        [-Name] <String>
        [-Office <String>]
        [-OfficePhone <String>]
        [-Organization <String>]
        [-OtherAttributes <Hashtable>]
        [-OtherName <String>]
        [-PassThru]
        [-PasswordNeverExpires <Boolean>]
        [-PasswordNotRequired <Boolean>]
        [-Path <String>]
        [-POBox <String>]
        [-PostalCode <String>]
        [-PrincipalsAllowedToDelegateToAccount <ADPrincipal[]>]
        [-ProfilePath <String>]
        [-SamAccountName <String>]
        [-ScriptPath <String>]
        [-Server <String>]
        [-ServicePrincipalNames <String[]>]
        [-SmartcardLogonRequired <Boolean>]
        [-State <String>]
        [-StreetAddress <String>]
        [-Surname <String>]
        [-Title <String>]
        [-TrustedForDelegation <Boolean>]
        [-Type <String>]
        [-UserPrincipalName <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None or Microsoft.ActiveDirectory.Management.ADUser" data-throw-if-not-resolved="False" />
  description: |-
    A user object that is a template for the new user object is received by the **Instance** parameter.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    By default, this cmdlet does not generate any output.
- name: <xref href="Microsoft.ActiveDirectory.Management.ADUser" data-throw-if-not-resolved="False" />
  description: |-
    Returns the new user object when the **PassThru** parameter is specified.
examples:
- title: 'Example 1: Create a user with an imported certificate'
  description: |-
    ```powershell
    $splat = @{
        Name = 'ChewDavid'
        Certificate = (New-Object System.Security.Cryptography.X509Certificates.X509Certificate -ArgumentList 'Export.cer')
    }
    New-ADUser @splat
    ```

    This command creates a user named `ChewDavid` with a certificate imported from the file `Export.cer`.
- title: 'Example 2: Create a user and set properties'
  description: |-
    ```powershell
    New-ADUser -Name 'ChewDavid' -OtherAttributes @{
        'title'='director'
        'mail'='chewdavid@fabrikam.com'
    }
    ```

    This command creates a new user named ChewDavid and sets the **title** and **mail** properties on
    the new object.
- title: 'Example 3: Create an inetOrgPerson user'
  description: |-
    ```powershell
    New-ADUser -Name 'ChewDavid' -Type iNetOrgPerson -Path 'DC=AppNC' -Server lds.Fabrikam.com:50000
    ```

    This command creates an **inetOrgPerson**-class user named ChewDavid on an AD LDS instance.
- title: 'Example 4: Create a user and set password'
  description: |-
    ```powershell
    $splat = @{
        Name = 'ChewDavid'
        AccountPassword = (Read-Host -AsSecureString 'AccountPassword')
        Enabled = $true
    }
    New-ADUser @splat
    ```

    This command creates a new user named ChewDavid and sets the account password.
