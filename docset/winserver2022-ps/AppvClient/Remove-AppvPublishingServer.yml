syntaxes:
- syntax: |-
    ```Syntax
    Remove-AppvPublishingServer
        [-ServerId] <UInt32>
        [<CommonParameters>]
    ```
  parameterSetName: ByServerId
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AppvPublishingServer
        [-Server] <AppvPublishingServer>
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AppvPublishingServer
        [[-Name] <String>]
