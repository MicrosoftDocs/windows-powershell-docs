syntaxes:
- syntax: |-
    ```Syntax
    Stop-AppvClientConnectionGroup
        [-GroupId] <Guid>
        [-VersionId] <Guid>
        [-Global]
        [<CommonParameters>]
    ```
  parameterSetName: ByGuid
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AppvClientConnectionGroup
        [-Name] <String>
        [-Global]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AppvClientConnectionGroup
        [-ConnectionGroup] <AppvClientConnectionGroup>
        [-Global]
        [<CommonParameters>]
