syntaxes:
- syntax: |-
    ```Syntax
    Enable-SbecAutologger
        -Path <String[]>
        [-Logger <String[]>]
        [-PermLogger <String[]>]
        [-NoDefaultLoggers]
        [-ForceLogger]
        [-DismLogPath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Offline
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecAutologger
        -ComputerName <String[]>
        [-Credential <PSCredential>]
        [-Logger <String[]>]
        [-PermLogger <String[]>]
        [-NoDefaultLoggers]
        [-ForceLogger]
        [<CommonParameters>]
    ```
  parameterSetName: Online
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecAutologger
        -Session <PSSession[]>
        [-Logger <String[]>]
        [-PermLogger <String[]>]
        [-NoDefaultLoggers]
        [-ForceLogger]
        [<CommonParameters>]
    ```
  parameterSetName: OnlineSession
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecAutologger
        [-Local]
        [-SystemHive <String>]
        [-ControlSet <String>]
        [-Logger <String[]>]
        [-PermLogger <String[]>]
        [-NoDefaultLoggers]
        [-ForceLogger]
        [<CommonParameters>]
    ```
  parameterSetName: Local
  isDefault: false
