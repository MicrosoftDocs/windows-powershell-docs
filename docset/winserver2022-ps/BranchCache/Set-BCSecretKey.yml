syntaxes:
- syntax: |-
    ```Syntax
    Set-BCSecretKey
        [[-Passphrase] <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
