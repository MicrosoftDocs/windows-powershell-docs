syntaxes:
- syntax: |-
    ```Syntax
    Set-DfsnFolder
        [-Path] <String>
        [[-EnableInsiteReferrals] <Boolean>]
        [-EnableTargetFailback]<Boolean>]
        [[-State] <State>]
        [[-TimeToLiveSec] <UInt32>]
        [[-Description] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
