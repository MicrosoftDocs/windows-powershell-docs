syntaxes:
- syntax: |-
    ```Syntax
    Set-DfsnRootTarget
        [-Path] <String>
        [-TargetPath] <String>
        [[-State] <State>]
        [[-ReferralPriorityClass] <ReferralPriorityClass>]
        [[-ReferralPriorityRank] <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
