syntaxes:
- syntax: |-
    ```Syntax
    Remove-DfsrMember
        [-GroupName] <String[]>
        [-ComputerName] <String[]>
        [-Force]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.DistributedFileSystemReplication.DfsReplicationGroup" data-throw-if-not-resolved="False" />
