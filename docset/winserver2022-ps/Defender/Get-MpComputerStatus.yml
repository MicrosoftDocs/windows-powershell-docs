### YamlMime:PowerShellCmdlet1
uid: Defender.Get-MpComputerStatus
name: Get-MpComputerStatus
module: Defender
isPreview: false
summary: |-
  Gets the status of antimalware software on the computer.
description: |-
  The `Get-MpComputerStatus` cmdlet gets the status of antimalware software installed on the
  computer.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.

      The cmdlet immediately returns an object that represents the job and then displays the command
      prompt. You can continue to work in the session while the job completes. To manage the job, use the
      `*-Job` cmdlets. To get the job results, use the
      [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see
      [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967)
      or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-MpComputerStatus

        [-AsJob]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
