      **Trojan:Win32/BlueFire** is `3229`.
      - The **ThreatIDDefaultAction_Actions** parameter identifies the action to take on the corresponding
      threat ID. Valid values are:

        • 1 or Clean

        • 2 or Quarantine

        • 3 or Remove

        • 6 or Allow

        • 8 or UserDefined

