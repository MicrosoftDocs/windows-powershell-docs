syntaxes:
- syntax: |-
    ```Syntax
    Add-DhcpServerv6Scope
        [-ValidLifeTime <TimeSpan>]
        [-ComputerName <String>]
        [-Prefix] <IPAddress>
        [-Name] <String>
        [-Description <String>]
        [-State <String>]
        [-Preference <UInt16>]
        [-PreferredLifetime <TimeSpan>]
        [-T1 <TimeSpan>]
        [-T2 <TimeSpan>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
