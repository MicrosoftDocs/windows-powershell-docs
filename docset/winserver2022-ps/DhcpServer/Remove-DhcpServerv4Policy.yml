syntaxes:
- syntax: |-
    ```Syntax
    Remove-DhcpServerv4Policy
        [-ComputerName <String>]
        [-PassThru]
        [-Name] <String[]>
        [[-ScopeId] <IPAddress>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
