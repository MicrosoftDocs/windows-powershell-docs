syntaxes:
- syntax: |-
    ```Syntax
    Remove-DhcpServerv6Reservation
        -IPAddress <IPAddress[]>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IPAddress
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-DhcpServerv6Reservation
        [-Prefix] <IPAddress>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
