syntaxes:
- syntax: |-
    ```Syntax
    Rename-DhcpServerv4Superscope
        [-ComputerName <String>]
        [-Name] <String>
        [-NewName] <String>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DhcpServerv4Superscope" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Rename a superscope'
  description: |-
    ```
    PS C:\> Rename-DhcpServerv4Superscope -Name "Expanded B3 Network" -NewName "Expanded B3-1 Network" -ComputerName "DhcpServer01.Contoso.com"
    ```

    This command renames the superscope named Expanded B3 Network to Expanded B3-1 Network on the DHCP named DhcpServer01.Contoso.com.
