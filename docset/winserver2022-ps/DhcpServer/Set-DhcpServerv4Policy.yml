syntaxes:
- syntax: |-
    ```Syntax
    Set-DhcpServerv4Policy
        [-ComputerName <String>]
        [-Description <String>]
        [-Name] <String>
        [[-ScopeId] <IPAddress>]
        [-Enabled <Boolean>]
        [-MacAddress <String[]>]
        [-Fqdn <String[]>]
        [-UserClass <String[]>]
        [-SubscriberId <String[]>]
        [-NewName <String>]
        [-ClientId <String[]>]
        [-PassThru]
        [-LeaseDuration <TimeSpan>]
        [-ProcessingOrder <UInt16>]
        [-RelayAgent <String[]>]
        [-RemoteId <String[]>]
        [-CircuitId <String[]>]
        [-Condition <String>]
        [-VendorClass <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
