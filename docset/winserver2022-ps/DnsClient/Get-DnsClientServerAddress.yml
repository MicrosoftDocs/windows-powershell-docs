syntaxes:
- syntax: |-
    ```Syntax
    Get-DnsClientServerAddress
        [-InterfaceIndex <UInt32[]>]
        [[-InterfaceAlias] <String[]>]
        [-AddressFamily <AddressFamily[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
