syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsClient
        [-InterfaceAlias] <String[]>
        [-ConnectionSpecificSuffix <String>]
        [-RegisterThisConnectionsAddress <Boolean>]
        [-UseSuffixWhenRegistering <Boolean>]
        [-ResetConnectionSpecificSuffix]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByAlias
  isDefault: true
- syntax: |-
    ```Syntax
    Set-DnsClient
        -InterfaceIndex <UInt32[]>
        [-ConnectionSpecificSuffix <String>]
        [-RegisterThisConnectionsAddress <Boolean>]
        [-UseSuffixWhenRegistering <Boolean>]
        [-ResetConnectionSpecificSuffix]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Set-DnsClient
        -InputObject <CimInstance[]>
        [-ConnectionSpecificSuffix <String>]
        [-RegisterThisConnectionsAddress <Boolean>]
        [-UseSuffixWhenRegistering <Boolean>]
        [-ResetConnectionSpecificSuffix]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
