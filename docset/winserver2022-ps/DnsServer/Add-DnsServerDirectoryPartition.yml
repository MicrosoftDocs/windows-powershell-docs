    ```Syntax
    Add-DnsServerDirectoryPartition
        [-Name] <String>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Add-DnsServerDirectoryPartition
        -Type <String>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
