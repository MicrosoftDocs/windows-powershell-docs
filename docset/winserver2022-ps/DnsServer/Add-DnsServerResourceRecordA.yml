syntaxes:
- syntax: |-
    ```Syntax
    Add-DnsServerResourceRecordA
        [-AllowUpdateAny]
        [-CreatePtr]
        [-Name] <String>
        [-IPv4Address] <IPAddress[]>
        [-ComputerName <String>]
        [-TimeToLive <TimeSpan>]
        [-ZoneName] <String>
        [-AgeRecord]
        [-PassThru]
        [-ZoneScope <String>]
        [-VirtualizationInstance <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DnsServerResourceRecord" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a DNS record'
  description: |-
    ```
    PS C:\> Add-DnsServerResourceRecordA -Name "host23" -ZoneName "contoso.com" -AllowUpdateAny -IPv4Address "172.18.99.23" -TimeToLive 01:00:00
    ```

    This example adds a type A DNS record for a host named host23 in the zone named contoso.com.
    The command specifies **AllowUpdateAny** and provides a TTL value.
