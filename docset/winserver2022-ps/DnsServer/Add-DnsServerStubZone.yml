syntaxes:
- syntax: |-
    ```Syntax
    Add-DnsServerStubZone
        [-MasterServers] <IPAddress[]>
        [-Name] <String>
        [-LoadExisting]
        [-ComputerName <String>]
        [-PassThru]
        [-ZoneFile <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FileForwardLookupZone
  isDefault: true
- syntax: |-
    ```Syntax
    Add-DnsServerStubZone
        [-MasterServers] <IPAddress[]>
        -NetworkId <String>
        [-LoadExisting]
        [-ComputerName <String>]
        [-PassThru]
        [-ZoneFile <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FileReverseLookupZone
  isDefault: false
- syntax: |-
    ```Syntax
    Add-DnsServerStubZone
        [-MasterServers] <IPAddress[]>
