syntaxes:
- syntax: |-
    ```Syntax
    Invoke-DnsServerSigningKeyRollover
        [-ZoneName] <String>
        [-KeyId] <Guid[]>
        [-ComputerName <String>]
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DnsServerSigningKey" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Invoke key rollover'
  description: |-
    ```
    PS C:\> Get-DnsServerSigningKey -ZoneName "DNSServer06.Contoso.com" | Invoke-DnsServerSigningKeyRollover -PassThru -Verbose -Force
    ```

    This command gets keys for the DNSServer06.Contoso.com zone and invokes rollover for each key.
