syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsServerQueryResolutionPolicy
        -Name <String>
        [-PassThru]
        [-ComputerName <String>]
        [-TransportProtocol <String>]
        [-TimeOfDay <String>]
        [-RecursionScope <String>]
        [-ServerInterfaceIP <String>]
        [-QType <String>]
        [-ProcessingOrder <UInt32>]
        [-ECS <String>]
        [-ClientSubnet <String>]
        [-Condition <String>]
        [-InternetProtocol <String>]
        [-Fqdn <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Server
  isDefault: true
- syntax: |-
