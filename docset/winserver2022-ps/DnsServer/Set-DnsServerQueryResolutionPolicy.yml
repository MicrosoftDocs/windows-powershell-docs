    Set-DnsServerQueryResolutionPolicy
        [-ZoneName] <String>
        -Name <String>
        [-PassThru]
        [-ComputerName <String>]
        [-TransportProtocol <String>]
        [-TimeOfDay <String>]
        [-ServerInterfaceIP <String>]
        [-QType <String>]
        [-ProcessingOrder <UInt32>]
        [-ECS <String>]
        [-ClientSubnet <String>]
        [-Condition <String>]
        [-InternetProtocol <String>]
        [-Fqdn <String>]
        [-ZoneScope <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
