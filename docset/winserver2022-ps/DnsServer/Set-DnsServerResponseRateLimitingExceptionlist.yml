### YamlMime:PowerShellCmdlet1
uid: DnsServer.Set-DnsServerResponseRateLimitingExceptionlist
name: Set-DnsServerResponseRateLimitingExceptionlist
module: DnsServer
isPreview: false
summary: |-
  Updates the settings of an RRL exception list.
description: |-
  The **Set-DnsServerResponseRateLimitingExceptionlist** cmdlet updates the settings of a Response Rate Limiting (RRL) exception list.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientSubnet
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client subnet values for the exception list.

      The value must have the following format: `COMPARATOR, value1, value2,..., COMPARATOR, value 3, value 4,..` where the COMPARATOR can be EQ or NE.
      There can be only one EQ and one NE in a value.

      The values following the EQ operator will be treated as multiple assertions which are logically combined using the OR operator.
      The values following the NE operator will be treated as multiple assertions which are logically differenced using the AND operator.

      Multiple values are combined using the *Condition* parameter as a logical operator.
      The same operator is also used for combining EQ and NE expressions within a value.

      For example, `EQ, America, Asia, NE, Europe` specifies that the client subnets of America and Asia are in the exception list, and the client subnet of Europe is not.

      For details, see **Add-DnsServerClientSubnet**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a remote DNS server on which to run the command.
      You can specify an IP address or any value that resolves to an IP address, such as a fully qualified domain name (FQDN), host name, or NetBIOS name.
    aliases:
    - Cn
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Condition
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a logical operator for combining multiple values of the **ClientSubnet**, **Fqdn** and **ServerIp** parameters.
      The values for the parameters are combined together using the *Condition* parameter as a logical operator.
      The same operator is also used for combining EQ and NE expressions within a value.
      The default value is AND.
    acceptedValues:
    - AND
    - OR
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Fqdn
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies FQDN values for the exception list.

      The value must have the following format: `COMPARATOR, value1, value2,..., COMPARATOR, value 3, value 4,..` where the COMPARATOR can be EQ or NE.
      There can be only one EQ and one NE in a value.

      The values following the EQ operator will be treated as multiple assertions which are logically combined using the OR operator.
      The values following the NE operator will be treated as multiple assertions which are logically differenced using the AND operator.

      Multiple values are combined using the *Condition* parameter as a logical operator.
      The same operator is also used for combining EQ and NE expressions within a value.

      For example, `EQ,*.contoso.com` specifies that the contoso.com domain should be added to the exception list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the RRL exception list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerInterfaceIP
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the server interface on which the DNS server is listening.

      The value must have the following format: `COMPARATOR, value1, value2,..., COMPARATOR, value 3, value 4,..` where the COMPARATOR can be EQ or NE.
      There can be only one EQ and one NE in a value.

      The values following the EQ operator will be treated as multiple assertions which are logically combined using the OR operator.
      The values following the NE operator will be treated as multiple assertions which are logically differenced using the AND operator.

      Multiple values are combined together using the *Condition* parameter as a logical operator.
      The same operator is also used for combining EQ and NE expressions within a value.

      For example, `EQ,10.0.0.3` specifies a server interface with IP 10.0.0.3.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsServerResponseRateLimitingExceptionlist
        [[-ClientSubnet] <String>]
        [[-Fqdn] <String>]
        [[-ServerInterfaceIP] <String>]
        [[-Name] <String>]
        [[-Condition] <String>]
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#DnsServerResponseRateLimitingExceptionlist" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Set a RRL exception list'
  description: |-
    ```
    PS C:\> Set-DnsServerResponseRateLimitingExceptionlist -Name "SafeList1" -ServerInterfaceIP "EQ,10.0.0.1"
    ```

    This command sets the **ServerInterfaceIP** value of the RRL exception list named SafeList1 to EQ,10.0.0.1.
