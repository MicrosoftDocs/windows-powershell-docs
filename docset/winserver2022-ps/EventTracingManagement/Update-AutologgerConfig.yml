syntaxes:
- syntax: |-
    ```Syntax
    Update-AutologgerConfig
        [-Name] <String[]>
        [-BufferSize <UInt32>]
        [-ClockType <ClockType>]
        [-DisableRealtimePersistence <UInt32>]
        [-LocalFilePath <String>]
        [-FileMax <UInt32>]
        [-FlushTimer <UInt32>]
        [-Guid <String>]
        [-LogFileMode <UInt32>]
        [-MaximumFileSize <UInt32>]
        [-MaximumBuffers <UInt32>]
        [-MinimumBuffers <UInt32>]
        [-Start <UInt32>]
        [-InitStatus <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AutologgerConfig
        -InputObject <CimInstance[]>
        [-BufferSize <UInt32>]
        [-ClockType <ClockType>]
        [-DisableRealtimePersistence <UInt32>]
        [-LocalFilePath <String>]
        [-FileMax <UInt32>]
        [-FlushTimer <UInt32>]
        [-Guid <String>]
        [-LogFileMode <UInt32>]
        [-MaximumFileSize <UInt32>]
        [-MaximumBuffers <UInt32>]
        [-MinimumBuffers <UInt32>]
        [-Start <UInt32>]
        [-InitStatus <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT\Microsoft\Windows\EventTracingManagement\MSFT_AutologgerConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify a configuration'
  description: |-
    ```
    PS C:\> Update-AutologgerConfig -Name "WFP-IPsec Trace" -MaximumBuffers 8 -ClockType Cycle
    ```

    This command modifies the AutoLogger configuration named WFP-IPsec Trace.
