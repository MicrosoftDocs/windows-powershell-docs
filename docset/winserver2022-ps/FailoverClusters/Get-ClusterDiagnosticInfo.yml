### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Get-ClusterDiagnosticInfo
name: Get-ClusterDiagnosticInfo
module: FailoverClusters
isPreview: false
summary: |-
  Gets diagnostics for a cluster a cluster that contains VMs and produces a zip file containing the
  data.
description: |-
  The `Get-ClusterDiagnosticInfo` cmdlet gets diagnostics for a cluster that contains virtual
  machines and produces a zip file containing the data.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster the cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Write
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HoursOfEvents
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of hours in the past that this cmdlet gathers system event logs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Write
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeEvents
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gathers system event logs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Write
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReadFromPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to read from when examining previously collected log files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Read
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WriteToPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to create the ZIP file that contains all of the logs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Write
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ZipPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name to prepend to the ZIP file that is produced.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Write
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ClusterDiagnosticInfo
        [[-WriteToPath] <String>]
        [[-Cluster] <String>]
        [[-ZipPrefix] <String>]
        [-HoursOfEvents <Int32>]
        [-IncludeEvents]
        [<CommonParameters>]
    ```
  parameterSetName: Write
  isDefault: false
- syntax: |-
    ```Syntax
    Get-ClusterDiagnosticInfo
        -ReadFromPath <String>
        [<CommonParameters>]
    ```
  parameterSetName: Read
  isDefault: false
examples:
- title: 'Example 1: Write diagnostic info to the specified path'
  description: |-
    ```powershell
    Get-ClusterDiagnosticInfo -WriteToPath "C:\Users\MyUser\HealthTest\"
    ```

    This command gets and writes the cluster Diagnostics to the folder `C:\Users\MyUser\HealthTest\`.
