### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Move-ClusterResource
name: Move-ClusterResource
module: FailoverClusters
isPreview: false
summary: |-
  Moves a clustered resource from one clustered role to another within a failover cluster.
description: |-
  The `Move-ClusterResource` cmdlet moves a clustered resource from one clustered role to another
  within a failover cluster. When a clustered resource is moved to a different clustered role, the
  clustered resource will then fail over with that clustered role.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet. If the input for this parameter is
      `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Group
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster group to which to move the resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster resource to move.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster resource to move.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Move-ClusterResource
        [[-Name] <String>]
        [[-Group] <String>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterResource" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.ClusterResource" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Move-ClusterResource -Name resource1 -Group group2
    ```

    This command moves the cluster resource called `resource1` to the resource group called `group2` on
    the local cluster.
