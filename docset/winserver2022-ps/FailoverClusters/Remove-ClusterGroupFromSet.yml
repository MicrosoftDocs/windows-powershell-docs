uid: FailoverClusters.Remove-ClusterGroupFromSet
name: Remove-ClusterGroupFromSet
module: FailoverClusters
isPreview: false
summary: |-
  Removes a group from a set.
description: |-
  The `Remove-ClusterGroupFromSet` cmdlet removes a group from a set.
