syntaxes:
- syntax: |-
    ```Syntax
    Remove-ClusterGroupFromSet
        [[-Name] <String[]>]
        [-Group] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-ClusterGroupFromSet
        [-Group] <String>
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove a group from the specified group set'
  description: |-
    ```powershell
    Remove-ClusterGroupSetDependency -Name "Set001" -Provider "Set002"
    ```

    This command removes the group set named `Set002` from being a provider for the group set named
    `Set001`.
