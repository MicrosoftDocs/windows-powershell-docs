      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Wait
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time in seconds to wait for the cmdlet. If the **Wait** parameter isn't specified,
