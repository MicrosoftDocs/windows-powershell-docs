### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Update-ClusterIPResource
name: Update-ClusterIPResource
module: FailoverClusters
isPreview: false
summary: |-
  Renews or releases the DHCP lease for an IP address resource in a failover cluster.
description: |-
  The `Update-ClusterIPResource` cmdlet renews or releases the DHCP lease for an IP address resource
  in a failover cluster. This cmdlet applies only to IP address resources that use DHCP.
parameters:
  cmdletParameters:
  - name: Cluster
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster on which to run this cmdlet. If the input for this parameter is
      `.` or it is omitted, then the cmdlet runs on the local cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster IP address resource to update.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster IP address resource to update.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Release
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Causes the cmdlet to release the DHCP lease of the IP address resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Renew
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Causes the cmdlet to renew the DHCP lease of the IP address resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
