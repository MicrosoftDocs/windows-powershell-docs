syntaxes:
- syntax: |-
    ```Syntax
    Get-FsrmClassificationPropertyDefinition
        [[-Name] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
