syntaxes:
- syntax: |-
    ```Syntax
    Get-FsrmMgmtProperty
        [-Namespace <String>]
        [-Name <String>]
        [-Recurse]
        [-Effective]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
