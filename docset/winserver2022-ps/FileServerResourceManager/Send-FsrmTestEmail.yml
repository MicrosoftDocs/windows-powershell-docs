syntaxes:
- syntax: |-
    ```Syntax
    Send-FsrmTestEmail
        -ToEmailAddress <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
