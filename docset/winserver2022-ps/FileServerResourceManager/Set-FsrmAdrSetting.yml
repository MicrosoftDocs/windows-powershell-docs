syntaxes:
- syntax: |-
    ```Syntax
    Set-FsrmAdrSetting
        [-Event] <FsrmAdrEventEnum[]>
        [-Enabled]
        [-DisplayMessage <String>]
        [-EmailMessage <String>]
        [-AllowRequests]
        [-MailToOwner]
        [-MailCCAdmin]
        [-MailTo <String>]
        [-IncludeDeviceClaims]
        [-IncludeUserClaims]
        [-EventLog]
        [-DeviceTroubleshooting]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
