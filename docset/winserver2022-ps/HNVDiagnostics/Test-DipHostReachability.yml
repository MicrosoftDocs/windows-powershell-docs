uid: HNVDiagnostics.Test-DipHostReachability
name: Test-DipHostReachability
module: HNVDiagnostics
isPreview: false
summary: |-
  Tests whether DIPs can be reached.
description: |-
  The **Test-DipHostReachability** cmdlet tests whether datacenter IP (DIP) addresses can be reached.
