syntaxes:
- syntax: |-
    ```Syntax
    Test-VirtualNetworkConnection
        [-OperationId] <String>
        [[-HostName] <String>]
        [[-MgmtIp] <String>]
        [[-Creds] <PSCredential>]
        [[-VMName] <String>]
        [[-VMNetworkAdapterName] <String>]
        [[-VMNetworkAdapterProfileId] <String>]
        [-IsSender] <Boolean>
        [-SenderCAIP] <String>
        [-SenderVSID] <Int32>
        [-ListenerCAIP] <String>
        [-ListenerVSID] <Int32>
        [-SequenceNumber] <Int32>
        [[-PayloadSize] <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
