syntaxes:
- syntax: |-
    ```Syntax
    Remove-HgsKeyProtectionCertificate
        -CertificateType <KeyCertificateType>
        -Thumbprint <String>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
