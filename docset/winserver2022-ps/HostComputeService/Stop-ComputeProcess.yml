syntaxes:
- syntax: |-
    ```Syntax
    Stop-ComputeProcess
        [-Id] <String>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: true
