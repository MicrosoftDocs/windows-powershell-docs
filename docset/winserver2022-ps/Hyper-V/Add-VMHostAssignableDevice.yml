syntaxes:
- syntax: |-
    ```Syntax
    Add-VMHostAssignableDevice
        -ResourcePoolName <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Force]
        [-InstancePath <String>]
        [-LocationPath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMHostAssignableDevice
        [-HostAssignableDevice] <VMHostAssignableDevice[]>
        -ResourcePoolName <String[]>
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostAssignableDevice" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $params = @{
    ComputerName = "MyVM01"
    InstancePath = "PCI\VEN_8086&DEV_0F48&SUBSYS_72708086&REV_0B\3&11583659&0&D8"
    ResourcePoolName = "MyResourcePool"
    }
    Add-VMHostAssignableDevice $params
    ```

    This example assigns a device identified by its instance path to VM host **MyVM01** within the
    resource pool **MyResourcePool**.
