### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Add-VMSwitch
name: Add-VMSwitch
module: Hyper-V
isPreview: false
summary: |-
  Adds a virtual switch to an Ethernet resource pool.
description: |-
  The **Add-VMSwitch** cmdlet adds a virtual switch to an Ethernet resource pool.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of Hyper-V hosts.
      The cmdlet adds the virtual switch on the Hyper-V hosts that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the virtual switch to be added.
    aliases:
    - SwitchName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkByName
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the resource pool to which the virtual switch is to be added.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMSwitch
    type: <xref href="VMSwitch" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual switch to be added to the Ethernet resource pool.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkByObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-VMSwitch
        [-Name] <String[]>
        [-ResourcePoolName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: NetworkByName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMSwitch
        [-VMSwitch] <VMSwitch[]>
        [-ResourcePoolName] <String[]>
        [<CommonParameters>]
    ```
  parameterSetName: NetworkByObject
  isDefault: false
outputs:
- name: <span>undefined</span>
  description: |-
    None by default; **Microsoft.HyperV.PowerShell.VMNetwork** if **-PassThru** is present.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Add-VMSwitch -Name Test -ResourcePoolName "Engineering Department"
    ```

    Adds virtual switch Test to Ethernet resource pool Engineering Department.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VMSwitch -Name Test | Add-VMSwitch -ResourcePoolName "Engineering Department"
    ```

    Adds virtual switch Test to Ethernet resource pool Engineering Department.
