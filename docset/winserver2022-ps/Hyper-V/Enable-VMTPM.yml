syntaxes:
- syntax: |-
    ```Syntax
    Enable-VMTPM
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-VMTPM
        [-VM] <VirtualMachine[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable TPM on a virtual machine'
  description: |-
    ```
    PS C:\> Enable-VMTPM -VMName "VM01"
    ```

    This example enables TPM on the virtual machine named "VM01"
