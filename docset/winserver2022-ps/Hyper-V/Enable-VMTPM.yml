### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Enable-VMTPM
name: Enable-VMTPM
module: Hyper-V
isPreview: false
summary: |-
  Enables TPM functionality on a virtual machine.
description: |-
  The **Enable-VMTPM** cmdlet enables Trusted Platform Module (TPM) functionality on a virtual machine.
