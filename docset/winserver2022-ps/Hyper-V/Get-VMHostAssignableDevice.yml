### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Get-VMHostAssignableDevice
name: Get-VMHostAssignableDevice
module: Hyper-V
isPreview: false
summary: |-
  Retrieves device information assigned to a virtual machine (VM) host.
description: |-
  The `Get-VMHostAssignableDevice` cmdlet retrieves information about devices that can be assigned to
  a virtual machine host. This can include devices such as GPUs, network adapters, or storage
  controllers that are physically present on the host system. The cmdlet can filter devices by their
  instance path or location path.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts from which the assignable devices are to be retrieved. NetBIOS
      names, IP addresses, and fully qualified domain names are allowed. The default is the local
      computer. Use localhost or a dot (`.`) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action. The default is the
      current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstancePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Represents the Device Instance path in the host machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocationPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location path to the assignable device.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Retrieves the name of the resource pool to which the device is assigned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-VMHostAssignableDevice
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-ResourcePoolName <String[]>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostAssignableDevice" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-VMHostAssignableDevice
    ```

    This example retrieves all assignable devices on the host computer.
- title: Example 2
  description: |-
    ```powershell
    Get-VMHostAssignableDevice -ComputerName "MyHost"
    ```

    In this example, the cmdlet retrieves all assignable devices from the computer named **MyHost**.
