- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterExtendedAcl
        [-VM] <VirtualMachine[]>
        [-VMNetworkAdapterName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
