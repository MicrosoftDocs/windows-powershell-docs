- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterExtendedAcl
        [-VMSnapshot] <VMSnapshot>
        [<CommonParameters>]
    ```
  parameterSetName: VMSnapshot
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterExtendedAcl
        [-VMNetworkAdapter] <VMNetworkAdapterBase[]>
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
