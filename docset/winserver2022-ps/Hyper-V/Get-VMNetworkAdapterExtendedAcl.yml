syntaxes:
- syntax: |-
    ```Syntax
    Get-VMNetworkAdapterExtendedAcl
        [[-VMName] <String[]>]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
