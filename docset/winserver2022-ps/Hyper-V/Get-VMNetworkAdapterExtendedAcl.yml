examples:
- title: 'Example 1: Get all extended ACLs'
  description: |-
    ```
    PS C:\> Get-VMNetworkAdapterExtendedAcl -VMName "TSQA01"
    ```

    This command gets all the extended ACLs for the virtual machine named TSQA01.
