syntaxes:
- syntax: |-
    ```Syntax
    Grant-VMConnectAccess
        [-VMName] <String[]>
        [-UserName] <String[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Grant-VMConnectAccess
        [-VMId] <Guid[]>
        [-UserName] <String[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMId
  isDefault: false
