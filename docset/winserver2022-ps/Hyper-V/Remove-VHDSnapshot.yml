syntaxes:
- syntax: |-
    ```Syntax
    Remove-VHDSnapshot
        [-Path] <String[]>
        -SnapshotId <Guid[]>
        [-PersistReferencePoint]
        [-AsJob]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VHDSnapshot
        [-VHDSnapshot] <VHDSnapshotInfo[]>
        [-PersistReferencePoint]
        [-AsJob]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VHDSnapshot
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Vhd.PowerShell.VHDSnapshotInfo" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Vhd.PowerShell.VHDSnapshotInfo" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a checkpoint'
  description: |-
    ```powershell
    Remove-VHDSnapshot -Path "Data01.vhds" -SnapshotId 6c87351a-a39a-4581-b231-6d693b26485d
    ```

    This command removes the checkpoint that has the specified ID from the VHD set file named
    `Data01.vhds`.
