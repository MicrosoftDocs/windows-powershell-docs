### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Remove-VHDSnapshot
name: Remove-VHDSnapshot
module: Hyper-V
isPreview: false
summary: |-
  Removes a checkpoint from a VHD set file.
description: |-
  The `Remove-VHDSnapshot` cmdlet removes a virtual hard disk (VHD) checkpoint from a VHD set file.

  Checkpoint replaces the previous term, snapshot.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967)
      or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet. The default is the
      current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
