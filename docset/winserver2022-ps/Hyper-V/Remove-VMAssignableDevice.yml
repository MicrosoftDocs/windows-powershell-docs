syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMAssignableDevice
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMAssignableDevice
        [-VMAssignableDevice] <VMAssignedDevice[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMAssignedDevice" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMAssignedDevice" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $params = @{
    VMName = "MyVM"
    InstancePath = "PCIROOT(0)#PCI(0300)#PCI(0000)#PCI(0800)#PCI(0000)#PCI(1000)"
    }
    Remove-VMAssignableDevice $params
    ```

    This example removes a specific assignable device, identified by its instance path, from the
    virtual machine named **MyVM**.
