syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMGpuPartitionAdapter
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-AdapterId <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMGpuPartitionAdapter
        [-VM] <VirtualMachine[]>
        [-Passthru]
        [-AdapterId <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMGpuPartitionAdapter
        [-VMGpuPartitionAdapter] <VMGpuPartitionAdapter[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
