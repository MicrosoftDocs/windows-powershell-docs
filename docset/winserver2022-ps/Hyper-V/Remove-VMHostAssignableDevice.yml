syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMHostAssignableDevice
        -ResourcePoolName <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMHostAssignableDevice
        [-HostAssignableDevice] <VMHostAssignableDevice[]>
        -ResourcePoolName <String[]>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostAssignableDevice" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $params = @{
    InstancePath = "PCIROOT(0)#PCI(0300)#PCI(0000)"
    ResourcePoolName = "MyResourcePool"
    }
    Remove-VMHostAssignableDevice $params
    ```

    This example removes the device with the specified instance path from the resource pool named
    **MyResourcePool**.
