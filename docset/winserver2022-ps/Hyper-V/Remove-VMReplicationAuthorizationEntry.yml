syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMReplicationAuthorizationEntry
        [-AllowedPrimaryServer] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PrimaryServerName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMReplicationAuthorizationEntry
        [-TrustGroup] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TrustGroup
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMReplicationAuthorizationEntry
        [-VMReplicationAuthorizationEntry] <VMReplicationAuthorizationEntry[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
