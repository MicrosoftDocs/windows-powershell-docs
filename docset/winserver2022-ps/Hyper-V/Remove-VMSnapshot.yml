syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMSnapshot
        [-VMName] <String[]>
        [[-Name] <String[]>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-IncludeAllChildSnapshots]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMSnapshot
        [-VM] <VirtualMachine[]>
        [[-Name] <String[]>]
        [-IncludeAllChildSnapshots]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMSnapshot
        [-VMSnapshot] <VMSnapshot[]>
        [-IncludeAllChildSnapshots]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotObject
  isDefault: false
