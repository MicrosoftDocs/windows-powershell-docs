syntaxes:
- syntax: |-
    ```Syntax
    Restore-VMSnapshot
        [-Name] <String>
        [-VMName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotName
  isDefault: true
- syntax: |-
    ```Syntax
    Restore-VMSnapshot
        [-VMSnapshot] <VMSnapshot>
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotObject
  isDefault: false
- syntax: |-
    ```Syntax
    Restore-VMSnapshot
        [-VM] <VirtualMachine>
        [-Name] <String>
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VM
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="VMSnapshot" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Restore-VMSnapshot -Name 'Base image' -VMName TestVM
    Confirm
    Are you sure you want to perform this action?
    Restore-VMSnapshot will restore checkpoint "Base image".
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help
    (default is "Y"): Y
    ```

    Restores checkpoint Base image of virtual machine TestVM.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM | Foreach-Object { $_ | Get-VMSnapshot | Sort CreationTime | Select -Last 1 | Restore-VMSnapshot -Confirm:$false }
    ```

    Applies the most recent checkpoint on all virtual machines with no confirmation prompts.
