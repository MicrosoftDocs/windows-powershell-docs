### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Set-VMFloppyDiskDrive
name: Set-VMFloppyDiskDrive
module: Hyper-V
isPreview: false
summary: |-
  Configures a virtual floppy disk drive.
description: |-
  The **Set-VMFloppyDiskDrive** cmdlet configures a virtual floppy disk drive.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts on which the virtual floppy disk drive is to be configured.
      NetBIOS names, IP addresses, and fully qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Passthru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that a **Microsoft.HyperV.PowerShell.FloppyDiskDrive** object is to be passed through to the pipeline representing the virtual floppy disk drive to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the virtual floppy drive file.
      If specified as **$null**, the drive is set to contain no media.
    aliases:
    - FullName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual floppy disk resource pool to use for this virtual floppy disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="VirtualMachine" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual machine in which the virtual floppy disk drive is to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMFloppyDiskDrive
    type: <xref href="VMFloppyDiskDrive" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual floppy disk drive to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMFloppyDiskDrive
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the virtual machine on which the virtual floppy disk drive is to be configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-VMFloppyDiskDrive
        [-VMName] <String[]>
        [[-Path] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-ResourcePoolName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-VMFloppyDiskDrive
        [-VM] <VirtualMachine[]>
        [[-Path] <String>]
        [-ResourcePoolName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-VMFloppyDiskDrive
        [-VMFloppyDiskDrive] <VMFloppyDiskDrive[]>
        [[-Path] <String>]
        [-ResourcePoolName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMFloppyDiskDrive
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMFloppyDiskDrive" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Set-VMFloppyDiskDrive TestVM C:\Test.vfd
    ```

    Connect C:\Test.vfd to the virtual floppy disk of virtual machine TestVM.
