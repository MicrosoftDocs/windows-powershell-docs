uid: Hyper-V.Set-VMNetworkAdapterRoutingDomainMapping
name: Set-VMNetworkAdapterRoutingDomainMapping
module: Hyper-V
isPreview: false
summary: |-
  Sets virtual subnets on a routing domain.
description: |-
  The **Set-VMNetworkAdapterRoutingDomainMapping** cmdlet sets virtual subnets on a routing domain.
