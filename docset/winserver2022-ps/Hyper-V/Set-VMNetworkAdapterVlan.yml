    description: |-
      Specifies **Access** mode for the virtual machine network adapter. This parameter configures an untagged virtual port with the VLANId (port based VLAN), so it must be specified together with **VlanId**.
    aliases:
    - a
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
