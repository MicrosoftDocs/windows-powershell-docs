syntaxes:
- syntax: |-
    ```Syntax
    Test-VMNetworkAdapter
        [-VMName] <String>
        -SenderIPAddress <String>
        -ReceiverIPAddress <String>
        -SequenceNumber <Int32>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Name <String>]
        [-Sender]
        [-Receiver]
        [-NextHopMacAddress <String>]
        [-IsolationId <Int32>]
        [-PayloadSize <Int32>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Test-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapter>
        -SenderIPAddress <String>
        -ReceiverIPAddress <String>
        -SequenceNumber <Int32>
        [-Sender]
        [-Receiver]
        [-NextHopMacAddress <String>]
        [-IsolationId <Int32>]
        [-PayloadSize <Int32>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Test-VMNetworkAdapter
        [-VM] <VirtualMachine>
        -SenderIPAddress <String>
        -ReceiverIPAddress <String>
        -SequenceNumber <Int32>
        [-Name <String>]
        [-Sender]
        [-Receiver]
        [-NextHopMacAddress <String>]
        [-IsolationId <Int32>]
        [-PayloadSize <Int32>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMNetworkAdapterConnectionTestResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Test connectivity'
  description: |-
    ```
    PS C:\> Test-VMNetworkAdapter -VMName "ContosoVM01" -Receiver -SenderIPAddress "10.20.20.5" -ReceiverIPAddress "10.20.20.6" -VMNetworkAdapterName "ContosoNic01"
    ```

    This command tests connectivity by using the virtual network adapter named ContosoNic01.
    The command targets the receiver virtual machine.
