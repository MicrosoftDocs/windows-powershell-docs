syntaxes:
- syntax: |-
    ```Syntax
    Update-VMVersion
        [-Name] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Force]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Update-VMVersion
        [-VM] <VirtualMachine[]>
        [-Force]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a **VirtualMachine** object, if you specify the **Passthru** parameter.
examples:
- title: 'Example 1: Update a virtual machine'
  description: |-
    ```
    PS C:\> Update-VMVersion -Name "VM06"
    ```

    This command updates the virtual machine named VM06 to the most recent virtual machine version.
