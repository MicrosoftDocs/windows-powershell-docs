### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.Get-IscsiVirtualDiskSnapshot
name: Get-IscsiVirtualDiskSnapshot
module: IscsiTarget
isPreview: false
summary: |-
  Gets the properties of the snapshots.
description: |-
  The **Get-IscsiVirtualDiskSnapshot** cmdlet gets properties of snapshots on a iSCSI virtual disk.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OriginalPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the virtual hard disk (VHD) file that is associated with the iSCSI virtual disk to which the snapshot belongs.
    aliases:
    - Path
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Device
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SnapshotId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier (ID) for the snapshot.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SnapshotId
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-IscsiVirtualDiskSnapshot
        [[-OriginalPath] <String>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Device
  isDefault: true
- syntax: |-
    ```Syntax
    Get-IscsiVirtualDiskSnapshot
        [-SnapshotId <String>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotId
  isDefault: false
inputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDisk" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDiskSnapshot" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all virtual disk snapshots'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDiskSnapshot
    ```

    This example gets all of the virtual disk snapshots on the local server.
- title: 'Example 2: Get virtual disk snapshots by ID'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDiskSnapshot -SnapshotId "{E9A5BA03-85B9-40CA-85DF-DC1695690B40}"
    ```

    This example gets all of the virtual disk snapshots with the Id {E9A5BA03-85B9-40CA-85DF-DC1695690B40} on the local server.
- title: 'Example 3: Get snapshots for a virtual disk'
  description: |-
    ```
    PS C:\> Get-IscsiVirtualDiskSnapshot -Path "E:\temp\test.vhdx"
    ```

    This example gets the snapshots that were taken for the virtual disk E:\temp\test.vhdx.
