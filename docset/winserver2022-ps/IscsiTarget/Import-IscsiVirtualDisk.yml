syntaxes:
- syntax: |-
    ```Syntax
    Import-IscsiVirtualDisk
        [-Description <String>]
        [-Path] <String>
        [-PassThru]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
