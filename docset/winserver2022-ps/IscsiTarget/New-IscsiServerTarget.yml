### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.New-IscsiServerTarget
name: New-IscsiServerTarget
module: IscsiTarget
isPreview: false
summary: |-
  Creates a new iSCSI Target object with the specified name.
description: |-
  The **New-IscsiServerTarget** cmdlet creates an iSCSI Target object that has the specified name.
  After creating an iSCSI Target object, the target can be assigned to an iSCSI initiator, and a virtual disk can be associated with the target.
parameters:
  cmdletParameters:
  - name: ClusterGroupName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group or network in the resource group on which this cmdlet should be run.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InitiatorIds
    type: <xref href="InitiatorId" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the iSCSI initiator identifiers (IDs) to which the iSCSI target is assigned.
      The format of this parameter is IdType:Value.
      The acceptable values for this parameter are: DNSName, IPAddress, IPv6Address, IQN, or MACAddress.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the iSCSI target.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-IscsiServerTarget
        [-TargetName] <String>
        [-InitiatorIds <InitiatorId[]>]
        [-ClusterGroupName <String>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.iSCSIServerTarget" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a target on the local server'
  description: |-
    ```
    PS C:\> New-IscsiServerTarget -TargetName "T1"
    ```

    This example creates a target named T1 on the local server.
- title: 'Example 2: Create a target and assign initiators'
  description: |-
    ```
    PS C:\> New-IscsiServerTarget -TargetName "T1" -InitiatorId @("IPAddress:10.10.1.1","IPAddress:10.10.1.2")
    ```

    This example creates a target with the name T1 and assigns it to two initiators, with IP addresses 10.10.1.1 and 10.10.1.2.
- title: 'Example 3: Create a target on a cluster'
  description: |-
    ```
    PS C:\> New-IscsiServerTarget -TargetName "T1" -ComputerName "fscluster.contoso.com" -ClusterGroupName "Group1"
    ```

    This example creates a target with the name T1 in the cluster group named Group1 on the cluster named fscluster.contoso.com.
