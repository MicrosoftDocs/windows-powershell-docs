syntaxes:
- syntax: |-
    ```Syntax
    New-IscsiVirtualDisk
        [-Path] <String>
        [-SizeBytes] <UInt64>
        [-Description <String>]
        [-LogicalSectorSizeBytes <UInt32>]
        [-PhysicalSectorSizeBytes <UInt32>]
        [-BlockSizeBytes <UInt32>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Dynamic
  isDefault: true
- syntax: |-
    ```Syntax
    New-IscsiVirtualDisk
        [-Path] <String>
        [[-SizeBytes] <UInt64>]
        -ParentPath <String>
        [-Description <String>]
        [-PhysicalSectorSizeBytes <UInt32>]
        [-BlockSizeBytes <UInt32>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Differencing
  isDefault: false
- syntax: |-
    ```Syntax
    New-IscsiVirtualDisk
        [-Path] <String>
        [-SizeBytes] <UInt64>
        [-Description <String>]
        [-DoNotClearData]
        [-UseFixed]
        [-LogicalSectorSizeBytes <UInt32>]
        [-PhysicalSectorSizeBytes <UInt32>]
        [-BlockSizeBytes <UInt32>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Fixed
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
