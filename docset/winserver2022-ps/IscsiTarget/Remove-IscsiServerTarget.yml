syntaxes:
- syntax: |-
    ```Syntax
    Remove-IscsiServerTarget
        [-TargetName] <String>
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: TargetName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-IscsiServerTarget
        -InputObject <IscsiServerTarget>
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiServerTarget" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a target'
  description: |-
    ```
    PS C:\> Remove-IscsiServerTarget -Targetname "TargetOne"
    ```

    This example deletes the target named TargetOne on the local server.
- title: 'Example 2: Remove all targets on a server'
  description: |-
    ```
    PS C:\> $all = Get-IscsiServerTarget
    PS C:\> ForEach-Object -InputObject ($each in $all) -Process {Remove-IscsiServerTarget -InputObject $each}
    ```

    The example deletes all of the targets on the local server.
