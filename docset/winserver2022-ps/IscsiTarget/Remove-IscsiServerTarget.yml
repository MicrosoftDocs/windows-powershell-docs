### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.Remove-IscsiServerTarget
name: Remove-IscsiServerTarget
module: IscsiTarget
isPreview: false
summary: |-
  Deletes the specified iSCSI target.
description: |-
  The **Remove-IscsiServerTarget** cmdlet deletes an iSCSI Target object.
  An iSCSI initiator cannot access the virtual disk after the target is deleted.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="IscsiServerTarget" data-throw-if-not-resolved="False" />
    description: |-
      Accepts an iSCSI Target object from the input pipeline.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the iSCSI target.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: TargetName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
