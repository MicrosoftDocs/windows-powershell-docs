### YamlMime:PowerShellCmdlet1
uid: IscsiTarget.Set-IscsiVirtualDisk
name: Set-IscsiVirtualDisk
module: IscsiTarget
isPreview: false
summary: |-
  Modifies the settings for the specified iSCSI virtual disk.
description: |-
  The **Set-IscsiVirtualDisk** cmdlet modifies the settings for a virtual disk and returns the corresponding iSCSI Virtual Disk object, if the **PassThru** parameter is specified.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer name, or IP address, of the remote computer, if this cmdlet is run on a remote computer.

      Specifies the cluster resource group network name, or cluster node name, if this cmdlet is run on a cluster configuration.

      If you do not specify a value for this parameter, the cmdlet uses the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credentials when connecting to a remote computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the description for the iSCSI virtual disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that the specified iSCSI virtual disk is either enabled or disabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="IscsiVirtualDisk" data-throw-if-not-resolved="False" />
    description: |-
      Accepts an iSCSI virtual disk object from the input pipeline.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the virtual hard disk (VHD) file that is associated with the iSCSI virtual disk.
      Filter the iSCSI Virtual Disk object by using this parameter.
    aliases:
    - DevicePath
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DevicePath
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-IscsiVirtualDisk
        [-Path] <String>
        [-Description <String>]
        [-PassThru]
        [-Enable <Boolean>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: DevicePath
  isDefault: true
- syntax: |-
    ```Syntax
    Set-IscsiVirtualDisk
        -InputObject <IscsiVirtualDisk>
        [-Description <String>]
        [-PassThru]
        [-Enable <Boolean>]
        [-ComputerName <String>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDisk" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Iscsi.Target.Commands.IscsiVirtualDisk" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change a VHD description'
  description: |-
    ```
    PS C:\> Set-IscsiVirtualDisk -Path "E:\Temp\vhd1.vhdx" -Description "disk for data"
    ```

    This example changes the VHD description to disk for data.
- title: 'Example 2: Disable a VHD'
  description: |-
    ```
    PS C:\> Set-IscsiVirtualDisk -Path "E:\Temp\vhd1.vhdx" -Enable $False
    ```

    This example disables the VHD with the path E:\Temp\vhd1.vhdx.
