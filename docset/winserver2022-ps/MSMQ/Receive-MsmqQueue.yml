### YamlMime:PowerShellCmdlet1
uid: MSMQ.Receive-MsmqQueue
name: Receive-MsmqQueue
module: MSMQ
isPreview: false
summary: |-
  Does a destructive read from a queue.
description: |-
  The **Receive-MsmqQueue** cmdlet does a destructive read from a queue.
  The cmdlet returns the received **System.Messaging.Message** object.
  This cmdlet accepts values for the **Name** parameter of path names, format names, and direct format names.
  Some other Message Queuing (also known as MSMQ) cmdlets require a friendly name for the queue.
  If you specify the **Peek** parameter, the cmdlet peeks at the message instead of doing a destructive read.
  The cmdlet succeeds if it returns at least one message.

  If you specify the **Peek** parameter, this cmdlet returns the number of messages  that is the minimum of the number supplied by the **Count** parameter and the number of messages in the queue.
parameters:
  cmdletParameters:
  - name: Count
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of messages to be returned.
      The default value is 1.
      You must specify a value larger than 0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="MessageQueue" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **MessageQueue** object.
      The cmdlet reads from the queue that the **MessageQueue** specifies.
      This parameter accepts pipeline input.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Peek
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns a copy of the first message in the queue without removing the message from the queue.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Peek
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetrieveBody
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns the body of the message.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Timeout
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum time, in milliseconds, to wait for the queue to contain a message.
      The default value is 0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Transactional
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet performs a transacted receive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Transactional
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Receive-MsmqQueue
        -InputObject <MessageQueue>
        [-Transactional]
        [-RetrieveBody]
        [-Timeout <TimeSpan>]
        [-Count <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Transactional
  isDefault: true
- syntax: |-
    ```Syntax
    Receive-MsmqQueue
        -InputObject <MessageQueue>
        [-Peek]
        [-RetrieveBody]
        [-Timeout <TimeSpan>]
        [-Count <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Peek
  isDefault: false
inputs:
- name: <xref href="Microsoft.Msmq.PowerShell.Commands.MessageQueue" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Perform a transacted read'
  description: |-
    ```powershell
    PS C:\> Get-MsmqQueue -Name "a04bm10\private$\order_queue" | Receive-MsmqQueue -Transactional
    ```

    This command gets the specified queue by using the **Get-MsmqQueue** cmdlet.
    The command passes the result to the current cmdlet by using the pipeline operator.
    The current cmdlet performs a transacted read on the queue.
