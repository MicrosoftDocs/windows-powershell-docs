syntaxes:
- syntax: |-
    ```Syntax
    Send-MsmqQueue
        [-Name] <String>
        [-MessageObject <Message>]
        [-Body <Object>]
        [-Label <String>]
        [-Recoverable]
        [-Authenticated]
        [-Journaling]
        [-Transactional]
        [-AcknowledgeType <AcknowledgeTypes>]
        [-AdminQueuePath <String>]
        [-ResponseQueuePath <String>]
        [-TimeToReachQueue <TimeSpan>]
        [-TimeToBeReceived <TimeSpan>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Send-MsmqQueue
        -InputObject <MessageQueue[]>
        [-MessageObject <Message>]
        [-Body <Object>]
        [-Label <String>]
        [-Recoverable]
        [-Authenticated]
        [-Journaling]
        [-Transactional]
        [-AcknowledgeType <AcknowledgeTypes>]
        [-AdminQueuePath <String>]
        [-ResponseQueuePath <String>]
        [-TimeToReachQueue <TimeSpan>]
        [-TimeToBeReceived <TimeSpan>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
