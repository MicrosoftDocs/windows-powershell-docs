syntaxes:
- syntax: |-
    ```Syntax
    Set-MsmqQueueACL
        [-InputObject] <MessageQueue[]>
        -UserName <String[]>
        [-Allow <MessageQueueAccessRights>]
        [-Deny <MessageQueueAccessRights>]
        [-Remove <MessageQueueAccessRights>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
