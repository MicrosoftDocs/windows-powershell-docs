syntaxes:
- syntax: |-
    ```Syntax
    Set-MsmqQueueManager
        [-RenewEncryptionKey]
        [-MsgStore <String>]
        [-MsgLogStore <String>]
        [-TransactionLogStore <String>]
        [-MessageQuota <Int64>]
        [-JournalQuota <Int64>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: true
- syntax: |-
    ```Syntax
    Set-MsmqQueueManager
        [-Connect]
        [-RenewEncryptionKey]
        [-MsgStore <String>]
        [-MsgLogStore <String>]
        [-TransactionLogStore <String>]
        [-MessageQuota <Int64>]
        [-JournalQuota <Int64>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Connect
  isDefault: false
- syntax: |-
    ```Syntax
    Set-MsmqQueueManager
        [-Disconnect]
        [-RenewEncryptionKey]
        [-MsgStore <String>]
        [-MsgLogStore <String>]
        [-TransactionLogStore <String>]
        [-MessageQuota <Int64>]
        [-JournalQuota <Int64>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
