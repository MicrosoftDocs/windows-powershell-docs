### YamlMime:PowerShellCmdlet1
uid: MSMQ.Suspend-MsmqOutgoingQueue
name: Suspend-MsmqOutgoingQueue
module: MSMQ
isPreview: false
summary: |-
  Pauses outgoing queues.
description: |-
  The **Suspend-MsmqOutgoingQueue** cmdlet pauses outgoing queues.
  Specify queues to pause by using **MsmqOutgoingQueue** objects.
  This cmdlet returns the suspended queue objects.
parameters:
  cmdletParameters:
  - name: InputObject
    type: <xref href="OutgoingQueue" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **MsmqOutgoingQueue** objects.
      This cmdlet pauses outgoing queues that this parameter specifies.
      This parameter accepts pipeline input.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Suspend-MsmqOutgoingQueue
        -InputObject <OutgoingQueue[]>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Msmq.PowerShell.Commands.OutgoingQueue" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Suspend outgoing queues specified by name'
  description: |-
    ```
    PS C:\> Get-MsmqOutgoingQueue -Name "Order*" | Suspend-MsmqOutgoingQueue
    ```

    This command gets all outgoing queues that have names hat begin with the string Order by using the **Get-MsmqOutgoingQueue** cmdlet.
    The command passes the results to the current cmdlet by using the pipeline operator.
    The current cmdlet suspends those queues.
