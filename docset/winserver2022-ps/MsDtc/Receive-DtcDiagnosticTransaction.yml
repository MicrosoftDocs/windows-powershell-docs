### YamlMime:PowerShellCmdlet1
uid: MsDtc.Receive-DtcDiagnosticTransaction
name: Receive-DtcDiagnosticTransaction
module: MsDtc
isPreview: false
summary: |-
  Propagates a transaction from a given diagnostic Resource Manager.
description: |-
  The **Receive-DtcDiagnosticTransaction** cmdlet propagates a transaction from a specified diagnostic Resource Manager (RM).
  A transaction is created on the specified RM and propagated to the Windows PowerShell® client using either pull or push propagation.
  Use the **PropagationMethod** parameter to specify the propagation mechanism.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name of the computer on which the RM runs.
      If you do not specify a host name, this cmdlet uses the name of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the listening port of the test RM.
    defaultValue: "3002"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PropagationMethod
    type: <xref href="DtcTransactionPropagation" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the propagation mechanism, pull or push, to use.
      The default is pull.
    acceptedValues:
    - Pull
    - Push
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Receive-DtcDiagnosticTransaction
        [[-ComputerName] <String>]
        [[-Port] <Int32>]
        [[-PropagationMethod] <DtcTransactionPropagation>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Receive a diagnostic transaction'
  description: |-
    ```powershell
    PS C:\> Receive-DtcDiagnosticTransaction -ComputerName "Host1" -Port 17123 -PropagationMethod Pull
    ```
    ```output
    Id
    --
    d23fd4b1-1b54-486a-9e9f-a92550a19ce2
    ```

    This command pulls a diagnostic transaction from Host1 port 17123.
