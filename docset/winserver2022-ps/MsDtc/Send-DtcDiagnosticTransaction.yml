### YamlMime:PowerShellCmdlet1
uid: MsDtc.Send-DtcDiagnosticTransaction
name: Send-DtcDiagnosticTransaction
module: MsDtc
isPreview: false
summary: |-
  Propagates a transaction to a specified diagnostic Resource Manager.
description: |-
  The **Send-DtcDiagnosticTransaction** cmdlet propagates a transaction to a specified diagnostic Resource Manager (RM).
  Use the **PropagationMethod** parameter to specify the propagation method.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name of the computer on which the RM is running.
      If you do not specify a host name, the cmdlet uses the name of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the listening port of the test RM.
    defaultValue: "3002"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PropagationMethod
    type: <xref href="DtcTransactionPropagation" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the propagation mechanism, pull or push, to use.
      The default is pull.
    acceptedValues:
    - Pull
    - Push
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Transaction
    type: <xref href="DtcDiagnosticTransaction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **DtcDiagnosticTransaction** object to use in the transaction propagation.
      You can use the pipeline operator to pass this parameter value to the cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Send-DtcDiagnosticTransaction
        [-Transaction] <DtcDiagnosticTransaction>
        [[-ComputerName] <String>]
        [[-Port] <Int32>]
        [[-PropagationMethod] <DtcTransactionPropagation>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Send a DTC diagnostic transaction'
  description: |-
    ```powershell
    PS C:\> $Tx = New-DtcDiagnosticTransaction
    PS C:\> Send-DtcDiagnosticTransaction -Transaction $Tx -ComputerName "Host1" -PropagationMethod Push
    ```

    The first command creates a new DTC diagnostic transaction and assigns it to a variable.

    The second command sends the diagnostic transaction to an RM running on the computer named Host1.
