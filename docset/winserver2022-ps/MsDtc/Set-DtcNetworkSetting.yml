### YamlMime:PowerShellCmdlet1
uid: MsDtc.Set-DtcNetworkSetting
name: Set-DtcNetworkSetting
module: MsDtc
isPreview: false
summary: |-
  Modifies DTC network and security configuration for a DTC instance.
description: |-
  The **Set-DtcNetworkSetting** cmdlet modifies the Distributed Transaction Coordinator (DTC) network and security configuration for the DTC instance specified by the **DtcName** parameter.
  This cmdlet also restarts the DTC instance.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthenticationLevel
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Sets the network authentication level of the DTC instance to NoAuth, Incoming, or Mutual.
    acceptedValues:
    - NoAuth
    - Incoming
    - Mutual
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableNetworkAccess
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to disable network access for the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableNetwork
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DtcName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a DTC instance.
      If you do not specify this parameter, or if you specify a value of Local, this cmdlet modifies the local DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InboundTransactionsEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable inbound transactions to the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LUTransactionsEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable LU transactions in the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OutboundTransactionsEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable outbound transactions from the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoteAdministrationAccessEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable remote administration access for the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoteClientAccessEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable remote client access for the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: XATransactionsEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable XA transactions in the DTC instance.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NetworkSettings
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-DtcNetworkSetting
        [-DtcName <String>]
        [-InboundTransactionsEnabled <Boolean>]
        [-OutboundTransactionsEnabled <Boolean>]
        [-RemoteClientAccessEnabled <Boolean>]
        [-RemoteAdministrationAccessEnabled <Boolean>]
        [-XATransactionsEnabled <Boolean>]
        [-LUTransactionsEnabled <Boolean>]
        [-AuthenticationLevel <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NetworkSettings
  isDefault: false
- syntax: |-
    ```Syntax
    Set-DtcNetworkSetting
        [-DtcName <String>]
        [-DisableNetworkAccess]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DisableNetwork
  isDefault: false
examples:
- title: 'Example 1: Modify network and security settings'
  description: |-
    ```
    PS C:\> Set-DtcNetworkSetting -DtcName "Local" -AuthenticationLevel "Incoming" -InboundTransactionsEnabled $False
    PS C:\> Get-DtcNetworkSetting -DtcName "Local"
    __GENUS                           : 2
    __CLASS                           : DtcNetworkSettings
    __SUPERCLASS                      :
    __DYNASTY                         : DtcNetworkSettings
    __RELPATH                         :
    __PROPERTY_COUNT                  : 7
    __DERIVATION                      : {}
    __SERVER                          :
    __NAMESPACE                       :
    __PATH                            :
    AuthenticationLevel               : Mutual
    InboundTransactionsEnabled        : True
    LUTransactionsEnabled             : True
    OutboundTransactionsEnabled       : True
    RemoteAdministrationAccessEnabled : True
    RemoteClientAccessEnabled         : True
    XATransactionsEnabled             : True
    ```

    The first command modifies the DTC network and security settings for the local DTC instance.
    The second command verifies the changes.
