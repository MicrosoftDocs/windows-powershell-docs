### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Get-WmsDiskProtection
name: Get-WmsDiskProtection
module: MultiPoint
isPreview: false
summary: |-
  Gets the current state and configuration of the disk protection feature.
description: |-
  The **Get-WmsDiskProtection** cmdlet gets the current configuration of the disk protection feature.
  The configuration can be NotInstalled, Discard, or Passive.
parameters:
  cmdletParameters:
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsDiskProtection
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsServerSolutions.MultipointServer.PowerShell.Commands.Library.DiskProtectionMode" data-throw-if-not-resolved="False" />
  description: |-
    The **DiskProtectionMode** object is an enumeration with one of three values that reflect the current mode of the disk protection feature.
    The possible values are NotInstalled, Discard, or Passive.
examples:
- title: 'Example 1: Get the disk protection configuration for the local computer'
  description: |-
    ```
    PS C:\> Get-WmsDiskProtection
    Discard
    ```

    This command returns the state of the disk protection feature on the local computer.
- title: 'Example 2: Get the disk protection configuration for a specified computer'
  description: |-
    ```
    PS C:\> Get-WmsDiskProtection -Server "Sample.microsoft.com"
    Passive
    ```

    This command returns the state of the disk protection feature on the specified computer.
