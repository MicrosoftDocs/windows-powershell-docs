### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Set-WmsStation
name: Set-WmsStation
module: MultiPoint
isPreview: false
summary: |-
  Modifies station information.
description: |-
  The **Set-WmsStation** cmdlet modifies station information.
  You can use this cmdlet to set the automatic logon and the friendly name for the station.
  If you want to enable a user in the Administrator group to auto-logon, specify the *OverrideAdminWarning* parameter.
parameters:
  cmdletParameters:
  - name: AutoLogonCredential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the automatic logon credentials.
      Use Get-Credential cmdlet to get a **PSCredential** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AutoLogonEnable
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableAutoLogon
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Disables automatic logon for the station.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableAutoLogon
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisplayOrientation
    type: <xref href="EDisplayOrientationPS" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Display Orientation for the station.
    acceptedValues:
    - Portrait
    - Landscape
    - PortraitFlipped
    - LandscapeFlipped
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisplayOrientation
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a friendly name for the station.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FriendlyName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalSessionHost
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local session host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableRemoteConnection
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OverrideAdminWarning
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation overrides the Administrator warning.
      Specify this parameter to enable an Administrator to automatically log on.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AutoLogonEnable
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionHost
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the session host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoteConnection
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of station IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
