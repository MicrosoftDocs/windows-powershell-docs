syntaxes:
- syntax: |-
    ```Syntax
    Set-WmsStation
        [-StationId] <UInt32[]>
        -FriendlyName <String>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: FriendlyName
  isDefault: false
- syntax: |-
    ```Syntax
    Set-WmsStation
        [-StationId] <UInt32[]>
        -AutoLogonCredential <PSCredential>
        [-OverrideAdminWarning]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: AutoLogonEnable
  isDefault: false
- syntax: |-
    ```Syntax
    Set-WmsStation
        [-StationId] <UInt32[]>
        [-DisableAutoLogon]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableAutoLogon
  isDefault: false
- syntax: |-
    ```Syntax
    Set-WmsStation
        [-StationId] <UInt32[]>
        -SessionHost <String>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoteConnection
  isDefault: false
- syntax: |-
    ```Syntax
    Set-WmsStation
        [-StationId] <UInt32[]>
        -VmName <String>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoteConnectionVM
  isDefault: false
- syntax: |-
