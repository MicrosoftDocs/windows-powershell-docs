### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Split-WmsStation
name: Split-WmsStation
module: MultiPoint
isPreview: false
summary: |-
  Splits a station.
description: |-
  The **Split-WmsStation** cmdlet splits the specified station into two stations.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SplitAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of station IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SplitById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Split-WmsStation
        [-StationId] <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SplitById
  isDefault: false
- syntax: |-
    ```Syntax
    Split-WmsStation
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SplitAll
  isDefault: false
inputs:
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Split a station'
  description: |-
    ```
    PS C:\> Split-WmsStation -StationId 01
    ```

    This command splits the station with the ID 01 into two stations.
