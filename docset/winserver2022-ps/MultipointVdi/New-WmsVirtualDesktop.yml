### YamlMime:PowerShellCmdlet1
uid: MultipointVdi.New-WmsVirtualDesktop
name: New-WmsVirtualDesktop
module: MultipointVdi
isPreview: false
summary: |-
  Creates a virtual desktop.
description: |-
  The **New-WmsVirtualDesktop** cmdlet creates a virtual desktop from the specified virtual desktop template for a specified MultiPoint station or all stations, and replaces any existing stations in the process.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation creates a virtual desktop for all stations.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CreateAllVirtualDesktops
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Domain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Active Directory domain to contain the virtual desktop.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path of the input file to use for the virtual desktop template.
      Valid file types are .wim, .iso, or .vhd that contains the version of Windows to use as the guest operating system.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of station IDs for which to create a virtual desktop.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CreateVirtualDesktopById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TemplatePrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the prefix to use for the name of the virtual machine template.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VhdLocation
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to store the template and station .vhd files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-WmsVirtualDesktop
        [-StationId] <UInt32[]>
        -InputFilePath <String>
        -TemplatePrefix <String>
        [-VhdLocation <String>]
        [-Domain <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateVirtualDesktopById
  isDefault: false
- syntax: |-
    ```Syntax
    New-WmsVirtualDesktop
        -InputFilePath <String>
        -TemplatePrefix <String>
        [-All]
        [-VhdLocation <String>]
        [-Domain <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateAllVirtualDesktops
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a virtual desktop for all stations on a computer'
  description: |-
    ```
    PS C:\> New-WmsVirtualDesktop -All -InputFilePath "C:\Images\Windows10Enterprise.iso" -TemplatePrefix "MyVdiImage" -VhdLocation "C:\MultiPointVhdImages"
    ```

    This command creates a virtual desktop from the template in C:\Images\Windows10Enterprise.iso for all of the stations on a computer.
