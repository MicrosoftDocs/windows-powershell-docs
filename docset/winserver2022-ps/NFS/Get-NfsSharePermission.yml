### YamlMime:PowerShellCmdlet1
uid: NFS.Get-NfsSharePermission
name: Get-NfsSharePermission
module: NFS
isPreview: false
summary: |-
  Gets information about permissions that an NFS server grants to exported NFS shares.
description: |-
  The **Get-NfsSharePermission** cmdlet gets information about access permissions granted by a Network File System (NFS) server that has an NFS share configured.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet runs the command as a background job on a remote computer.
      Use this parameter to run commands that take an extensive time to finish.

      When you use the *AsJob* parameter, the command returns an object that represents the job, and then displays the command prompt.
      You can continue to work in the session while the job finishes.
      To manage the job, use the **Job** cmdlets.
      To get the job results, use the Receive-Job cmdlet.

      The *AsJob* parameter resembles using the Invoke-Command cmdlet to run a Start-Job command remotely.
      However, with *AsJob*, the job is created on the local computer, even though the job runs on a remote computer, and the results of the remote job are automatically returned to the local computer.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251) and [about_Remote_Jobs](https://go.microsoft.com/fwlink/?LinkID=135184).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a client name.
      The client name can be a host name or IP address, netgroup name, or client group name.
      To specify the type of client, use the *ClientType* parameter.
    aliases:
    - Client
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a client type.
      The acceptable values for this parameter are:

      - host
      - clientgroup
      - netgroup
    acceptedValues:
    - host
    - netgroup
    - clientgroup
    - builtin
    aliases:
    - Type
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an NFS share.
    aliases:
    - ShareName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the scoped network name of an NFS share.

      On a local share, *NetworkName* is the host name.
      On a cluster, it is the network name in the resource group to which the share is scoped.
    aliases:
    - netname
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of an NFS share.
    aliases:
    - SharePath
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPath
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of access to get for an NFS share.
      The acceptable values for this parameter are:

      - no-access
      - readonly
      - readwrite

      A client can have either read-only or read/write access.
      Only the All Machines group can have all three types of access.
    acceptedValues:
    - no-access
    - readonly
    - readwrite
    aliases:
    - Access
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NfsSharePermission
        [[-ClientName] <String>]
        [[-ClientType] <String>]
        [[-Permission] <String>]
        [-Name] <String>
        [-NetworkName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NfsSharePermission
        [-Path] <String>
        [[-ClientName] <String>]
        [[-ClientType] <String>]
        [[-Permission] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/microsoft/windows/nfs/MSFT_NfsSharePermission" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all permissions for a specified NFS share'
  description: |-
    ```
    PS C:\> Get-NfsSharePermission -Name "Export"
    ClientName        : All Machines
    ClientType        : Built-in Group
    Name              : Export
    Path              : C:\shares\Export
    Permission        : READ, WRITE
    AllowRootAccess   : ALLOW ACCESS
    LanguageEncoding  : ansi
    ```

    This command gets the permissions for an NFS share named Export.
- title: 'Example 2: Get read/write permissions for a specified NFS share'
  description: |-
    ```
    PS C:\> Get-NfsSharePermission -Name "Export" -Permission "readwrite"
    ```

    This command gets the read/write permissions for an NFS share named Export.
