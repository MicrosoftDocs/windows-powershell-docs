syntaxes:
- syntax: |-
    ```Syntax
    Revoke-NfsOpenFile
        [-Path] <String[]>
        [[-StateId] <String[]>]
        [[-ClientId] <UInt64[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Revoke-NfsOpenFile
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Nothing" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Revoke all open files on an NFS server'
  description: |-
    ```
    PS C:\> Revoke-NfsOpenFile -Path "C:\Shares\*"
    ```

    This command revokes all open files on a local NFS server that contain the name C:\Shares.
