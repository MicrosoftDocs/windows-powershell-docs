    ```Syntax
    Set-NfsMappingStore
        [-InputObject <CimInstance[]>]
        [-EnableUNMLookup <Boolean>]
        [-UNMServer <String>]
        [-EnableADLookup <Boolean>]
        [-ADDomainName <String>]
        [-EnableLdapLookup <Boolean>]
