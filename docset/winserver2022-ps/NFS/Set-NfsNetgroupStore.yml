syntaxes:
- syntax: |-
    ```Syntax
    Set-NfsNetgroupStore
        [-InputObject <CimInstance[]>]
        [-NetgroupStoreType <String>]
        [-NisServer <String>]
        [-NisDomain <String>]
        [-LdapServer <String>]
        [-LDAPNamingContext <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
