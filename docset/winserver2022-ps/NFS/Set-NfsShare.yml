syntaxes:
- syntax: |-
    ```Syntax
    Set-NfsShare
        [[-Authentication] <String[]>]
        [[-EnableAnonymousAccess] <Boolean>]
        [[-EnableUnmappedAccess] <Boolean>]
        [[-AnonymousGid] <Int32>]
        [[-AnonymousUid] <Int32>]
        [[-LanguageEncoding] <String>]
        [[-AllowRootAccess] <Boolean>]
        [[-Permission] <String>]
        [-Name] <String>
        [-NetworkName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NfsShare
        [-Path] <String>
        [[-Authentication] <String[]>]
        [[-EnableAnonymousAccess] <Boolean>]
        [[-EnableUnmappedAccess] <Boolean>]
        [[-AnonymousGid] <Int32>]
        [[-AnonymousUid] <Int32>]
        [[-LanguageEncoding] <String>]
        [[-AllowRootAccess] <Boolean>]
        [[-Permission] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: false
examples:
- title: 'Example 1: Enable unmapped user access on an NFS share'
  description: |-
    ```
    PS C:\> Set-NfsShare -Name "NFSshare01" -EnableUnmappedAccess $True
    ```

    This command enables unmapped users to access the NFS share NFSshare01.
- title: 'Example 2: Set the authentication protocol of an NFS share'
  description: |-
    ```
    PS C:\> Set-NfsShare -Name "NFSshare01" -Authentication "sys,krb5" -AnonymousUid 100 -AnonymousGid 200
    ```

    This command sets the authentication protocol as AUTH_SYS and Kerberos v5 on the NFS share NFSshare01.
    The command also sets the anonymous UID to 100 and the anonymous GID to 200.
