      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableAnonymousAccess
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Configures the NFS share to allow anonymous users to access it.
    aliases:
    - anon
    - AnonymousAccess
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableUnmappedAccess
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Configures the NFS share to allow unmapped UNIX users to access the share by using a UID or GID.
    aliases:
    - unmapped
    - UnmappedAccess
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LanguageEncoding
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the language encoding to configure on an NFS share.
      You can use only one language on the share.

      The acceptable values for this parameter are:

      - Euc-jp (Japanese)
      - Euc-tw (Chinese)
      - Euc-kr (Korean)
      - Shift-jis (Japanese)
      - Big5 (Chinese)
      - Ksc5601 (Korean)
      - Gb2312-80 (Simplified Chinese)
      - Ansi
    acceptedValues:
