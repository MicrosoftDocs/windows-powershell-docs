syntaxes:
- syntax: |-
    ```Syntax
    Get-NetAdapterChecksumOffload
        [[-Name] <String[]>]
        [-IncludeHidden]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetAdapterChecksumOffload
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapter ChecksumOffloadSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get the checksum offload properties of the specified network adapter'
  description: |-
    ```
    PS C:\> Get-NetAdapterChecksumOffload -Name "MyAdapter"
    ```

    This command gets the state of checksum offload properties of the network adapter named MyAdapter.
- title: 'Example 2: Get the checksum offload properties of the specified network adapter and display them'
  description: |-
    ```
    PS C:\> $NetworkAdapterC01 = Get-NetAdapterChecksumOffload -Name "MyAdapter"
    PS C:\> $NetworkAdapterC01.ChecksumOffloadHardwareCapabilities
    ```

    The first command gets the state of checksum offload properties from the network adapter named MyAdapter and stores the result in the variable named $NetworkAdapterC01.

    The second command displays the checksum offload hardware capabilities of the network adapter stored in the $NetworkAdapterC01.
