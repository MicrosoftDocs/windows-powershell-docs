syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterChecksumOffload
        [-Name] <String[]>
        [-IncludeHidden]
        [-IpIPv4Enabled <Direction>]
        [-TcpIPv4Enabled <Direction>]
        [-TcpIPv6Enabled <Direction>]
        [-UdpIPv4Enabled <Direction>]
        [-UdpIPv6Enabled <Direction>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterChecksumOffload
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-IpIPv4Enabled <Direction>]
        [-TcpIPv4Enabled <Direction>]
        [-TcpIPv6Enabled <Direction>]
        [-UdpIPv4Enabled <Direction>]
        [-UdpIPv6Enabled <Direction>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterChecksumOffload
        -InputObject <CimInstance[]>
        [-IpIPv4Enabled <Direction>]
        [-TcpIPv4Enabled <Direction>]
        [-TcpIPv6Enabled <Direction>]
        [-UdpIPv4Enabled <Direction>]
        [-UdpIPv6Enabled <Direction>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
