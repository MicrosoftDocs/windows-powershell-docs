syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterDataPathConfiguration
        [-Name] <String[]>
        [-IncludeHidden]
        [-Profile <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterDataPathConfiguration
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-Profile <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterDataPathConfiguration
        -InputObject <CimInstance[]>
        [-Profile <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the profile of a network adapter'
  description: |-
    ```powershell
    PS> Set-NetAdapterDataPathConfiguration -Name "Ethernet" -Profile Legacy
    ```

    Sets the profile to **Legacy** for the network adapter named **Ethernet**.
