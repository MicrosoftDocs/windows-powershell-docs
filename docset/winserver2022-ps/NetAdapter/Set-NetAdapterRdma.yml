syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterRdma
        [[-Name] <String[]>]
        [-IncludeHidden]
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterRdma
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterRdma
        -InputObject <CimInstance[]>
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
