syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterUso
        [-Name] <String[]>
        [-IncludeHidden]
        [-IPv4Enabled <Boolean>]
        [-IPv6Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterUso
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-IPv4Enabled <Boolean>]
        [-IPv6Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterUso
        -InputObject <CimInstance[]>
        [-IPv4Enabled <Boolean>]
        [-IPv6Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
