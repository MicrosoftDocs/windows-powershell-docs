syntaxes:
- syntax: |-
    ```Syntax
    Set-NetConnectionProfile
        [-Name <String[]>]
        [-InterfaceAlias <String[]>]
        [-InterfaceIndex <UInt32[]>]
        [-IPv4Connectivity <IPv4Connectivity[]>]
        [-IPv6Connectivity <IPv6Connectivity[]>]
        [-NetworkCategory <NetworkCategory>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetConnectionProfile
        -InputObject <CimInstance[]>
        [-NetworkCategory <NetworkCategory>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Change the network category of a connection profile'
  description: |-
    ```powershell
    PS C:\> Set-NetConnectionProfile -InterfaceAlias Ethernet1 -NetworkCategory "Public"
    ```
