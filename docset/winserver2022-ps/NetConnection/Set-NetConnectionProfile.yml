      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPv4Connectivity
    type: <xref href="IPv4Connectivity" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IPv4 protocol connectivity status values.
      The acceptable values for this parameter are:

      - Disconnected
      - NoTraffic
      - Subnet
      - LocalNetwork
      - Internet
    acceptedValues:
    - Disconnected
    - NoTraffic
    - Subnet
    - LocalNetwork
    - Internet
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPv6Connectivity
    type: <xref href="IPv6Connectivity" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IPv6 protocol connectivity status values.
      The acceptable values for this parameter are:

      - Disconnected
      - NoTraffic
      - Subnet
      - LocalNetwork
      - Internet
    acceptedValues:
    - Disconnected
    - NoTraffic
    - Subnet
    - LocalNetwork
    - Internet
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
      position: Named
