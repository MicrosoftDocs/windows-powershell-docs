### YamlMime:PowerShellCmdlet1
uid: NetEventPacketCapture.Add-NetEventPacketCaptureProvider
name: Add-NetEventPacketCaptureProvider
module: NetEventPacketCapture
isPreview: false
summary: |-
  Adds a Remote Packet Capture provider.
description: |-
  The **Add-NetEventPacketCaptureProvider** cmdlet adds a Remote Packet Capture provider.
  You can only use one packet capture provider at a time and you must remove an existing provider before you use this cmdlet to add a new provider.
  To remove an existing Remote Packet Capture provider, use the Remove-NetEventPacketCaptureProvider cmdlet.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CaptureType
    type: <xref href="CaptureType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether the packet capture is enabled for physical network adapters, virtual switches, or both. The acceptable values for this parameter are:
      The acceptable values for this parameter are:

      - Physical.
      Captures packets from physical network adapters.
      - Switch.
      Captures packets from the virtual machine switch(es) on Hyper-V hosts.
      - BothPhysicalAndSwitch.
      Captures packets from both the physical network adapters and the virtual machine switch(es).
    acceptedValues:
    - Physical
    - Switch
    - BothPhysicalAndSwitch
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EtherType
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of ether types.
      The most common ether types and their values are IPv4 (0800), IPv6 (86DD) and ARP (0806).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "7"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IpAddresses
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IP addresses.
      The provider logs network traffic that matches the addresses that this cmdlet specifies.
      The provider joins multiple addresses by using logical OR.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "8"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IpProtocols
    type: <xref href="Byte" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of one or more IP protocols, such as TCP or UDP, on which to filter.
      The packet capture provider logs network traffic that matches this filter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "9"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Level
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the level of Event Tracing for Windows (ETW) events for the provider.
      Use the level of detail for the event to filter the events that are logged.
      The default value for this parameter is 0x4.
      The acceptable values for this parameter are:

      - 0x5.
      Verbose
      - 0x4.
      Informational
      - 0x3.
      Warning
      - 0x2.
      Error
      - 0x1.
      Critical
      - 0x0.
      LogAlways

      The provider must log the event if the value of the event is less than or equal to the value of this parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LinkLayerAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of link layer, or Media Access Control (MAC), addresses.
      The packet capture provider logs network traffic that matches this filter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "6"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchAllKeyword
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a bitmask that restricts the events that the provider logs.
      Set the **MatchAnyKeyword** parameter value to 0 (zero) to match all keywords.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchAnyKeyword
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies keywords as a set of hexadecimal values.
      Keywords are flags that you can combine to generate values.
      Use a set of hexadecimal values of the keywords instead of the keyword names, and apply a filter to write ETW events for keyword matches.
      For more information, see [EnableTraceEx2 function](https://msdn.microsoft.com/en-us/library/windows/desktop/dd392305(v=vs.85)) in the Microsoft Developer Network library.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MultiLayer
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the capture occurs at various layers of the stack.
      By default, this parameter has a value of $False.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the session associated with the packet capture provider.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TruncationLength
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the display length of each captured packet.
      The default size is 128 bytes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "10"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VmCaptureDirection
    type: <xref href="VmCaptureDirection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the direction of network traffic for a virtual machine capture.
      The acceptable values for this parameter are:

      - Ingress.
      Network traffic from a virtual machine to a virtual switch.
      - Egress.
      Network traffic from a virtual switch to a virtual machine.
    acceptedValues:
    - Ingress
    - Egress
    - IngressAndEgress
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "11"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-NetEventPacketCaptureProvider
        [-SessionName] <String>
        [[-Level] <Byte>]
        [[-MatchAnyKeyword] <UInt64>]
        [[-MatchAllKeyword] <UInt64>]
        [[-CaptureType] <CaptureType>]
        [[-MultiLayer] <Boolean>]
        [[-LinkLayerAddress] <String[]>]
        [[-EtherType] <UInt16[]>]
        [[-IpAddresses] <String[]>]
        [[-IpProtocols] <Byte[]>]
        [[-TruncationLength] <UInt16>]
        [[-VmCaptureDirection] <VmCaptureDirection>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a packet capture provider'
  description: |-
    ```
    PS C:\>New-NetEventSession -Name "Session01"
    PS C:\> Add-NetEventProvider -Name "Microsoft-Windows-TCPIP" -SessionName "Session01"
    PS C:\> Add-NetEventPacketCaptureProvider -SessionName "Session01"
    ```

    This example adds a Remote Packet Capture provider to a session.

    The first command uses the New-NetEventSession cmdlet to create a new session named Session01.

    The second command adds a provider named Microsoft-Windows-TCPIP to the session named Session01 by using the Add-NetEventProvider cmdlet.

    The third command adds a packet capture provider to the session.
