### YamlMime:PowerShellCmdlet1
uid: NetEventPacketCapture.Add-NetEventVFPProvider
name: Add-NetEventVFPProvider
module: NetEventPacketCapture
isPreview: false
summary: |-
  Creates a VFP provider for network events.
description: |-
  The **Add-NetEventVFPProvider** cmdlet creates a Virtual Filtering Platform (VFP) provider for network events.
