    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "15"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TCPPorts
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of TCP ports.
      The provider filters and logs network traffic that matches the ports that this parameter specifies.
      The provider joins multiple port numbers with logical OR.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
