syntaxes:
- syntax: |-
    ```Syntax
    Set-NetEventSession
        [[-Name] <String[]>]
        [-CaptureMode <CaptureModes>]
        [-LocalFilePath <String>]
        [-MaxFileSize <UInt32>]
        [-MaxNumberOfBuffers <Byte>]
        [-TraceBufferSize <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetEventSession
        [-AssociatedEventProvider <CimInstance>]
        [-CaptureMode <CaptureModes>]
        [-LocalFilePath <String>]
        [-MaxFileSize <UInt32>]
        [-MaxNumberOfBuffers <Byte>]
        [-TraceBufferSize <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByProviderOfSession
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetEventSession
        -InputObject <CimInstance[]>
        [-CaptureMode <CaptureModes>]
        [-LocalFilePath <String>]
        [-MaxFileSize <UInt32>]
        [-MaxNumberOfBuffers <Byte>]
        [-TraceBufferSize <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Modify the file path for a session'
  description: |-
    ```
    PS C:\>Set-NetEventSession -LocalFilePath 'C:\WINDOWS\Temp\Trace.etl'
    ```

    This command modifies the file path for the network event session on the current computer.
    The new path is C:\WINDOWS\Temp\Trace.etl.
    If you change a session that is currently running, use the Stop-NetEventSession and Start-NetEventSession cmdlets to stop and restart logging.
