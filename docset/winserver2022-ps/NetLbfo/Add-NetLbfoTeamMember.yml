### YamlMime:PowerShellCmdlet1
uid: NetLbfo.Add-NetLbfoTeamMember
name: Add-NetLbfoTeamMember
module: NetLbfo
isPreview: false
summary: |-
  Adds a new member (network adapter) to a specified NIC team.
description: |-
  The **Add-NetLbfoTeamMember** cmdlet adds a new network adapter as a member to the specified team.
  You can use the *AdministrativeMode* parameter to specify the initial role of the new team member.
parameters:
  cmdletParameters:
  - name: AdministrativeMode
    type: <xref href="AdminModes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the initial role of the new member (network adapter).
      The acceptable values for this parameter are:

      - Active.
      Allows the team member to participate in the NIC team.
      - Standby.
      Places the member in a standby state where it does not participate in the team.
      The team member is automatically moved to the Active state if any other member of the team fails.

      By default, the initial role of the team member is Active.

      At most one member in a team can be in Standby mode.
    acceptedValues:
    - Active
    - Standby
    aliases:
    - am
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="WildcardPattern" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name (Interface Alias or Connection Name) of the network adapter to add.
    aliases:
    - ifAlias
    - InterfaceAlias
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Team
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the NIC team to which to add the new network adapter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-NetLbfoTeamMember
        [-Name] <WildcardPattern>
        [-Team] <String>
        [[-AdministrativeMode] <AdminModes>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet takes no input objects.
outputs:
- name: <xref href="MSFT_NetLbfoTeamMember" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an array of **MSFT_NetLbfoTeamMember** objects consisting of the newly added member network adapter objects to the team.
examples:
- title: 'Example 1: Add a new team member'
  description: |-
    ```
    PS C:\> Add-NetLbfoTeamMember -Name "NIC1" -Team "Team1"
    ```

    This command adds a new member named NIC1 to the specified team named Team1.
- title: 'Example 2: Add a new team member with initial status'
  description: |-
    ```
    PS C:\> Add-NetLbfoTeamMember -Name "NIC2" -Team "Team2" -AdministrativeMode Standby
    ```

    This command adds a new member named NIC2 to the specified team named Team2 with the initial status Standby.
- title: 'Example 3: Add new team members using wildcard pattern'
  description: |-
    ```
    PS C:\> Add-NetLbfoTeamMember -Name "NIC*" -Team "Team1"
    ```

    This command adds new members whose name starts with NIC to the specified team named Team1.
