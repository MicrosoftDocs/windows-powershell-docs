syntaxes:
- syntax: |-
    ```Syntax
    Set-NetLbfoTeamMember
        [[-Name] <String[]>]
        [[-Team] <String[]>]
        [-AdministrativeMode <AdminModes>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameAndOrTeam
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetLbfoTeamMember
        [-TeamOfTheMember <CimInstance>]
        [-AdministrativeMode <AdminModes>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByTeamOfTheMember
  isDefault: false
- syntax: |-
