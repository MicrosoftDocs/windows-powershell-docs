syntaxes:
- syntax: |-
    ```Syntax
    Add-NetNatStaticMapping
        [-NatName] <String>
        -Protocol <Protocol>
        [-RemoteExternalIPAddressPrefix <String>]
        -ExternalIPAddress <String>
        -ExternalPort <UInt16>
        -InternalIPAddress <String>
        [-InternalPort <UInt16>]
        [-InternalRoutingDomainId <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
