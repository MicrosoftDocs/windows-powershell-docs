syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetNatExternalAddress
        [[-NatName] <String[]>]
        [-ExternalAddressID <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-NetNatExternalAddress
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
