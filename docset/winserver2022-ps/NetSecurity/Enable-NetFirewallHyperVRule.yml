    Enable-NetFirewallHyperVRule
        [-All]
        [-PolicyStore <string>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <int>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GetAll
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-NetFirewallHyperVRule
        [-Name] <string[]>
        [-PolicyStore <string>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <int>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-NetFirewallHyperVRule
        -DisplayName <string[]>
        [-PolicyStore <string>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <int>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByDisplayName
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-NetFirewallHyperVRule
        [-VMCreatorId <string[]>]
        [-Protocol <string[]>]
        [-PolicyStore <string>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <int>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByQuery
  isDefault: false
- syntax: |-
