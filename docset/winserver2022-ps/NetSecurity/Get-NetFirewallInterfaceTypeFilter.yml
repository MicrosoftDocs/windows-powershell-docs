syntaxes:
- syntax: |-
    ```Syntax
    Get-NetFirewallInterfaceTypeFilter
        [-All]
        [-PolicyStore <String>]
        [-GPOSession <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: GetAll
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetFirewallInterfaceTypeFilter
        [-InterfaceType <InterfaceType[]>]
        [-PolicyStore <String>]
        [-GPOSession <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByQuery
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetFirewallInterfaceTypeFilter
        -AssociatedNetFirewallRule <CimInstance>
        [-PolicyStore <String>]
        [-GPOSession <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByAssociatedNetFirewallRule
  isDefault: false
- syntax: |-
    ```Syntax
    Get-NetFirewallInterfaceTypeFilter
        -AssociatedNetIPsecRule <CimInstance>
        [-PolicyStore <String>]
        [-GPOSession <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByAssociatedNetIPsecRule
  isDefault: false
