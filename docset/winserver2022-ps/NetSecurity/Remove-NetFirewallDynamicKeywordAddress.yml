syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetFirewallDynamicKeywordAddress
        [-All]
        [-PolicyStore <String>]
        [-AllAutoResolve]
        [-AllNonAutoResolve]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GetAll
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-NetFirewallDynamicKeywordAddress
        [-Id] <String[]>
        [-PolicyStore <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
