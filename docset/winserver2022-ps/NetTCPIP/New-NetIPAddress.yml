syntaxes:
- syntax: |-
    ```Syntax
    New-NetIPAddress
        [-IPAddress] <String>
        -InterfaceAlias <String>
        [-DefaultGateway <String>]
        [-AddressFamily <AddressFamily>]
        [-Type <Type>]
        [-PrefixLength <Byte>]
        [-ValidLifetime <TimeSpan>]
        [-PreferredLifetime <TimeSpan>]
        [-SkipAsSource <Boolean>]
        [-PolicyStore <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInterfaceAlias
  isDefault: true
- syntax: |-
    ```Syntax
    New-NetIPAddress
        [-IPAddress] <String>
        -InterfaceIndex <UInt32>
        [-DefaultGateway <String>]
        [-AddressFamily <AddressFamily>]
        [-Type <Type>]
        [-PrefixLength <Byte>]
        [-ValidLifetime <TimeSpan>]
        [-PreferredLifetime <TimeSpan>]
        [-SkipAsSource <Boolean>]
        [-PolicyStore <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInterfaceIndex
  isDefault: false
