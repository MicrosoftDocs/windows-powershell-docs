syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetIPAddress
        [[-IPAddress] <String[]>]
        [-InterfaceIndex <UInt32[]>]
        [-InterfaceAlias <String[]>]
        [-AddressFamily <AddressFamily[]>]
        [-Type <Type[]>]
        [-PrefixLength <Byte[]>]
        [-PrefixOrigin <PrefixOrigin[]>]
        [-SuffixOrigin <SuffixOrigin[]>]
        [-AddressState <AddressState[]>]
        [-ValidLifetime <TimeSpan[]>]
        [-PreferredLifetime <TimeSpan[]>]
        [-SkipAsSource <Boolean[]>]
        [-PolicyStore <String>]
        [-DefaultGateway <String>]
        [-IncludeAllCompartments]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-NetIPAddress
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
