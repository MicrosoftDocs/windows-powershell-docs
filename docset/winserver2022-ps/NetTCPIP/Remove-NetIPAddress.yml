    acceptedValues:
    - Unicast
    - Anycast
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ValidLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values of valid lifetimes, as **TimeSpan** objects, for an IP address.
      To obtain a **TimeSpan** object, use the New-TimeSpan cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
      position: Named
