### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Remove-NetRoute
name: Remove-NetRoute
module: NetTCPIP
isPreview: false
summary: |-
  Removes IP routes from the IP routing table.
description: |-
  The **Remove-NetRoute** cmdlet removes IP routes from the IP routing table.
  Run this cmdlet without any parameters to remove all IP routes from the routing table, including default routes.
  You can also specify routes to remove by specifying parameters, or by using the Get-NetRoute cmdlet.

  For more information about routing, see Chapter 5 - [IP Routing](https://technet.microsoft.com/library/bb727001.aspx) in the TechNet library.
parameters:
  cmdletParameters:
  - name: AddressFamily
    type: <xref href="AddressFamily" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IP address families of IP routes.
      The cmdlet removes IP routes that belong to the families that you specify.
      The acceptable values for this parameter are:

      - IPv4
      - IPv6
    acceptedValues:
    - IPv4
    - IPv6
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssociatedIPInterface
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an IP interface as a **CIM** object.
      The cmdlet removes IP routes that belong to the interfaces that you specify.
      To obtain an IP interface, use the Get-NetIPInterface cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompartmentId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of identifiers for network compartments in the protocol stack.
      By default, the cmdlet only removes Net routes in the default compartment.
      If you specify a value, the cmdlet removes any matching Net routes in all compartments in this field.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of destination prefixes of IP routes.
      The cmdlet removes IP routes that use the prefixes that you specify.
      A destination prefix contains an IP address prefix and a prefix length, separated by a slash (/).
      A value of 0.0.0.0/0 for IPv4 or ::/0 for IPv6 indicates that the value of the **NextHop** parameter is a default gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeAllCompartments
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet includes routes from all configured network compartments.
      If you do not specify this parameter, the cmdlet removes only routes in the default network compartment.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceAlias
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of aliases of network interfaces.
      The cmdlet removes IP routes for the interfaces that have the aliases that you specify.
    aliases:
    - ifAlias
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceIndex
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of indexes of network interfaces.
      The cmdlet removes IP routes for the interfaces located at the indexes that you specify.
    aliases:
    - ifIndex
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceMetric
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of integer interface metrics for network interfaces. The cmdlet gets IP routes
      for the interfaces that have the metric that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHop
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of next hop values.
      The cmdlet removes routes that have the next hop values that you specify.
      A value of 0.0.0.0 for IPv4 or :: for IPv6 indicates that the route is on the local subnet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PolicyStore** value.
      The cmdlet removes IP routes that have the **PolicyStore** value that you specify.
      The acceptable values for this parameter are:

      - ActiveStore.
      The IP address information is valid.
      - PersistentStore.
      The computer saves IP address information across restarts.
      When the computer restarts, it copies the saved settings to the ActiveStore.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PreferredLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values for preferred lifetime, as **TimeSpan** objects, of IP routes.
      The cmdlet removes IP routes that have the lifetimes that you specify.
      To obtain a **TimeSpan** object, use the New-TimeSpan cmdlet.
      For more information, type `Get-Help New-TimeSpan`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="Protocol" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of types of routing protocols.
      The cmdlet removes IP routes that use the protocols that you specify.
      The acceptable values for this parameter are:

      - Bbn
      - Bgp
      - Dhcp
      - Dvmrp
      - Egp
      - Eigrp
      - EsIs
      - Ggp
      - Hello
      - Icmp
      - Idpr
      - Igrp
      - IsIs
      - Local
      - NetMgmt
      - Ospf
      - Rip
      - Rpl
      - Other
    acceptedValues:
    - Other
    - Local
    - NetMgmt
    - Icmp
    - Egp
    - Ggp
    - Hello
    - Rip
    - IsIs
    - EsIs
    - Igrp
    - Bbn
    - Ospf
    - Bgp
    - Idpr
    - Eigrp
    - Dvmrp
    - Rpl
    - Dhcp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Publish
    type: <xref href="Publish" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of publish settings of IP routes.
      The cmdlet removes IP routes that have the publish settings that you specify.
      The acceptable values for this parameter are:

      - No.
      Do not publish or advertise IP route information in router advertisements.
      - Yes.
      Publish and advertise IP route information that includes an infinite valid lifetime in router advertisements
      - Age.
      Publish and advertise IP route information with a finite valid lifetime in router advertisements.
    acceptedValues:
    - No
    - Age
    - Yes
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteMetric
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of integer route metrics for IP routes.
      The cmdlet removes IP routes that have the metrics that you specify.
      To choose among multiple routes, the computer adds this value to the interface metric value.
      The computer selects the route with the lowest combined value.
      To modify the interface metric, use the Set-NetIPInterface cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="State" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of state values for IP routes. The cmdlet gets entries that have the state values
      that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell&reg; calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ValidLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values for valid lifetime, as a **TimeSpan** object, for IP routes.
      The cmdlet removes IP routes that have the lifetime that you specify.
      To obtain a **TimeSpan** object, use the New-TimeSpan cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
