syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetRoute
        [[-DestinationPrefix] <String[]>]
        [-InterfaceIndex <UInt32[]>]
        [-InterfaceAlias <String[]>]
        [-NextHop <String[]>]
        [-AddressFamily <AddressFamily[]>]
        [-Publish <Publish[]>]
        [-RouteMetric <UInt16[]>]
        [-Protocol <Protocol[]>]
        [-CompartmentId <UInt32[]>]
        [-ValidLifetime <TimeSpan[]>]
        [-PreferredLifetime <TimeSpan[]>]
        [-State <State[]>]
        [-InterfaceMetric <UInt32[]>]
        [-AssociatedIPInterface <CimInstance>]
        [-PolicyStore <String>]
        [-IncludeAllCompartments]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-NetRoute
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#rootStandardCimv2MSFT_NetRoute" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove all routes'
  description: |-
    ```
    PS C:\>Remove-NetRoute
    ```

    This command removes all of the IP routes on the computer, including default routes.
- title: 'Example 2: Remove routes for a specified next hop'
  description: |-
    ```
    PS C:\>Remove-NetRoute -NextHop "192.168.0.1"
    ```

    This command removes all of the IP routes that have a next hop of 192.168.0.1.
