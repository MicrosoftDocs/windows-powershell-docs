### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Set-NetIPv6Protocol
name: Set-NetIPv6Protocol
module: NetTCPIP
isPreview: false
summary: |-
  Modifies the IPv6 protocol configuration.
description: |-
  The **Set-NetIPv6Protocol** cmdlet modifies the global IPv6 protocol configuration for a computer.
  If you do not specify any parameters for the cmdlet, the cmdlet sets the default values for the IPv6 protocol configuration.
parameters:
  cmdletParameters:
  - name: AddressMaskReply
    type: <xref href="AddressMaskReply" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for address mask reply.
      The cmdlet modifies the value for this setting.
      Address mask reply specifies how the computer responds to ICMP address mask packets.
      The acceptable values for this parameter are:

      - Enabled.
      The computer responds to ICMP address mask packets.
      - Disabled.
      The computer does not respond to ICMP address mask packets.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeadGatewayDetection
    type: <xref href="DeadGatewayDetection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an array of values for dead gateway detection. The cmdlet gets IPv6 protocol
      configurations that have these values.
      Dead gateway detection is a feature that identifies gateways that are not operating properly and
      switches the computer to a new default gateway if available.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultHopLimit
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the default hop limit.
      The cmdlet modifies the value for this setting.
      This parameter sets the default value for the **CurrentHopLimit** property in the IP interface.
      The current hop limit is the value that the IP interface writes in the hop limit field in all outbound IPv6 traffic.
      When routers forward a packet, they decrement the hop limit by 1 and discard the packet when the hop limit is 0.
      The default value is 128.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DhcpMediaSense
    type: <xref href="DhcpMediaSense" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for Media Sense.
      The cmdlet modifies the value for this setting.

      Media Sense provides a mechanism for the network adapter to notify the protocol stack of media connect and disconnect events.
      These events trigger the DHCP client to take an action, such as attempting to renew a DHCP lease or removing routes that are related to a disconnected network.
      When Media Sense is enabled, the network parameters on the laptop of a roaming user are automatically and transparently updated without requiring a restart when the user moves from one location to another.
      The acceptable values for this parameter are:

      - Enabled
      - Disabled

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GroupForwardedFragments
    type: <xref href="GroupForwardedFragments" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for group forwarded fragments.
      The cmdlet modifies the value for this setting.
      Group forwarded fragments specifies whether the IP interface collects fragments into groups before it forwards the fragments.
      This parameter sets the **GroupForwardedFragments** property in the IP interface.
      The acceptable values for this parameter are:

      - Enabled.
      The IP interface collects IPv6 protocol fragments into groups before it forwards the fragments.
      - Disabled.
      The IP interface does not collect IPv6 protocol fragments into groups before it forwards the fragments.

      The default value is Disabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IcmpRedirects
    type: <xref href="IcmpRedirects" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for Internet Control Message Protocol (ICMP) redirect.
      The cmdlet modifies the value for this setting.
      ICMP redirect specifies whether to update the path cache in response to ICMP redirect packets.
      This parameter sets the **IcmpRedirects** property in the IP interface.
      The acceptable values for this parameter are:

      - Enabled.
      The IP interface updates the path cache in response to ICMP redirect packets.
      - Disabled.
      The IP interface does not update the path cache in response to ICMP redirect packets.

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxTemporaryDadAttempts
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the maximum number of duplicate address detection attempts for temporary addresses.
      The cmdlet modifies the value for this setting.
    aliases:
    - MaxDadAttempts
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxTemporaryDesyncTime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the maximum time to desynchronize temporary address preferred lifetimes.
      The cmdlet modifies the value for this setting.
    aliases:
    - MaxRandomTime
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxTemporaryPreferredLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an array of values, as **TimeSpan** objects, for the maximum preferred lifetime over which to prefer a temporary address.
      The cmdlet gets IPv6 protocol configurations that have these values.
    aliases:
    - MaxPreferredLifetime
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxTemporaryValidLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value, as a **TimeSpan** object, for the maximum lifetime over which a temporary address is valid.
      The cmdlet modifies the value for this setting.
    aliases:
    - MaxValidLifetime
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MediaSenseEventLog
    type: <xref href="MediaSenseEventLog" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for Media Sense event log.
      The cmdlet modifies the value for this setting.
      The acceptable values for this parameter are:

      - Enabled.
      The IP interface logs DHCP Media Sense events in the event log for troubleshooting purposes.
      - Disabled.
      The IP interface does not log DHCP Media Sense events in the event log.

      The default value is Disabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MldLevel
    type: <xref href="MldLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the level of Multicast Listener Discovery (MLD) support.
      The cmdlet modifies the value for this setting.
      The acceptable values for this parameter are:

      - All.
      The computer can send and receive multicast packets.
      - None.
      The computer cannot send or receive multicast packets.
      - SendOnly.
      The computer can send but not receive multicast packets.
    acceptedValues:
    - None
    - SendOnly
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MldVersion
    type: <xref href="MldVersion" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the maximum version of Multicast Listener Discovery that the host supports.
      The cmdlet modifies the value for this setting.
    acceptedValues:
    - Version1
    - Version2
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MulticastForwarding
    type: <xref href="MulticastForwarding" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for multicast forwarding.
      The cmdlet modifies the value for this setting.
      The acceptable values for this parameter are:

      - Enabled.
      The computer can forward multicast packets.
      - Disabled.
      The computer cannot forward multicast packets.

      The default value is Disabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NeighborCacheLimitEntries
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of entries in the neighbor cache, which consists of all dynamic neighbors no longer referenced.
      The cmdlet modifies the value for this setting.

      The default value is 256.
    aliases:
    - NeighborCacheLimit
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RandomizeIdentifiers
    type: <xref href="RandomizeIdentifiers" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the randomization of identifiers.
      The cmdlet modifies the value for this setting.
      The acceptable values for this parameter are:

      - Enabled.
      The IP interface randomizes identifiers when it creates an IP address.
      - Disabled.
      The IP interface does not randomize identifiers when it creates an IP address.

      The default value is Enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReassemblyLimitBytes
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the maximum size of the reassembly buffer.
      The cmdlet modifies the value for this setting.
    aliases:
    - ReassemblyLimit
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteCacheLimitEntries
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for the maximum number of route cache entries.
      The cmdlet modifies the value for this setting.

      The default value is 128.
    aliases:
    - RouteCacheLimit
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceRoutingBehavior
    type: <xref href="SourceRoutingBehavior" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for source routing behavior.
      The cmdlet modifies the value for this setting.
      The acceptable values for this parameter are:

      - DontForward.
      The computer can receive but not forward source-routed packets.
      - Drop.
      The computer drops source-routed packets.

      The default value is DontForward.
    acceptedValues:
    - Forward
    - DontForward
    - Drop
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TemporaryRegenerateTime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value, as a **TimeSpan** object, for the time prior to deprecating a temporary address when a new address is generated.

      The cmdlet modifies the value for this setting.
    aliases:
    - RegenerateTime
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell&reg; calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UseTemporaryAddresses
    type: <xref href="UseTemporaryAddresses" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value for temporary addresses.
      The cmdlet modifies the value for this setting.

      - Always.
      The computer always generates temporary addresses by using random numbers.
      - Counter.
      The computer generates temporary addresses by using the interface identifier.
      You typically use this identifier for test purposes.
      - Disabled.
      The computer does not use temporary addresses.
      - Enabled.
      The computer uses temporary addresses.
    acceptedValues:
    - Disabled
    - Enabled
    - Always
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
