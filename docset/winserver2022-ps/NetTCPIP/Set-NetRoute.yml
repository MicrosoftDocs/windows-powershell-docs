syntaxes:
- syntax: |-
    ```Syntax
    Set-NetRoute
        [[-DestinationPrefix] <String[]>]
        [-InterfaceIndex <UInt32[]>]
        [-InterfaceAlias <String[]>]
        [-NextHop <String[]>]
        [-AddressFamily <AddressFamily[]>]
        [-Protocol <Protocol[]>]
        [-PolicyStore <String>]
        [-IncludeAllCompartments]
        [-Publish <Publish>]
        [-RouteMetric <UInt16>]
        [-ValidLifetime <TimeSpan>]
        [-PreferredLifetime <TimeSpan>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetRoute
        -InputObject <CimInstance[]>
        [-Publish <Publish>]
        [-RouteMetric <UInt16>]
        [-ValidLifetime <TimeSpan>]
        [-PreferredLifetime <TimeSpan>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetPrefixPolicy" data-throw-if-not-resolved="False" />
  description: |-
