syntaxes:
- syntax: |-
    ```Syntax
    Get-NetworkControllerLoadBalancer
        [[-ResourceId] <String[]>]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
