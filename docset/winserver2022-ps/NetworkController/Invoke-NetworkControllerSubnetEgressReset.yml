uid: NetworkController.Invoke-NetworkControllerSubnetEgressReset
name: Invoke-NetworkControllerSubnetEgressReset
module: NetworkController
isPreview: false
summary: |-
  Resets egress metering counters for Network Controller.
description: |-
  The **Invoke-NetworkControllerSubnetEgressReset** cmdlet resets egress metering counters for Network Controller.
