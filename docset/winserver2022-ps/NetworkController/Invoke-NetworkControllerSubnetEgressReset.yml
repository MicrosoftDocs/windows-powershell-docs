syntaxes:
- syntax: |-
    ```Syntax
    Invoke-NetworkControllerSubnetEgressReset
        [[-Tags] <PSObject>]
        [-Properties] <SubnetEgressResetProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [[-ResourceId] <String>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
