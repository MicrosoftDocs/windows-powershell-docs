syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerBackup
        [-ResourceId] <String>
        [[-Tags] <PSObject>]
        [-Properties] <NetworkControllerBackupProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
