uid: NetworkController.New-NetworkControllerNetworkInterfaceIpConfiguration
name: New-NetworkControllerNetworkInterfaceIpConfiguration
module: NetworkController
isPreview: false
summary: |-
  This cmdlet adds/updates an IP configuration to a network interface in the Network Controller
