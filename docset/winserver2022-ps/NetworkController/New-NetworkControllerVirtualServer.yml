### YamlMime:PowerShellCmdlet1
uid: NetworkController.New-NetworkControllerVirtualServer
name: New-NetworkControllerVirtualServer
module: NetworkController
isPreview: false
summary: |-
  Adds a new virtual server to the Network Controller.
  If already present, updates the properties of the virtual server
description: |-
  Adds a new virtual server to the Network Controller.
  If already present, updates the properties of the virtual server
