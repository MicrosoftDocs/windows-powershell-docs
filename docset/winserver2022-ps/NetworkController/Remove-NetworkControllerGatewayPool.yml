    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetworkControllerGatewayPool
        [-ResourceId] <String>
        [[-Etag] <String>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a gateway pool configuration from the Network Controller'
  description: |-
    ```
    PS C:\> Remove-NetworkControllerGateway -ConnectionUri "https://networkcontroller" -ResourceId "ForwardingGWPool"
    Confirm
    Performing the operation 'Remove-NetworkControllerGatewayPool' on entities of type 'Microsoft.Windows.NetworkController.GatewayPool' via 'https://networkcontroller/networking/v1/gatewayPools/ForwardingGWPool '. Are you sure
    you want to continue?
    [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): Yes
    ```

    This command removes the configuration for the gateway pool ForwardingGWPool from the Network Controller.
