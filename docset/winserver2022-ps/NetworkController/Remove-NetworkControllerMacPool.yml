examples:
- title: Example 1
  description: |-
    ```
    Remove-NetworkControllerMacPool -ConnectionUri https://networkcontroller -ResourceId "MacPool1"
    ```

    Description



    This example removes a MAC pool named MAcPool1 from the Network Controller
