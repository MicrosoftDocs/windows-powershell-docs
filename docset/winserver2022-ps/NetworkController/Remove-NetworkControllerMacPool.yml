syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetworkControllerMacPool
        [-ResourceId] <String>
        [[-Etag] <String>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
