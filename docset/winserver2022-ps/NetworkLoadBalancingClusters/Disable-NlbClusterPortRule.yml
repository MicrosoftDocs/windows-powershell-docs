### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Disable-NlbClusterPortRule
name: Disable-NlbClusterPortRule
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Disables a port rule on a Network Load Balancing (NLB) cluster or on a specific host in the cluster.
description: |-
  The **Disable-NlbClusterPortRule** cmdlet disables a specific port rule on a Network Load Balancing (NLB) cluster or on a specific host in the NLB cluster.
  Disabling new traffic handling should be considered for the port rule using the optional *Drain* parameter.
  Specifying the *Drain* parameter at the cluster level drains the specified ports on all hosts within the cluster, and specifying it at the host level drains the ports on the specific host only.
parameters:
  cmdletParameters:
  - name: ClusterWide
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet disables the given port rule on all cluster nodes.
      If this parameter is omitted, then the port rule is only disabled on one node.
    aliases:
    - Cluster
    - C
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Drain
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet drains existing traffic before disabling this port rule.
      If this parameter is omitted, then existing traffic is dropped.
    aliases:
    - D
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PortRule" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of cluster port rules that this cmdlet disables.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IP
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address for the cluster port rule that this cmdlet disables.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a port number within the port rule that will be disabled.
      The acceptable values for this parameter are: 0 through 65535.
    aliases:
    - P
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Timeout
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of minutes to wait for the drain operation before the port rule is disabled.
      After the time expires, the existing connections will be dropped.
    aliases:
    - T
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-NlbClusterPortRule
        [-Port] <UInt32>
        [-Drain]
        [-Timeout <UInt32>]
        [-ClusterWide]
        [-HostName <String>]
        [-InterfaceName <String>]
        [-IP <IPAddress>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-NlbClusterPortRule
        -InputObject <PortRule[]>
        [-Drain]
        [-Timeout <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.PortRule" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.PortRule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable a port rule for a port number on the local cluster'
  description: |-
    ```
    PS C:\>Disable-NlbClusterPortRule -Port 80
    IPAddress State     Start     End       Protocol  Mode      Affinity  Timeout
    --------- -----     -----     ---       --------  ----      --------  -------
    All       Disabled  80        80        Both      Multiple  Single    0
    ```

    This command disables the port rule for port number 80 on the local cluster.
- title: 'Example 2: Disable all port rules on the local cluster'
  description: |-
    ```
    PS C:\>Get-NlbClusterPortRule | Disable-NlbClusterPortRule
    IPAddress State     Start     End       Protocol  Mode      Affinity  Timeout
    --------- -----     -----     ---       --------  ----      --------  -------
    All       Disabled  80        80        Both      Multiple  Single    0
    ```

    This command disables all port rules on the local cluster.
