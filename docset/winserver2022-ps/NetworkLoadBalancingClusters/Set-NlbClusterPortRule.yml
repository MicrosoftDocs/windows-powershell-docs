syntaxes:
- syntax: |-
    ```Syntax
    Set-NlbClusterPortRule
        [[-Port] <UInt32>]
        [-HostName <String>]
        [-InterfaceName <String>]
        [-IP <IPAddress>]
        [-NewIP <IPAddress>]
        [-NewProtocol <PortRuleProtocol>]
        [-NewStartPort <Int32>]
        [-NewEndPort <Int32>]
        [-NewMode <PortRuleFilteringMode>]
        [-NewAffinity <PortRuleAffinity>]
        [-NewTimeout <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
