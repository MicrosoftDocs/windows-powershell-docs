### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Start-NlbClusterNode
name: Start-NlbClusterNode
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Starts a NLB cluster node.
description: |-
  The **Start-NlbClusterNode** cmdlet starts a node in a Network Load Balancing (NLB) cluster.
  Once the node is started, NLB includes that node in load balancing network traffic.
parameters:
  cmdletParameters:
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Node" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of cluster nodes that this cmdlet starts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Start-NlbClusterNode
        [[-HostName] <String>]
        [-InterfaceName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Start-NlbClusterNode
        -InputObject <Node[]>
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Node" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Node" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Start a cluster node on the local cluster'
  description: |-
    ```
    PS C:\>Start-NlbClusterNode -InputObject "Node2"
    Name                State               Interface           HostID
    ----                -----               ---------           ------
    Node2               Converged           vlan-3              2
    ```

    This example starts cluster node named Node2 on the local cluster.
