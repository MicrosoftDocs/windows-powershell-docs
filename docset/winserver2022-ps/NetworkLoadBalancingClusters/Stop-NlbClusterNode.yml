### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Stop-NlbClusterNode
name: Stop-NlbClusterNode
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Stops a node in a NLB cluster.
description: |-
  The **Stop-NlbClusterNode** cmdlet stops a node in a Network Load Balancing (NLB) cluster.
  When the nodes are stopped in the cluster, client connections that are already in progress are interrupted.
  To avoid interrupting active connections, consider using the *Drain* parameter, which allows the node to continue servicing active connections but disables all new traffic to that node.
parameters:
  cmdletParameters:
  - name: Drain
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet drains existing traffic before stopping the cluster node.
      If this parameter is omitted, then the existing traffic is dropped.
    aliases:
    - D
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Node" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the cluster node to stop.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Timeout
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of seconds to wait for the drain operation before stopping the cluster node.
      After the time expires, the existing connections are dropped.
    aliases:
    - T
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Stop-NlbClusterNode
        [[-HostName] <String>]
        [-Drain]
        [-Timeout <UInt32>]
        [-InterfaceName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-NlbClusterNode
        -InputObject <Node[]>
        [-Drain]
        [-Timeout <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Node" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Node" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Stop a cluster node on the local cluster'
  description: |-
    ```
    PS C:\>Stop-NlbClusterNode "Node2"
    Name                State               Interface           HostID
    ----                -----               ---------           ------
    node2               Stopped             vlan-3              2
    ```

    This command stops the cluster node named Node2 on the local cluster.
- title: 'Example 2: Stop the local cluster node'
  description: |-
    ```
    PS C:\>Stop-NlbClusterNode -Drain -Timeout 10
    Name                State               Interface           HostID
    ----                -----               ---------           ------
    node3               Stopped             vlan-3              3
    ```

    This command stops the local cluster node.
    Before this cmdlet stops the cluster, this cmdlet drains all existing connections for up to 10 seconds.
    During that time, new connections will not be established on this node.
    Any remaining connections after the 10 seconds will be forcefully terminated.
