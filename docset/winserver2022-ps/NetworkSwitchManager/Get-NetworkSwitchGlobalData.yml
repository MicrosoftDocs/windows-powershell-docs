### YamlMime:PowerShellCmdlet1
uid: NetworkSwitchManager.Get-NetworkSwitchGlobalData
name: Get-NetworkSwitchGlobalData
module: NetworkSwitchManager
isPreview: false
summary: |-
  Gets global data of a network switch.
description: |-
  The **Get-NetworkSwitchGlobalData** cmdlet gets global data of a network switch.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **CimSession** that this cmdlet uses to connect to the network switch.
      For more information about **CimSession** objects, type `Get-Help New-CimSession`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetworkSwitchGlobalData
        [-CimSession] <CimSession>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_GlobalEthernetSwitchSettingData" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get global data'
  description: |-
    ```
    PS C:\>$Session = New-CimSession -ComputerName "NetworkSwitch08"
    PS C:\> Get-NetworkSwitchGlobalData -CimSession $Session
    ```

    The first command creates a **CimSession** for a network switch, and then stores it in the **$Session** variable.
    For more information about **CimSession** objects, type `Get-Help New-CimSession`.

    The second command gets global data for the network switch NetworkSwitch08 by using the **$Session** object.
