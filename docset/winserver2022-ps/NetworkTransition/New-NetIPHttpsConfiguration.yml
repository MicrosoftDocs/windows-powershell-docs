### YamlMime:PowerShellCmdlet1
uid: NetworkTransition.New-NetIPHttpsConfiguration
name: New-NetIPHttpsConfiguration
module: NetworkTransition
isPreview: false
summary: |-
  Creates an IP-HTTPS configuration.
description: |-
  The **New-NetIPHttpsConfiguration** cmdlet creates an IP-HTTPS configuration.

  This cmdlet can create IP-HTTPS configurations on the ActiveStore, PersistentStore, or Group Policy Objects (GPOs).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthMode
    type: <xref href="AuthMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the authentication mode of the IP-HTTPS configuration.The acceptable values for this parameter are:

      - None.
      Performs no client authentication during the SSL handshake.
      This is the default value.
      - Certificates.
      Uses client certificates to authenticate clients.
      This authentication mode applies only to a server interface on a computer running Windows Server® 2012 or Windows Server 2016.
    acceptedValues:
    - None
    - Certificates
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GPOSession
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Group Policy session in which to store the configuration information.

      You can use this parameter with the **NetGPO** cmdlets to aggregate multiple operations performed on a GPO.

      You cannot use this parameter with the *PolicyStore* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByGpoSession
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store to which to add the configuration profile.
      The acceptable values for this parameter are:

      - ActiveStore
      - PersistentStore
      - GPO

      To add the configuration profile to a GPO, specify the GPO name using the following format: Domain\GPOName

      You cannot use this parameter with the *GPOSession* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name by which to identify the IP-HTTPS configuration profile.
      This option is only available if the store is a GPO.
    aliases:
    - IPHttpsProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerURL
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URL for the server.
      If the profile is a client profile, Windows Server 2012 or Windows Server 2016 attempts to connect to the server URL.
      If the profile is a server profile, then this is the URL on which the server listens.

      Specify the server URL using the following format: https://myserver/IPHTTPS
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="State" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the state behavior of IP-HTTPS.
      The acceptable values for this parameter are:

      - Default:

      ---- For a server interface, IP-HTTPS is always configured.

      ---- For a client interface, IP-HTTPS is configured on-demand based on the other connectivity options available.
      Client interfaces are created with this setting by default.

      - Enabled.
      IP-HTTPS is always configured, for both server interfaces and client interfaces.
      Server interfaces are created with this setting by default.

      - Disabled.
      Disables the IP-HTTPS interface.

      - OutsideEnabled.
      IP-HTTPs is configured on-demand whenever the computer is outside of the corporate network.
    acceptedValues:
    - Default
    - Enabled
    - Disabled
    - OutsideEnabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StrongCRLRequired
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates if a strong certificate revocation list (CRL) check is required before a connection.

      By default, the value of this parameter is $False.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="Type" data-throw-if-not-resolved="False" />
    description: |-
      Specifies if IP-HTTPS should start in server mode or client mode.
      Server mode is only allowed on Windows Server 2012.
    acceptedValues:
    - Client
    - Server
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-NetIPHttpsConfiguration
        [-PolicyStore] <String>
        -ServerURL <String>
        [-Profile <String>]
        [-Type <Type>]
        [-State <State>]
        [-AuthMode <AuthMode>]
        [-StrongCRLRequired <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPolicyStore
  isDefault: true
- syntax: |-
    ```Syntax
    New-NetIPHttpsConfiguration
        [-GPOSession] <String>
        -ServerURL <String>
        [-Profile <String>]
        [-Type <Type>]
        [-State <State>]
        [-AuthMode <AuthMode>]
        [-StrongCRLRequired <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByGpoSession
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet accepts no input objects.
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an object.
examples:
- title: 'Example 1: Create an IP-HTTPS configuration'
  description: |-
    ```
    PS C:\>New-NetIPHttpsConfiguration -Profile "Redmond" -ServerURL "https://contoso.com:443/IPHTTPs" -PolicyStore "Domain\TestGPO"
    ```

    This command creates an IP-HTTPS configuration named Redmond with the specified server URL https://contoso.com:443/IPHTTPs in the GPO named TestGPO.
