syntaxes:
- syntax: |-
    ```Syntax
    Rename-NetIPHttpsConfiguration
        -NewName <String>
        [-Profile <String[]>]
        [-ProfileActivated <Boolean[]>]
        [-PolicyStore <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPolicyStore
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-NetIPHttpsConfiguration
        -NewName <String>
        [-Profile <String[]>]
        [-ProfileActivated <Boolean[]>]
        [-GPOSession <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByGpoSession
  isDefault: false
- syntax: |-
    ```Syntax
    Rename-NetIPHttpsConfiguration
        -InputObject <CimInstance[]>
        -NewName <String>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet accepts no input objects.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetIPHttpsConfiguration" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.

    When the **Passthru** parameter is specified, this cmdlet outputs a modified Windows Management Instrumentation (WMI) object.
examples:
- title: 'Example 1: Rename an IP-HTTPS profile using a configuration object'
  description: |-
    ```
    PS C:\>$config = Get-NetIPHttpsConfiguration -PolicyStore "testdomain\GPOName"
    PS C:\> Rename-NetIPHttpsConfiguration -InputObject $config
    ```

    This set of commands uses the Get-NetIPHttpsConfiguration cmdlet to get an IP-HTTPS configuration object and stores it in a variable named $config.
    The contents of the variable are then passed to this cmdlet.
- title: 'Example 2: Rename an IP-HTTPS profile'
  description: |-
    ```
    PS C:\>Rename-NetIPHttpsConfiguration -Profile "Redmond" -NewName "Fareast"
    ```

    This command renames the IP-HTTPS profile named Redmond to Fareast.
