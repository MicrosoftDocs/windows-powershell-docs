      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPInterface
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface on which to set the Teredo configuration.
      If the specified interface is not a Teredo interface, then the cmdlet does not return any configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store that contains the configuration to set.
      The acceptable values for this parameter are:

      - PersistentStore
      - GPO

      The default value is PersistentStore.

      To set the configuration of a GPO, specify the GPO name using the following format: Domain\GPOName

      You cannot use this parameter with the *GPOSession* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RefreshIntervalSeconds
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client refresh interval in seconds.
    aliases:
    - RefreshInterval
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name or IPv4 address of the Teredo server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerShunt
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the tunnel miniport and IPv4 routing layer are bypassed for high throughput on the Teredo relay functionality of the Teredo server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "7"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerVirtualIP
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual IPv4 address of the server.
      This parameter is not applicable if the computer is a Teredo client.
      This parameter can only be specified on GPOs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="Type" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the state of Teredo.
      The acceptable values for this parameter are:

      - Disabled: Disables the Teredo service.
      - Client.
      Enables the Teredo client.
      - Enterpriseclient.
      Skips the managed network detection.
      - Server.
      Enables the Teredo server.
      - Relay.
      - Automatic.
      - Default.
      The default state is client.
    acceptedValues:
    - Default
    - Relay
    - Client
    - Server
    - Disabled
    - Automatic
    - Enterpriseclient
    - Natawareclient
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
