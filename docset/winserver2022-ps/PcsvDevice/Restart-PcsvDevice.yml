  parameterSetName: ByNoConnectionParams
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-PcsvDevice
        [-TargetAddress] <String>
        [-Credential] <PSCredential>
        [-ManagementProtocol] <ManagementProtocol>
        [[-Port] <UInt16>]
        [-Authentication <Authentication>]
        [-UseSSL]
        [-SkipCACheck]
        [-SkipCNCheck]
        [-SkipRevocationCheck]
        [-TimeoutSec <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByComputerName
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-PcsvDevice
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
