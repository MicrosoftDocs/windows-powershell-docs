examples:
- title: 'Example 1: Get physical devices that have persistent memory'
  description: |-
    ```powershell
    Get-PmemPhysicalDevice
    ```

    ```output
    DeviceId DeviceType           HealthStatus OperationalStatus PhysicalLocation FirmwareRevision Persistent memory size Volatile
                                                                                                                          memory size
    -------- ----------           ------------ ----------------- ---------------- ---------------- ---------------------- --------------
    1020     Intel INVDIMM device Healthy      {Ok}              CPU2_DIMM_C1     102005310        126 GB                 0 GB
    1120     Intel INVDIMM device Healthy      {Ok}              CPU2_DIMM_F1     102005310        126 GB                 0 GB
    120      Intel INVDIMM device Healthy      {Ok}              CPU1_DIMM_F1     102005310        126 GB                 0 GB
    20       Intel INVDIMM device Healthy      {Ok}              CPU1_DIMM_C1     102005310        126 GB                 0 GB
    ```

    This command gets all the physical devices with persistent memory.
- title: 'Example 2: Get physical device for a persistent memory disk'
  description: |-
    ```powershell
    (Get-PmemDisk)[0] | Get-PmemPhysicalDevice
    ```

    ```output
    DeviceId DeviceType           HealthStatus OperationalStatus PhysicalLocation FirmwareRevision Persistent memory size Volatile memory size
    -------- ----------           ------------ ----------------- ---------------- ---------------- ---------------------- --------------------
    20       Intel INVDIMM device Healthy      {Ok}              CPU1_DIMM_C1     102005310        126 GB                 0 GB
    120      Intel INVDIMM device Healthy      {Ok}              CPU1_DIMM_F1     102005310        126 GB                 0 GB
    ```

    This example uses the **Get-PmemDisk** cmdlet to get a persistent memory disk and gets the physical device for that disk.
