examples:
- title: 'Example 1: Remove a persistent memory disk'
  description: |-
    ```powershell
    Remove-PmemDisk -DiskNumber 2
    ```

    ```output
    This will remove the persistent memory disk(s) from the system and will result in data loss.
    Remove the persistent memory disk(s)?
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): Y
    Removing the persistent memory disk. This may take a few moments.
    ```

    This example removes a persistent memory disk.
- title: 'Example 1: Remove a disk in simulated persistent memory'
  description: |-
    ```powershell
    Remove-PmemDisk -Simulated
    ```

    ```output
    This will remove the persistent memory disk(s) from the system and will result in data loss.
    Remove the persistent memory disk(s)?
    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default is "Y"): Y
    Removing the persistent memory disk. This may take a few moments.
    ```

    This example removes the disks in simulated persistent memory.
