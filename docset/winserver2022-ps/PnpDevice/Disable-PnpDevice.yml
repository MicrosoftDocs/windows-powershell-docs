### YamlMime:PowerShellCmdlet1
uid: PnpDevice.Disable-PnpDevice
name: Disable-PnpDevice
module: PnpDevice
isPreview: false
summary: |-
  Disables a PnP device.
description: |-
  The **Disable-PnpDevice** cmdlet disables a Plug and Play (PnP) device.
  You must use an Administrator account to disable a device.
notes: |-
  * You must use an Administrator account for this cmdlet.
