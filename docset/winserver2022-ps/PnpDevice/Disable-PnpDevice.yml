syntaxes:
- syntax: |-
    ```Syntax
    Disable-PnpDevice
        [-InstanceId] <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceId
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-PnpDevice
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Cimv2/Win32_PnPEntity" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
outputs:
- name: <xref href="System.Int32" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet generates a WMI error code.
examples:
- title: 'Example 1: Disable a device'
  description: |-
    ```
    PS C:\>Disable-PnpDevice -InstanceId 'USB\VID_5986&;PID_0266&;MI_00\7&;1E5D3568&;0000'
    ```

    This command disables a device that has the specified instance ID.
