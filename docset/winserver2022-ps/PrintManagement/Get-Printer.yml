syntaxes:
- syntax: |-
    ```Syntax
    Get-Printer
        [[-Name] <String[]>]
        [-ComputerName <String>]
        [-Full]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
