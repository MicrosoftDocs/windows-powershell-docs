syntaxes:
- syntax: |-
    ```Syntax
    Remove-PrinterDriver
        [-Name] <String[]>
        [[-PrinterEnvironment] <String[]>]
        [-ComputerName <String>]
        [-RemoveFromDriverStore]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-PrinterDriver
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
