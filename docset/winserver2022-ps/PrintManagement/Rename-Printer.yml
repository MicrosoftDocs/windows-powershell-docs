syntaxes:
- syntax: |-
    ```Syntax
    Rename-Printer
        [-Name] <String>
        [-NewName] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: name
  isDefault: false
- syntax: |-
    ```Syntax
    Rename-Printer
        [-NewName] <String>
        [-InputObject] <CimInstance>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: object
  isDefault: false
