        [-PortName <String>]
        [-PrintProcessor <String>]
        [-Priority <UInt32>]
        [-Published <Boolean>]
        [-RenderingMode <RenderingModeEnum>]
        [-SeparatorPageFile <String>]
        [-Shared <Boolean>]
        [-ShareName <String>]
        [-StartTime <UInt32>]
        [-DisableBranchOfficeLogging <Boolean>]
        [-BranchOfficeOfflineLogSizeMB <UInt32>]
        [-WorkflowPolicy <WorkflowPolicyEnum>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
