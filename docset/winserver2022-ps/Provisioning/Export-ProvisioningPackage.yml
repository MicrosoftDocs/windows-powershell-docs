    supportsWildcards: false
syntaxes:
- syntax: |-
    ```Syntax
    Export-ProvisioningPackage
        [-OutputFolder] <String>
        -PackageId <String>
        [-AllowClobber]
        [-AnswerFileOnly]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Export-ProvisioningPackage
        [-PackagePath] <String>
        [-OutputFolder] <String>
        [-AllowClobber]
        [-AnswerFileOnly]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Path
  isDefault: false
- syntax: |-
    ```Syntax
    Export-ProvisioningPackage
        [-RuntimeMetadata] <RuntimeProvPackageMetadata>
        [-OutputFolder] <String>
        [-AllowClobber]
        [-AnswerFileOnly]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
    ```
  parameterSetName: Metadata
  isDefault: false
inputs:
- name: <xref href="Microsoft.Windows.Provisioning.ProvCommon.RuntimeProvPackageMetadata" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Export-ProvisioningPackage -PackageId {e2ea11f5-d8b0-4db9-bf96-8c909dc2fed5} -OutputFolder D:\Package
    ```

    This example extracts the content of a Package specifying it's PackageId to the specified folder.
