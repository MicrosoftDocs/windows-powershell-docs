### YamlMime:PowerShellCmdlet1
uid: Provisioning.Export-ProvisioningPackage
name: Export-ProvisioningPackage
module: Provisioning
isPreview: false
summary: |-
  Extract the contents of a provisioning package.
description: |-
  Extract the contents of a provisioning package to the specified folder.

  The **Export-ProvisioningPackage** cmdlet is supported on Windows 11 client operating system only.
parameters:
  cmdletParameters:
  - name: AllowClobber
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet exports contents even if there's an existing instance.
    aliases:
    - Force
    - Overwrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AnswerFileOnly
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet only exports the Windows provisioning answer file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectedDevice
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the provisioning package uses a connected device.
    aliases:
    - Device
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogsDirectoryPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a path to store logs files resulting from the export operation.
    aliases:
    - Logs
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OutputFolder
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the output directory.
    aliases:
    - Out
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
