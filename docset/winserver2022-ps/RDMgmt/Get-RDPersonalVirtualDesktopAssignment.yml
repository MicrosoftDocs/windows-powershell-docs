### YamlMime:PowerShellCmdlet1
uid: RDMgmt.Get-RDPersonalVirtualDesktopAssignment
name: Get-RDPersonalVirtualDesktopAssignment
module: RDMgmt
isPreview: false
summary: |-
  Retrieves a list of personal virtual desktops and associated user accounts.
description: |-
  The **Get-RDPersonalVirtualDesktopAssignment** cmdlet retrieves a list of personal virtual desktops and associated user accounts.
  Specify one or more user accounts to retrieve the associated personal virtual desktops, or specify one or more personal virtual desktop names to retrieve the associated user accounts.
parameters:
  cmdletParameters:
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a personal virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a Remote Desktop deployment.
      If you do not supply a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: User
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one or more user accounts, in DOMAIN\User format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByUser
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualDesktopName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual desktop.
      This parameter is required.
      The virtual desktop identified here must be a member of the collection that the **CollectionName** parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByDesktop
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-RDPersonalVirtualDesktopAssignment
        [-CollectionName] <String>
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByCollection
  isDefault: true
- syntax: |-
    ```Syntax
    Get-RDPersonalVirtualDesktopAssignment
        [-CollectionName] <String>
        -VirtualDesktopName <String>
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByDesktop
  isDefault: false
- syntax: |-
    ```Syntax
    Get-RDPersonalVirtualDesktopAssignment
        [-CollectionName] <String>
        -User <String>
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByUser
  isDefault: false
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example1: Retrieve a list of the current associations between personal virtual desktops and users'
  description: |-
    ```
    PS C:\>Get-RDPersonalVirtualDesktopAssignment -CollectionName "Virtual Desktop Collection"
    ```

    This command lists current associations between personal virtual desktops and users from the virtual desktop collection named Virtual Desktop Collection.
