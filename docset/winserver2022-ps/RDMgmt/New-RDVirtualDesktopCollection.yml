### YamlMime:PowerShellCmdlet1
uid: RDMgmt.New-RDVirtualDesktopCollection
name: New-RDVirtualDesktopCollection
module: RDMgmt
isPreview: false
summary: |-
  Creates a virtual desktop collection.
description: |-
  The **New-RDVirtualDesktopCollection** cmdlet creates a virtual desktop collection.
parameters:
  cmdletParameters:
  - name: AutoAssignPersonalVirtualDesktopToUser
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the server automatically associates virtual desktops with user accounts when you create a new personal virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PersonalMgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PersonalUnmgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CentralStoragePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a central storage location for virtual desktops in the collection.
      Use the **StorageType** parameter to specify the type of storage (local or centralized) for the collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PooledMgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PersonalMgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a personal virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a remote desktop deployment.
      If you do not specify a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomSysprepUnattendFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides the path to the .xml file that contains unattended installation settings for the remote desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PooledMgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PersonalMgd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
