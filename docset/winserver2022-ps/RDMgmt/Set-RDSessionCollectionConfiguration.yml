### YamlMime:PowerShellCmdlet1
uid: RDMgmt.Set-RDSessionCollectionConfiguration
name: Set-RDSessionCollectionConfiguration
module: RDMgmt
isPreview: false
summary: |-
  Modifies configuration options for an existing session collection.
description: |-
  The **Set-RDSessionCollectionConfiguration** cmdlet modifies configuration options for an existing session collection.
  A session collection consists of one or more Remote Desktop Session Host (RD Session Host) servers.
  Users can connect to RD Session Host servers in a session collection to run programs, save files, and use resources on those servers.

  You can use the New-RDSessionCollection cmdlet to create a session collection.
notes: |-
  * The **IncludeFolderPath** and **IncludeFilePath** parameters are mutually exclusive with the **ExcludeFolderPath** and **ExcludeFilePath** parameters.
parameters:
  cmdletParameters:
  - name: ActiveSessionLimitMin
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum time, in minutes, an active session runs.
      After this period, the RD Session Host server ends the session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuthenticateUsingNLA
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to use Network Level Authentication (NLA).
      If this value is $True, Remote Desktop uses NLA to authenticate a user before the user sees a logon screen.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticReconnectionEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the Remote Desktop client attempts to reconnect after a connection interruption.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BrokenConnectionAction
    type: <xref href="RDBrokenConnectionAction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an action for an RD Session Host server to take after a connection interruption.
      The acceptable values for this parameter are:

      - None
      - Disconnect
      - LogOff
    acceptedValues:
    - None
    - Disconnect
    - LogOff
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientDeviceRedirectionOptions
    type: <xref href="RDClientDeviceRedirectionOptions" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a type of client device to be redirected to an RD Session Host server in this session collection.
      The acceptable values for this parameter are:

      - 0x0000.
      None.
      - 0x0001.
      AudioVideoPlayBack.
      - 0x0002.
      AudioRecording.
      - 0x0004.
      COMPort.
      - 0x0008.
      PlugAndPlayDevice.
      - 0x0010.
      SmartCard.
      - 0x0020.
      Clipboard.
      - 0x0040.
      LPTPort.
      - 0x0080.
      Drive.
      - 0x0100.
      TimeZone.

      You can use binary-or to combine two or more values of this enum to specify multiple client device types.
    acceptedValues:
    - None
    - AudioVideoPlayBack
    - AudioRecording
    - COMPort
    - PlugAndPlayDevice
    - SmartCard
    - Clipboard
    - LPTPort
    - Drive
    - TimeZone
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientPrinterAsDefault
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to use the client printer or server printer as the default printer.
      If this value is $True, use the client printer as default.
      If this value is $False, use the server as default.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientPrinterRedirected
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to use client printer redirection, which routes print jobs from the Remote Desktop session to a printer attached to the client computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CollectionDescription
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description of the session collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a session collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a Remote Desktop deployment.
      If you do not specify a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomRdpProperty
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Remote Desktop Protocol (RDP) settings to include in the .rdp files for all Windows Server 2012 RemoteApp programs and remote desktops published in this collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableUserProfileDisk
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that Remote Desktop does not use a user profile to configure the session collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableUserProfileDisk
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisconnectedSessionLimitMin
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a length of time, in minutes.
      After client disconnection from a session for this period, the RD Session Host ends the session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a path for the user profile disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableUserProfileDisk
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that Remote Desktop uses a user profile disk to configure the session collection.
      A user profile disk stores user profile information as a separate virtual hard disk in order to persist user profile settings across a pool of virtual desktops.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptionLevel
    type: <xref href="RDEncryptionLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the level of data encryption used for a Remote Desktop session.
      The acceptable values for this parameter are:

      - 0 - Low.
      - 1 - ClientCompatible.
      - 2 - High.
      - 3 - FipsCompliant.

      The default value is ClientCompatible.
    acceptedValues:
    - None
    - Low
    - ClientCompatible
    - High
    - FipsCompliant
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludeFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of file paths to exclude from a user profile disk.
      By default, Remote Desktop creates standard file and folder paths, such as Documents and Music.
      Use this parameter to prevent creation of specified file paths.
      This parameter overrides any identical values specified in the **IncludeFilePath** or **IncludeFolderPath** parameters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludeFolderPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of folder paths to exclude from a user profile disk.
      By default, Remote Desktop creates standard file and folder paths, such as Documents and Music.
      Use this parameter to prevent creation of specified folder paths.
      This parameter overrides any identical values specified in the **IncludeFilePath** or **IncludeFolderPath** parameters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IdleSessionLimitMin
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the length of time, in minutes, to wait before an RD Session Host logs off or disconnects an idle session.
      The **BrokenConnectionAction** parameter determines whether to log off or disconnect.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeFilePath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of file paths to include in a user profile disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeFolderPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of folder paths to include in a user profile disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoadBalancing
    type: <xref href="RDSessionHostCollectionLoadBalancingInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of objects that defines load balancing guidelines for the remote session collection.
      Each object specifies the collection name, RD Session Host server name, relative weight to use for that server, and a maximum number of sessions to allow.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxRedirectedMonitors
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of client monitors that an RD Session Host server can redirect to a remote session.
      The highest value for this parameter is 16.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxUserProfileDiskSizeGB
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum size, in gigabytes, for a user profile disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableUserProfileDisk
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RDEasyPrintDriverEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to enable the Remote Desktop Easy Print driver.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecurityLayer
    type: <xref href="RDSecurityLayer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies which security protocol to use.
      The acceptable values for this parameter are:

      - 0 - RDP.
      - 1 - Negotiate.
      - 2 - SSL.

      The default value is Negotiate.
    acceptedValues:
    - RDP
    - Negotiate
    - SSL
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TemporaryFoldersDeletedOnExit
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to delete temporary folders from the RD Session Host server for a disconnected session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TemporaryFoldersPerSession
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to use a single folder for temporary files.
      If this value is $True, a single folder contains temporary files.
      If this value is $False, individual users have separate folders to store temporary files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UserGroup
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of domain groups and users authorized to connect to the RD Session Host servers in a session collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
