- name: <xref href="System.Net.IPAddress" data-throw-if-not-resolved="False" />
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.PowerShell.Cmdletization.GeneratedTypes.Bgp.IPv6RoutingState" data-throw-if-not-resolved="False" />
