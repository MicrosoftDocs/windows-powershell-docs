### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Add-BgpRouter
name: Add-BgpRouter
module: RemoteAccess
isPreview: false
summary: |-
  Adds a BGP router for the specified Tenant ID.
description: |-
  The **Add-BgpRouter** cmdlet adds a new Border Gateway Protocol (BGP) router for the given tenant.
  This cmdlet returns error information if errors occur while adding the BGP router.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BgpIdentifier
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local BGP Router identifier.
      The acceptable value for this parameter is an IPv4 address.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientToClientReflection
    type: <xref href="ClientToClientReflection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether client to client reflection is enabled or disabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClusterId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cluster ID of the router reflector.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompareMEDAcrossASN
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether comparison of Microsoft Enterprise Desktop (MED) values across different autonomous systems (AS) are enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultGatewayRouting
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether routing of the unresolvable routes to the default (Internet) gateway is enabled or disabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPv6Routing
    type: <xref href="IPv6RoutingState" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a value that enables or disables IPv6 routing for this BGP router.
      The acceptable values for this parameter are:

      - Disable
      - Enable
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalASN
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local AS number of the BGP Router instance. See [AS numbers by IANA](https://www.iana.org/assignments/as-numbers/as-numbers.xhtml) for the list of 32 bit AS numbers.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalIPv6Address
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local BGP Router's global or site-local IPv6 address.
      This value is used as the NEXT-HOP value in the IPv6 route advertisements.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteReflector
    type: <xref href="RouteReflector" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether BGP router acts as a route reflector.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user-defined unique alphanumeric identifier for the routing domain.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent connections that can be established to run this command.
      If you omit this parameter or enter a value of 0, the default value, 32, is used.

      The throttle limit applies only to the current command, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TransitRouting
    type: <xref href="TransitRouting" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether transit routing is enabled.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-BgpRouter
        -BgpIdentifier <IPAddress>
        -LocalASN <UInt32>
        [-IPv6Routing <IPv6RoutingState>]
        [-CompareMEDAcrossASN <Boolean>]
        [-DefaultGatewayRouting <Boolean>]
        [-PassThru]
        [-Force]
        [-RoutingDomain <String>]
        [-LocalIPv6Address <IPAddress>]
        [-TransitRouting <TransitRouting>]
        [-RouteReflector <RouteReflector>]
        [-ClusterId <UInt32>]
        [-ClientToClientReflection <ClientToClientReflection>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
