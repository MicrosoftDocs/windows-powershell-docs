    ```Syntax
    Add-DAClientDnsConfiguration
        [[-DnsIPAddress] <String[]>]
        [-DnsSuffix] <String>
        [-ProxyServer <String>]
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
