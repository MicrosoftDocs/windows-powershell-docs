syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpRoutingPolicy
        [[-Name] <String[]>]
        [-PolicyType <PolicyType>]
        [-RoutingDomain <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: RoutingDomain
  isDefault: false
- syntax: |-
    ```Syntax
    Get-BgpRoutingPolicy
        [-AllRoutingDomains]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: AllRoutingDomains
  isDefault: false
