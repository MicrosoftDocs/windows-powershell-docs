### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Get-BgpRoutingPolicy
name: Get-BgpRoutingPolicy
module: RemoteAccess
isPreview: false
summary: |-
  Gets configuration information of BGP routing policies.
description: |-
  The **Get-BgpRoutingPolicy** cmdlet gets configuration information of BGP routing policies from the policy store.
  You can specify the names and policy type of the routing policies to return.
  If you do not specify the **Name** and **PolicyType** parameters, the cmdlet returns all routing policies of the local BGP router.
parameters:
  cmdletParameters:
  - name: AllRoutingDomains
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Use this command to retrieve details about all routing domains.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllRoutingDomains
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of policies.
    aliases:
    - PolicyList
    - PolicyId
    - PolicyName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyType
    type: <xref href="PolicyType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of BGP routing policy.
      The acceptable values for this parameter are:

      - ModifyAttribute
      - Allow
      - Deny
    acceptedValues:
    - Deny
    - Allow
    - ModifyAttribute
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name, as a string, of a routing domain.
      The name of a routing domain is a unique user-defined alphanumeric string.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
