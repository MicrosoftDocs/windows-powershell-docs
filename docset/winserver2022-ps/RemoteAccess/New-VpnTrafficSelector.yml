syntaxes:
- syntax: |-
    ```Syntax
    New-VpnTrafficSelector
        [[-IPAddressRange] <String[]>]
        [[-PortRange] <UInt32[]>]
        [-ProtocolId <UInt32>]
        [-Type <Type>]
        [-TsPayloadId <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
