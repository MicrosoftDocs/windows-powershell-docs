syntaxes:
- syntax: |-
    ```Syntax
    Set-BgpRouteAggregate
        [-RoutingDomain <String>]
        [-AttributePolicy <String[]>]
        [-PreserveASPath <PreserveASPath>]
        -Prefix <String>
        [-SummaryOnly <SummaryOnly>]
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
