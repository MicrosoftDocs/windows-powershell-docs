syntaxes:
- syntax: |-
    ```Syntax
    Set-BgpRouteFlapDampening
        [-RoutingDomain <String>]
        [-ReuseThreshold <UInt32>]
        [-SuppressThreshold <UInt32>]
        [-HalfLife <UInt32>]
        [-HalfLifeUnreachable <UInt32>]
        [-MaxSuppressTime <UInt32>]
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpRouteFlapDampeningConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Configure a BGP route flap dampening'
  description: |-
    ```
    PS C:\>Set-BgpRouteFlapDampening -HalfLifeTimeOK 600 -ReuseThreshold 500 -SuppressThreshold 2000 -MaxSuppressValue 2400
    ```

    This command configures a BGP route flap dampening.
