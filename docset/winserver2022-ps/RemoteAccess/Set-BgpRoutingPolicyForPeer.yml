syntaxes:
- syntax: |-
    ```Syntax
    Set-BgpRoutingPolicyForPeer
        -PolicyName <String[]>
        [-PeerName <String[]>]
        [-RoutingDomain <String>]
        -Direction <PolicyDirection>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
