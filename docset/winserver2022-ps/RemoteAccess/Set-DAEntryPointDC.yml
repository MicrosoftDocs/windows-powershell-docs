syntaxes:
- syntax: |-
    ```Syntax
    Set-DAEntryPointDC
        -ExistingDC <String>
        [-ComputerName <String>]
        [-NewDC <String>]
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ChangeByDCName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-DAEntryPointDC
        -EntryPointName <String>
        [-ComputerName <String>]
        [-NewDC <String>]
        [-Force]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ChangeByEntryPoint
