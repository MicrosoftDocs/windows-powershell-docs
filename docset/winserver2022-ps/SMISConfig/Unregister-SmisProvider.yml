syntaxes:
- syntax: |-
    ```Syntax
    Unregister-SmisProvider
        -ConnectionUri <Uri>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
