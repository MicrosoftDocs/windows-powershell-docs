### YamlMime:PowerShellCmdlet1
uid: ScheduledTasks.Get-ScheduledTask
name: Get-ScheduledTask
module: ScheduledTasks
isPreview: false
summary: |-
  Gets the task definition object of a scheduled task that is registered on the local computer.
description: |-
  The **Get-ScheduledTask** cmdlet gets the task definition object of a scheduled task that is
  registered on a computer.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TaskName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of one or more names of a scheduled task. You can use **"*"** for a wildcard character query.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TaskPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of one or more paths for scheduled tasks in Task Scheduler namespace. You can use **"*"** for a wildcard character query.
      You can use **\\*** for the root folder. To specify a full TaskPath you need to include the leading and trailing **\\**.
      If you do not specify a path, the cmdlet uses the root folder.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ScheduledTask
        [[-TaskName] <String[]>]
        [[-TaskPath] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_ScheduledTask" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a scheduled task definition object'
  description: |-
    ```powershell
    Get-ScheduledTask -TaskName "SystemScan"
    ```

    ```Output
    TaskPath                          TaskName                        State
    --------                          --------                        --------
    \                                 SystemScan                      Ready
    ```

    This command gets the definition object of the SystemScan scheduled task in the root folder.
- title: 'Example 2: Get an array of scheduled task definition objects'
  description: |-
    ```powershell
    Get-ScheduledTask -TaskPath "\UpdateTasks\*"
    ```

    ```Output
    TaskPath                          TaskName                        State
    --------                          --------                        --------
    \UpdateTasks                      UpdateApps                      Ready
    \UpdateTasks                      UpdateDrivers                   Ready
    \UpdateTasks                      UpdateOS                        Disabled
    \UpdateTasks                      UpdateSignatures                Running
    ```

    This command gets an array of task definitions objects from the UpdateTasks folder.
- title: 'Example 3: Get an array of scheduled task definition objects in multiple paths'
  description: |-
    ```powershell
    Get-ScheduledTask -TaskPath "\Microsoft\Windows\Work Folders\","\Microsoft\Windows\Workplace Join\"
    ```

    ```Output
    TaskPath                                       TaskName                          State
    --------                                       --------                          -----
    \Microsoft\Windows\Work Folders\               Work Folders Logon Synchroniza... Ready
    \Microsoft\Windows\Work Folders\               Work Folders Maintenance Work     Ready
    \Microsoft\Windows\Workplace Join\             Automatic-Device-Join             Disabled
    \Microsoft\Windows\Workplace Join\             Device-Sync                       Disabled
    \Microsoft\Windows\Workplace Join\             Recovery-Check                    Disabled
    ```

    This command gets task definition objects from multiple task paths
