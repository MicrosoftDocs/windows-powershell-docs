      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Once
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that a trigger starts a task once at a time specified in the *At* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Once
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RandomDelay
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a random amount of time to delay the start time of the trigger.
      The delay time is a random time between the time the task triggers and the time that you specify in this setting.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RepetitionDuration
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how long the repetition pattern repeats after the task starts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Once
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RepetitionInterval
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an amount of time between each restart of the task.
      The task will run, wait for the time interval specified, and then run again.
      This cycle continues for the time that you specify for the *RepetitionDuration* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Once
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer. The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: User
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier of the user for a trigger that starts a task when a user logs on.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Logon
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Weekly
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the trigger starts a task on a recurring weekly schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Weekly
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WeeksInterval
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interval between the weeks in the schedule.
      An interval of 1 produces a weekly schedule.
      An interval of 2 produces an every-other week schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Weekly
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
