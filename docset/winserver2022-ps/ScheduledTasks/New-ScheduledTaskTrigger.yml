syntaxes:
- syntax: |-
    ```Syntax
    New-ScheduledTaskTrigger
        -At <DateTime>
        [-RandomDelay <TimeSpan>]
        [-Once]
        [-RepetitionDuration <TimeSpan>]
        [-RepetitionInterval <TimeSpan>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Once
  isDefault: true
- syntax: |-
    ```Syntax
    New-ScheduledTaskTrigger
        -At <DateTime>
        [-Daily]
        [-DaysInterval <UInt32>]
        [-RandomDelay <TimeSpan>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Daily
  isDefault: false
- syntax: |-
    ```Syntax
    New-ScheduledTaskTrigger
        -At <DateTime>
        [-RandomDelay <TimeSpan>]
        [-DaysOfWeek <DayOfWeek[]>]
        [-Weekly]
        [-WeeksInterval <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Weekly
  isDefault: false
- syntax: |-
    ```Syntax
    New-ScheduledTaskTrigger
        [-RandomDelay <TimeSpan>]
        [-AtStartup]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Startup
  isDefault: false
- syntax: |-
    ```Syntax
    New-ScheduledTaskTrigger
        [-RandomDelay <TimeSpan>]
        [-AtLogOn]
