- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_ServiceStatus" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the status of all services'
  description: |-
    ```
    PS C:\>Get-SMServerService
    ```

    This command gets the status of all services running on a server.
