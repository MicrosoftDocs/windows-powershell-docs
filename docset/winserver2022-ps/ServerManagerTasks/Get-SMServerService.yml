syntaxes:
- syntax: |-
    ```Syntax
    Get-SMServerService
        [-Service <String[]>]
        [-BatchSize <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
