- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/SMB/MSFT_SmbGlobalMapping" data-throw-if-not-resolved="False" />
examples:
- title: Example 1 - Retrieve SMB client directory global mappings
  description: |-
    This command retrieves the SMB client directory global mappings created for the SMB server.

    ```powershell
    PS C:\> Get-SmbGlobalMapping
    ```

    ```output
    Status Local Path Remote Path
    ------ ---------- -----------
    OK     G:         \\fs1.contoso.com\public
    ```
