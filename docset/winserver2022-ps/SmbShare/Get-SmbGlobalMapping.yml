syntaxes:
- syntax: |-
    ```Syntax
    Get-SmbGlobalMapping
        [[-LocalPath] <String[]>]
        [[-RemotePath] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
