syntaxes:
- syntax: |-
    ```Syntax
    Get-SmbShareAccess
        [-Name] <String[]>
        [[-ScopeName] <String[]>]
        [-SmbInstance <SmbInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Get-SmbShareAccess
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/SMB/MSFT_SmbShareAccessControlEntry" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
    The MSFT_SmbShareAccessControlEntry object is returned for the specified share.
examples:
- title: 'Example 1: Get the ACL of a share'
  description: |-
    ```
    PS C:\>Get-SmbShareAccess -Name "VMFiles"
    Name                 ScopeName               AccountName             AccessControlType       AccessRight
    ----                 ---------               -----------             -----------------       -----------
    VMFiles              Contoso-SO              Contoso\Administrator   Allow                   Full
    VMFiles              Contoso-SO              Contoso\Contoso-HV1$    Allow                   Full
    ```

    This command retrieves the ACL of an SMB share named VMFiles.
- title: 'Example 2: Get the ACL of a share for a server'
  description: |-
    ```
    PS C:\>Get-SmbShareAccess -Name "VMFiles" -ScopeName "Contoso-SO" | Format-List
    Name              : VMFiles
    ScopeName         : Contoso-SO
    AccountName       : Contoso\Administrator
    AccessControlType : Allow
    AccessRight       : Full

    Name              : VMFiles
    ScopeName         : Contoso-SO
    AccountName       : Contoso\Contoso-HV1$
    AccessControlType : Allow
    AccessRight       : Full
    ```

    This command displays the information about the ACL of an SMB share named VMFiles connected to the SMB server named Contoso-SO.
