syntaxes:
- syntax: |-
    ```Syntax
    New-SmbClientCertificateMapping
        [-Namespace] <String>
        [-Thumbprint <String>]
        [-StoreName <String>]
        [-IssuerName <String>]
        [-Subject <String>]
        [-DisplayName <String>]
        [-Type <Type>]
        [-Flags <Flags>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
