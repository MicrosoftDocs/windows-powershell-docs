syntaxes:
- syntax: |-
    ```Syntax
    New-SmbGlobalMapping
        [[-LocalPath] <String>]
        [-RemotePath] <String>
        -Credential <PSCredential>
        [-Persistent <Boolean>]
        [-RequireIntegrity <Boolean>]
        [-RequirePrivacy <Boolean>]
        [-UseWriteThrough <Boolean>]
        [-FullAccess <String[]>]
        [-DenyAccess <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
