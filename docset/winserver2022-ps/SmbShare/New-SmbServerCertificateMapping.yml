syntaxes:
- syntax: |-
    ```Syntax
    New-SmbServerCertificateMapping
        [-Name] <String>
        [-Thumbprint] <String>
        [-StoreName] <String>
        [-Subject <String>]
        [-DisplayName <String>]
        [-Type <Type>]
        [-Flags <Flags>]
        [-RequireClientAuthentication <Boolean>]
        [-SkipClientCertificateAccessCheck <Boolean>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
