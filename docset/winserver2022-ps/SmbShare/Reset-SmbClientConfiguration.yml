syntaxes:
- syntax: |-
    ```Syntax
    Reset-SmbClientConfiguration
        [-All]
        [-CompressibilitySampling]
        [-ConnectionCountPerRssNetworkInterface]
        [-DirectoryCacheEntriesMax]
        [-DirectoryCacheEntrySizeMax]
        [-DirectoryCacheLifetime]
        [-DisableCompression]
        [-DormantFileLimit]
        [-EnableBandwidthThrottling]
        [-EnableByteRangeLockingOnReadOnlyFiles]
        [-EnableLargeMtu]
        [-EnableLoadBalanceScaleOut]
        [-EnableMultiChannel]
        [-EncryptionCiphers]
        [-ExtendedSessionTimeout]
        [-FileInfoCacheEntriesMax]
        [-FileInfoCacheLifetime]
        [-FileNotFoundCacheEntriesMax]
        [-FileNotFoundCacheLifetime]
        [-ForceSMBEncryptionOverQuic]
        [-KeepConn]
        [-MaxCmds]
        [-MaximumConnectionCountPerServer]
        [-OplocksDisabled]
        [-RequestCompression]
        [-SessionTimeout]
        [-SkipCertificateCheck]
        [-UseOpportunisticLocking]
        [-WindowSizeThreshold]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
