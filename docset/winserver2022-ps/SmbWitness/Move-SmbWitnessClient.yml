syntaxes:
- syntax: |-
    ```Syntax
    Move-SmbWitnessClient
        [-ClientName] <String>
        [-DestinationNode] <String>
        [[-NetworkName] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
