syntaxes:
- syntax: |-
    ```Syntax
    Dismount-DiskImage
        [-ImagePath] <String[]>
        [-StorageType <StorageType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByImagePath
  isDefault: true
- syntax: |-
    ```Syntax
    Dismount-DiskImage
        -DevicePath <String[]>
        [-StorageType <StorageType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByDevicePath
  isDefault: false
- syntax: |-
    ```Syntax
    Dismount-DiskImage
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_DiskImage" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a DiskImage object to the InputObject parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_DiskImage" data-throw-if-not-resolved="False" />
  description: |-
    If you specify the *PassThru* parameter, this cmdlet outputs an object that represents the disk image that you dismounted.
examples:
- title: 'Example 1: Dismount a disk image by path'
  description: |-
    ```
    PS C:\>Dismount-DiskImage -ImagePath "E:\ISO-Files\My US Visit Fall 2010 Pictures.iso"
    ```

    This example ejects an ISO named My US Visit Fall 2010 Pictures by specifying the image path at E:\ISO-Files.
- title: 'Example 2: Dismount a disk image by device path'
  description: |-
    ```
    PS C:\>Dismount-DiskImage -DevicePath \\.\CDROM1
    ```

    This example ejects an ISO by specifying device path for cdrom1.
    Refer to the Get-DiskImage cmdlet to learn how to find the device path of an ISO or VHD file.
