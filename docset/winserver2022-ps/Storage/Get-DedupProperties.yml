syntaxes:
- syntax: |-
    ```Syntax
    Get-DedupProperties
        [-DriveLetter] <Char[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByDriveLetter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-DedupProperties
        -ObjectId <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-DedupProperties
        -Path <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByPaths
  isDefault: false
- syntax: |-
