syntaxes:
- syntax: |-
    ```Syntax
    Get-StorageEnclosureVendorData
        [-FriendlyName] <String[]>
        -PageNumber <UInt16>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-StorageEnclosureVendorData
        -UniqueId <String[]>
        -PageNumber <UInt16>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageEnclosureVendorData
        -InputObject <CimInstance[]>
        -PageNumber <UInt16>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get information for an enclosure'
  description: |-
    ```
    PS C:\>Get-StorageEnclosureVendorData -FriendlyName "E11" -PageNumber 0x2
    ```

    This command gets vendor data for the enclosure named E11.
    The cmdlet specifies SCSI diagnostic page code 0x2.
