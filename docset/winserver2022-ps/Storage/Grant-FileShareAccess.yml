syntaxes:
- syntax: |-
    ```Syntax
    Grant-FileShareAccess
        -Name <String[]>
        -AccountName <String[]>
        -AccessRight <AccessRight>
        [-FileServer <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Grant-FileShareAccess
        -UniqueId <String[]>
        -AccountName <String[]>
        -AccessRight <AccessRight>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
    ```Syntax
    Grant-FileShareAccess
        -InputObject <CimInstance[]>
        -AccountName <String[]>
        -AccessRight <AccessRight>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Grant full access to a user'
  description: |-
    ```
    PS C:\>Grant-FileShareAccess -Name "SalesFiles" -AccessRight "Full" -AccountName "Contoso\Jack"
    ```

    This command grants Jack full access to the SalesFiles file share.
