examples:
- title: EXAMPLE 1
  description: |-
    ```
    PS C:\> $inpobject = (Get-StorageSubSystem)
    PS C:\> Set-StorageSubSystem -InputObject $inpobject -Description "Non-Production Testing only"
    ```

    This example changes the Description field on a StorageSubSystem object.
