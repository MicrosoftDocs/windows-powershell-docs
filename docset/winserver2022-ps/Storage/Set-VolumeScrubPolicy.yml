syntaxes:
- syntax: |-
    ```Syntax
    Set-VolumeScrubPolicy
        [-DriveLetter] <Char[]>
        [[-Enable] <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByDriveLetter
  isDefault: true
- syntax: |-
    ```Syntax
    Set-VolumeScrubPolicy
        [[-Enable] <Boolean>]
        -ObjectId <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
- syntax: |-
    ```Syntax
    Set-VolumeScrubPolicy
        [[-Enable] <Boolean>]
        -Path <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByPaths
  isDefault: false
- syntax: |-
    ```Syntax
    Set-VolumeScrubPolicy
        [[-Enable] <Boolean>]
        -FileSystemLabel <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ByLabel
  isDefault: false
- syntax: |-
    ```Syntax
    Set-VolumeScrubPolicy
        [[-Enable] <Boolean>]
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_Volume" data-throw-if-not-resolved="False" />
  description: |-
    You can use the pipeline operator to pass an array of MSFT_Volume objects to the *InputObject* parameter.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_Volume" data-throw-if-not-resolved="False" />
  description: |-
    If you specify the *PassThru* parameter, this cmdlet returns an object representing the volumes that you were configuring.
examples:
- title: 'Example 1: Set the volume scrub policy status'
  description: |-
    ```
    PS C:\>Get-Volume H | Set-VolumeScrubPolicy -Enable $False
    ```

    This command gets a volume object, and then sets the volume scrub policy status on that object to $False.
