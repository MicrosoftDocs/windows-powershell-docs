### YamlMime:PowerShellCmdlet1
uid: Storage.Set-VolumeScrubPolicy
name: Set-VolumeScrubPolicy
module: Storage
isPreview: false
summary: |-
  Sets the status of the volume scrub policy.
description: |-
  The **Set-VolumeScrubPolicy** cmdlet sets the status of the volume scrub policy.
  Use this cmdlet to enable or disable the policy.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
