      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable or disable the volume scrub policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
