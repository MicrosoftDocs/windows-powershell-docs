syntaxes:
- syntax: |-
    ```Syntax
    Show-VirtualDisk
        [-FriendlyName] <String[]>
        [-TargetPortAddresses <String[]>]
        [-InitiatorAddress <String>]
        [-HostType <HostType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: true
- syntax: |-
    ```Syntax
    Show-VirtualDisk
        -UniqueId <String[]>
        [-TargetPortAddresses <String[]>]
        [-InitiatorAddress <String>]
        [-HostType <HostType>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: false
- syntax: |-
