### YamlMime:PowerShellCmdlet1
uid: StorageReplica.Dismount-SRDestination
name: Dismount-SRDestination
module: StorageReplica
isPreview: false
summary: |-
  Dismounts a test failover snapshot.
description: |-
  The **Dismount-SRDestination** cmdlet dismounts a test failover snapshot.
