### YamlMime:PowerShellCmdlet1
uid: StorageReplica.Get-SRPartnership
name: Get-SRPartnership
module: StorageReplica
isPreview: false
summary: |-
  Gets replication partnerships.
description: |-
  The **Get-SRPartnership** cmdlet gets existing replication partnerships.
  A partnership is the replication relationship between replication groups on a pair of servers, a pair of clusters, or nodes in a stretch cluster.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica host computer NetBIOS name or fully qualified domain name (FQDN) of a computer on which this cmdlet gets partnerships.
    aliases:
    - CN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromGroup
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica host computer NetBIOS name or FQDN of the destination computer for which this cmdlet gets partnerships.
    aliases:
    - DCN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonCluster
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationRGName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the destination replication group for which this cmdlet gets partnerships.
    aliases:
    - DGN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonCluster
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a partnership that this cmdlet gets.
    aliases:
    - N
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromGroup
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a single replica source host computer NetBIOS name or FQDN for which this cmdlet gets partnerships.
      The default value is the local computer.
    aliases:
    - SCN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonCluster
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceRGName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the source replication group for which this cmdlet gets partnerships.
    aliases:
    - SGN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonCluster
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SRPartnership
        [[-SourceComputerName] <String>]
        [[-SourceRGName] <String>]
        [[-DestinationComputerName] <String>]
        [[-DestinationRGName] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: NonCluster
  isDefault: true
- syntax: |-
    ```Syntax
    Get-SRPartnership
        [[-ComputerName] <String>]
        [[-Name] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: FromGroup
  isDefault: false
outputs:
- name: <xref href="replicationgroups" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all partnerships on a computer'
  description: |-
    ```
    PS C:\>Get-SRPartnership
    DestinationComputerName : SR-SRV06
    DestinationRGName       : ReplicationGroup02
    Id                      : 084afd15-3340-4695-9f9a-5fdc666a89c6
    SourceComputerName      : SR-SRV05
    SourceRGName            : ReplicationGroup01
    PSComputerName          :
    ```

    This command gets all partnerships on the local computer.
- title: 'Example 2: Get partnerships between two servers'
  description: |-
    ```
    PS C:\>Get-SRPartnership -SourceComputerName "SR-SRV05" -DestinationComputerName "SR-SRV06"
    DestinationComputerName : SR-SRV06
    DestinationRGName       : ReplicationGroup02
    Id                      : 084afd15-3340-4695-9f9a-5fdc666a89c6
    SourceComputerName      : SR-SRV05
    SourceRGName            : ReplicationGroup01
    PSComputerName          :
    ```

    This command gets all partnerships between the strand-alone servers named SR-SRV05 and SR-SRV06.
