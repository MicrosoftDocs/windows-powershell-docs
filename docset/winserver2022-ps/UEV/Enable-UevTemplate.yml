### YamlMime:PowerShellCmdlet1
uid: UEV.Enable-UevTemplate
name: Enable-UevTemplate
module: UEV
isPreview: false
summary: |-
  Enables a settings location template.
description: |-
  The **Enable-UevTemplate** cmdlet enables a settings location template for the current user of the computer.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ID
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a settings location template.
      The cmdlet enables the template that you specify.
    aliases:
    - TemplateID
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-UevTemplate
        [-ID] <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="string" data-throw-if-not-resolved="False" />
  description: |-
    The settings location template ID.
examples:
- title: 'Example 1: Enable a specific template'
  description: |-
    ```
    PS C:\> Enable-UevTemplate -ID "MicrosoftCalculator6"
    ```

    This command enables a settings location template that has the specified ID for the current user.
