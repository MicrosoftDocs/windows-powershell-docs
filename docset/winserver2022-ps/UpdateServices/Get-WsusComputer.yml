### YamlMime:PowerShellCmdlet1
uid: UpdateServices.Get-WsusComputer
name: Get-WsusComputer
module: UpdateServices
isPreview: false
summary: |-
  Gets the WSUS computer object that represents the client computer.
description: |-
  The **Get-WsusComputer** cmdlet gets one or more Windows Server Update Services (WSUS) computers based on the specified filtering criteria such as operating system, computer name, update installation status, last reported status time, and etcetera.

  If the [Get-WsusServer](./Get-WsusServer.yml) cmdlet is run and the resulting **IUpdateServer** object is passed into this cmdlet, then the specified server will be used rather than the local server.

  This cmdlet can be passed into the [Add-WsusComputer](./Add-WsusComputer.yml) cmdlet.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that all computers are to be returned. The information displayed includes the computer name, IP address, operating system, and last status report time.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllComputers
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerTargetGroups
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the list of target group to search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerUpdateStatus
    type: <xref href="WsusUpdateInstallationState" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the computer update state as represented in the WSUS Console user interface. The acceptable values for this parameter are:

      - FailedOrNeeded
      - InstalledNotApplicableOrNoStatus
      - Failed
      - InstalledNotApplicable
      - NoStatus
      - Any
    acceptedValues:
    - NoStatus
    - InstalledOrNotApplicable
    - InstalledOrNotApplicableOrNoStatus
    - Failed
    - Needed
    - FailedOrNeeded
    - Any
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludedInstallationStates
    type: <xref href="UpdateInstallationStates" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the installation states to exclude. The acceptable values for this parameter are:

      - All
      - Downloaded
      - Failed
      - Installed
      - InstalledPendingReboot
      - NotApplicable
      - NotInstalled
      - Unknown
    acceptedValues:
    - Unknown
    - NotApplicable
    - NotInstalled
    - Downloaded
    - Installed
    - Failed
    - InstalledPendingReboot
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FromLastReportedStatusTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the earliest reported status time. This parameter can be used in combination with the _ToLastReportedStatusTime_ parameter in order to create a date range to use in the search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FromLastSyncTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the earliest last synchronization time for which to search. This parameter can be used in combination with the _ToLastSynchTime_ parameter in order to create a date range to use in the search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludedInstallationStates
    type: <xref href="UpdateInstallationStates" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the installation states to include. The acceptable values for this parameter are:

      - All
      - Downloaded
      - Failed
      - Installed
      - InstalledPendingReboot
      - NotApplicable
      - NotInstalled
      - Unknown
    acceptedValues:
    - Unknown
    - NotApplicable
    - NotInstalled
    - Downloaded
    - Installed
    - Failed
    - InstalledPendingReboot
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeDownstreamComputerTargets
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that clients of a downstream server should be included, not clients of this server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeSubgroups
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that the _ComputerTargetGroups_ parameter should include descendant groups. This value has no impact if the _ComputerTargetGroups_ parameter is not used.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NameIncludes
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the partial name of the computer for which to search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequestedTargetGroupNames
    type: <xref href="StringCollection" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the list of requested target group names for which to search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ToLastReportedStatusTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the latest reported status time. This parameter can be used in combination with the _FromLastReportedStatusTime_ parameter in order to create a date range to use in the search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ToLastSyncTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the latest last synchronization time for which to search. This parameter can be used in combination with the _FromLastSynchTime_ parameter in order to create a date range to use in the search.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Scoped
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UpdateServer
    type: <xref href="IUpdateServer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the object that contains the WSUS server. This value is obtained by calling the [Get-WsusServer](./Get-WsusServer.yml) cmdlet and passing the resulting _IUpdateServer_ object into this cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WsusComputer
        [-UpdateServer <IUpdateServer>]
        [-All]
        [<CommonParameters>]
    ```
  parameterSetName: AllComputers
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WsusComputer
        [-UpdateServer <IUpdateServer>]
        [-NameIncludes <String>]
        [-ComputerTargetGroups <StringCollection>]
        [-IncludeSubgroups]
        [-ComputerUpdateStatus <WsusUpdateInstallationState>]
        [-ExcludedInstallationStates <UpdateInstallationStates[]>]
        [-IncludedInstallationStates <UpdateInstallationStates[]>]
        [-FromLastSyncTime <DateTime>]
        [-ToLastSyncTime <DateTime>]
        [-FromLastReportedStatusTime <DateTime>]
        [-ToLastReportedStatusTime <DateTime>]
        [-IncludeDownstreamComputerTargets]
        [-RequestedTargetGroupNames <StringCollection>]
        [<CommonParameters>]
    ```
  parameterSetName: Scoped
  isDefault: false
inputs:
- name: <xref href="Microsoft.UpdateServices.Administration.IUpdateServer" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.UpdateServices.Commands.WsusComputer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all client computers'
  description: |-
    ```text
    PS C:\> Get-WsusComputer -All
    Computer                      IP Address                    Operating System              Last Status Report
    --------                      ----------                    ----------------              ------------------
    contoso                       XXXX:XXXX:XX:X:XXXX:XXX:XXXX: Windows Server 2008           6/2/2010 12:00:00 AM
                                  XXXX                          Enterprise Edition (full                                                             installation)
    ```

    This command gets all client computers.
- title: 'Example 2: Get client computers that have names that contain a string'
  description: |-
    ```text
    PS C:\> Get-WsusComputer -NameIncludes "contoso"
    Computer                      IP Address                    Operating System              Last Status Report
    --------                      ----------                    ----------------              ------------------
    contoso                       XXXX:XXXX:XX:X:XXXX:XXX:XXXX: Windows Server 2008           6/2/2010 12:00:00 AM
                                  XXXX                          Enterprise Edition (full
                                                                installation)
    ```

    This command gets the client computer whose name includes contoso.
- title: 'Example 3: Get client computers by specifying dates'
  description: |-
    ```text
    PS C:\> Get-WsusComputer -FromLastReportedStatusTime 6/1/10 -ToLastReportedStatusTime 6/30/10
    Computer                      IP Address                    Operating System              Last Status Report
    --------                      ----------                    ----------------              ------------------
    contoso                       XXXX:XXXX:XX:X:XXXX:XXX:XXXX: Windows Server 2008           6/2/2010 12:00:00 AM
                                  XXXX                          Enterprise Edition (full
                                                                installation)
    ```

    This command gets all client computers with a last reported status date and time between June 1, 2010 and June 30, 2010.
