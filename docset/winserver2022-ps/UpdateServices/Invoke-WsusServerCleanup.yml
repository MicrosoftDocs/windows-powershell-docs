syntaxes:
- syntax: |-
    ```Syntax
    Invoke-WsusServerCleanup
        [-UpdateServer <IUpdateServer>]
        [-CleanupObsoleteComputers]
        [-CleanupObsoleteUpdates]
        [-CleanupUnneededContentFiles]
        [-CompressUpdates]
        [-DeclineExpiredUpdates]
        [-DeclineSupersededUpdates]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
