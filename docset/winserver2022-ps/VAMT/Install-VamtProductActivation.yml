### YamlMime:PowerShellCmdlet1
uid: VAMT.Install-VamtProductActivation
name: Install-VamtProductActivation
module: VAMT
isPreview: false
summary: |-
  Activates products online, using the local computer's Internet connection.
description: |-
  The **Install-VamtProductActivation** cmdlet activates products online by using the Internet connection on the local computer.
  You cannot use this cmdlet for proxy activation.
parameters:
  cmdletParameters:
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides a password for password-protected environments.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Products
    type: <xref href="Product" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the product or products to be activated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Username
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Provides a user name for password-protected environments.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Install-VamtProductActivation
        -Products <Product[]>
        [-Username <String>]
        [-Password <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Activate products'
  description: |-
    ```
    PS C:\>Get-VamtProduct | Install-VamtProductActivation
    ```

    This command gets products and then activates them by using online activation.
