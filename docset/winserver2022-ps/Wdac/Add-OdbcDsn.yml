syntaxes:
- syntax: |-
    ```Syntax
    Add-OdbcDsn
        [-Name] <String>
        -DriverName <String>
        [-SetPropertyValue <String[]>]
        [-PassThru]
        [-Platform <String>]
        -DsnType <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
