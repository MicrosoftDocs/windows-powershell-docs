    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Clear-WebRequestTracingSetting
        [[-Name] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove request tracing from the default website'
  description: |-
    ```
    IIS:\> Clear-WebRequestTracingSetting -Name "Default Web Site"
    ```

    This command removes request tracing from the default website.
