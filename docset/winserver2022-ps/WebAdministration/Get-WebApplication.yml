### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebApplication
name: Get-WebApplication
module: WebAdministration
isPreview: false
summary: |-
  Gets the web applications associated with a specific site or with a specified name.
description: |-
  The **Get-WebApplication** cmdlet gets the web applications associated with a specific site or with a specified name.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the web application for which information is returned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Site
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site for which this cmdlet returns application information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebApplication
        [-Site <String>]
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the web applications associated with the default website'
  description: |-
    ```powershell
    IIS:\> Get-WebApplication -Site "Default Web Site"

    Name             Application pool   Protocols    Physical Path
    ----             ----------------   ---------    -------------
    Test             DefaultAppPool     http         C:\inetpub\wwwroot\
    ```

    This command gets the web applications associated with the default website.
