### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebConfigurationBackup
name: Get-WebConfigurationBackup
module: WebAdministration
isPreview: false
summary: |-
  Gets a list of available IIS configuration backups.
description: |-
  The **Get-WebConfigurationBackup** cmdlet gets a list of available Internet Information Services (IIS) configuration backups.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an IIS configuration backup.
      If a backup exists that has the specified name, this cmdlet returns information about that backup.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebConfigurationBackup
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get available IIS configuration backups'
  description: |-
    ```
    IIS:\> Get-WebConfigurationBackup
    Name          Creation Date
    ----          -------------
    MyIISBackup   2/25/2009 12:00:00 AM
    ```

    This command returns a list of available IIS configuration backups.
