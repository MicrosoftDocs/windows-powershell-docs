### YamlMime:PowerShellCmdlet1
uid: WebAdministration.New-WebApplication
name: New-WebApplication
module: WebAdministration
isPreview: false
summary: |-
  Creates an IIS web application.
description: |-
  The **New-WebApplication** cmdlet creates an Internet Information Services (IIS) web application.
parameters:
  cmdletParameters:
  - name: ApplicationPool
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the application pool in which the new web application runs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the creation of the application without prompting for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the web application to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical path to the web application files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Site
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site on which this cmdlet creates an application.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-WebApplication
        [-Site <String>]
        [-Name] <String>
        [-PhysicalPath <String>]
        [-ApplicationPool <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create a web application'
  description: |-
    ```
    IIS:\> New-WebApplication -Name "TestApp" -Site "Default Web Site" -PhysicalPath "C:\Test" -ApplicationPool "DefaultAppPool"
    ```

    This command creates a web application named TestApp on the default website.
    The application files are stored in the C:\Test folder, and the application runs in the DefaultAppPool application pool.
