syntaxes:
- syntax: |-
    ```Syntax
    New-WebHandler
        [-Name] <String>
        -Path <String>
        -Verb <String>
        [-Type <String>]
        [-Modules <String>]
        [-ScriptProcessor <String>]
        [-Precondition <String>]
        [-ResourceType <String>]
        [-RequiredAccess <String>]
        [-Force]
        [-Location <String[]>]
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a new handler'
  description: |-
    ```
    IIS:\> New-WebHandler -Name "TestHandler" -Path "*.test" -Verb "GET,POST" -Modules "IsapiModule" -PSPath "IIS:\sites\Default Web Site"
    ```

    This command adds a handler named TestHandler to the default website.
