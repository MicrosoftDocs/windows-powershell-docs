syntaxes:
- syntax: |-
    ```Syntax
    Set-WebHandler
        [-Name] <String>
        [-Path <String>]
        [-Verb <String>]
        [-Type <String>]
        [-Modules <String>]
        [-ScriptProcessor <String>]
        [-Precondition <String>]
        [-ResourceType <String>]
        [-RequiredAccess <String>]
        [-Location <String[]>]
        [[-PSPath] <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Change a property of a handler'
  description: |-
    ```
    IIS:\> Set-WebHandler -Name "StaticFile" -Path "*.htm"
    ```

    This command sets properties of a handler.
