### YamlMime:PowerShellCmdlet1
uid: WebApplicationProxy.Remove-WebApplicationProxyApplication
name: Remove-WebApplicationProxyApplication
module: WebApplicationProxy
isPreview: false
summary: |-
  Removes web applications published in Web Application Proxy.
description: |-
  The **Remove-WebApplicationProxyApplication** cmdlet removes web applications published in Web Application Proxy.
  Specify web applications by name or by ID.
  If you specify a string that contains wildcard characters, * and ?, as the name, the cmdlet removes all the web applications that match that string.

  When you remove a web application, Web Application Proxy drops any current connections for that application.
  The cmdlet does not uninstall the application from its backend server.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ID
    type: <xref href="Guid" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of GUIDs of web applications.
    aliases:
    - ApplicationID
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ID
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a friendly name for the published web application.
      You can use wildcard characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Name
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-WebApplicationProxyApplication
        [-ID] <Guid[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ID
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-WebApplicationProxyApplication
        [-Name] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
inputs:
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove all published applications'
  description: |-
    ```
    PS C:\> Remove-WebApplicationProxyApplication
    ```

    This command removes all of the published web applications.
- title: 'Example 2: Remove an application by using an ID'
  description: |-
    ```
    PS C:\> Remove-WebApplicationProxyApplication -ID 616b2e81-bada-4abc-996a-b0c806eb6f45
    ```

    This command removes the application that has the specified ID.
- title: 'Example 3: Remove an application by using a name'
  description: |-
    ```
    PS C:\> Remove-WebApplicationProxyApplication -Name "ContosoApp"
    ```

    This command removes the application named ContosoApp.
- title: 'Example 4: Remove applications that have names that contain a specified string'
  description: |-
    ```
    PS C:\> Remove-WebApplicationProxyApplication -Name "*Contoso*"
    ```

    This command removes applications that have names that contain the string Contoso.
