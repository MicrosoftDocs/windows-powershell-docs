syntaxes:
- syntax: |-
    ```Syntax
    Start-WBBackup
        [-Policy] <WBPolicy>
        [-Async]
        [-Force]
        [-AllowDeleteOldBackups]
        [-DoNotVerifyMedia]
        [<CommonParameters>]
    ```
  parameterSetName: Default
