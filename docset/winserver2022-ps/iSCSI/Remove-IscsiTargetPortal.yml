syntaxes:
- syntax: |-
    ```Syntax
    Remove-IscsiTargetPortal
        -TargetPortalAddress <String[]>
        [-InitiatorInstanceName <String>]
        [-InitiatorPortalAddress <String>]
        [-TargetPortalPortNumber <Int32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByTargetPortalAddress
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-IscsiTargetPortal
        -InputObject <CimInstance[]>
        [-InitiatorInstanceName <String>]
        [-InitiatorPortalAddress <String>]
        [-TargetPortalPortNumber <Int32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
