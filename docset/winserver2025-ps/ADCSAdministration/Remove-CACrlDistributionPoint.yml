syntaxes:
- syntax: |-
    ```Syntax
    Remove-CACrlDistributionPoint
        [-Uri] <String>
        [-AddToCertificateCdp]
        [-AddToFreshestCrl]
        [-AddToCrlCdp]
        [-AddToCrlIdp]
        [-PublishToServer]
        [-PublishDeltaToServer]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
