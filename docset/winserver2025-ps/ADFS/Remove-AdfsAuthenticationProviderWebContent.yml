  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AdfsAuthenticationProviderWebContent
        [[-Locale] <CultureInfo>]
        -Name <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AdfsAuthenticationProviderWebContent
        [-TargetWebContent] <AdfsAuthProviderWebContent>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierObject
  isDefault: false
examples:
- title: 'Example 1: Remove authentication provider web content'
  description: |-
    ```
    PS C:\> Remove-AdfsAuthenticationProviderWebContent -Name "ContosoAuthenticationProvider"
    ```

    This command removes the provider web content for the authentication provider named ContosoAuthenticationProvider.
