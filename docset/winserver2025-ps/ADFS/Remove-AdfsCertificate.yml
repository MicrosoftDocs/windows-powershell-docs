### YamlMime:PowerShellCmdlet1
uid: ADFS.Remove-AdfsCertificate
name: Remove-AdfsCertificate
module: ADFS
isPreview: false
summary: |-
  Removes a certificate from AD FS.
description: |-
  The **Remove-AdfsCertificate** cmdlet removes a certificate from Active Directory Federation Services (AD FS).
notes: |-
  * Removing a certificate removes it only from the AD FS configuration data. It does not remove or delete the certificate from the local certificate store on the server computer.
parameters:
  cmdletParameters:
  - name: CertificateType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of the certificate to remove.
      The acceptable values for this parameter are:

      - Infocard-Signing
      - Service-Communications
      - Token-Encryption
      - Token-Signing
    acceptedValues:
    - Token-Decrypting
    - Token-Signing
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByProperties
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetCertificate
    type: <xref href="ServiceCertificate" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the certificate to remove.
      This value is typically taken from the pipeline.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: TargetCertificate
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Thumbprint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the thumbprint of the certificate to remove.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByProperties
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AdfsCertificate
        [-TargetCertificate] <ServiceCertificate>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TargetCertificate
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AdfsCertificate
        -CertificateType <String>
        -Thumbprint <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByProperties
  isDefault: false
inputs:
- name: <xref href="Microsoft.IdentityServer.PowerShell.Resources.ServiceCertificate" data-throw-if-not-resolved="False" />
  description: |-
    A ServiceCertificate object is received by the *TargetCertificate* parameter.
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    A string object is received by the *Thumbprint* parameter.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a token-signing certificate'
  description: |-
    ```
    PS C:\> Remove-AdfsCertificate -CertificateType "Token-Signing" -Thumbprint ‎"fedd995b45e633d4ef30fcbc8f3a48b627e9a28b"
    ```

    This command removes a token-signing certificate from AD FS.
