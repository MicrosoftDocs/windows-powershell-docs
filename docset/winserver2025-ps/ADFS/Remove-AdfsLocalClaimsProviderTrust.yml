syntaxes:
- syntax: |-
    ```Syntax
    Remove-AdfsLocalClaimsProviderTrust
        -TargetClaimsProviderTrust <LocalClaimsProviderTrust>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifierObject
  isDefault: false
