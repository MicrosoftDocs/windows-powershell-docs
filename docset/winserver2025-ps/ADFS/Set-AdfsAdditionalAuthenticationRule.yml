syntaxes:
- syntax: |-
    ```Syntax
    Set-AdfsAdditionalAuthenticationRule
        [-AdditionalAuthenticationRules] <String>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RuleSets
  isDefault: true
- syntax: |-
