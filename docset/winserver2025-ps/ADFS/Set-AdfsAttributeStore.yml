### YamlMime:PowerShellCmdlet1
uid: ADFS.Set-AdfsAttributeStore
name: Set-AdfsAttributeStore
module: ADFS
isPreview: false
summary: |-
  Modifies properties of an attribute store.
description: |-
  The **Set-AdfsAttributeStore** cmdlet modifies properties of an attribute store in the Federation Service.
parameters:
  cmdletParameters:
  - name: Configuration
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the initialization parameters of the attribute store, such as a connection string.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of this attribute store.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetAttributeStore
    type: <xref href="AttributeStore" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **AttributeStore** object.
      The cmdlet modifies the attribute store that you specify.
      To obtain an attribute store, use the **Get-AdfsAttributeStore** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
