        [<CommonParameters>]
    ```
  parameterSetName: ADFSFarmJoinSqlSvcAcct
  isDefault: false
- syntax: |-
    ```Syntax
    Test-AdfsFarmJoin
        -GroupServiceAccountIdentifier <String>
        -SQLConnectionString <String>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-FarmBehavior <Int32>]
        [<CommonParameters>]
    ```
