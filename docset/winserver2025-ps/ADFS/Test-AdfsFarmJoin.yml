    ```Syntax
    Test-AdfsFarmJoin
        -GroupServiceAccountIdentifier <String>
        -PrimaryComputerName <String>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PrimaryComputerPort <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: AdfsFarmJoinWidGmsa
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AdfsFarmJoin
        -ServiceAccountCredential <PSCredential>
        -PrimaryComputerName <String>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PrimaryComputerPort <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ADFSFarmJoinWidSvcAcct
  isDefault: false
- syntax: |-
    ```Syntax
    Test-AdfsFarmJoin
        -ServiceAccountCredential <PSCredential>
        -SQLConnectionString <String>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
