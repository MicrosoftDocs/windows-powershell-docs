syntaxes:
- syntax: |-
    ```Syntax
    Update-AdfsClaimsProviderTrust
        -TargetClaimsProviderTrust <ClaimsProviderTrust>
        [-MetadataFile <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
