syntaxes:
- syntax: |-
    ```Syntax
    Import-RmsTUD
        [-DisplayName] <String>
        [-SourceFile] <String>
        [-Path] <String[]>
        [-TrustADFederatedUser]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseTUD
  isDefault: true
- syntax: |-
    ```Syntax
    Import-RmsTUD
        [-Path] <String[]>
        [-WindowsLiveId]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WindowsLiveID
  isDefault: false
