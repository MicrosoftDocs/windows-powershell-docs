syntaxes:
- syntax: |-
    ```Syntax
    Initialize-RmsCryptoMode2
        -FilePath <String[]>
        [-CspName <String>]
        [-Regenerate]
        [-Force]
        [-Path] <String[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
