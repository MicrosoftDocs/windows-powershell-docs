syntaxes:
- syntax: |-
    ```Syntax
    New-ADDCCloneConfigFile
        [-CloneComputerName <String>]
        [-IPv4DNSResolver <String[]>]
        [-Path <String>]
        [-SiteName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: IPv4DynamicSettings
  isDefault: true
- syntax: |-
    ```Syntax
    New-ADDCCloneConfigFile
        -Path <String>
        [-AlternateWINSServer <String>]
        [-CloneComputerName <String>]
        [-IPv4Address <String>]
        [-IPv4DefaultGateway <String>]
        [-IPv4DNSResolver <String[]>]
        [-IPv4SubnetMask <String>]
        [-IPv6DNSResolver <String[]>]
        [-Offline]
        [-PreferredWINSServer <String>]
        [-SiteName <String>]
        [-Static]
        [<CommonParameters>]
    ```
  parameterSetName: OfflineExecution
  isDefault: false
- syntax: |-
    ```Syntax
    New-ADDCCloneConfigFile
        -IPv4Address <String>
        -IPv4DNSResolver <String[]>
        -IPv4SubnetMask <String>
        [-AlternateWINSServer <String>]
        [-CloneComputerName <String>]
        [-IPv4DefaultGateway <String>]
        [-Path <String>]
        [-PreferredWINSServer <String>]
        [-SiteName <String>]
        [-Static]
        [<CommonParameters>]
    ```
  parameterSetName: IPv4StaticSettings
  isDefault: false
- syntax: |-
    ```Syntax
    New-ADDCCloneConfigFile
        [-CloneComputerName <String>]
        [-IPv6DNSResolver <String[]>]
        [-Path <String>]
        [-SiteName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: IPv6DynamicSettings
  isDefault: false
- syntax: |-
    ```Syntax
    New-ADDCCloneConfigFile
        -IPv6DNSResolver <String[]>
        [-CloneComputerName <String>]
        [-Path <String>]
        [-SiteName <String>]
        [-Static]
        [<CommonParameters>]
    ```
  parameterSetName: IPv6StaticSettings
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
