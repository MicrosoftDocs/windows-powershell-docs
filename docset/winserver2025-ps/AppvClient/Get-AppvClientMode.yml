### YamlMime:PowerShellCmdlet1
uid: AppvClient.Get-AppvClientMode
name: Get-AppvClientMode
module: AppvClient
isPreview: false
summary: |-
  Displays the mode for the App-V Client.
description: |-
  The **Get-AppvClientMode** cmdlet displays the mode to which the Microsoft Application Virtualization (App-V) Client is currently.
  The valid values are Normal and Uninstall.
syntaxes:
- syntax: |-
    ```Syntax
    Get-AppvClientMode
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.AppV.AppvClientPowerShell.AppvClientMode" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet generates **AppvClientMode** object that describes the current App-V Client mode, either Normal or Uninstall.
links:
- text: Set-AppvClientMode
  href: ./Set-AppvClientMode.yml
