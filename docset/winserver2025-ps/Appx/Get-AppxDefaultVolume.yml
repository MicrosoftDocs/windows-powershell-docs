### YamlMime:PowerShellCmdlet1
uid: Appx.Get-AppxDefaultVolume
name: Get-AppxDefaultVolume
module: Appx
isPreview: false
summary: |-
  Gets the default appx volume.
description: |-
  The `Get-AppxDefaultVolume` cmdlet gets the default **AppxVolume**. The default **AppxVolume** is
  the default target for all deployment operations on the computer. You can't remove the default
  **AppxVolume** from the list of volumes.
syntaxes:
- syntax: |-
    ```Syntax
    Get-AppxDefaultVolume
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Appx.PackageManager.Commands.AppxVolume" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the default volume'
  description: |-
    ```powershell
    Get-AppxDefaultVolume
    ```

    This command gets the current default deployment target.
