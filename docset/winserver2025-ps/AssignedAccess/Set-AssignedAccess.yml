syntaxes:
- syntax: |-
    ```Syntax
    Set-AssignedAccess
        -UserName <String>
        -AppName <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UserNameANDAppName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AssignedAccess
        -UserName <String>
        -AppUserModelId <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UserNameANDAppId
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AssignedAccess
        -UserSID <String>
        -AppUserModelId <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UserSidANDAppId
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AssignedAccess
        -UserSID <String>
        -AppName <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UserSidANDAppName
  isDefault: false
inputs:
- name: <xref href="None." data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set assigned access by SID and app name'
  description: |-
    ```
    PS C:\> Set-AssignedAccess -UserSID "S-1-5-21-523423449-2432423479-234123443-1004" -AppName "CustomApp"
    ```

    This command configures assigned access by using the user SID and the app name.
- title: 'Example 2: Set assigned access by user name and AppUserModelID'
  description: |-
    ```
    PS C:\> Set-AssignedAccess -UserName "UserName" -AppUserModelId "microsoft.windowsphotos_8wekyb3d8bbwe!app"
    ```

    This command configures assigned access by using the user name and AppUserModelID.
