syntaxes:
- syntax: |-
    ```Syntax
    Get-BpaResult
        [-ModelId] <String>
        [-CollectedConfiguration]
        [-All]
        [-Filter <FilterOptions>]
        [-RepositoryPath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ModelParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-BpaResult
        [-ModelId] <String>
        [-CollectedConfiguration]
        [-All]
        [-Filter <FilterOptions>]
        [-RepositoryPath <String>]
        [-SubModelId <String>]
        [-ComputerName <String[]>]
        [-Context <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SubModelParameterSet
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.BestPractices.CoreInterface.Report" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.BestPractices.CoreInterface.Result" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get BPA scan results by model ID'
  description: |-
    ```
    PS C:\> Get-BPAResult -ModelId ModelId1
    ```

    This example returns the most recent BPA scan results for the model that is represented by ModelId1.
    The short form of the *ModelId* parameter can also be used, *Id*.
- title: 'Example 2: Get all BPA model scan results'
  description: |-
    ```
    PS C:\> Get-BPAModel | Get-BPAResult
    ```

    In this example, the **Get-BpaModel** cmdlet is used to return a list of all BPA models that are installed on the computer.
    The results of the **Get-BpaModel** cmdlet are piped to this cmdlet to retrieve the most recent BPA scan results for all models that are supported by BPA.
