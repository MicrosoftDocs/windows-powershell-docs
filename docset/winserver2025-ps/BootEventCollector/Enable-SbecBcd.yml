syntaxes:
- syntax: |-
    ```Syntax
    Enable-SbecBcd
        -Path <String[]>
        -CollectorIp <String>
        -CollectorPort <String>
        -Key <String>
        [-Id <String>]
        [-BusParameters <String>]
        [-DismLogPath <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Offline
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecBcd
        -ComputerName <String[]>
        -CollectorIp <String>
        -CollectorPort <String>
        -Key <String>
        [-Credential <PSCredential>]
        [-Id <String>]
        [-BusParameters <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Online
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecBcd
        -Session <PSSession[]>
        -CollectorIp <String>
        -CollectorPort <String>
        -Key <String>
        [-Id <String>]
        [-BusParameters <String>]
        [<CommonParameters>]
    ```
  parameterSetName: OnlineSession
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-SbecBcd
        -CollectorIp <String>
        -CollectorPort <String>
        -Key <String>
        [-Local]
        [-BcdStore <String>]
        [-CreateEventSettings]
        [-Id <String>]
        [-BusParameters <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Local
  isDefault: false
