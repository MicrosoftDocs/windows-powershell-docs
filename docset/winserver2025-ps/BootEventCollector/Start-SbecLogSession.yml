syntaxes:
- syntax: |-
    ```Syntax
    Start-SbecLogSession
        [-Name] <String>
        [[-Path] <String>]
        [[-SessionGuid] <Guid>]
        [[-ProviderName] <String[]>]
        [[-ProviderGuid] <Guid[]>]
        [[-Level] <SeverityLevel>]
        [[-ClockType] <ClientContext>]
        [[-BufferSize] <UInt32>]
        [[-MinimumBufferCount] <UInt32>]
        [[-MaximumBufferCount] <UInt32>]
        [[-MaximumFileSize] <UInt32>]
        [[-FlushSeconds] <UInt32>]
        [[-LogFileMode] <LoggingMode>]
        [[-KernelEnableFlags] <EventTraceFlag>]
        [-PassThru]
        [[-SimulateCreationError] <Int32>]
        [[-SimulateSubscriptionError] <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
