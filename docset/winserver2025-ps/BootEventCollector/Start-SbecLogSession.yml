### YamlMime:PowerShellCmdlet1
uid: BootEventCollector.Start-SbecLogSession
name: Start-SbecLogSession
module: BootEventCollector
isPreview: false
summary: |-
  Starts an ETW log session.
description: |-
  The **Start-SbecLogSession** cmdlet starts an Event Tracing for Windows (ETW) log session with full flexibility.

  To start an ETW session in a simpler way with fewer parameters, use the **Start-SbecSimpleLogSession** cmdlet.
parameters:
  cmdletParameters:
  - name: BufferSize
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the buffer size for the session, in kilobytes.
      This is the size of one buffer, with the count of these buffers set by the *MinimumBufferCount* and *MaximumBufferCount* parameters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "7"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClockType
    type: <xref href="ClientContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of clock used for the events collected by this session: The acceptable values for this parameter are:

      - Default
      - QueryPerformanceCounter.
      The high-resolution (period of 100 nanoseconds) clock that is typically used for performance measurement.
      - SystemTime.
      The lower-resolution system time similar to FILETIME (period of 10 milliseconds).
      This value is most typical for the data collection through SBEC.
      - CpuCycleCounter.
      The highest-resolution, with the frequency of the CPU, but may be unreliable depending on the CPU model and the thermal and power modes.
    acceptedValues:
    - Default
    - QueryPerformanceCounter
    - SystemTime
    - CpuCycleCounter
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "6"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FlushSeconds
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the timeout, in seconds, for the session buffers to automatically flush.
      You can disable the flushing of buffers on timeout by setting this parameter to 0, then the buffers will be written only when full or on an explicit flush.
    aliases:
    - FlushTimer
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "11"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: KernelEnableFlags
    type: <xref href="EventTraceFlag" data-throw-if-not-resolved="False" />
    description: |-
      Specifies flags for the NT Kernel Logger that enable the kernel events.
      For the setup and boot monitoring, the only reasonable flag is Process.
      This enumeration type is defined in $PsHome\Modules\BootEventCollector\SbecTraceHelpers.psm1.
      The acceptable values for this parameter are:

      - Process
      - Thread
      - ImageLoad
      - ProcessCounters
      - ContextSwitch
      - Dpc
      - Interrupt
      - SystemCall
      - DiskIO
      - DiskFileIO
      - DiskIOInit
      - Dispatcher
      - MemoryPageFaults
      - MemoryHardFaults
      - VirtualAlloc
      - NetworkTCPIP
      - Registry
      - Alpc
      - SplitIO
      - Driver
      - FileIO
      - FileIOInit
      - Profile
    acceptedValues:
    - None
    - Process
    - Thread
    - ImageLoad
    - ProcessCounters
    - ContextSwitch
    - Dpc
    - Interrupt
    - SystemCall
    - DiskIO
    - DiskFileIO
    - DiskIOInit
    - Dispatcher
    - MemoryPageFaults
    - MemoryHardFaults
    - VirtualAlloc
    - NetworkTCPIP
    - Registry
    - Alpc
    - SplitIO
    - Driver
    - FileIO
    - FileIOInit
    - Profile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "13"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Level
    type: <xref href="SeverityLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the highest detail level value to enable for providers.
      This enumeration type is defined in $PsHome\Modules\BootEventCollector\SbecTraceHelpers.psm1.
      The acceptable values for this parameter are:

      - Undefined
      - Fatal
      - Error
      - Warning
      - Information
      - Verbose
      - All
    acceptedValues:
    - Undefined
    - Fatal
    - Error
    - Warning
    - Information
    - Verbose
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogFileMode
    type: <xref href="LoggingMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new flags for the log file mode.
      The EnableKd and DisableKd values parameters are applied on top of these flags.
      This enumeration type is defined in $PsHome\Modules\BootEventCollector\SbecTraceHelpers.psm1.
      The cmdlet automatically adds the RealTime and KdFilter values to this parameter.
      Commonly used values are:

      - FileSequential.
      Write events to a log file sequentially; stops when the file reaches its maximum size.
      - FileCircular.
      Write events to a log file.
      After the file reaches the maximum size, replace the oldest events with incoming events.
      - FileAppend.
      Append events to an existing sequential log file.
      - FileNewFile.
      Automatically switch to a new log file when the file reaches the maximum size.
      - FilePreallocate.
      Reserve the *MaximumFileSize* of disk space for the log files in advance.
      - Secure.
      Restrict who can log events to the session to those with TRACELOG_LOG_EVENT permission.
      - RealTime.
      Deliver the events to consumers in real-time instead of writing them to a file.
      This mode is required for sending the events to the event collector.
      - KdFilter.
      Forward the events though the kernel channel to the event collector or to the debugger.
      - UsePagedMemory.
      Use the paged memory for the buffers.
      - NoPerProcessorBuffering.
      Write the events from all processors to the same buffer.
      This preserves the order of the events, and is recommended for sending the events to the event collector.

      The acceptable values for this parameter are:

      - None
      - FileNone
      - FileSequential
      - FileCircular
      - FileAppend
      - FileNewFile
      - Reserved0x00000010
      - FilePreallocate
      - Nonstoppable
      - Secure
      - RealTime
      - DelayOpenFile
      - Buffering
      - PrivateLogger
      - AddHeader
      - UseKilobytesForSize
      - UseGlobalSequence
      - Relog
      - PrivateInProc
      - BufferInterface
      - KdFilter
      - RealtimeRelog
      - LostEventsDebug
      - StopOnHybridShutdown
      - PersistOnHybridShutdown
      - UsePagedMemory
      - SystemLogger
      - Compressed
      - IndependentSession
      - NoPerProcessorBuffering
      - Blocking
      - Reserved0x40000000
      - AddToTriageDump
    acceptedValues:
    - None
    - FileNone
    - FileSequential
    - FileCircular
    - FileAppend
    - FileNewFile
    - Reserved0x00000010
    - FilePreallocate
    - Nonstoppable
    - Secure
    - RealTime
    - DelayOpenFile
    - Buffering
    - PrivateLogger
    - AddHeader
    - UseKilobytesForSize
    - UseGlobalSequence
    - UseLocalSequence
    - Relog
    - PrivateInProc
    - BufferInterface
    - KdFilter
    - RealtimeRelog
    - LostEventsDebug
    - StopOnHybridShutdown
    - PersistOnHybridShutdown
    - UsePagedMemory
    - SystemLogger
    - Compressed
    - IndependentSession
    - NoPerProcessorBuffering
    - Blocking
    - Reserved0x40000000
    - AddToTriageDump
    defaultValue: None
    dontShow: false
    isDynamic: false
