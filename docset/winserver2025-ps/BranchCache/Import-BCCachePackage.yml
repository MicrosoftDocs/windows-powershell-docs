examples:
- title: 'Example 1: Import cache package'
  description: |-
    ```
    PS C:\> Import-BCCachePackage -Path "D:\temp\PeerDistPackage.zip"
    ```

    This command imports all content that exported into the cache package D:\temp\PeerDistPackage.zip.
