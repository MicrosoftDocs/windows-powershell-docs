### YamlMime:PowerShellCmdlet1
uid: DFSN.Get-DfsnServerConfiguration
name: Get-DfsnServerConfiguration
module: DFSN
isPreview: false
summary: |-
  Gets DFS namespace settings for a DFSN root server.
description: |-
  The **Get-DfsnServerConfiguration** cmdlet gets Distributed File System (DFS) namespace settings for
  a DFS namespace root server. A DFS namespace root server hosts one or more namespace root targets.
  You can use this cmdlet to see current settings for a server, and you can use the
  **Set-DfsnServerConfiguration** cmdlet to make changes to a server.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.

      The cmdlet immediately returns an object that represents the job and then displays the command
      prompt. You can continue to work in the session while the job completes. To manage the job, use the
      `*-Job` cmdlets. To get the job results, use the
      [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see
      [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="Microsoft.Management.Infrastructure.CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a
      [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or
      [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name or fully qualified domain name (FQDN) for a DFS namespace server.
    aliases:
    - NamespaceServer
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
