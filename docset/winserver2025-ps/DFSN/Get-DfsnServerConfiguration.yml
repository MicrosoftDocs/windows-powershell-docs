syntaxes:
- syntax: |-
    ```Syntax
    Get-DfsnServerConfiguration
        [-ComputerName] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get settings for a server'
  description: |-
    ```powershell
    Get-DfsnServerConfiguration -ComputerName "Contoso-FS"
    ```

    ```Output
    ComputerName              : Contoso-FS
    LdapTimeoutSec            :
    PreferLogonDC             :
    EnableSiteCostedReferrals :
    EnableInsiteReferrals     :
    SyncIntervalSec           :
    UseFqdn                   :
    ```

    This command gets the Retrieves the configuration settings of the DFS namespace server Contoso-FS.
