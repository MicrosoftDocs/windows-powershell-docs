examples:
- title: 'Example 1: Remove a DFS namespace folder'
  description: |-
    ```powershell
    Remove-DfsnFolder -Path '\\Contoso\AccountingResources\LegacySoftware'
    ```

    This command removes the DFS namespace folder `\\Contoso\AccountingResources\LegacySoftware`.
