syntaxes:
- syntax: |-
    ```Syntax
    Remove-DfsnRoot
        [-Path] <String>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
