    ```Syntax
    Grant-DfsrDelegation
        [-GroupName] <String[]>
        [-AccountName] <String[]>
        [-Force]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
