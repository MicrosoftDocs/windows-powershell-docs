syntaxes:
- syntax: |-
    ```Syntax
    Set-DfsrConnection
        [[-GroupName] <String[]>]
        [-SourceComputerName] <String>
        [-DestinationComputerName] <String>
        [[-DisableConnection] <Boolean>]
        [[-DisableRDC] <Boolean>]
        [[-DisableCrossFileRDC] <Boolean>]
        [[-Description] <String>]
        [[-MinimumRDCFileSizeInKB] <Int64>]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.DistributedFileSystemReplication.DfsReplicationGroup" data-throw-if-not-resolved="False" />
