syntaxes:
- syntax: |-
    ```Syntax
    Write-DfsrPropagationReport
        [-GroupName] <String[]>
        [-FolderName] <String[]>
        [-ReferenceComputerName] <String>
        [[-Path] <String>]
        [[-FileCount] <Int32>]
        [[-DomainName] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
