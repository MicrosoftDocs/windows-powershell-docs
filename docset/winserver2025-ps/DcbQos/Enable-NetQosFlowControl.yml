    ```Syntax
    Enable-NetQosFlowControl
        [[-Priority] <Byte[]>]
        [[-InterfaceAlias] <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
