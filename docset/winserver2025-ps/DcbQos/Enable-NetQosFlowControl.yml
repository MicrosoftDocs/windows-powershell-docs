examples:
- title: 'Example 1: Enable flow control for traffic by priority'
  description: |-
    ```
    PS C:\> Enable-NetQosFlowControl -Priority 3,6
    ```

    This command enables flow control on traffic tagged with priority 3 and priority 6.
