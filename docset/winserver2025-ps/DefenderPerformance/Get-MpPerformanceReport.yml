syntaxes:
- syntax: |-
    ```Syntax
    Get-MpPerformanceReport
        [-Path] <String>
        [-TopFiles <Int32>]
        [-TopScansPerFile <Int32>]
        [-TopProcessesPerFile <Int32>]
