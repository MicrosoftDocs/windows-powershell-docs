syntaxes:
- syntax: |-
    ```Syntax
    Remove-DhcpServerv6OptionValue
        [-ComputerName <String>]
        [[-Prefix] <IPAddress>]
        [-ReservedIP <IPAddress>]
        [-OptionId] <UInt32[]>
        [-PassThru]
        [-VendorClass <String>]
        [-UserClass <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
