        [-IPsecTunnelEndpoints]
        [-PreferLocalNamesAllowed]
        [-UserInterface]
        [-SupportEmail]
        [-FriendlyName]
        [-ManualEntryPointSelectionAllowed]
        [-GslbFqdn]
        [-ForceTunneling]
        [-CustomCommands]
        [-PassiveMode]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
