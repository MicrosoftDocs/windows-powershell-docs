### YamlMime:PowerShellCmdlet1
uid: DirectAccessClientComponents.Reset-DAEntryPointTableItem
name: Reset-DAEntryPointTableItem
module: DirectAccessClientComponents
isPreview: false
summary: |-
  Resets the specified DirectAccess entry point configuration to the default configuration.
description: |-
  The **Reset-DAEntryPointTableItem** cmdlet resets the configuration of the entry point specified by *EntryPointName* to the default configuration.
  You can use the optional parameters to reset specific configuration settings to the default configuration.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EntryPointName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the entry point to modify.
      The entry point name is usually the friendly name of the location, such as Redmond or Paris.

      Specify the name of the entry point by using double quotes (" ").
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByGpoSession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GPOSession
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Group Policy session to send configuration information.
      You can use *GPOSession* with the **NetGPO** cmdlets to aggregate multiple operations performed on a Group Policy Object.

      *GPOSession* cannot be used in conjunction with **PolicyStore**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByGpoSession
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GslbIP
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Resets the global server load balancing (GSLB) IP of the specified sites to a non-configured state.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input to this cmdlet.
      You can use this parameter, or you can pipe the input to this cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPHttpsProfile
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Resets the IpHTTPsProfile property of the specified sites to a non-configured state.
      For more information about IPHTTPs profiles, see the **NetIPHTTPsConfiguration** cmdlets in the **NetworkTransition** module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Sends items from an interactive window down the pipeline as input to other cmdlets.
      By default, this cmdlet does not generate any output.
      However, to send items from the interactive window down the pipeline, click to select the items and then click OK.
      Shift-click and Ctrl-click are supported.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store into which the cmdlet adds the entry point.

      To add the entry point to a Group Policy Object, specify the GPO name using the format "Domain\GPOName".

      To add the entry point information to a computer's local GPO, specify the computer's local GPO name in the format "GPO:\<computername\>"

      *PolicyStore* cannot be used in conjunction with *GPOSession*.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TeredoServerIP
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Resets the TeredoServerIP property of the specified sites to a non-configured state.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Reset-DAEntryPointTableItem
        -PolicyStore <String>
        [-EntryPointName <String[]>]
        [-TeredoServerIP]
        [-IPHttpsProfile]
        [-GslbIP]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPolicyStore
  isDefault: true
- syntax: |-
    ```Syntax
    Reset-DAEntryPointTableItem
        -GPOSession <String>
        [-EntryPointName <String[]>]
        [-TeredoServerIP]
        [-IPHttpsProfile]
        [-GslbIP]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByGpoSession
  isDefault: false
- syntax: |-
    ```Syntax
    Reset-DAEntryPointTableItem
        -InputObject <CimInstance[]>
        [-TeredoServerIP]
        [-IPHttpsProfile]
        [-GslbIP]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/StandardCimv2/MSFT_DASiteTableEntry" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet accepts as input a CIM object which contains a DA site table entry.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Reset an entry point property'
  description: |-
    ```
    PS C:\> Reset-DAEntryPointTableItem -GslbIP -EntryPointName "Paris" -PolicyStore "Contoso\GPO1"
    ```

    This cmdlet resets the GslbIP property to not-configured for the Paris entry point.
