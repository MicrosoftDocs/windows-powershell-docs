examples:
- title: 'Example 1: Remove configuration for DoH servers'
  description: |-
    ```powershell
    Remove-DnsClientDohServerAddress -ServerAddress 10.23.1.1,10.18.1.1
    ```

    This example removes DoH configuration for the servers 10.23.1.1 and 10.18.1.1.
