syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsClientDohServerAddress
        [-ServerAddress] <String[]>
        [[-DohTemplate] <String>]
        [[-AllowFallbackToUdp] <Boolean>]
        [[-AutoUpgrade] <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
