syntaxes:
- syntax: |-
    ```Syntax
    Remove-DnsServerClientSubnet
        [-Name] <String>
        [-PassThru]
        [-Force]
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
