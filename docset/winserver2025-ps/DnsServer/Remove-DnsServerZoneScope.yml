syntaxes:
- syntax: |-
    ```Syntax
    Remove-DnsServerZoneScope
        [-ZoneName] <String>
        [-Name] <String>
        [-PassThru]
        [-Force]
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
