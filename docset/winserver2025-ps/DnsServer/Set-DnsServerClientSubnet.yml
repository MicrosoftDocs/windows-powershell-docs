syntaxes:
- syntax: |-
    ```Syntax
    Set-DnsServerClientSubnet
        [-Name] <String>
        [[-IPv4Subnet] <String[]>]
        [[-IPv6Subnet] <String[]>]
        [-Action] <String>
        [-PassThru]
        [-ComputerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
