    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to add to, remove, or replace the IP addresses in the client subnet.
      The acceptable values for this parameter are:

      - ADD
      - REMOVE
      - REPLACE
    acceptedValues:
    - ADD
    - REMOVE
    - REPLACE
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
