### YamlMime:PowerShellCmdlet1
uid: EventTracingManagement.Get-EtwTraceProvider
name: Get-EtwTraceProvider
module: EventTracingManagement
isPreview: false
summary: |-
  Enumerates existing AutoLogger session configurations.
description: |-
  The **Get-EtwTraceProvider** cmdlet enumerates existing AutoLogger session configurations.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutologgerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the target AutoLogger session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAutologger
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Guid
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the provider ID.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the target ETW session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-EtwTraceProvider
        [[-Guid] <String[]>]
        [-AutologgerName <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByAutologger
  isDefault: true
- syntax: |-
    ```Syntax
    Get-EtwTraceProvider
        [[-Guid] <String[]>]
        [-SessionName <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: BySession
  isDefault: false
examples:
- title: 'Example 1: View all available trace providers'
  description: |-
    ```
    PS C:\> Get-NetEventProvider -ShowInstalled | Select-Object -Property *
    ```

    This command obtains a list of all available ETW trace providers and their GUIDs on the current computer by using the **Get-NetEventProvider** cmdlet.
    For more information, type `Get-Help Get-NetEventProvider`.
- title: 'Example 2: Get trace providers for an ETW session'
  description: |-
    ```
    PS C:\> Get-EtwTraceProvider -SessionName "NtfsLog"
    SessionName     : NtfsLog
    AutologgerName  :
    Guid            : {9C88041D-349D-4647-8BFD-2C0A167BFE58}
    Level           : 4
    MatchAnyKeyword : 0xFFFFFFFFFFFFFFFF
    MatchAllKeyword : 0x0
    Property        : 0

    SessionName     : NtfsLog
    AutologgerName  :
    Guid            : {5EEFEBDB-E90C-423A-8ABF-0241E7C5B87D}
    Level           : 0
    MatchAnyKeyword : 0x0
    MatchAllKeyword : 0x0
    Property        : 0
    ```

    This command gets all trace providers for the ETW session named NtfsLog.
- title: 'Example 3: Get trace providers for an AutoLogger configuration'
  description: |-
    ```
    PS C:\> Get-EtwTraceProvider -AutologgerName "WdiContextLog"
    SessionName     :
    AutologgerName  : WdiContextLog
    Guid            : 1D75856D-36A7-4ECB-A3F5-B13152222D29
    Level           : 0
    MatchAnyKeyword : 0x0
    MatchAllKeyword : 0x0
    Property        : 0

    SessionName     :
    AutologgerName  : WdiContextLog
    Guid            : {1D75856D-36A7-4ECB-A3F5-B13152222D29}
    Level           : 0
    MatchAnyKeyword : 0x0
    MatchAllKeyword : 0x0
    Property        : 0
    ```

    This command gets all trace providers for the AutoLogger configuration named WdiContextLog.
