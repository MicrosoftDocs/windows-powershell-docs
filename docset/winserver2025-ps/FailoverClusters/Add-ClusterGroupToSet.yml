syntaxes:
- syntax: |-
    ```Syntax
    Add-ClusterGroupToSet
        [[-Name] <String[]>]
        [-Group] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Add-ClusterGroupToSet
        [-Group] <String>
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Add a cluster group to a set'
  description: |-
    ```powershell
    Add-ClusterGroupToSet -Name "Set001" -Group "Group001"
    ```

    This command adds the cluster group named `Group001` to the set named `Set001`.
