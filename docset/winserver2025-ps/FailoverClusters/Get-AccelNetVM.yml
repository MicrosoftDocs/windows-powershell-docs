### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Get-AccelNetVM
name: Get-AccelNetVM
module: FailoverClusters
isPreview: false
summary: |-
  Gets VMs with Accelerated Networking.
description: |-
  Retrieves VMs where AccelNet is enabled.
parameters:
  cmdletParameters:
  - name: VM
    type: <xref href="VirtualMachineBase" data-throw-if-not-resolved="False" />
    description: |-
      The VM object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The Virtual Machine name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AccelNetVM
        [[-VMName] <String>]
        [[-VM] <VirtualMachineBase>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Get-AccelNetVM -VMName "MyVM"
    ```

    This example retrieves a VM named `MyVM`.

    If the **-VMName** parameter isn't provided, all VM names are retrieved.
- title: EXAMPLE 2
  description: |-
    ```powershell
    $vm = Get-VM -Name "MyVM"
    Get-AccelNetVM -VM $vm
    ```

    This example retrieves the VM object for a VM named `MyVM`.
