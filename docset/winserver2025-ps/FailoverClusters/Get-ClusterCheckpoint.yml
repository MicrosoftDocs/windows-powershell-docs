syntaxes:
- syntax: |-
    ```Syntax
    Get-ClusterCheckpoint
        [[-ResourceName] <StringCollection>]
        [-CheckpointName <String>]
        [-RegistryCheckpoint]
        [-CryptoCheckpoint]
        [-InputObject <PSObject>]
        [-Cluster <String>]
