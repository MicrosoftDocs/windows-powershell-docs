### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Get-ClusterCredential
name: Get-ClusterCredential
module: FailoverClusters
isPreview: false
summary: |-
  Retrieves the credentials for a specified node in a failover cluster.
description: |-
  The `Get-ClusterCredential` cmdlet retrieves the credentials for a specified node in a failover
  cluster.
parameters:
  cmdletParameters:
  - name: NodeName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the node for which to retrieve the credentials.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-ClusterCredential
        [[-NodeName] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-ClusterCredential -NodeName "Node01"
    ```

    This example retrieves the credentials for a node named `Node01` in the failover cluster.
