### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.New-WorkgroupCluster
name: New-WorkgroupCluster
module: FailoverClusters
isPreview: false
summary: |-
  Creates a new workgroup cluster.
description: |-
  The `New-WorkgroupCluster` cmdlet creates a new workgroup cluster.
parameters:
  cmdletParameters:
  - name: AdministrativeAccessPoint
    type: <xref href="AdminAccessPoint" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of administrative access point that the cmdlet creates for the cluster.
      Acceptable values are:

      - `DNS`: The cmdlet creates an administrative access point for the cluster. The administrative
        access point is registered in DNS but isn't enabled in Active Directory Domain Services.
      - `None`

      The cmdlet doesn't create an administrative access point for the cluster. Some clustered roles and
      functionality might not be available for a cluster that doesn't have an administrative access
      point. Also, you cannot use Failover Cluster Manager to manage a cluster that doesn't have an
      administrative access point.
    acceptedValues:
    - None
    - Dns
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "7"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credentials
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      An array of credentials for the nodes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IgnoreNetwork
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more networks to ignore when running the cmdlet. Networks with DHCP enabled are
      always included, but other networks need a static address to be specified using the
      **StaticAddress** parameter or should be explicitly ignored with this **IgnoreNetwork** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ManagementPointNetworkType
    type: <xref href="AdminAccessPointResType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the network configuration used to determine IP address settings. Acceptable values are:

      - `Automatic`: Automatically detects the appropriate setting.
        - If SQL Server is running in Azure, it uses `Distributed`.
        - If SQL Server is running on-premises, it uses `Singleton`.
      - `Singleton`: The traditional method of DHCP or static IP address.
      - `Distributed`: Uses a Distributed Network Name by using Node IP addresses.

      For on-prem SQL Server, if the value is set to `Automatic`, it defaults to `Singleton`.
    acceptedValues:
    - Automatic
    - Singleton
    - Distributed
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "6"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the workgroup cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Node
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      An array of nodes to be included in the cluster.
    defaultValue: '@()'
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NoStorage
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that shared storage is ignored for the workgroup cluster node.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: S2D
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to enable Storage Spaces Direct when creating the workgroup cluster.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StaticAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more static addresses to use when running the cmdlet. Networks with DHCP enabled
      are always included, but other networks need a static address to be specified using the
      **StaticAddress** parameter or should be explicitly ignored with this **IgnoreNetwork** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet isn't run.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
