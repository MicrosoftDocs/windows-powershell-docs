syntaxes:
- syntax: |-
    ```Syntax
    Remove-Cluster
        [[-Cluster] <String>]
        [-CleanupAD]
        [-Force]
        [-InputObject <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
