syntaxes:
- syntax: |-
    ```Syntax
    Remove-ClusterFaultDomain
        [[-Name] <String[]>]
        [-Id <String[]>]
        [-Flags <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-ClusterFaultDomain
        -InputObject <CimInstance[]>
        [-Flags <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove a cluster fault domain'
  description: |-
    ```powershell
    Remove-ClusterFaultDomain -Name "Rack001"
    ```

    This command removes the cluster fault domain named `Rack001`.
