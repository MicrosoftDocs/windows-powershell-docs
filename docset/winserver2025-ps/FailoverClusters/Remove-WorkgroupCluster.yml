uid: FailoverClusters.Remove-WorkgroupCluster
name: Remove-WorkgroupCluster
module: FailoverClusters
isPreview: false
summary: |-
  Removes a workgroup cluster.
description: |-
  The `Remove-WorkgroupCluster` cmdlet removes a workgroup cluster.
