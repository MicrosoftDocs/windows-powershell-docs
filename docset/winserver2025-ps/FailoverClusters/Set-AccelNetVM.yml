### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Set-AccelNetVM
name: Set-AccelNetVM
module: FailoverClusters
isPreview: false
summary: |-
  Sets Accelerated Networking on a VM.
description: |-
  Sets Accelerated Networking on a VM.
parameters:
  cmdletParameters:
  - name: Performance
    type: <xref href="PerformanceWeight" data-throw-if-not-resolved="False" />
    description: |-
      Sets the performance level. Acceptable values are:

      - `Low`
      - `Medium`
      - `High`
    acceptedValues:
    - Low
    - Medium
    - High
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AccelNetVM
        [-VMName] <String>
        [-Performance] <PerformanceWeight>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Set-AccelNetVM -VMName "MyVM" -Performance High
    ```

    This example sets Accelerated Networking with the performance level set to `High` for the VM
    named `MyVM`.
