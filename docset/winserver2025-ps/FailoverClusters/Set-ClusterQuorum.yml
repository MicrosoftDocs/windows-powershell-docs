syntaxes:
- syntax: |-
    ```Syntax
    Set-ClusterQuorum
        [-DiskOnly <String>]
        [-NoWitness]
        [-DiskWitness <String>]
        [-FileShareWitness <String>]
        [-CloudWitness]
        [-AccountName <String>]
        [-Endpoint <String>]
        [-AccessKey <String>]
        [-InputObject <PSObject>]
        [-Cluster <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.FailoverClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
