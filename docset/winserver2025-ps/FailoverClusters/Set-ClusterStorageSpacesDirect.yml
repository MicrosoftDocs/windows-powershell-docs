### YamlMime:PowerShellCmdlet1
uid: FailoverClusters.Set-ClusterStorageSpacesDirect
name: Set-ClusterStorageSpacesDirect
module: FailoverClusters
isPreview: false
summary: |-
  Sets S2D cache parameters.
description: |-
  The `Set-ClusterStorageSpacesDirect` cmdlet sets Storage Spaces Direct (S2D) cache parameters.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.

      The cmdlet immediately returns an object that represents the job and then displays the command
      prompt. You can continue to work in the session while the job completes. To manage the job, use the
      `*-Job` cmdlets. To get the job results, use the
      [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see
      [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheModeHDD
    type: <xref href="CacheModeType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cache mode of the hard disk drive. The acceptable values for this parameter are:

      - `ReadOnly`
      - `WriteOnly`
      - `ReadWrite`
    acceptedValues:
    - ReadOnly
    - WriteOnly
    - ReadWrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheModeSSD
    type: <xref href="CacheModeType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the cache mode of the solid state drive. The acceptable values for this parameter are:

      - `ReadOnly`
      - `WriteOnly`
      - `ReadWrite`
    acceptedValues:
    - ReadOnly
    - WriteOnly
    - ReadWrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CacheState
    type: <xref href="CacheStateType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the S2D cache state. The acceptable values for this parameter are: `Enabled` or
      `Disabled`. The default value is `Enabled`.
    acceptedValues:
    - Disabled
    - Enabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967)
      or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Nodes
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies, as a string array, the nodes on which this operation takes place.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SkipEligibilityChecks
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet skips cache eligibility checks. If cache stores are found with data
      partitions on them, then you can use `Enable-ClusterStorageSpacesDirect` with the cache state as
      Disabled but not as ReadOnly or ReadWrite.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-ClusterStorageSpacesDirect
        [-CacheState <CacheStateType>]
        [-CacheModeHDD <CacheModeType>]
        [-CacheModeSSD <CacheModeType>]
        [-Nodes <String[]>]
        [-SkipEligibilityChecks]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set S2D cache parameters'
  description: |-
    ```powershell
    Set-ClusterStorageSpacesDirect -CimSession "cluster01.contoso.com" -CacheModeHDD ReadWrite
    ```

    The following command sets the S2D cache parameter as ReadWrite on the cluster named
    `cluster01.contoso.com`.
