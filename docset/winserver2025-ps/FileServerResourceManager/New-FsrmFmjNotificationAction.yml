        [-MailCC <String>]
        [-MailBCC <String>]
        [-Subject <String>]
        [-Body <String>]
        [-AttachmentFileListSize <UInt32>]
        [-EventType <FmjNotificationActionEventTypeEnum>]
        [-Command <String>]
        [-WorkingDirectory <String>]
