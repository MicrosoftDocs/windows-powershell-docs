### YamlMime:PowerShellCmdlet1
uid: FileServerResourceManager.Set-FsrmClassification
name: Set-FsrmClassification
module: FileServerResourceManager
isPreview: false
summary: |-
  Changes configuration settings for classification.
description: |-
  The **Set-FsrmClassification** cmdlet changes configuration settings for classification.
parameters:
