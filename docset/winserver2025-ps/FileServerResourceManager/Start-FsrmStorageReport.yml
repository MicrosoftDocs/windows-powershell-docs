syntaxes:
- syntax: |-
    ```Syntax
    Start-FsrmStorageReport
        [-Name] <String[]>
        [-Queue]
        [-RunDuration <Int32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Start-FsrmStorageReport
        -InputObject <CimInstance[]>
        [-Queue]
        [-RunDuration <Int32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
