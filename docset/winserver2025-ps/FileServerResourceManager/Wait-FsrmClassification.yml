syntaxes:
- syntax: |-
    ```Syntax
    Wait-FsrmClassification
        [-Timeout <Int32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
