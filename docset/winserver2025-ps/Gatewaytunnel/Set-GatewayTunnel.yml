syntaxes:
- syntax: |-
    ```Syntax
    Set-GatewayTunnel
        [-TunnelName] <String>
        [[-RoutingDomainName] <String>]
        [[-LocalIp] <String>]
        [[-RemoteIp] <String>]
        [[-TunnelIdentity] <String>]
        [[-Routes] <String>]
        [[-LocalExemptRoutes] <String>]
        [[-RemoteExemptRoutes] <String>]
        [-LocalSubnets <String>]
        [-Standby <Boolean>]
        [-AdminStatus <Boolean>]
        [-AutoConnectEnabled <Boolean>]
        [-ProtocolType <ProtocolType>]
        [-EncryptionType <EncryptionType>]
        [-IpsecEncryption <IpsecEncryption>]
        [-IpsecIntegrity <IpsecIntegrity>]
        [-Pfsgroup <Pfsgroup>]
        [-IkeEncryption <IkeEncryption>]
        [-IkeIntegrity <IkeIntegrity>]
        [-Dhgroup <Dhgroup>]
        [-MMSALifeTimeInSeconds <UInt32>]
        [-SALifeTimeInSeconds <UInt32>]
        [-SALifeKilloBytes <UInt32>]
        [[-SharedSecret] <String>]
        [-DpdTimeout <UInt32>]
        [-UseNarrowTrafficSelectors <Boolean>]
        [-IsConnectionNATed <Boolean>]
        [-ConnectReason <ConnectReason>]
        [-TunnelId <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
