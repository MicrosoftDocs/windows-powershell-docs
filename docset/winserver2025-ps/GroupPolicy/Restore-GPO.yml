    ```Syntax
    Restore-GPO
        -BackupId <Guid>
        -Path <String>
        [-Domain <String>]
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestoreFromBackupId
  isDefault: true
- syntax: |-
    ```Syntax
    Restore-GPO
        -Guid <Guid>
        -Path <String>
        [-Domain <String>]
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestoreFromGpo(GUID)
  isDefault: false
- syntax: |-
    ```Syntax
    Restore-GPO
        [-Name] <String>
        -Path <String>
        [-Domain <String>]
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
