### YamlMime:PowerShellCmdlet1
uid: HNVDiagnostics.Disable-MuxEchoResponder
name: Disable-MuxEchoResponder
module: HNVDiagnostics
isPreview: false
summary: |-
  Disables an ICMP echo responder. This cmdlet has been deprecated.
description: |-
  The **Disable-MuxEchoResponder** cmdlet disables an Internet Control Message Protocol (ICMP) echo responder in a multiplexer (MUX).
parameters:
  cmdletParameters:
  - name: SequenceNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ICMP sequence number of the echo responder to disable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetVIP
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the target virtual IP address of the echo responder to disable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-MuxEchoResponder
        [-TargetVIP] <String>
        [[-SequenceNumber] <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable an echo responder'
  description: |-
    ```
    PS C:\> Disable-MuxEchoResponder -TargetVIP "10.123.176.108" -SequenceNumber 27
    ```
