    New-HwCertProjectDefinitionFile
        [-ControllerName <String>]
        [-PdefFilePath <String>]
        [-TestCollectionFilePath <String>]
        [-EnableIsolateTargets]
        [-EnableMultiDeviceTest]
        [-OutputAutomatedPdef]
        [-ProjectName <String>]
        [-SkipTestStatus <String>]
        [-CrashDumpCollection <String>]
        [-MachineList <String[]>]
        [-MachinePool <String>]
        [-RunSystemTest]
        [-TestAllDevices]
        [-HwIdList <String[]>]
        [-DriverList <String[]>]
        [-ContainerIdList <String[]>]
        [-ClassIdList <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: PdefOverrides
  isDefault: false
- syntax: |-
    ```Syntax
    New-HwCertProjectDefinitionFile
        -MachineList <String[]>
        [-ControllerName <String>]
        [-PdefFilePath <String>]
        [-TestCollectionFilePath <String>]
        [-EnableIsolateTargets]
        [-EnableMultiDeviceTest]
        [-OutputAutomatedPdef]
        [-ProjectName <String>]
        [-SkipTestStatus <String>]
        [-CrashDumpCollection <String>]
        [-RunSystemTest]
        [-TestAllDevices]
        [-HwIdList <String[]>]
        [-DriverList <String[]>]
        [-ContainerIdList <String[]>]
        [-ClassIdList <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: MachineList
  isDefault: false
- syntax: |-
    ```Syntax
    New-HwCertProjectDefinitionFile
        -MachinePool <String>
        [-ControllerName <String>]
        [-PdefFilePath <String>]
        [-TestCollectionFilePath <String>]
        [-EnableIsolateTargets]
        [-EnableMultiDeviceTest]
        [-OutputAutomatedPdef]
        [-ProjectName <String>]
        [-SkipTestStatus <String>]
        [-CrashDumpCollection <String>]
        [-RunSystemTest]
        [-TestAllDevices]
        [-HwIdList <String[]>]
        [-DriverList <String[]>]
        [-ContainerIdList <String[]>]
        [-ClassIdList <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: MachinePool
  isDefault: false
examples:
- title: 'Example 1: Create a project definition file for a driver'
  description: |-
    ```
    PS C:\> New-HwCertProjectDefinitionFile -MachinePool "Test07" -DriverList "disk.sys"
    ```

    This command creates a project definition file.
    The command populates the project file with HCK target values for which disk.sys is a device driver, and from all machines available in the Test07 pool.
