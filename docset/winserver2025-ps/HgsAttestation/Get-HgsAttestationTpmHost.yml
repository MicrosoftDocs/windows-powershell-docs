    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-HgsAttestationTpmHost
        [-Name <String>]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [<CommonParameters>]
    ```
  parameterSetName: NameSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-HgsAttestationTpmHost
        -Path <String>
        [-Name <String>]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
- syntax: |-
    ```Syntax
    Get-HgsAttestationTpmHost
        -Xml <XmlDocument>
        [-Name <String>]
        [-PolicyVersion <PolicyVersion>]
        [-Stage]
        [<CommonParameters>]
    ```
  parameterSetName: Console
  isDefault: false
