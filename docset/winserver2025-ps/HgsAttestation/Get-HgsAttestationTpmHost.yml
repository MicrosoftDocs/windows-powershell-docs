### YamlMime:PowerShellCmdlet1
uid: HgsAttestation.Get-HgsAttestationTpmHost
name: Get-HgsAttestationTpmHost
module: HgsAttestation
isPreview: false
summary: |-
  Gets guarded hosts with TPM 2.0 from the Attestation service HGS.
description: |-
  The **Get-HgsAttestationTpmHost** cmdlet retrieves guarded hosts from the Attestation service in the Host Guardian Service (HGS).
  Use this cmdlet for hosts that have trusted platform module (TPM) 2.0 hardware, and that were added by using the **Add-HgsAttestationTpmHost** cmdlet.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the guarded host that this cmdlet gets from the Attestation service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path of an .xml file for which this cmdlet gets hosts.
      Create this file by using the **Get-PlatformIdentifier** cmdlet.
      For more information, type `Get-Help Get-PlatformIdentifier`.
    aliases:
    - FilePath
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: File
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyVersion
    type: <xref href="PolicyVersion" data-throw-if-not-resolved="False" />
    description: |-
      Reserved for future use.
    acceptedValues:
    - None
    - PolicyVersion1503
    - PolicyVersion1704
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stage
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Reserved for future use.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Xml
    type: <xref href="XmlDocument" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path of an .xml file that contains binary data for which this cmdlet gets hosts.
      Create this file by using **Get-PlatformIdentifier**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
