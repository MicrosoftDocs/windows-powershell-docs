syntaxes:
- syntax: |-
    ```Syntax
    Remove-HgsGuardian
        [-Name] <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameViaString
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-HgsGuardian
        [-InputObject] <CimInstance>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameViaGuardian
  isDefault: false
examples:
- title: 'Example 1: Remove a guardian'
  description: |-
    ```
    PS C:\> Remove-HgsGuardian -Name "Guardian11"
    ```

    This command removes the guardian named Guardian11 from the local store.
