    type: <xref href="KeyCertificateType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies of the type of the certificate that this cmdlet modifies.
      The acceptable values for this parameter are:

      - Signing
      - Encryption
    acceptedValues:
    - Signing
    - Encryption
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
