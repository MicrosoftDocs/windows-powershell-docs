syntaxes:
- syntax: |-
    ```Syntax
    Set-HgsKeyProtectionCertificate
        -CertificateType <KeyCertificateType>
        -Thumbprint <String>
        [-IsEnabled <Boolean>]
        [-IsPrimary]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
