syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-HgsServer
        [-LocalAdministratorPassword] <SecureString>
        [-HgsDomainCredential <PSCredential>]
        [-Force]
        [-Restart]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove the node from HGS'
  description: |-
    ```
    PS C:\> $Cred = Get-Credential
    PS C:\> Uninstall-HgsServer -HgsDomainCredential $cred -LocalAdministratorPassword $secureString
    ```

    This example removes the node from an existing HGS setup.
    If the second command removes the final node, then it also destroys the cluster.
