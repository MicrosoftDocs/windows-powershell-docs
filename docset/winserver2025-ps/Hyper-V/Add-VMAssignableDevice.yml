syntaxes:
- syntax: |-
    ```Syntax
    Add-VMAssignableDevice
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-VirtualFunction <UInt16>]
        [-ResourcePoolName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMAssignableDevice
        [-VM] <VirtualMachine[]>
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-VirtualFunction <UInt16>]
        [-ResourcePoolName <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
