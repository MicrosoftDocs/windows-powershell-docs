examples:
- title: Example 1
  description: |-
    ```powershell
    Add-VMAssignableDevice -VMName "MyVM" -InstancePath "PCIROOT(0)#PCI(0300)#PCI(0000)"
    ```

    This example attaches a physical device, identified by its instance path, to the virtual machine
    named **MyVM**.
