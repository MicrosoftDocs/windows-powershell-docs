### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Add-VMHardDiskDrive
name: Add-VMHardDiskDrive
module: Hyper-V
isPreview: false
summary: |-
  Adds a hard disk drive to a virtual machine.
description: |-
  The **Add-VMHardDiskDrive** cmdlet adds a hard disk drive to a virtual machine.
parameters:
  cmdletParameters:
  - name: AllowUnverifiedPaths
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that no error is to be thrown if the specified path is not verified as accessible by the cluster.
      This parameter is applicable to clustered virtual machines.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts that run this cmdlet.
      NetBIOS names, IP addresses, and fully qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    aliases:
    - PSComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerLocation
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of the location on the controller at which the hard disk drive is to be added.
      If not specified, the first available location in the controller specified with the **ControllerNumber** parameter is used.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of the controller to which the hard disk drive is to be added.
      If not specified, this parameter assumes the value of the first available controller at the location specified in the **ControllerLocation** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMObject
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControllerType
    type: <xref href="ControllerType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of the controller to which the hard disk drive is to be added.
      If not specified, **IDE** is attempted first.
      If the IDE controller port at the specified number and location is already connected to a drive, then it will try to create one on the SCSI controller specified by **ControllerNumber**.
      Allowed values are **IDE** and **SCSI**.
    acceptedValues:
    - IDE
    - SCSI
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: VMObject
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskNumber
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk number of the offline physical hard drive to be connected as a passthrough disk.
    aliases:
    - Number
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumIOPS
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum normalized I/O operations per second (IOPS) for the hard disk.
      Hyper-V calculates normalized IOPS as the total size of I/O per second divided by 8 KB.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumIOPS
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum normalized I/O operations per second (IOPS) for the hard disk.
      Hyper-V calculates normalized IOPS as the total size of I/O per second divided by 8 KB.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OverrideCacheAttributes
    type: <xref href="CacheAttributes" data-throw-if-not-resolved="False" />
    acceptedValues:
    - Default
    - WriteCacheEnabled
    - WriteCacheAndFUAEnabled
    - WriteCacheDisabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Passthru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Passes the added **Microsoft.HyperV.PowerShell.HardDiskDrive** object through to the pipeline.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the full path of the hard disk drive file to be added.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSPolicy
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the storage Quality of Service (QoS) policy that this cmdlet associates with the hard disk drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSPolicyID
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the unique ID for a storage QoS policy that this cmdlet associates with the hard disk drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourcePoolName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the ISO resource pool to which this virtual hard disk is to be associated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SupportPersistentReservations
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the hard disk supports SCSI persistent reservation semantics.
      Specify this parameter when the hard disk is a shared disk that is used by multiple virtual machines.
    aliases:
    - ShareVirtualDisk
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="VirtualMachine" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual machine to which the hard disk drive is to be added.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMDriveController
    type: <xref href="VMDriveController" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the controller to which the hard disk drive is to be added.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMDriveController
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the virtual machine to which the hard disk drive is to be added.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-VMHardDiskDrive
        [-VMName] <String[]>
        [[-ControllerType] <ControllerType>]
        [[-ControllerNumber] <Int32>]
        [[-ControllerLocation] <Int32>]
        [[-Path] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-DiskNumber <UInt32>]
        [-ResourcePoolName <String>]
        [-SupportPersistentReservations]
        [-AllowUnverifiedPaths]
        [-MaximumIOPS <UInt64>]
        [-MinimumIOPS <UInt64>]
        [-QoSPolicyID <String>]
        [-QoSPolicy <CimInstance>]
        [-Passthru]
        [-OverrideCacheAttributes <CacheAttributes>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-VMHardDiskDrive
        [-VM] <VirtualMachine[]>
        [[-ControllerType] <ControllerType>]
        [[-ControllerNumber] <Int32>]
        [[-ControllerLocation] <Int32>]
        [[-Path] <String>]
        [-DiskNumber <UInt32>]
        [-ResourcePoolName <String>]
        [-SupportPersistentReservations]
        [-AllowUnverifiedPaths]
        [-MaximumIOPS <UInt64>]
        [-MinimumIOPS <UInt64>]
        [-QoSPolicyID <String>]
        [-QoSPolicy <CimInstance>]
        [-Passthru]
        [-OverrideCacheAttributes <CacheAttributes>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Add-VMHardDiskDrive
        [-VMDriveController] <VMDriveController>
        [[-ControllerLocation] <Int32>]
        [[-Path] <String>]
        [-DiskNumber <UInt32>]
        [-ResourcePoolName <String>]
        [-SupportPersistentReservations]
        [-AllowUnverifiedPaths]
        [-MaximumIOPS <UInt64>]
        [-MinimumIOPS <UInt64>]
        [-QoSPolicyID <String>]
        [-QoSPolicy <CimInstance>]
        [-Passthru]
        [-OverrideCacheAttributes <CacheAttributes>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMDriveController
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.Powershell.DriveController" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.HyperV.Powershell.VirtualMachine" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.HardDiskDrive" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Add-VMHardDiskDrive -VMName Test -Path D:\VHDs\disk1.vhdx
    ```

    Creates a virtual hard disk using file D:\VHDs\disk1.vhdx on virtual machine Test.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM Test | Add-VMHardDiskDrive -ControllerType SCSI -ControllerNumber 0
    ```

    Adds a virtual hard disk to SCSI controller number 0 on virtual machine Test.
- title: Example 3
  description: |-
    ```
    PS C:\> Get-VMScsiController -VMName Test -ControllerNumber 0 | Add-VMHardDiskDrive -DiskNumber 2
    ```

    This example gets a SCSI controller on a virtual machine named Test and then adds physical disk 2 to that controller.
- title: Example 4
  description: |-
    ```
    PS C:\> Get-Disk 2 | Add-VMHardDiskDrive -VMName Test
    ```

    This example gets physical disk 2 and then adds it to a virtual machine named Test.
