syntaxes:
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [[-Name] <String[]>]
        [-SwitchName] <String>
        [-VMName] <String[]>
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name_SwitchName
  isDefault: true
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapter[]>
        [-SwitchName] <String>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object_SwitchName
  isDefault: false
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapter[]>
        [-VMSwitch] <VMSwitch>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object_SwitchObject
  isDefault: false
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [-VMNetworkAdapter] <VMNetworkAdapter[]>
        [-UseAutomaticConnection]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object_UseAutomaticConnection
  isDefault: false
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [[-Name] <String[]>]
        [-VMSwitch] <VMSwitch>
        [-VMName] <String[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name_SwitchObject
  isDefault: false
- syntax: |-
    ```Syntax
    Connect-VMNetworkAdapter
        [[-Name] <String[]>]
        [-VMName] <String[]>
        [-UseAutomaticConnection]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name_UseAutomaticConnection
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
