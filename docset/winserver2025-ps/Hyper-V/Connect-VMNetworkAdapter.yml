### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Connect-VMNetworkAdapter
name: Connect-VMNetworkAdapter
module: Hyper-V
isPreview: false
summary: |-
  Connects a virtual network adapter to a virtual switch.
description: |-
  The **Connect-VMNetworkAdapter** cmdlet connects a virtual network adapter to a virtual switch.
parameters:
