### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Copy-VMFile
name: Copy-VMFile
module: Hyper-V
isPreview: false
summary: |-
  Copies a file to a virtual machine.
description: |-
  The **Copy-VMFile** cmdlet copies a file to a virtual machine.
