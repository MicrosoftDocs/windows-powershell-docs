syntaxes:
- syntax: |-
    ```Syntax
    Copy-VMFile
        [-Name] <String[]>
        [-SourcePath] <String>
        [-DestinationPath] <String>
        -FileSource <CopyFileSourceType>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-CreateFullPath]
        [-Force]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Copy-VMFile
        [-VM] <VirtualMachine[]>
        [-SourcePath] <String>
        [-DestinationPath] <String>
        -FileSource <CopyFileSourceType>
        [-CreateFullPath]
        [-Force]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Copy-VMFile "Test VM" -SourcePath "D:\Test.txt" -DestinationPath "C:\Temp\Test.txt" -CreateFullPath -FileSource Host
    ```

    This example copies the file "test.txt" from the host operating system into the guest operating system of the virtual machine "Test VM".
    It will create the directory "C:\Temp" inside the guest operating system if it does not exist already.
