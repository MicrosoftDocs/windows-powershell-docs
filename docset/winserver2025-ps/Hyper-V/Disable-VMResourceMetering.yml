    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-VMResourceMetering
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-VMResourceMetering
        [-ResourcePoolName] <String>
        [[-ResourcePoolType] <VMResourcePoolType>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourcePool
  isDefault: false
- syntax: |-
    ```Syntax
    Disable-VMResourceMetering
        [-VM] <VirtualMachine[]>
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VirtualMachine" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.HyperV.PowerShell.VMResourcePoolType" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Disable-VMResourceMetering -VMName TestVM
    ```

    Disables collection of resource utilization data on a virtual machine named TestVM.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM Test* | Disable-VMResourceMetering
    ```

    Disables collection of resource utilization data on a set of virtual machines whose names begin with the string Test.
- title: Example 3
  description: |-
    ```
    PS C:\> Disable-VMResourceMetering -ResourcePoolName TestResourcePool -ResourcePoolType Memory
    ```

    Disables collection of resource utilization data on a resource pool named TestResourcePool of type Memory.
