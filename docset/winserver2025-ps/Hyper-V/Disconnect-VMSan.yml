syntaxes:
- syntax: |-
    ```Syntax
    Disconnect-VMSan
        [-Name] <String>
        -WorldWideNodeName <String[]>
        -WorldWidePortName <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StringWwn
  isDefault: true
- syntax: |-
    ```Syntax
    Disconnect-VMSan
        [-Name] <String>
        -HostBusAdapter <CimInstance[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: HbaObject
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    Default
- name: <xref href="Microsoft.HyperV.PowerShell.VMSan" data-throw-if-not-resolved="False" />
  description: |-
    If **-PassThru** is specified.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Disconnect-VMSan -Name Production -WorldWideNodeName C003FF0000FFFF00 -WorldWidePortName C003FF5778E50002
    ```

    Removes the host bus adapter having the specified world wide node name and world wide port name from the virtual SAN named Production on the local Hyper-V host.
