syntaxes:
- syntax: |-
    ```Syntax
    Enable-VMEventing
        [-Force]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Enable-VMEventing -Force
    ```

    Enables virtual machine eventing, suppressing the confirmation prompt.
