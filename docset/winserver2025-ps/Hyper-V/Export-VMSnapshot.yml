syntaxes:
- syntax: |-
    ```Syntax
    Export-VMSnapshot
        [-Name] <String[]>
        [-Path] <String>
        -VMName <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotName
  isDefault: true
- syntax: |-
    ```Syntax
    Export-VMSnapshot
        [-VM] <VirtualMachine[]>
        [-Name] <String[]>
        [-Path] <String>
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Export-VMSnapshot
        [-VMSnapshot] <VMSnapshot[]>
        [-Path] <String>
        [-AsJob]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SnapshotObject
  isDefault: false
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
