syntaxes:
- syntax: |-
    ```Syntax
    Get-VMDvdDrive
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-ControllerLocation <Int32>]
        [-ControllerNumber <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VMDvdDrive
        [-VM] <VirtualMachine[]>
        [-ControllerLocation <Int32>]
        [-ControllerNumber <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMDvdDrive
        [-VMSnapshot] <VMSnapshot>
        [-ControllerLocation <Int32>]
        [-ControllerNumber <Int32>]
