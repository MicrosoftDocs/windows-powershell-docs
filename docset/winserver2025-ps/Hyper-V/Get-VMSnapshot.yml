### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Get-VMSnapshot
name: Get-VMSnapshot
module: Hyper-V
isPreview: false
summary: |-
  Gets the checkpoints associated with a virtual machine or checkpoint.
description: |-
  The **Get-VMSnapshot** cmdlet gets the checkpoints associated with a virtual machine or checkpoint.

  Note: In Windows Server 2012 R2, virtual machine snapshots were renamed to virtual machine checkpoints.
  For clarity, this document will refer to virtual machine snapshots as checkpoints.
parameters:
  cmdletParameters:
  - name: ChildOf
    type: <xref href="VMSnapshot" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the checkpoint whose child checkpoints are to be retrieved.
      This retrieves immediate children only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Child
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Id
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts on which checkpoints are to be retrieved.
      NetBIOS names, IP addresses, and fully qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
