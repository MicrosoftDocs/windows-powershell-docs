syntaxes:
- syntax: |-
    ```Syntax
    Get-VMSnapshot
        [-VMName] <String[]>
        [[-Name] <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-SnapshotType <SnapshotType>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VMSnapshot
        [-VM] <VirtualMachine[]>
        [[-Name] <String>]
        [-SnapshotType <SnapshotType>]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSnapshot
        [-Id] <Guid>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSnapshot
        [[-Name] <String>]
        -ParentOf <VirtualMachineBase>
        [-SnapshotType <SnapshotType>]
        [<CommonParameters>]
    ```
  parameterSetName: Parent
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSnapshot
        [[-Name] <String>]
        -ChildOf <VMSnapshot>
        [-SnapshotType <SnapshotType>]
        [<CommonParameters>]
    ```
  parameterSetName: Child
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMSnapshot" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-VMSnapshot -VMName TestVM
    ```

    Gets all checkpoints of virtual machine TestVM.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VM -Name TestVM | Get-VMSnapshot -SnapshotType Standard
    ```

    Gets all standard checkpoints of virtual machine TestVM.
- title: Example 3
  description: |-
    ```
    PS C:\> $snapshot = Get-VMSnapshot -Name 'Before applying updates' -VMName TestVM


    PS C:\> Get-VMSnapshot -ParentOf $snapshot
    ```

    Gets the immediate parent of checkpoint Before applying updates of virtual machine TestVM.
- title: Example 4
  description: |-
    ```
    PS C:\> $snapshot = Get-VMSnapshot -Name 'Before applying updates' -VMName TestVM


    PS C:\> Get-VMSnapshot -ChildOf $snapshot
    ```

    Gets the immediate child checkpoints of checkpoint Before applying updates of virtual machine TestVM.
