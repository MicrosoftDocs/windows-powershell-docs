        [<CommonParameters>]
    ```
  parameterSetName: ExternalPort
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionPortData
        [-VM] <VirtualMachine[]>
        [-VMNetworkAdapterName <String>]
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMSwitchExtensionPortData" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-VMSwitchExtensionPortData VM1 -FeatureId eb29f0f2-f5dc-45c6-81bb-3cd9f219bbbb
    ```

    Gets the port feature data with ID eb29f0f2-f5dc-45c6-81bb-3cd9f219bbbb from the sample forwarding extension on the virtual network adapter in virtual machine VM1.
