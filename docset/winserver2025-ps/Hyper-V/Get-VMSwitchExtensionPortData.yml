syntaxes:
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionPortData
        [-VMName] <String[]>
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionPortData
        [-VMNetworkAdapter] <VMNetworkAdapterBase[]>
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionPortData
        [-ManagementOS]
        [-VMNetworkAdapterName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
        [-Extension <VMSwitchExtension[]>]
        [-ExtensionName <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ManagementOS
  isDefault: false
- syntax: |-
    ```Syntax
    Get-VMSwitchExtensionPortData
        [-ExternalPort]
        [-SwitchName <String>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-FeatureName <String[]>]
        [-FeatureId <Guid[]>]
