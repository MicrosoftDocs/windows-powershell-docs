syntaxes:
- syntax: |-
    ```Syntax
    Mount-VMHostAssignableDevice
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-InstancePath <String>]
        [-LocationPath <String>]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Mount-VMHostAssignableDevice
        [-HostAssignableDevice] <VMHostAssignableDevice[]>
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
inputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostAssignableDevice" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.HyperV.PowerShell.VMHostAssignableDevice" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $device = Get-VMHostAssignableDevice -InstancePath "PCIROOT(0)#PCI(0300)#PCI(0000)"
    $params = @{
    HostAssignableDevice = $device
    VMName = "MyVM"
    }
    Mount-VMHostAssignableDevice @params
    ```

    In this example, the `Get-VMHostAssignableDevice` cmdlet retrieves the device with the specified
    instance path and stores it in the `$device` variable. The `Mount-VMHostAssignableDevice` cmdlet
    then assigns this device to the virtual machine named **MyVM**.
