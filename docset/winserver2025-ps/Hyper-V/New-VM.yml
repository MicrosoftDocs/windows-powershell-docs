### YamlMime:PowerShellCmdlet1
uid: Hyper-V.New-VM
name: New-VM
module: Hyper-V
isPreview: false
summary: |-
  Creates a new virtual machine.
description: |-
  The `New-VM` cmdlet creates a new virtual machine.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BootDevice
    type: <xref href="BootDevice" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the device to use as the boot device for the new virtual machine. Acceptable values are:

      - `CD`
      - `Floppy`
      - `LegacyNetworkAdapter`
      - `IDE`
      - `NetworkAdapter`
      - `VHD`

      When `LegacyNetworkAdapter` is specified, this configures the new virtual machine with a network
      adapter that can be used to perform a PXE boot and install a 32-bit operating system from a network
      installation server.

      Generation 2 virtual machines do not support `Floppy`, `LegacyNetworkAdapter` or `IDE`. Using these
      values with a Generation 2 virtual machine will cause an error.

      `VHD` and `NetworkAdapter` are new to Generation 2 virtual machines. If you specify them on a
      Generation 1 virtual machine, then they are interpreted to be `IDE` and `LegacyNetworkAdapter`
      respectively.
    acceptedValues:
    - Floppy
    - CD
    - IDE
    - LegacyNetworkAdapter
    - NetworkAdapter
    - VHD
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession) or
      [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts on which the virtual machine is to be created. NetBIOS names,
      IP addresses, and fully qualified domain names are allowable. The default is the local computer.
      Use localhost or a dot (`.`) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action. The default is the
      current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Experimental
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specific prerelease VM version 255.0. This parameter is used to experiment with new VM
      functionality, but this is not supported and may fail across updates. This VM version is not
      supported in release host builds, meaning you can only use this on pre-release host builds (Windows
      Insider program).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Generation
    type: <xref href="Int16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the generation, as an integer, for the virtual machine. Acceptable values are:

      - `1`
      - `2`
    acceptedValues:
    - "1"
    - "2"
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GuestStateIsolationType
    type: <xref href="GuestIsolationType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the level of isolation for the virtual machine being created. Acceptable values are:

      - `TrustedLaunch`: Enables guest state isolation and Trusted Launch security features for the
        virtual machine.
      - `VBS`: Enables Virtualization Based Security (VBS) isolation for the virtual machine.
      - `SNP`: Enables AMD Secure Encrypted Virtualization-Secure Nested Paging (SEV-SNP) isolation for
        the virtual machine.
      - `TDX`: Enables Intel Trust Domain Extensions (TDX) isolation for the virtual machine.
      - `Disabled`: Disables all guest state isolation features for the virtual machine.
    acceptedValues:
    - TrustedLaunch
    - VBS
    - SNP
    - TDX
    - Disabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MemoryStartupBytes
    type: <xref href="Int64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the amount of memory, in bytes, to assign to the virtual machine. The default value is
      `512 MB`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the new virtual machine. The default name is New virtual machine.
    aliases:
    - VMName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NewVHDPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Creates a new virtual hard disk with the specified path and connects it to the new virtual machine.
      Absolute paths are allowed. If only a file name is specified, the virtual hard disk is created in
      the default path configured for the host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: New VHD
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NewVHDSizeBytes
    type: <xref href="UInt64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size of the dynamic virtual hard disk that is created and attached to the new virtual
      machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: New VHD
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NoVHD
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Creates a virtual machine without attaching any virtual hard disks.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: No VHD
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the directory to store the files for the new virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Prerelease
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specific prerelease VM version 254.0. This parameter is used to experiment with new VM
      functionality, but this is not supported and may fail across updates. This VM version is not
      supported in release host builds, meaning you can only use this on pre-release host builds (Windows
      Insider program).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceGuestStatePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the guest state file for the virtual machine being created. Specifying the
      guest state path allows for creation of a new virtual machine that has the same configuration and
      state as the existing virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SwitchName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the virtual switch if you want to connect the new virtual machine to
      an existing virtual switch to provide connectivity to a network. Hyper-V automatically creates a
      virtual machine with one virtual network adapter, but connecting it to a virtual switch is
      optional.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="Version" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version during the VM creation process. See,
      [Get-VMHostSupportedVersion](/powershell/module/hyper-v/get-vmhostsupportedversion) for supported
      VM versions on a given host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VHDPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a virtual hard disk file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Existing VHD
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
