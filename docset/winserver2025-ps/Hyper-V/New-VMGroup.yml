syntaxes:
- syntax: |-
    ```Syntax
    New-VMGroup
        [-Name] <String>
        [-GroupType] <GroupType>
        [[-Id] <Guid>]
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
