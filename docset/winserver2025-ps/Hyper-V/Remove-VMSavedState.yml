  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-VMSavedState
        [-VMName] <String[]>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-VMSavedState
        [-VM] <VirtualMachine[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-VMSavedState
        [-VMSnapshot] <VMSnapshot>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMSnapshot
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Remove-VMSavedState TestVM
    ```

    Removes the saved state from virtual machine TestVM.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-VMSnapshot TestVM | Remove-VMSavedState
    ```

    Removes the saved state from all snapshots belonging to virtual machine TestVM.
