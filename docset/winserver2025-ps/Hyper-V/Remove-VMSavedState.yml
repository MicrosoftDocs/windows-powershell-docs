### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Remove-VMSavedState
name: Remove-VMSavedState
module: Hyper-V
isPreview: false
summary: |-
  Deletes the saved state of a saved virtual machine.
description: |-
  The **Remove-VMSavedState** cmdlet deletes the saved state of a saved virtual machine.
  Note: data contained in the memory of the virtual machine may be lost; data on its virtual hard disk drives are unaffected.
parameters:
  cmdletParameters:
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more Hyper-V hosts on which the virtual machine saved state is to be deleted.
      NetBIOS names, IP addresses, and fully qualified domain names are allowable.
      The default is the local computer.
      Use localhost or a dot (.) to specify the local computer explicitly.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more user accounts that have permission to perform this action.
      The default is the current user.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="VirtualMachine" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the virtual machine whose saved state is to be deleted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the virtual machine whose saved state is to be deleted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VMName
      position: "0"
      isRequired: true
