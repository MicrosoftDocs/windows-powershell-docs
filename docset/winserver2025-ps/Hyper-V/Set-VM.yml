### YamlMime:PowerShellCmdlet1
uid: Hyper-V.Set-VM
name: Set-VM
module: Hyper-V
isPreview: false
summary: |-
  Configures a virtual machine.
description: |-
  The **Set-VM** cmdlet configures a virtual machine.
parameters:
  cmdletParameters:
  - name: AllowUnverifiedPaths
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that no error is to be thrown if the specified path is not verified as accessible by the cluster.
      This parameter is applicable to clustered virtual machines.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticCheckpointsEnabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether automatic checkpoints are enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticCriticalErrorAction
    type: <xref href="CriticalErrorAction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the action to take when the VM encounters a critical error, and exceeds the timeout duration specified by the **AutomaticCriticalErrorActionTimeout** cmdlet.
      The acceptable values for this parameter are: Pause and None.
    acceptedValues:
    - None
    - Pause
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticCriticalErrorActionTimeout
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the amount of time, in minutes, to wait in critical pause before powering off the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticStartAction
    type: <xref href="StartAction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the action the virtual machine is to take upon start.
      Allowed values are **Nothing**, **StartIfRunning**, and **Start**.
    acceptedValues:
    - Nothing
    - StartIfRunning
    - Start
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticStartDelay
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of seconds by which the virtual machine's start should be delayed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutomaticStopAction
    type: <xref href="StopAction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the action the virtual machine is to take when the virtual machine host shuts down.
      Allowed values are **TurnOff**, **Save**, and **ShutDown**.
    acceptedValues:
    - TurnOff
    - Save
    - ShutDown
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
