  - name: CheckpointType
    type: <xref href="CheckpointType" data-throw-if-not-resolved="False" />
    description: |-
      Allows you to configure the type of checkpoints created by Hyper-V.
      The acceptable values for this parameter are:

      - Disabled.
      Block creation of checkpoints.
      - Standard.
      Create standard checkpoints.
      - Production.
      Create production checkpoints if supported by guest operating system.
      Otherwise, create standard checkpoints.
      - ProductionOnly.
      Create production checkpoints if supported by guest operating system.
      Otherwise, the operation fails.
    acceptedValues:
    - Disabled
    - Production
    - ProductionOnly
    - Standard
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
