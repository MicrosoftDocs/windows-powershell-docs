syntaxes:
- syntax: |-
    ```Syntax
    Set-VMNetworkAdapterFailoverConfiguration
        [-VMName] <String>
        [-CimSession <CimSession[]>]
        [-ComputerName <String[]>]
        [-Credential <PSCredential[]>]
        [-VMNetworkAdapterName <String>]
        [-IPv4Address <String>]
        [-IPv6Address <String>]
        [-IPv4SubnetMask <String>]
        [-IPv6SubnetPrefixLength <Int32>]
        [-IPv4PreferredDNSServer <String>]
        [-IPv4AlternateDNSServer <String>]
        [-IPv6PreferredDNSServer <String>]
        [-IPv6AlternateDNSServer <String>]
        [-IPv4DefaultGateway <String>]
        [-IPv6DefaultGateway <String>]
        [-ClearFailoverIPv4Settings]
        [-ClearFailoverIPv6Settings]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-VMNetworkAdapterFailoverConfiguration
        [-VMNetworkAdapter] <VMNetworkAdapter>
        [-IPv4Address <String>]
        [-IPv6Address <String>]
        [-IPv4SubnetMask <String>]
        [-IPv6SubnetPrefixLength <Int32>]
        [-IPv4PreferredDNSServer <String>]
        [-IPv4AlternateDNSServer <String>]
        [-IPv6PreferredDNSServer <String>]
        [-IPv6AlternateDNSServer <String>]
        [-IPv4DefaultGateway <String>]
        [-IPv6DefaultGateway <String>]
        [-ClearFailoverIPv4Settings]
        [-ClearFailoverIPv6Settings]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-VMNetworkAdapterFailoverConfiguration
        [-VM] <VirtualMachine>
        [-VMNetworkAdapterName <String>]
        [-IPv4Address <String>]
        [-IPv6Address <String>]
        [-IPv4SubnetMask <String>]
        [-IPv6SubnetPrefixLength <Int32>]
        [-IPv4PreferredDNSServer <String>]
        [-IPv4AlternateDNSServer <String>]
        [-IPv6PreferredDNSServer <String>]
        [-IPv6AlternateDNSServer <String>]
        [-IPv4DefaultGateway <String>]
        [-IPv6DefaultGateway <String>]
        [-ClearFailoverIPv4Settings]
        [-ClearFailoverIPv6Settings]
        [-Passthru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
