syntaxes:
- syntax: |-
    ```Syntax
    Start-VMInitialReplication
        [-VMName] <String[]>
        [-ComputerName <String[]>]
        [-DestinationPath <String>]
        [-InitialReplicationStartTime <DateTime>]
        [-UseBackup]
        [-AsJob]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMName
  isDefault: true
- syntax: |-
    ```Syntax
    Start-VMInitialReplication
        [-VM] <VirtualMachine[]>
        [-DestinationPath <String>]
        [-InitialReplicationStartTime <DateTime>]
        [-UseBackup]
        [-AsJob]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
