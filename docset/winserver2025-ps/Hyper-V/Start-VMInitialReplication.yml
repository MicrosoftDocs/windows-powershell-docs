    Start-VMInitialReplication
        [-VMReplication] <VMReplication[]>
        [-DestinationPath <String>]
        [-InitialReplicationStartTime <DateTime>]
        [-UseBackup]
        [-AsJob]
        [-Passthru]
        [-CimSession <CimSession[]>]
        [-Credential <PSCredential[]>]
        [-WhatIf]
