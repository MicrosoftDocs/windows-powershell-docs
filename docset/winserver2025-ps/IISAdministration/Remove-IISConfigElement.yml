### YamlMime:PowerShellCmdlet1
uid: IISAdministration.Remove-IISConfigElement
name: Remove-IISConfigElement
module: IISAdministration
isPreview: false
summary: |-
  Removes a specified configuration element.
description: |-
  The **Remove-IISConfigElement** cmdlet deletes a specified configuration element.
  This affectively causes that configuration element to inherit from the parents, if any, or use the default value as described in the schema.
  If the configuration element that is being removed is a collection element, it is removed from the collection, in which case the functionality is equivalent to Remove-IISConfigCollectionElement.
parameters:
  cmdletParameters:
  - name: ConfigElement
    type: <xref href="ConfigurationElement" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Internet Information Services (IIS) ConfigurationSection or ConfigurationElement to be deleted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
