### YamlMime:PowerShellCmdlet1
uid: IpamServer.Find-IpamFreeSubnet
name: Find-IpamFreeSubnet
module: IpamServer
isPreview: false
summary: |-
  Finds one or more free IP subnets in a specified IP block.
description: |-
  The **Find-IpamFreeSubnet** cmdlet finds available free subnets in the IP Address Management (IPAM) database in a specified IP block.
  The IP block within which free IP subnet is to be searched is passed in InputObject parameter.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the input to this cmdlet.
      You can use this parameter, or you can pipe the input to this cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfSubnets
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of free subnets to be returned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubnetPrefix
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the prefix for the subnet to be returned.
      The prefix is an integer value indicating the number of bits set in a subnet mask.

      The subnet prefix tells you the number of IP addresses available on that subnet.
      For instance, a subnet with a prefix value of 24 has 256 IP addresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
