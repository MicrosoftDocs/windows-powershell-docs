### YamlMime:PowerShellCmdlet1
uid: IpamServer.Get-IpamAddress
name: Get-IpamAddress
module: IpamServer
isPreview: false
summary: |-
  Gets IP addresses from IPAM.
description: |-
  The **Get-IpamAddress** cmdlet gets IP addresses from IP Address Management (IPAM).
  Specify the *IpAddress* parameter to retrieve an IP address.
  Specify the *AddressFamily* parameter to retrieve a set of IP addresses for address families.
  You can also get addresses that belong to a range, a subnet, or an address block.
parameters:
  cmdletParameters:
  - name: AddressCategory
    type: <xref href="AddressCategory" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IP address categories.
      If you specify this parameter, you must specify the *AddressFamily*  parameter.

      The acceptable values for this parameter are:
      - Public
      - Private
    acceptedValues:
    - Public
    - Private
    - Global
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAddressFamily
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AddressFamily
    type: <xref href="AddressFamily" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of address families of IP addresses.

      The acceptable values for this parameter are:

      - IPv4
      - IPv6
    acceptedValues:
    - IPv4
    - IPv6
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAddressFamily
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AddressSpace
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of address spaces.
      If you do not specify this parameter, the cmdlet gets the addresses for all address spaces in IPAM.
      If you specify this parameter, you must specify the *AddressFamily* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAddress
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByAddressFamily
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
