    description: |-
      Specifies an array of the IP address ranges to delete.
      If you do not specify a value, the cmdlet removes data for all NonVirtualized, Provider and Customer address spaces in IPAM.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
