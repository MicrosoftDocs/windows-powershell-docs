### YamlMime:PowerShellCmdlet1
uid: IpamServer.Set-IpamRange
name: Set-IpamRange
module: IpamServer
isPreview: false
summary: |-
  Modifies an existing IP address range.
description: |-
  The **Set-IpamRange** cmdlet modifies an existing IP address range that an IP Address Management (IPAM) server manages.
parameters:
  cmdletParameters:
  - name: AddCustomConfiguration
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies semi-colon (;) separated name/value pairs.
      This parameter specifies custom metadata that are associated with the address space.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AddressSpace
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of address spaces.
      If you do not specify a value, the cmdlet modifies matching ranges from all address spaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Query (cdxml)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssignmentDate
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
