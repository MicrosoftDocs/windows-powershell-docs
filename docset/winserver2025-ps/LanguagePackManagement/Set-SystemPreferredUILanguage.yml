### YamlMime:PowerShellCmdlet1
uid: LanguagePackManagement.Set-SystemPreferredUILanguage
name: Set-SystemPreferredUILanguage
module: LanguagePackManagement
isPreview: false
summary: |-
  Sets the provided language as the System Preferred UI Language.
description: |-
  Sets the provided language as the System Preferred UI Language.

  After a language is set as the System Preferred UI Language, you have to restart the device or login again for changes to take effect. Additional accounts created after setting the System Preferred UI Langauge will be configured to use the new language.
parameters:
  cmdletParameters:
  - name: Language
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The bcp47 tag of the language to set as the System Preferred UI Language.
    aliases:
    - LanguageId
    - LanguageTag
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If specified, this parameter returns the bcp47 tag of the language upon successful configuration of the System Preferred UI Language.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-SystemPreferredUILanguage
        [-Language] <String>
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the System Preferred UI Language on a Windows installation'
  description: |-
    ```powershell
    Set-SystemPreferredUILanguage ja-JP
    ```

    This command sets the System Preferred UI Language to Japanese.
