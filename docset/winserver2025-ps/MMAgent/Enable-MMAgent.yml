syntaxes:
- syntax: |-
    ```Syntax
    Enable-MMAgent
        [-ApplicationLaunchPrefetching]
        [-OperationAPI]
        [-PageCombining]
        [-ApplicationPreLaunch]
        [-MemoryCompression]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Enable application launch prefetching'
  description: |-
    ```
    PS C:\> Enable-MMAgent -ApplicationLaunchPrefetching
    ```

    This command enables application launch prefetching on the local computer.
