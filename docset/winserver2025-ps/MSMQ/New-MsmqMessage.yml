### YamlMime:PowerShellCmdlet1
uid: MSMQ.New-MsmqMessage
name: New-MsmqMessage
module: MSMQ
isPreview: false
summary: |-
  Creates a message object.
description: |-
  The **New-MsmqMessage** cmdlet creates a **System.Messaging.Message** object that includes properties specified by parameters.
parameters:
  cmdletParameters:
  - name: AcknowledgeType
    type: <xref href="AcknowledgeTypes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of acknowledgement messages that can be returned by Messaging Queuing.
    acceptedValues:
    - None
    - PositiveArrival
    - PositiveReceive
    - NotAcknowledgeReachQueue
    - FullReachQueue
    - NegativeReceive
    - NotAcknowledgeReceive
    - FullReceive
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AdminQueuePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a path.
      The queue that the path specifies receives the acknowledgement messages that Message Queuing generates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Authenticated
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet sends the message as an authenticated message.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Body
    type: <xref href="Object" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the body of the message.
      The default value is an empty body.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Journaling
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the originating computer keeps a copy of the message in a journal.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Label
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a label.
      The label that this parameter specifies describes the message.
      The default value is an empty string.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Recoverable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet sets the recoverable property of a message object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResponseQueuePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a path.
      The queue that this parameter specifies receives application-generated response messages.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeToBeReceived
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum amount of time, in milliseconds, for the message to be received from the destination queue.
      The default value is 49.17:02:47.295.
    aliases:
    - TTBR
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeToReachQueue
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum amount of time, in milliseconds, for the message to reach the queue.
      The default value is 49.17:02:47.295.
    aliases:
    - TTRQ
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-MsmqMessage
        [[-Body] <Object>]
        [-Recoverable]
        [-Authenticated]
        [-Journaling]
        [-Label <String>]
        [-AdminQueuePath <String>]
        [-AcknowledgeType <AcknowledgeTypes>]
        [-ResponseQueuePath <String>]
        [-TimeToReachQueue <TimeSpan>]
        [-TimeToBeReceived <TimeSpan>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a test message'
  description: |-
    ```
    PS C:\> New-MsmqMessage -Body "Test Message" -AdminQueuePath ".\private$\adminqueue" -Recoverable
    ```

    This command creates a test message.
    The command specifies the queue that receives the acknowledgement message.
links:
- text: Move-MsmqMessage
  href: ./Move-MsmqMessage.yml
