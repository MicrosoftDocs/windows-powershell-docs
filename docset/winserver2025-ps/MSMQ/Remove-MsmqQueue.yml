### YamlMime:PowerShellCmdlet1
uid: MSMQ.Remove-MsmqQueue
name: Remove-MsmqQueue
module: MSMQ
isPreview: false
summary: |-
  Deletes queues.
description: |-
  The **Remove-MsmqQueue** cmdlet deletes queues.
  Specify queues to delete by using **MsmqQueue** objects.
  This cmdlet does not return anything.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="MessageQueue" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **MsmqQueue** objects.
      This cmdlet deletes the queues that the **MsmqQueue** objects specify.
      This parameter accepts pipeline input.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
