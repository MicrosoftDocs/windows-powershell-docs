syntaxes:
- syntax: |-
    ```Syntax
    Set-MsmqQueueManagerACL
        -UserName <String[]>
        [-Allow <QueueManagerAccessRights>]
        [-Deny <QueueManagerAccessRights>]
        [-Remove <QueueManagerAccessRights>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
