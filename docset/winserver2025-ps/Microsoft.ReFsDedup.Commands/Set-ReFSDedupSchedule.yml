### YamlMime:PowerShellCmdlet1
uid: Microsoft.ReFsDedup.Commands.Set-ReFSDedupSchedule
name: Set-ReFSDedupSchedule
module: Microsoft.ReFsDedup.Commands
isPreview: false
summary: |-
  Sets the deduplication schedule on a specified ReFS volume.
description: |-
  The `Set-ReFSDedupSchedule` cmdlet sets the deduplication schedule for a specified ReFS volume. You
  can use this cmdlet to specify when and how often deduplication should run on the volume.
parameters:
  cmdletParameters:
  - name: CompressionChunkSize
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the chunk size to use during compression.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressionFormat
    type: <xref href="Format" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the compression format to use during deduplication. Acceptable values are:

      - `LZ4`
      - `Uncompressed`
      - `Unknown`
      - `ZSTD`
    acceptedValues:
    - Unknown
    - Uncompressed
    - LZ4
    - ZSTD
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressionLevel
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the compression level to use during deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressionTuning
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the compression tuning to use during deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentOpenFiles
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of files that can be open at the same time during deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CpuPercentage
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum percentage of CPU usage that deduplication should consume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Days
    type: <xref href="DaysOfWeek" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the days of the week on which deduplication should run on the volume. Acceptable values
      are:

      - `None`
      - `EveryDay`
      - `Monday`
      - `Tuesday`
      - `Wednesday`
      - `Thursday`
      - `Friday`
      - `Saturday`
      - `Sunday`
    acceptedValues:
    - None
    - Sunday
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - EveryDay
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DecompressionTuning
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the decompression tuning to use during deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Duration
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the duration for which deduplication should run on the volume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludeFileExtension
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more file extensions to exclude from deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludeFolder
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more folders to exclude from deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumLastModifiedTimeHours
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum number of hours that must elapse before a file can be deduplicated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecompressionTuning
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the recompression tuning to use during deduplication.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Start
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the date and time when deduplication should start running on the volume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Volume
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ReFS volume for which to set the deduplication schedule. Enter one or more volume
      IDs, drive letters, or volume GUID paths. For drive letters, use the format `D:`. For volume GUID
      paths, use the format `\\?\Volume{{GUID}}\`. Separate multiple volumes with a comma.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-ReFSDedupSchedule
        [-Volume] <String>
        -Start <DateTime>
        [-Duration <TimeSpan>]
        -Days <DaysOfWeek>
        [-CpuPercentage <UInt32>]
        [-ConcurrentOpenFiles <UInt32>]
        [-MinimumLastModifiedTimeHours <Int32>]
        [-ExcludeFileExtension <String[]>]
        [-ExcludeFolder <String[]>]
        [-CompressionFormat <Format>]
        [-CompressionLevel <UInt16>]
        [-CompressionChunkSize <UInt32>]
        [-CompressionTuning <UInt32>]
        [-RecompressionTuning <UInt32>]
        [-DecompressionTuning <UInt32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Set-ReFSDedupSchedule -Volume "D:" -Start "10:00 PM" -Days Monday,Wednesday,Friday -Duration 4:00:00
    ```

    This example sets the deduplication schedule for the `D:` ReFS volume to run on `Monday`, `Wednesday`,
    and `Friday` at `10:00 PM` for `4` hours.
