### YamlMime:PowerShellCmdlet1
uid: Microsoft.ReFsDedup.Commands.Set-ReFSDedupScrubSchedule
name: Set-ReFSDedupScrubSchedule
module: Microsoft.ReFsDedup.Commands
isPreview: false
summary: |-
  Sets the deduplication scrub schedule on the specified ReFS volume.
description: |-
  The `Set-ReFSDedupScrubSchedule` cmdlet sets the deduplication scrub schedule on the specified ReFS
  volume. The scrub schedule specifies when and how often scrub jobs are run on the volume.
parameters:
  cmdletParameters:
  - name: Days
    type: <xref href="DaysOfWeek" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the days of the week on which to run the scrub schedule. Acceptable values are:

      - `None`
      - `EveryDay`
      - `Monday`
      - `Tuesday`
      - `Wednesday`
      - `Thursday`
      - `Friday`
      - `Saturday`
      - `Sunday`
    acceptedValues:
    - None
    - Sunday
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - EveryDay
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DedupDataOnly
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to include only deduplicated data in the scrub schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Start
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the date and time on which to start the scrub schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Volume
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ReFS volume on which to set the deduplication scrub schedule. Enter one or more volume
      IDs, drive letters, or volume GUID paths. For drive letters, use the format `D:`. For volume GUID
      paths, use the format `\\?\Volume{{GUID}}\`. Separate multiple volumes with a comma.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WeeksInterval
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of weeks between each run of the scrub schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-ReFSDedupScrubSchedule
        [-Volume] <String>
        -Start <DateTime>
        -Days <DaysOfWeek>
        -WeeksInterval <UInt16>
        [-DedupDataOnly <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $params = @{
        Volume        = "D:"
        Start         = "12/01/2024 8:00 AM"
        Days          = "Monday,Thursday"
        WeeksInterval = 2
    }
    Set-ReFSDedupScrubSchedule @params
    ```

    This example sets the deduplication scrub schedule on the `D:` ReFS volume to run every `Monday` and
    `Thursday` at `8:00 AM`, starting on December 1st, 2024, and running every `2` weeks.
