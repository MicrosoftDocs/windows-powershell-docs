### YamlMime:PowerShellCmdlet1
uid: MsDtc.Undo-DtcDiagnosticTransaction
name: Undo-DtcDiagnosticTransaction
module: MsDtc
isPreview: false
summary: |-
  Invokes the Abort process on the specified transaction.
description: |-
  The **Undo-DtcDiagnosticTransaction** cmdlet invokes the Abort process on the specified transaction.
parameters:
  cmdletParameters:
  - name: Transaction
    type: <xref href="DtcDiagnosticTransaction" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **DtcDiagnosticTransaction** object on which to invoke the Abort process.
      You can use the pipeline operator to pass this parameter value to the cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Undo-DtcDiagnosticTransaction
        [-Transaction] <DtcDiagnosticTransaction>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Undo a DTC diagnostic transaction'
  description: |-
    ```
    PS C:\> $Tx = New-DtcDiagnosticTransaction
    PS C:\> Undo-DtcDiagnosticTransaction -Transaction $Tx
    ```

    This command creates a new diagnostic transaction and assigns it to a variable.

    The second command undoes the transaction.
