### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Get-WmsWebLimiting
name: Get-WmsWebLimiting
module: MultiPoint
isPreview: false
summary: |-
  Gets the web limiting configuration.
description: |-
  The **Get-WmsWebLimiting** cmdlet gets web limiting configuration, including allowed URLs, blocked URLs, and whether the system is in Allowed or Blocked mode.
parameters:
  cmdletParameters:
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an array of MultiPoint session IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WmsWebLimiting
        [-SessionId <UInt32>]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsServerSolutions.MultipointServer.PowerShell.Commands.Library.WebLimitSetting" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get web limiting information'
  description: |-
    ```
    PS C:\> Get-WmsWebLimiting
    Sites             IsInLimiting                IsAllowList
    -----             -----------                 ----------
    {test.com}        True                        False
    ```

    This command gets web limiting information for the current computer.
