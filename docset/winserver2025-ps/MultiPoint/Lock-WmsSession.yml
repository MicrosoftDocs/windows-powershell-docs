### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Lock-WmsSession
name: Lock-WmsSession
module: MultiPoint
isPreview: false
summary: |-
  Locks a session for a user.
description: |-
  The **Lock-WmsSession** cmdlet blocks desktop use for a specific user.
  You can specify a message to display on the user's screen.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LockAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Message
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the message to display.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of session IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LockById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Lock-WmsSession
        [-SessionId] <UInt32[]>
        [-Message] <String>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: LockById
  isDefault: false
- syntax: |-
    ```Syntax
    Lock-WmsSession
        [-Message] <String>
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: LockAll
  isDefault: false
inputs:
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Lock a session'
  description: |-
    ```
    PS C:\> Lock-WmsSession -SessionId 3 -Message "Your station is locked"
    ```

    This command locks the specified session and displays the message "Your station is locked" to the user.
