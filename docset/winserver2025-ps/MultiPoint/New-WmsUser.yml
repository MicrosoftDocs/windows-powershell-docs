syntaxes:
- syntax: |-
    ```Syntax
    New-WmsUser
        [-Credential] <PSCredential>
        [-UserType] <UserTypePS>
        [[-FullName] <String>]
        [[-Description] <String>]
        [-Server <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
