### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Show-WmsIdentifier
name: Show-WmsIdentifier
module: MultiPoint
isPreview: false
summary: |-
  Displays the identification screen for a station.
description: |-
  The **Show-WmsIdentifier** cmdlet displays the identification screen for the specified station.
  The top line shown is the client name.
  For a Windows MultiPoint Server station, the station-friendly name is used as the client name.
  The bottom name is the system in which this session is hosted.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of MultiPoint session IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyBySession
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StationId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of MultiPoint station IDs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyByStation
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Show-WmsIdentifier
        -SessionId <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifyBySession
  isDefault: false
- syntax: |-
    ```Syntax
    Show-WmsIdentifier
        -StationId <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifyByStation
  isDefault: false
- syntax: |-
    ```Syntax
    Show-WmsIdentifier
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifyAll
  isDefault: false
inputs:
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Display the identification screen'
  description: |-
    ```
    PS C:\> Show-WmsIdentifier -SessionId 2
    PS C:\> Show-WmsIdentifier -StationId 1
    ```

    This example displays the ID screen for the specified session.
    The first command displays the system that runs the remote desktop client.

    The second command displays the local server name.
