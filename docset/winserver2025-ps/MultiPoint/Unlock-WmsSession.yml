### YamlMime:PowerShellCmdlet1
uid: MultiPoint.Unlock-WmsSession
name: Unlock-WmsSession
module: MultiPoint
isPreview: false
summary: |-
  Unblocks a user for desktop use.
description: |-
  The **Unlock-WmsSession** cmdlet unblocks a user for desktop use.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation applies to all sessions on the target host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UnlockAll
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the fully qualified host name of the MultiPoint Server that is the target of the command.
      The default is localhost.
    aliases:
    - ComputerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SessionId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the session ID.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UnlockById
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Unlock-WmsSession
        [-SessionId] <UInt32[]>
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UnlockById
  isDefault: false
- syntax: |-
    ```Syntax
    Unlock-WmsSession
        [-All]
        [-Server <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UnlockAll
  isDefault: false
inputs:
- name: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Unblock a station'
  description: |-
    ```
    PS C:\> Unlock-WmsSession -SessionId 3
    ```

    This command unblocks a station.

    Note: If a Multipoint Manager session is running, and the state of the sessions was Block All, the Multipoint Manager may block the station again.
