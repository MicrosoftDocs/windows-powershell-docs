examples:
- title: 'Example 1: Install the Hyper-V virtual desktop role'
  description: |-
    ```
    PS C:\> Enable-WmsVirtualDesktopRole -Restart
    ```

    This command installs the Hyper-V virtual desktop role and reboots the computer to apply the change.
