syntaxes:
- syntax: |-
    ```Syntax
    Grant-NfsSharePermission
        [-ClientName] <String>
        [-ClientType] <String>
        [[-Permission] <String>]
        [[-LanguageEncoding] <String>]
        [[-AllowRootAccess] <Boolean>]
        [-Name] <String>
        [-NetworkName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Grant-NfsSharePermission
        [-Path] <String>
        [-ClientName] <String>
        [-ClientType] <String>
        [[-Permission] <String>]
        [[-LanguageEncoding] <String>]
        [[-AllowRootAccess] <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: false
