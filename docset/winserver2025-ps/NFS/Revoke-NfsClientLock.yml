  parameterSetName: InputObject (cdxml)
  isDefault: false
outputs:
- name: <xref href="Nothing" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Revoke the lock on all files'
  description: |-
    ```
    PS C:\> Revoke-NfsClientLock -Path "c:\shares\*"
    ```

    This command revokes the lock on all the files on a local NFS server that have a path that begins with c:\shares\.
