syntaxes:
- syntax: |-
    ```Syntax
    Revoke-NfsClientLock
        [-Path] <String[]>
        [[-LockType] <ClientLockType[]>]
        [[-StateId] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: v4
  isDefault: true
- syntax: |-
    ```Syntax
    Revoke-NfsClientLock
        [-Path] <String[]>
        [[-LockType] <ClientLockType[]>]
        [[-ComputerName] <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: v3
  isDefault: false
- syntax: |-
