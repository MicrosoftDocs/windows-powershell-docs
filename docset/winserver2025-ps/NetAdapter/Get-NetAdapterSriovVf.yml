syntaxes:
- syntax: |-
    ```Syntax
    Get-NetAdapterSriovVf
        [[-Name] <String[]>]
        [-SwitchID <UInt32[]>]
        [-FunctionID <UInt16[]>]
        [-IncludeHidden]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetAdapterSriovVf
        -InterfaceDescription <String[]>
        [-SwitchID <UInt32[]>]
        [-FunctionID <UInt16[]>]
        [-IncludeHidden]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/StandardCimv2/MSFT_NetAdapterSriovVfSettingData" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get a list of virtual functions, virtual machines, and MAC addresses for the specified network adapter'
  description: |-
    ```
    PS C:\> Get-NetAdapterSriovVf -Name "Ethernet 1"
    ```

    This command gets a list of the virtual functions with the virtual machine names and MAC addresses for the network adapter named Ethernet 1.
- title: 'Example 2: Get a list of virtual functions, virtual machines, and MAC addresses for a network adapter bound to a virtual switch'
  description: |-
    ```
    PS C:\> Get-NetAdapterSriovVf -SwitchId 2
    ```

    This command gets a list of the virtual functions with the virtual machine names and MAC addresses for the network adapter bound to virtual switch 2.
