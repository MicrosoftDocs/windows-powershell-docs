syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapter
        [-Name] <String[]>
        [-IncludeHidden]
        [-VlanID <UInt16>]
        [-MacAddress <String>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapter
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-VlanID <UInt16>]
        [-MacAddress <String>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapter
        -InputObject <CimInstance[]>
        [-VlanID <UInt16>]
        [-MacAddress <String>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
