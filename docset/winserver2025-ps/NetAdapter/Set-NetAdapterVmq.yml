syntaxes:
- syntax: |-
    ```Syntax
    Set-NetAdapterVmq
        [-Name] <String[]>
        [-IncludeHidden]
        [-BaseProcessorGroup <UInt16>]
        [-BaseProcessorNumber <Byte>]
        [-MaxProcessors <UInt32>]
        [-MaxProcessorNumber <Byte>]
        [-NumaNode <UInt16>]
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetAdapterVmq
        -InterfaceDescription <String[]>
        [-IncludeHidden]
        [-BaseProcessorGroup <UInt16>]
        [-BaseProcessorNumber <Byte>]
        [-MaxProcessors <UInt32>]
        [-MaxProcessorNumber <Byte>]
        [-NumaNode <UInt16>]
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInstanceID
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetAdapterVmq
        -InputObject <CimInstance[]>
        [-BaseProcessorGroup <UInt16>]
        [-BaseProcessorNumber <Byte>]
        [-MaxProcessors <UInt32>]
        [-MaxProcessorNumber <Byte>]
        [-NumaNode <UInt16>]
        [-Enabled <Boolean>]
        [-NoRestart]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
