syntaxes:
- syntax: |-
    ```Syntax
    Remove-NetEventWFPCaptureProvider
        [-SessionName] <String[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySessionName
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-NetEventWFPCaptureProvider
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
examples:
- title: 'Example 1: Remove a WPF capture provider'
  description: |-
    ```
    PS C:\>Remove-NetEventWFPCaptureProvider -SessionName "WFPCapture"
    ```

    This command removes the WFP capture provider for the session named WFPCapture.
