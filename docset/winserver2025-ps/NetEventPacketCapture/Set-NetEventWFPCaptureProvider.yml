### YamlMime:PowerShellCmdlet1
uid: NetEventPacketCapture.Set-NetEventWFPCaptureProvider
name: Set-NetEventWFPCaptureProvider
module: NetEventPacketCapture
isPreview: false
summary: |-
  Modifies the configuration of a WFP capture provider.
description: |-
  The **Set-NetEventWFPCaptureProvider** cmdlet modifies the configuration of a Windows Firewall Platform (WFP) capture provider.
  For more information about the **NetEventWFPCaptureProvider**, see the Add-NetEventWFPCaptureProvider cmdlet.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssociatedEventSession
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the associated network event session, as a CIM object.
      To obtain the network event session, use the Get-NetEventSession cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySessionOfTheProvider
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CaptureLayerSet
    type: <xref href="WFPCaptureSet" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a WFP capture set, which designates the layers and directions to filter.
      The acceptable values for this parameter are:

      - IPv4Inbound
      - IPv4Outbound
      - IPv6Inbound
      - IPv6Outbound

      You can logically OR the direction and IP layer pairs together.
      For instance, you could capture incoming loopback traffic from IPv6 to avoid seeing duplicate traffic received by the loopback interface.
    acceptedValues:
    - IPv4Inbound
    - IPv4Outbound
    - IPv6Inbound
    - IPv6Outbound
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3007"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
