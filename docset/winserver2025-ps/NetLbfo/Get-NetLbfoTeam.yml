### YamlMime:PowerShellCmdlet1
uid: NetLbfo.Get-NetLbfoTeam
name: Get-NetLbfoTeam
module: NetLbfo
isPreview: false
summary: |-
  Gets a list of NIC teams on the system.
description: |-
  The **Get-NetLbfoTeam** cmdlet gets the list of all available NIC teams on the system.

  You can retrieve the list of NIC teams by specifying the name or name pattern of the team.
  You can also use **Get-NetLbfoTeam** to get the team associated with a team interface or a team member (network adapter).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MemberOfTheTeam
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the member network adapter name to retrieve the associated NIC team.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByMemberOfTheTeam
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name (or name wildcard pattern) of the NIC team for which to retrieve information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TeamNicForTheTeam
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
