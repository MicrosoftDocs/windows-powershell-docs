### YamlMime:PowerShellCmdlet1
uid: NetLbfo.Get-NetLbfoTeamMember
name: Get-NetLbfoTeamMember
module: NetLbfo
isPreview: false
summary: |-
  Gets network adapters that are members of a NIC team.
description: |-
  The **Get-NetLbfoTeamMember** cmdlet gets all network adapters (team members) of all NIC teams.
  You can also use **Get-NetLbfoTeamMember** to get the network adapters for a specified NIC team, and then use that object as input to other cmdlets.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of team members.
      Wildcard characters are acceptable.
    aliases:
    - ifAlias
    - InterfaceAlias
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameAndOrTeam
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Team
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the NIC team name (or wildcard pattern) for which the user wants to enumerate the members.
      If no team parameter is present, it returns all members specified by *Name* parameter from all teams on the system.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameAndOrTeam
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TeamOfTheMember
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the NIC team object whose associated member objects you want to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByTeamOfTheMember
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetLbfoTeamMember
        [[-Name] <String[]>]
        [[-Team] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameAndOrTeam
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetLbfoTeamMember
        [-TeamOfTheMember <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByTeamOfTheMember
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet takes no input objects.
outputs:
- name: <xref href="MSFT_NetLbfoTeamMember" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an array of **MSFT_NetLbfoTeamMember** objects.
examples:
- title: 'Example 1: Get members of a NIC team'
  description: |-
    ```
    PS C:\> Get-NetLbfoTeamMember -Team "Team1"
    ```

    This command retrieves a list of team members for the NIC team named Team1.
- title: 'Example 2: Get all members of all NIC teams'
  description: |-
    ```
    PS C:\> Get-NetLbfoTeamMember
    ```

    This command retrieves a list of all team members of all NIC teams on the system.
- title: 'Example 3: Get team members via associations'
  description: |-
    ```
    PS C:\> Get-NetLbfoTeam -Name "Team1" | Get-NetLbfoTeamMember

    Or
    PS C:\> $teamObj = Get-NetLbfoTeam -Name "Team1"
    PS C:\> Get-NetLbfoTeamMember -TeamOfTheMember $teamObj
    ```

    This command retrieves a list of all team members belonging to team named Team1.
