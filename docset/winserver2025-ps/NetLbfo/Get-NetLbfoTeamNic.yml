### YamlMime:PowerShellCmdlet1
uid: NetLbfo.Get-NetLbfoTeamNic
name: Get-NetLbfoTeamNic
module: NetLbfo
isPreview: false
summary: |-
  Gets a list of team interfaces.
description: |-
  The **Get-NetLbfoTeamNic** cmdlet gets a list of team interfaces as specified by the input parameters.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name (or wildcard pattern) of the team interface.
    aliases:
    - ifAlias
    - InterfaceAlias
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameOrTeam
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Team
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of the NIC team for which the user wants to enumerate the team interfaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameOrTeam
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TeamOfTheTeamNic
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the NIC team object whose team interfaces you want to enumerate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByTeamOfTheTeamNic
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetLbfoTeamNic
        [[-Name] <String[]>]
        [[-Team] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameOrTeam
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetLbfoTeamNic
        [-TeamOfTheTeamNic <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByTeamOfTheTeamNic
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet takes no input objects.
outputs:
- name: <xref href="MSFT_NetLbfoTeamNic" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet produces an array of **MSFT_NetLbfoTeamNic** objects corresponding to the query.
examples:
- title: 'Example 1: Get a list of team interfaces associated with Team1'
  description: |-
    ```
    PS C:\>Get-NetLbfoTeamNic -Team "Team1"

    Or
    PS C:\> $teamObj = Get-NetLbfoTeam -Name "Team1"
    PS C:\> Get-NetLbfoTeamNic -Team $teamObj
    ```

    This command gets a list of team interfaces for the team named Team1.
- title: 'Example 2: Get a list of team interfaces by name'
  description: |-
    ```
    PS C:\> Get-NetLbfoTeamNic -Name "*VLAN*" -Team "T*"
    ```

    This command gets a list of team interfaces whose name contains VLAN in any NIC team whose name starts with T.
