syntaxes:
- syntax: |-
    ```Syntax
    Set-NetLbfoTeam
        [[-Name] <String[]>]
        [-TeamingMode <TeamingModes>]
        [-LoadBalancingAlgorithm <LBAlgos>]
        [-LacpTimer <LacpTimers>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetLbfoTeam
        [-MemberOfTheTeam <CimInstance>]
        [-TeamingMode <TeamingModes>]
        [-LoadBalancingAlgorithm <LBAlgos>]
        [-LacpTimer <LacpTimers>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByMemberOfTheTeam
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetLbfoTeam
        [-TeamNicForTheTeam <CimInstance>]
        [-TeamingMode <TeamingModes>]
        [-LoadBalancingAlgorithm <LBAlgos>]
        [-LacpTimer <LacpTimers>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByTeamNicForTheTeam
  isDefault: false
- syntax: |-
