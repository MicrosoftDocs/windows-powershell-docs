syntaxes:
- syntax: |-
    ```Syntax
    Add-NetNatExternalAddress
        [-NatName] <String>
        -IPAddress <String>
        [-PortStart <UInt16>]
        [-PortEnd <UInt16>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
