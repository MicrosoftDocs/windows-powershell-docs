### YamlMime:PowerShellCmdlet1
uid: NetSecurity.Get-NetFirewallDynamicKeywordAddress
name: Get-NetFirewallDynamicKeywordAddress
module: NetSecurity
isPreview: false
summary: |-
  Gets dynamic keyword addresses.
description: |-
  The **Get-NetFirewallDynamicKeywordAddress** cmdlet gets dynamic keyword addresses.
  You can specify an ID or get all `AutoResolve` or all non-`AutoResolve` dynamic keyword addresses.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet gets all dynamic keyword addresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAll
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AllAutoResolve
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet gets all `AutoResolve` dynamic keyword addresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAll
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AllNonAutoResolve
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet gets all non-`AutoResolve` dynamic keyword addresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAll
