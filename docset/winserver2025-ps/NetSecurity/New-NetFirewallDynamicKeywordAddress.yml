syntaxes:
- syntax: |-
    ```Syntax
    New-NetFirewallDynamicKeywordAddress
        [-Id <String>]
        [-Keyword <String>]
        [-Addresses <String>]
        [-AutoResolve <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
