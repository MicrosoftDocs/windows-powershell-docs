    Update-NetIPsecRule
        -InputObject <CimInstance[]>
        -Action <ChangeAction>
        -EndpointType <EndpointType>
        [-IPv6Addresses <String[]>]
        [-IPv4Addresses <String[]>]
        [-PassThru]
