    ```Syntax
    Update-NetIPsecRule
        -IPsecRuleName <String[]>
        -Action <ChangeAction>
        -EndpointType <EndpointType>
        [-PolicyStore <String>]
        [-GPOSession <String>]
        [-IPv6Addresses <String[]>]
        [-IPv4Addresses <String[]>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
