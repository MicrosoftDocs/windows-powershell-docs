    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetSwitchTeam
        [[-Name] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NetSwitchTeam
        [-Member <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByMember
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a switch team'
  description: |-
    ```
    PS C:\> Get-NetSwitchTeam -Name "SwitchTeam01"
    ```

    This command gets the switch team named SwitchTeam01.
- title: 'Example 2: Get multiple switch teams'
  description: |-
    ```
    PS C:\> Get-NetSwitchTeam -Name "SwitchTeam*"
    ```

    This example gets all of the switch teams with the name with the wildcard character matching SwitchTeam*.
