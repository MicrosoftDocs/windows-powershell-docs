syntaxes:
- syntax: |-
    ```Syntax
    Get-NetIPv6Protocol
        [-DefaultHopLimit <UInt32[]>]
        [-NeighborCacheLimitEntries <UInt32[]>]
        [-RouteCacheLimitEntries <UInt32[]>]
        [-ReassemblyLimitBytes <UInt32[]>]
        [-IcmpRedirects <IcmpRedirects[]>]
        [-SourceRoutingBehavior <SourceRoutingBehavior[]>]
        [-DhcpMediaSense <DhcpMediaSense[]>]
        [-MediaSenseEventLog <MediaSenseEventLog[]>]
        [-MldLevel <MldLevel[]>]
        [-MldVersion <MldVersion[]>]
        [-MulticastForwarding <MulticastForwarding[]>]
        [-GroupForwardedFragments <GroupForwardedFragments[]>]
        [-RandomizeIdentifiers <RandomizeIdentifiers[]>]
        [-AddressMaskReply <AddressMaskReply[]>]
        [-DeadGatewayDetection <DeadGatewayDetection[]>]
        [-UseTemporaryAddresses <UseTemporaryAddresses[]>]
        [-MaxTemporaryDadAttempts <UInt32[]>]
        [-MaxTemporaryValidLifetime <TimeSpan[]>]
        [-MaxTemporaryPreferredLifetime <TimeSpan[]>]
        [-TemporaryRegenerateTime <TimeSpan[]>]
        [-MaxTemporaryDesyncTime <TimeSpan[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetIPv6Protocol" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get all IPv6 protocol configurations'
  description: |-
    ```
    PS C:\>Get-NetIPv6Protocol
    ```

    This command gets all IPv6 protocol configurations for the IP interface.
    The default output for the cmdlet does not include all properties of the **NetIPv6Protocol** object.
- title: 'Example 2: Output all properties of IPv6 protocol configurations'
  description: |-
    ```
    PS C:\>Get-NetIPv6Protocol | Format-List -Property *
    ```

    This command gets all IPv6 protocol configurations for the IP interface.
    The command uses the Format-List cmdlet to display all the properties in the output in the form of a table.
    For more information, type `Get-Help Format-Table`.
    The command default output omits some properties.
