      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReassemblyLimitBytes
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values for the maximum size of the reassembly buffer.
      The cmdlet gets IPv6 protocol configurations that have these values.
    aliases:
    - ReassemblyLimit
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteCacheLimitEntries
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values for the maximum number of route cache entries.
      The cmdlet gets IPv6 protocol configurations that have these values.
    aliases:
    - RouteCacheLimit
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceRoutingBehavior
    type: <xref href="SourceRoutingBehavior" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values for the behavior for source-routed packets.
      The cmdlet gets IPv6 protocol configurations that have these values.
      The acceptable values for this parameter are:

      - DontForward.
      The computer can receive but not forward source-routed packets.
      - Drop.
      The computer drops source-routed packets.
