  - name: MaxTemporaryValidLifetime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values, as **TimeSpan** objects, for the maximum lifetime over which a temporary address is valid.
      The cmdlet gets IPv6 protocol configurations that have these values.
    aliases:
    - MaxValidLifetime
    defaultValue: None
    dontShow: false
    isDynamic: false
