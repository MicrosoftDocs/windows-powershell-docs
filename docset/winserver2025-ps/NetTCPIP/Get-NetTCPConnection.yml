### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Get-NetTCPConnection
name: Get-NetTCPConnection
module: NetTCPIP
isPreview: false
summary: |-
  Gets TCP connections.
description: |-
  The **Get-NetTCPConnection** cmdlet gets current TCP connections.
  Use this cmdlet to view TCP connection properties such as local or remote IP address, local or remote port, and connection state.
parameters:
  cmdletParameters:
  - name: AppliedSetting
    type: <xref href="AppliedSetting" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of values of applied settings.
      The cmdlet gets connections that match the settings that you specify.
      The acceptable values for this parameter are:

      - Internet
      - Datacenter
      - Compat
      - Custom
    acceptedValues:
    - Internet
    - Datacenter
    - Compat
    - DatacenterCustom
    - InternetCustom
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreationTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of **DateTime** objects.
      To get a **DateTime** object, use the Get-Date cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of local IP addresses.
      The cmdlet gets connections for the addresses that you specify.
    aliases:
    - IPAddress
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of local ports.
      The cmdlet gets connections for the ports that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OffloadState
    type: <xref href="OffloadState" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the offload state of a TCP connection.
    acceptedValues:
    - InHost
    - Offloading
    - Offloaded
    - Uploading
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OwningProcess
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the PID of the owning process of a TCP connection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoteAddress
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of remote IP addresses.
      The cmdlet gets connections for the addresses that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of remote ports.
      The cmdlet gets connections for the ports that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="State" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of TCP states.
      The cmdlet gets connections that match the states that you specify.
      The acceptable values for this parameter are:

      - Bound
      - Closed
      - CloseWait
      - Closing
      - DeleteTCB
      - Established
      - FinWait1
      - FinWait2
      - LastAck
      - Listen
      - SynReceived
      - SynSent
      - TimeWait
    acceptedValues:
    - Closed
    - Listen
    - SynSent
    - SynReceived
    - Established
    - FinWait1
    - FinWait2
    - CloseWait
    - Closing
    - LastAck
    - TimeWait
    - DeleteTCB
    - Bound
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-NetTCPConnection
        [[-LocalAddress] <String[]>]
        [[-LocalPort] <UInt16[]>]
        [-RemoteAddress <String[]>]
        [-RemotePort <UInt16[]>]
        [-State <State[]>]
        [-AppliedSetting <AppliedSetting[]>]
        [-OwningProcess <UInt32[]>]
        [-CreationTime <DateTime[]>]
        [-OffloadState <OffloadState[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetTCPConnection" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Get all connections'
  description: |-
    ```
    PS C:\>Get-NetTCPConnection
    ```

    This command gets all current TCP connections.
- title: 'Example 2: Get established connections'
  description: |-
    ```
    PS C:\>Get-NetTCPConnection -State Established
    ```

    This command gets all TCP connections that have an Established state.
- title: 'Example 3: Get Internet TCP connections'
  description: |-
    ```
    PS C:\>Get-NetTCPConnection -AppliedSetting Internet
    ```

    This command gets all TCP connections that use a TCP applied setting of Internet.
- title: 'Example 4: Get Owning Process'
  description: |-
    ```
    PS C:\>Get-NetTcpConnection -OwningProcess 18948
    ```

    This command gets all Owning Process with PID 18948
