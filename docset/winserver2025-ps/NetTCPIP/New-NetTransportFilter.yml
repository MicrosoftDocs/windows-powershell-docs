### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.New-NetTransportFilter
name: New-NetTransportFilter
module: NetTCPIP
isPreview: false
summary: |-
  Creates a transport filter.
description: |-
  The **New-NetTransportFilter** cmdlet creates a transport filter.
  A transport filter specifies the TCP settings, as a **NetTcpSetting** object, to apply to an IP address prefix or a TCP port range.
  Specify the setting to apply by name.
  You can use the Set-NetTCPSetting cmdlet to modify a setting.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a destination prefix of an IP route.
      The cmdlet associates the transport filter that to the prefix that you specify.
      A destination prefix consists of an IP address prefix and a prefix length, separated by a slash (/).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPortEnd
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the upper bound of a range of local TCP ports.
      The cmdlet assigns the upper bound that you specify to the transport filter.
      If you do not specify this parameter, the cmdlet uses the lower range value of 1025.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPortStart
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the lower bound of a range of local TCP ports.
      The cmdlet assigns the lower bound that you specify to the transport filter.
      If you do not specify this parameter, the cmdlet uses the lower range value of 65535.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="Protocol" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of routing protocol.
      The cmdlet assigns the protocol that you specify to the routing filter.
      The acceptable values for this parameter are:

      - Bbn
      - Bgp
      - Dhcp
      - Dvmrp
      - Egp
      - Eigrp
      - EsIs
      - Ggp
      - Hello
      - Icmp
      - Idpr
      - Igrp
      - IsIs
      - Local
      - NetMgmt
      - Ospf
      - Rip
      - Rpl
      - Other
    acceptedValues:
    - TCP
    - UDP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePortEnd
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the upper bound of a range of remote TCP ports.
      The cmdlet assigns the upper bound that you specify to the transport filter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePortStart
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the lower bound of a range of remote TCP ports.
      The cmdlet assigns the lower bound that you specify to the transport filter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SettingName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a setting name.
      The cmdlet associates the setting that you specify to the transport filter.
      The acceptable values for this parameter are:

      - Internet
      - Datacenter
      - Compat
      - Custom
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
