examples:
- title: 'Example 1: Remove transport filters for a setting name'
  description: |-
    ```
    PS C:\>Remove-NetTransportFilter -SettingName Custom
    ```

    This command removes all of the transport filters on the server that have the setting name of Custom.
- title: 'Example 2: Remove transit filters for objects with a specified congestion window'
  description: |-
    ```
    PS C:\>Get-NetTCPSetting -InitialCongestionWindowMss 4 | Remove-NetTransportFilter
    ```

    This command uses the Get-NetTCPSetting cmdlet to get all of the **NetTcpSetting** objects that have an initial congestion window of 4 maximum segment size (MSS) units, and then passes them to the current cmdlet by using the pipeline operator.
    The command removes transport filters for these settings.
