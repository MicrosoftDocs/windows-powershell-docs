### YamlMime:PowerShellCmdlet1
uid: NetTCPIP.Remove-NetTransportFilter
name: Remove-NetTransportFilter
module: NetTCPIP
isPreview: false
summary: |-
  Removes transport filters.
description: |-
  The **Remove-NetTransportFilter** cmdlet removes transport filters.
