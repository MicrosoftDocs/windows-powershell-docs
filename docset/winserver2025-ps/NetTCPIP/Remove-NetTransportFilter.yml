      Specifies an array of types of routing protocols.
      The cmdlet removes transport filters based on the protocols that you specify.
      The acceptable values for this parameter are:

      - Bbn
      - Bgp
      - Dhcp
      - Dvmrp
      - Egp
      - Eigrp
      - EsIs
      - Ggp
      - Hello
      - Icmp
      - Idpr
      - Igrp
      - IsIs
      - Local
      - NetMgmt
      - Ospf
      - Rip
      - Rpl
      - Other
    acceptedValues:
