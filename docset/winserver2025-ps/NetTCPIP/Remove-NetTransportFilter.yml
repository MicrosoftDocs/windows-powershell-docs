    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **NetTCPSetting** object.
      The cmdlet removes transport filters associated with the setting that you specify.
      To obtain a **NetTCPSetting** object, use the Get-NetTCPSetting cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
