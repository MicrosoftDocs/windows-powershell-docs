    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Cluster
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stretch
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Enables stretch mode, allowing the network configuration to extend across
      multiple physical networks or sites. This option is useful for environments that
      require network intents to span more than one location or subnet.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Cluster
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Switchless
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the configuration should be applied without creating a virtual
      switch. This mode is used when you want to configure the physical adapters
      directly without introducing additional switch constructs.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Cluster
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SwitchPropertyOverrides
    type: <xref href="SwitchConfigurationOverride" data-throw-if-not-resolved="False" />
    description: |-
      Provides custom configuration overrides for virtual switch properties. These
      settings allow you to fine-tune the behavior of the virtual switch that might be
      created as part of the network intent, replacing the default switch
      configurations as needed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Cluster
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Wait
