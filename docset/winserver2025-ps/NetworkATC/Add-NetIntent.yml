syntaxes:
- syntax: |-
    ```Syntax
    Add-NetIntent
        [[-ComputerName] <String>]
        -AdapterName <String[]>
        -Name <String>
        [-Wait]
        [-Compute]
        [-Management]
        [-Storage]
        [-Switchless]
        [-Stretch]
        [-AdapterPropertyOverrides <NetAdapterAdvancedConfiguration>]
        [-QoSPolicyOverrides <QoSPolicy>]
        [-AdapterRssPropertyOverrides <RssConfiguration>]
        [-SwitchPropertyOverrides <SwitchConfigurationOverride>]
        [-StorageOverrides <NetAdapterStorageOverride>]
        [-SiteOverrides <SiteConfiguration[]>]
        [-StorageVlans <Int32[]>]
        [-ManagementVlan <Int32>]
        [-SkipNetworkInterfaceValidation]
        [-PutGlobal <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: ComputerName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-NetIntent
        [[-ComputerName] <String>]
        [-ClusterName <String>]
        [-Wait]
        [-GlobalProxyOverrides <WinHttpAdvProxy>]
        [-GlobalClusterOverrides <ClusterSettings>]
        [<CommonParameters>]
    ```
  parameterSetName: Global
  isDefault: false
- syntax: |-
    ```Syntax
    Add-NetIntent
        -ClusterName <String>
        -AdapterName <String[]>
        -Name <String>
        [-Wait]
        [-Compute]
        [-Management]
        [-Storage]
        [-Switchless]
        [-Stretch]
        [-AdapterPropertyOverrides <NetAdapterAdvancedConfiguration>]
        [-QoSPolicyOverrides <QoSPolicy>]
        [-AdapterRssPropertyOverrides <RssConfiguration>]
        [-SwitchPropertyOverrides <SwitchConfigurationOverride>]
        [-StorageOverrides <NetAdapterStorageOverride>]
        [-SiteOverrides <SiteConfiguration[]>]
        [-StorageVlans <Int32[]>]
        [-ManagementVlan <Int32>]
        [-SkipNetworkInterfaceValidation]
        [-PutGlobal <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Cluster
  isDefault: false
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Add-NetIntent –AdapterName "Ethernet0" –ComputerName "Server01" –Name "MyIntent" -Compute
    ```

    This example creates a new `Compute` intent for the standalone device named
    `Server01` on network adapter `Ethernet0`.
