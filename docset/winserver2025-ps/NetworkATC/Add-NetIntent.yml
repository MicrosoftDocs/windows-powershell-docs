    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Global
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Compute
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the network intent includes configuration related to compute workloads.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ComputerName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Cluster
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
