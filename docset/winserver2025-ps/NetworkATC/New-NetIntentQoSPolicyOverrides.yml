### YamlMime:PowerShellCmdlet1
uid: NetworkATC.New-NetIntentQoSPolicyOverrides
name: New-NetIntentQoSPolicyOverrides
module: NetworkATC
isPreview: false
summary: |-
  Creates a new instance of QoS policy overrides which can be used to supply granular values to `Set-NetIntent`.
description: |-
  The `New-NetIntentQoSPolicyOverrides` cmdlet creates a new instance of Quality of Service (QoS)
  policy overrides. This cmdlet is used to provide specific granular values that can be utilized by
  the `Set-NetIntent` cmdlet to define QoS policies for network traffic.
parameters:
  cmdletParameters:
  - name: BandwidthPercentage_Cluster
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the percentage of allocated bandwidth for the Cluster traffic.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BandwidthPercentage_SMB
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the percentage of allocated bandwidth for the SMB traffic.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetDirectPortMatchCondition
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port number used to match NetDirect traffic.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PriorityValue8021Action_Cluster
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the 802.1 priority value for Cluster traffic.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PriorityValue8021Action_SMB
    type: <xref href="Byte" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the 802.1 priority value for SMB traffic.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-NetIntentQoSPolicyOverrides
        [-PriorityValue8021Action_SMB <Byte>]
        [-PriorityValue8021Action_Cluster <Byte>]
        [-BandwidthPercentage_SMB <Byte>]
        [-BandwidthPercentage_Cluster <Byte>]
        [-NetDirectPortMatchCondition <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: Example 1
  description: |-
    ```powershell
    New-NetIntentQoSPolicyOverrides -PriorityValue8021Action_SMB 3 -BandwidthPercentage_SMB 30
    ```

    This example creates a new QoS policy override setting the 802.1 priority value for SMB traffic to
    `3` with `30%` of the available network bandwidth allocated to SMB traffic.
