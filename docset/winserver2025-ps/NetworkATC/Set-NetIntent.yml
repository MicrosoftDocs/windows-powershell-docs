syntaxes:
- syntax: |-
    ```Syntax
    Set-NetIntent
        [-Name] <String>
        [[-ComputerName] <String>]
        [-AdapterPropertyOverrides <NetAdapterAdvancedConfiguration>]
        [-QoSPolicyOverrides <QoSPolicy>]
        [-AdapterRssOverrides <RssConfiguration>]
        [-SwitchOverrides <SwitchConfigurationOverride>]
        [-StorageOverrides <NetAdapterStorageOverride>]
        [-SiteOverrides <SiteConfiguration[]>]
        [-StorageVlans <Int32[]>]
        [-ManagementVlan <Int32>]
        [-Wait]
        [<CommonParameters>]
    ```
  parameterSetName: ComputerName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetIntent
        [-Name] <String>
        [-ClusterName] <String>
        [-AdapterPropertyOverrides <NetAdapterAdvancedConfiguration>]
        [-QoSPolicyOverrides <QoSPolicy>]
        [-AdapterRssOverrides <RssConfiguration>]
        [-SwitchOverrides <SwitchConfigurationOverride>]
        [-StorageOverrides <NetAdapterStorageOverride>]
        [-SiteOverrides <SiteConfiguration[]>]
        [-StorageVlans <Int32[]>]
        [-ManagementVlan <Int32>]
        [-Wait]
        [<CommonParameters>]
    ```
  parameterSetName: Cluster
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetIntent
        [[-ComputerName] <String>]
        [[-ClusterName] <String>]
        [-GlobalProxyOverrides <WinHttpAdvProxy>]
        [-GlobalClusterOverrides <ClusterSettings>]
        [-Wait]
        [<CommonParameters>]
    ```
  parameterSetName: Global
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```powershell
    $adapterOverrides = @{
        JumboPacket = 9000
        InterruptModeration = "Enabled"
    }
    $qosOverrides = @{
        Name = "HighPriority"
        Priority = 1
        BandwidthPercentage = 50
    }
    $params = @{
        Name                     = "MyIntent"
        ComputerName             = "Server01"
        AdapterPropertyOverrides = $adapterOverrides
        QoSPolicyOverrides       = $qosOverrides
    }
    Set-NetIntent @params
    ```

    This example sets the network intent named `MyIntent` on the computer `Server01` with specified
    adapter property overrides and QoS policy overrides.
