syntaxes:
- syntax: |-
    ```Syntax
    Set-NetIntentRetryState
        -Name <String>
        [-ComputerName <String>]
        [-Wait]
        [<CommonParameters>]
    ```
  parameterSetName: ComputerName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetIntentRetryState
        [-ClusterName <String>]
        [-ComputerName <String>]
        [-NodeName <String>]
        [-Wait]
        [-GlobalOverrides]
        [<CommonParameters>]
    ```
  parameterSetName: Global
  isDefault: false
- syntax: |-
    ```Syntax
    Set-NetIntentRetryState
        -Name <String>
        -NodeName <String>
        [-ClusterName <String>]
        [-Wait]
        [<CommonParameters>]
    ```
  parameterSetName: Cluster
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```powershell
    Set-NetIntentRetryState -ComputerName "Server01" -Name "MyIntent" -Wait
    ```

    This example resets the provisioning state for the network intent named `MyIntent` on the computer
    `Server01` and waits for the operation to complete.
