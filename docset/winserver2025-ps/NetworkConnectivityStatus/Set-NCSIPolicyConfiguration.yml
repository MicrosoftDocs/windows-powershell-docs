### YamlMime:PowerShellCmdlet1
uid: NetworkConnectivityStatus.Set-NCSIPolicyConfiguration
name: Set-NCSIPolicyConfiguration
module: NetworkConnectivityStatus
isPreview: false
summary: |-
  Specifies the policy store from which the cmdlet should pull configuration information.
description: |-
  The **Set-NCSIPolicyConfiguration** cmdlet allows a user to configure NCSI configuration options on a Group Policy Object.

  This cmdlet supports getting information from a Group Policy Object, in the form `Domain\GPOName`.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.

      The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.

      For more information about Windows PowerShell background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CorporateDNSProbeHostAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value to be configured.

      This is the expected address of the host name used as for DNS probe.
      Successful resolution of the host name to this address indicates corporate connectivity, such as `2001::32`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CorporateDNSProbeHostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value to be configured.

      This is the host name of a computer known to be on the corporate network.
      Successful resolution of this host name to the expected address indicates corporate connectivity, such as `http://contoso.com`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CorporateSitePrefixList
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the value to be configured.

      This is the list of IPv6 corporate site prefixes that should be monitored for corporate connectivity.
      Reachability of addresses with any of these prefixes indicates corporate connectivity, such as `fe90::/9`, `fe81::/8`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CorporateWebsiteProbeURL
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value to be configured.

      This is the URL of the corporate website that will be used to perform an active probe against, such as `http://contoso.com`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DomainLocationDeterminationURL
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value to be configured.

      This is the HTTPS URL of the corporate website that will be used to determine the current domain location, such as inside or outside the corporate domain.
      Reachability of the URL indicates that the location is inside corporate else it is outside, such as `https://contoso.com`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GPOSession
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Group Policy session for which the cmdlet should pull configuration information from.
      This parameter can be used in conjunction with the NetGPO cmdlet family to aggregate multiple operations that are performed on a Group Policy Object.

      This parameter cannot be used in conjunction with the *PolicyStore* parameter.

      Using this parameter allows multiple cmdlets to be aggregated to run against a local GPO cache.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the input to this cmdlet.
      You can use this parameter, or you can pipe the input to this cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject (cdxml)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store for which the cmdlet should pull configuration information from.
      This cmdlet supports getting information from a Group Policy Object, in the form `Domain\GPOName`.

      The types of PolicyStore supported by this cmdlet:

      - `Domain\GPOName`
      - `GPO: ComputerName`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
