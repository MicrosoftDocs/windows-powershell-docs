    ```Syntax
    Invoke-NetworkControllerState
        [[-Tags] <PSObject>]
        [-Properties] <NetworkControllerStateProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [[-ResourceId] <String>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
