uid: NetworkController.New-NetworkControllerLoadBalancerInboundNatRule
name: New-NetworkControllerLoadBalancerInboundNatRule
module: NetworkController
isPreview: false
summary: |-
  This cmdlet adds/updates an inbound NAT rule associated with a load balancer resource.
description: |-
  This cmdlet adds/updates an inbound NAT rule associated with a load balancer resource.
  This can be used to forward external traffic to a specific VM in the virtual network
