syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerNetworkInterface
        [-ResourceId] <String>
        [[-Tags] <PSObject>]
        [-Properties] <NetworkInterfaceProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
