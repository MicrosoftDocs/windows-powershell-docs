syntaxes:
- syntax: |-
    ```Syntax
    New-NetworkControllerRouteTable
        [-ResourceId] <String>
        [[-Tags] <PSObject>]
        [-Properties] <RouteTableProperties>
        [[-Etag] <String>]
        [[-ResourceMetadata] <ResourceMetadata>]
        [-Force]
        -ConnectionUri <Uri>
        [-CertificateThumbprint <String>]
        [-Credential <PSCredential>]
        [-PassInnerException]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
