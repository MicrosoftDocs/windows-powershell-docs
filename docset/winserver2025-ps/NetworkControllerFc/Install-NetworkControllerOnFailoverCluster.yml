syntaxes:
- syntax: |-
    ```Syntax
    Install-NetworkControllerOnFailoverCluster
        -DatabasePath <String>
        [-PackagePath <String>]
        [-RestIPAddress <String>]
        [-ClientAuthentication <ClientAuthentication>]
        [-ClusterAuthentication <ClusterAuthentication>]
        [-RestCertificateThumbPrint <String>]
        [-RestClientCertificateSubjectNames <String[]>]
        [-RestName <String>]
        [-ClusterNetworkName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: None
  isDefault: true
- syntax: |-
