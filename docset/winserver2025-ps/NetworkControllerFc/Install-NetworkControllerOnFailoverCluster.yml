### YamlMime:PowerShellCmdlet1
uid: NetworkControllerFc.Install-NetworkControllerOnFailoverCluster
name: Install-NetworkControllerOnFailoverCluster
module: NetworkControllerFc
isPreview: false
summary: |-
  Installs NetworkController on a FailOver cluster. The user running this should be a part of the
  Cluster Administrators group.
description: |-
  Installs Network Controller on a Windows FailOver Cluster..
parameters:
  cmdletParameters:
  - name: ClientAuthentication
    type: <xref href="ClientAuthentication" data-throw-if-not-resolved="False" />
    description: |-
      This the Client authentication Mode.
    acceptedValues:
    - None
    - Kerberos
    - X509
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: None
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClusterAuthentication
    type: <xref href="ClusterAuthentication" data-throw-if-not-resolved="False" />
    description: |-
      This the Cluster authentication Mode.
    acceptedValues:
    - None
    - Kerberos
    - X509
    defaultValue: X509
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
