### YamlMime:PowerShellCmdlet1
uid: NetworkControllerFc.Restore-NetworkControllerOnFailoverCluster
name: Restore-NetworkControllerOnFailoverCluster
module: NetworkControllerFc
isPreview: false
summary: |-
  Restores the NetworkController from a Backup.
description: |-
  Restores the NetworkController state from a previous Backup. This performs the following tasks.

  - Extracts the REST resources form the Backup.
  - Cleans up the state of all the MicroServices and restarts the services .
  - Replays the REST resources.
parameters:
  cmdletParameters:
  - name: BackupPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Folder path where the NetworkController Backup is stored.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsSfNcBackup
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      True if this is a Service Fabric Based backup.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Restore-NetworkControllerOnFailoverCluster
        [-BackupPath] <String>
        [[-IsSfNcBackup] <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
