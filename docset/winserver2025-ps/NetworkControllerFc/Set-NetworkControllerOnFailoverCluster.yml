uid: NetworkControllerFc.Set-NetworkControllerOnFailoverCluster
name: Set-NetworkControllerOnFailoverCluster
module: NetworkControllerFc
isPreview: false
summary: |-
  Updates the Configuration of the NetworkController on a FailOver cluster. The user running this
  should be a part of the Cluster Administrators group.
