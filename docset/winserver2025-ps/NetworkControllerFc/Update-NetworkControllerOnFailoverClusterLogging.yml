### YamlMime:PowerShellCmdlet1
uid: NetworkControllerFc.Update-NetworkControllerOnFailoverClusterLogging
name: Update-NetworkControllerOnFailoverClusterLogging
module: NetworkControllerFc
isPreview: false
description: |-
  Updates one of the following logging parameters: LogLevel, LogTimeLimitInDays, and LogSizeLimitInMBs
  on all devices.
parameters:
  cmdletParameters:
  - name: CertificateThumbprint
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the digital public key X.509 certificate of a user account that has permission to perform
      this action.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      A credential to access the Network Controller REST endpoint and the physical host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogLevel
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the level of the log. Acceptable values: 'Error', 'Warning', 'Informational', or 'Verbose'
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogSizeLimitInMBs
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum log size, in MB, to store. Logs are stored in a circular fashion.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "6"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogTimeLimitInDays
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the duration, in days, that logs are stored.
    defaultValue: "0"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RestName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The DNS name of the REST endpoint.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
