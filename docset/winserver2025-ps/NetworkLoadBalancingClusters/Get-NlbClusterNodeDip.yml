### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Get-NlbClusterNodeDip
name: Get-NlbClusterNodeDip
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Gets the dedicated IP address that is queried by the caller.
description: |-
  The **Get-NlbClusterNodeDIP** cmdlet gets the dedicated IP address that is requested by the caller.
  This IP address is the unique IP address of the local host that is used for dedicated traffic to the host or network traffic that is not associated with the cluster.
  Network Load Balancing (NLB) never load balances traffic for the dedicated IP address.
  Instead, NLB load balances incoming traffic from all IP addresses other than the dedicated IP address.
parameters:
  cmdletParameters:
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Node" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the node of the cluster for which this cmdlet gets the dedicated IP address.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IP
    type: <xref href="IPAddress" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address of the cluster node for which this cmdlet gets the dedicated IP address.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NodeName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster node for which this cmdlet gets the dedicated IP address.
    aliases:
