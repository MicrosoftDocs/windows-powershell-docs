syntaxes:
- syntax: |-
    ```Syntax
    Get-NlbClusterNodeDip
        [[-IP] <IPAddress>]
        [-HostName <String>]
        [-InterfaceName <String>]
        [-NodeName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Get-NlbClusterNodeDip
        [[-IP] <IPAddress>]
        -InputObject <Node[]>
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Node" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.ClusterNodeDip" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: List all dedicated IP addresses on the local cluster node'
  description: |-
    ```
    PS C:\>Get-NlbClusterNodeDip
    Node                       IPAddress                  SubnetMask
    ----                       ---------                  ----------
    Node01                      3.53.4.1                   255.0.0.0
    Node01                      fe80::a9cb:eafb:e841:d8cf
    Node02                      3.53.4.2                   255.0.0.0
    ```

    This command lists all the dedicated IP addresses on the local cluster node.
- title: 'Example 2: List all the dedicated IP addresses on the specified cluster node'
  description: |-
    ```
    PS C:\>Get-NlbClusterNodeDip -NodeName "Node02"
    Node                       IPAddress                  SubnetMask
    ----                       ---------                  ----------
    Node02                      3.53.4.2                   255.0.0.0
    ```

    This command lists all the dedicated IP addresses on cluster node Node02.
- title: 'Example 3: List the dedicated IP address that is specified'
  description: |-
    ```
    PS C:\>Get-NlbClusterNodeDip -IP 3.53.4.2
    Node                       IPAddress                  SubnetMask
    ----                       ---------                  ----------
    node2                      3.53.4.2                   255.0.0.0
    ```

    This command lists the dedicated IP address specified.
