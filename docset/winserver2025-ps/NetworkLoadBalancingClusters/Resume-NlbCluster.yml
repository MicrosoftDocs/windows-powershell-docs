### YamlMime:PowerShellCmdlet1
uid: NetworkLoadBalancingClusters.Resume-NlbCluster
name: Resume-NlbCluster
module: NetworkLoadBalancingClusters
isPreview: false
summary: |-
  Resumes all nodes of a NLB cluster.
description: |-
  The **Resume-NlbCluster** cmdlet resumes all nodes in a Network Load Balancing (NLB) cluster.
  To override any remote control commands that are issued, a cluster may need to be suspended and resumed.
parameters:
  cmdletParameters:
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster host against which this cmdlet is run.
      If this parameter is omitted or a value of `.` is entered, then the local cluster is assumed.
    aliases:
    - Host
    - HN
    - H
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Cluster" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of clusters that this cmdlet resumes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Pipeline
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interface to which NLB is bound.
      This is the interface of the cluster against which this cmdlet is run.
    aliases:
    - Interface
    - IN
    - I
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NonPipeline
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Resume-NlbCluster
        [[-HostName] <String>]
        [[-InterfaceName] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Resume-NlbCluster
        -InputObject <Cluster[]>
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
inputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.NetworkLoadBalancingClusters.PowerShell.Cluster" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Resume all cluster nodes on the local cluster'
  description: |-
    ```
    PS C:\>Resume-NlbCluster
    Name                IPAddress           SubnetMask          Mode
    ----                ---------           ----------          ----
    cluster1            3.53.100.100        255.0.0.0           UNICAST
    ```

    This command resumes all cluster nodes on the local cluster.
    Cluster nodes are in the Stopped state after this cmdlet runs.
    Run the Start-NlbCluster cmdlet to start all cluster nodes.
