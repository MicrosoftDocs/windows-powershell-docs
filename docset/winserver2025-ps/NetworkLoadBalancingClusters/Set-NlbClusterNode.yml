syntaxes:
- syntax: |-
    ```Syntax
    Set-NlbClusterNode
        [[-HostName] <String>]
        -InterfaceName <String>
        [-Reload]
        [-HostPriority <Int32>]
        [-InitialHostState <NodeInitialHostState>]
        [-RetainSuspended <Boolean>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: NonPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NlbClusterNode
        -InputObject <Node[]>
        [-Reload]
        [-HostPriority <Int32>]
        [-InitialHostState <NodeInitialHostState>]
        [-RetainSuspended <Boolean>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Pipeline
  isDefault: false
