uid: NetworkSwitchManager.Enable-NetworkSwitchFeature
name: Enable-NetworkSwitchFeature
module: NetworkSwitchManager
isPreview: false
summary: |-
  Enables features of a network switch.
description: |-
  The **Enable-NetworkSwitchFeature** cmdlet enables specified features of a network switch.
