syntaxes:
- syntax: |-
    ```Syntax
    Restore-NetworkSwitchConfiguration
        [-CimSession] <CimSession>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
