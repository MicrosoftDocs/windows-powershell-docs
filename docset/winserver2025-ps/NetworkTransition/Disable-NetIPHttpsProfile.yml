syntaxes:
- syntax: |-
    ```Syntax
    Disable-NetIPHttpsProfile
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
