uid: NetworkTransition.Disable-NetIPHttpsProfile
name: Disable-NetIPHttpsProfile
module: NetworkTransition
isPreview: false
summary: |-
  Disables the currently active IP-HTTPS profile.
description: |-
  The **Disable-NetIPHttpsProfile** cmdlet disables the currently active IP-HTTPS profile.
