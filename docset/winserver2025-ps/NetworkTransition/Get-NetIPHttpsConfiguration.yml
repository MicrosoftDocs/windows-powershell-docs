### YamlMime:PowerShellCmdlet1
uid: NetworkTransition.Get-NetIPHttpsConfiguration
name: Get-NetIPHttpsConfiguration
module: NetworkTransition
isPreview: false
summary: |-
  Gets the IP-HTTPS configuration from a computer or a GPO.
description: |-
  The **Get-NetIPHttpsConfiguration** cmdlet gets the IP-HTTPS configuration from a computer or a Group Policy Object (GPO).

  You can also use **Get-NetIPHttpsConfiguration** to retrieve the IP-HTTPS configuration, and then use the configuration information as input into other cmdlets.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GPOSession
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Group Policy session from which to get the configuration information.

      You can use this parameter with the **NetGPO** cmdlets to aggregate multiple operations performed on a GPO.

      You cannot use this parameter with the *PolicyStore* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByGpoSession
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyStore
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy store from which to get the configuration.
      The default store is ActiveStore.
      The acceptable values for this parameter are:

      - ActiveStore
      - PersistentStore
      - GPO

      To get the configuration of a GPO, specify the GPO name using the following format: Domain\GPOName

      You cannot use this parameter with the *GPOSession* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPolicyStore
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Filters the objects retrieved by the profile name.
    aliases:
    - IPHttpsProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProfileActivated
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Filters the objects retrieved by profile status.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
