syntaxes:
- syntax: |-
    ```Syntax
    Set-NetDnsTransitionConfiguration
        [-Adapter <CimInstance>]
        [-State <State>]
        [-OnlySendAQuery <Boolean>]
        [-LatencyMilliseconds <UInt32>]
        [-AlwaysSynthesize <Boolean>]
        [-AcceptInterface <String[]>]
        [-SendInterface <String[]>]
        [-ExclusionList <String[]>]
        [-PrefixMapping <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetDnsTransitionConfiguration
        -InputObject <CimInstance[]>
        [-State <State>]
        [-OnlySendAQuery <Boolean>]
        [-LatencyMilliseconds <UInt32>]
        [-AlwaysSynthesize <Boolean>]
        [-AcceptInterface <String[]>]
        [-SendInterface <String[]>]
        [-ExclusionList <String[]>]
        [-PrefixMapping <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetDnsTransitionConfiguration" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Set the DNS64 configuration'
  description: |-
    ```
    PS C:\>Set-NetDnsTransitionConfiguration -State Enabled -LatencyMilliseconds 400
    ```

    This command sets the state to Enabled and latency to 400 ms for the DNS64 configuration.
