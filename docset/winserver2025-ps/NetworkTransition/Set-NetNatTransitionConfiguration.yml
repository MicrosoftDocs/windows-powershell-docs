syntaxes:
- syntax: |-
    ```Syntax
    Set-NetNatTransitionConfiguration
        [-InstanceName <String[]>]
        [-PolicyStore <PolicyStore[]>]
        [-Adapter <CimInstance>]
        [-State <State>]
        [-InboundInterface <String[]>]
        [-OutboundInterface <String[]>]
        [-PrefixMapping <String[]>]
        [-IPv4AddressPortPool <String[]>]
        [-TcpMappingTimeoutSeconds <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-NetNatTransitionConfiguration
        -InputObject <CimInstance[]>
        [-State <State>]
        [-InboundInterface <String[]>]
        [-OutboundInterface <String[]>]
        [-PrefixMapping <String[]>]
        [-IPv4AddressPortPool <String[]>]
        [-TcpMappingTimeoutSeconds <UInt32>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root\StandardCimv2\MSFT_NetNatTransitionConfiguration" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays Windows Management Instrumentation (WMI) objects.
    The path after the pound sign (`#`) provides the namespace and class name for the underlying WMI object.
examples:
- title: 'Example 1: Set the NAT64 configuration'
  description: |-
    ```
    PS C:\>$nat64Prefix = "2009:1:2:3:4:5::/96"
    PS C:\> $prefixMapping = "$nat64Prefix,0.0.0.0/0"
    PS C:\> $portPool = "33.0.0.1,6000-10000"
    PS C:\> Set-NetNatTransitionConfiguration -InstanceName "NAT64" OutboundInterface "corpnet" -PrefixMapping $prefixMapping -IPv4AddressPortPool $portPool
    ```

    This command sets the NAT64 configuration for the instance named NAT64.
