### YamlMime:PowerShellCmdlet1
uid: PersistentMemory.Get-PmemDedicatedMemory
name: Get-PmemDedicatedMemory
module: PersistentMemory
isPreview: false
summary: |-
  Gets dedicated persistent memory.
description: |-
  The **Get-PmemDedicatedMemory** cmdlet gets dedicated persistent memory. You can display all dedicated persistent memory or memory for a specific device.
parameters:
  cmdletParameters:
  - name: DeviceNumber
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the device number for the physical device.
      The cmdlet gets dedicated memory for that device.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SingleDevice
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-PmemDedicatedMemory
        [<CommonParameters>]
    ```
  parameterSetName: AllDevices
  isDefault: true
- syntax: |-
    ```Syntax
    Get-PmemDedicatedMemory
        [[-DeviceNumber] <UInt32[]>]
        [<CommonParameters>]
    ```
  parameterSetName: SingleDevice
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all dedicated persistent memory'
  description: |-
    ```powershell
    Get-PmemDedicatedMemory
    ```

    This example gets all dedicated memory.
- title: 'Example 2: Get dedicated persistent memory on a device'
  description: |-
    ```powershell
    Get-PmemDedicatedMemory -DeviceNumber 1
    ```

    This example gets all dedicated memory for the specified device.
