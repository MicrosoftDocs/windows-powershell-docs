uid: PersistentMemory.Get-PmemDisk
name: Get-PmemDisk
module: PersistentMemory
isPreview: false
summary: |-
  Gets persistent memory disks.
description: |-
  The **Get-PmemDisk** cmdlet gets persistent memory disks.
  You can get disks by number or physical device.
