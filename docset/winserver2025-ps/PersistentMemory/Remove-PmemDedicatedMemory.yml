uid: PersistentMemory.Remove-PmemDedicatedMemory
name: Remove-PmemDedicatedMemory
module: PersistentMemory
isPreview: false
summary: |-
  Gets dedicated persistent memory.
description: |-
  The **Remove-PmemDedicatedMemory** cmdlet gets dedicated persistent memory.
