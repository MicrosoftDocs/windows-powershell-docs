### YamlMime:PowerShellCmdlet1
uid: Provisioning.Install-TrustedProvisioningCertificate
name: Install-TrustedProvisioningCertificate
module: Provisioning
isPreview: false
summary: |-
  Adds a certificate to the Trusted Certificate Store.
description: |-
  Installs the specified certificate to the Trusted Certificate Store.

  The **Install-TrustedProvisioningCertificate** cmdlet is supported on Windows 11 client operating system only.
parameters:
  cmdletParameters:
  - name: CertificatePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Path to .CER file
    aliases:
    - Path
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectedDevice
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If enabled, specifies that the device type is mobile.
    aliases:
    - Device
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ForceInstall
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether, if certificate already exists, it will be overwritten.
    aliases:
    - Force
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogsDirectoryPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the logs directory path.
    aliases:
    - Logs
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WprpFile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of the WPR profile file.
    aliases:
    - Wprp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Install-TrustedProvisioningCertificate
        [-CertificatePath] <String>
        [-ForceInstall]
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Install Trusted Provisioning Certificate'
  description: |-
    ```powershell
    PS C:\> Install-TrustedProvisioningCertificate -CertificatePath trustedCert.cer
    ```

    Installs the specified certificate as a trusted provisioning certificate.
