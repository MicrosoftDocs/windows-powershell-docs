### YamlMime:PowerShellCmdlet1
uid: Provisioning.Uninstall-TrustedProvisioningCertificate
name: Uninstall-TrustedProvisioningCertificate
module: Provisioning
isPreview: false
summary: |-
  Removes a previously installed provisioning certificate.
description: |-
  Removes a previously installed provisioning certificate.

  The **Uninstall-TrustedProvisioningCertificate** cmdlet is supported on Windows 11 client operating system only.
parameters:
  cmdletParameters:
  - name: ConnectedDevice
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If enabled, specifies that the device type is mobile.
    aliases:
    - Device
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogsDirectoryPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the logs directory path.
    aliases:
    - Logs
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Thumbprint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a certificate thumbprint.
    aliases:
    - Id
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WprpFile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of the WPR profile file.
    aliases:
    - Wprp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-TrustedProvisioningCertificate
        [-Thumbprint] <String>
        [-LogsDirectoryPath <String>]
        [-WprpFile <String>]
        [-ConnectedDevice]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Uninstall a trusted provisioning certificate'
  description: |-
    ```powershell
    PS C:\> Uninstall-TrustedProvisioningCertificate -Thumbprint fedd995b45e633d4ef30fcbc8f3a48b627e9a28b
    ```

    Uninstall a trusted provisioning certificate with the specified thumbprint.
