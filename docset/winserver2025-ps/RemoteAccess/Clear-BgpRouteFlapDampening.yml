syntaxes:
- syntax: |-
    ```Syntax
    Clear-BgpRouteFlapDampening
        [-RoutingDomain <String>]
        [-Force]
        [-Prefix <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
