syntaxes:
- syntax: |-
    ```Syntax
    Disconnect-VpnUser
        [-UserName] <String[]>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UserName
  isDefault: true
- syntax: |-
    ```Syntax
    Disconnect-VpnUser
        -HostIPAddress <String[]>
        [-ComputerName <String>]
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: HostIP
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    The array of strings consists of the list of user names or host addresses of the connections that were disconnected.
examples:
- title: EXAMPLE 1
  description: |-
    ```
    Disconnect-VpnUser -HostIPAddress 10.1.1.11 -PassThru 10.1.1.11
    ```

    This example disconnects a VPN connection by specifying the host address.
    There is one active VPN connection in this example.
