syntaxes:
- syntax: |-
    ```Syntax
    Enable-DAOtpAuthentication
        [-RadiusServer <String>]
        [-ComputerName <String>]
        [-RadiusPort <UInt16>]
        [-CAServer <String[]>]
        [-CertificateTemplateName <String>]
        [-SharedSecret <String>]
        [-UserSecurityGroupName <String>]
        [-Force]
        [-PassThru]
        [-SigningCertificateTemplateName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
