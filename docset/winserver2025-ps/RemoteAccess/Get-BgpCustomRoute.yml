syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpCustomRoute
        [-RoutingDomain <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: RoutingDomain
  isDefault: false
- syntax: |-
    ```Syntax
    Get-BgpCustomRoute
        [-AllRoutingDomains]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: AllRoutingDomains
