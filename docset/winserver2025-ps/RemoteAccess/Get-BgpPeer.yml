### YamlMime:PowerShellCmdlet1
uid: RemoteAccess.Get-BgpPeer
name: Get-BgpPeer
module: RemoteAccess
isPreview: false
summary: |-
  Gets configuration information for BGP peers.
description: |-
  The **Get-BgpPeer** cmdlet gets configuration information for Border Gateway Protocol (BGP) peers.
  You can specify peers to get by using names or routing domains.
parameters:
  cmdletParameters:
  - name: AllRoutingDomains
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet against all routing domains that are setup.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllRoutingDomains
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names.
      The cmdlet gets configuration information for the named peers.
    aliases:
    - PeerList
    - PeerId
    - PeerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoutingDomain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the routing domain as a string.
      The name is a unique, for the multitenant gateway, user-defined alphanumeric string.
    aliases:
    - RoutingDomainName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RoutingDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-BgpPeer
        [[-Name] <String[]>]
        [-RoutingDomain <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: RoutingDomain
  isDefault: false
- syntax: |-
    ```Syntax
    Get-BgpPeer
        [-AllRoutingDomains]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: AllRoutingDomains
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#BgpPeerConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get configuration information for a peer'
  description: |-
    ```
    PS C:\> Get-BgpPeer -Name "TenantSite17"
    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    TenantSite17        192.168.1.10        10.1.1.10           64512               Mixed               Connecting
    ```

    This command gets configuration information for the peer named TenantSite17.
- title: 'Example 2: Get configuration information for all peers'
  description: |-
    ```
    PS C:\> Get-BgpPeer
    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    TenantSite17        192.168.1.10        10.1.1.10           64512               Mixed               Connecting
    TenantSite22        192.168.1.10        10.1.2.10           64522               Mixed               Connecting
    ```

    This command gets the configuration information for all peers.
- title: 'Example 3: View formatted configuration information'
  description: |-
    ```
    PS C:\> Get-BgpPeer "TenantSite17" | Format-List
    PeerName           : TenantSite17
    LocalIPAddress     : 192.168.1.10
    PeerIPAddress      : 10.1.1.10
    PeerASN            : 64512
    OperationMode      : Server
    PeeringMode        : Manual
    HoldTime(s)        : 180
    ConnectivityStatus : Stopped
    IngressPolicyList  : {Policy11}
    EgressPolicyList   :
    MaxAllowedPrefix   :
    ```

    This command gets configuration information for all peers, and then passes them to the Format-List cmdlet by using the pipeline operator.
    That cmdlet formats the output to the console.
    For more information, type `Get-Help Format-List`.
- title: 'Example 4: Get configuration information for all peers in a routing domain'
  description: |-
    ```
    PS C:\> Get-BgpPeer -RoutingDomain "Rd001"
    PeerName            LocalIPAddress      PeerIPAddress       PeerASN             OperationMode       ConnectivityStatus
    --------            --------------      -------------       -------             -------------       ------------------
    Tenant46            10.1.1.10           192.168.1.2         64513               Mixed               Connecting
    ```

    This command gets configuration information for all peers of the specified routing domain.
    This domain contains only a single peer named Tenant46.
