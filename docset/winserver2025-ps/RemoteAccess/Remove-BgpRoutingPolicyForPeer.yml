syntaxes:
- syntax: |-
    ```Syntax
    Remove-BgpRoutingPolicyForPeer
        [-PeerName <String[]>]
        [-PolicyName <String[]>]
        [-Direction <PolicyDirection>]
        [-RoutingDomain <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
