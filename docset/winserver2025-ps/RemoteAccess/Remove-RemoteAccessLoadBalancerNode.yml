syntaxes:
- syntax: |-
    ```Syntax
    Remove-RemoteAccessLoadBalancerNode
        [-RemoteAccessServer] <String>
        [-ComputerName <String>]
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
