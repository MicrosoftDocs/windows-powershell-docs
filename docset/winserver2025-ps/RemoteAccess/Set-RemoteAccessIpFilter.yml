    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-RemoteAccessIpFilter
        [-Action] <Action>
        [-Direction] <Direction>
        [-InterfaceAlias] <String>
        [-AddressFamily] <AddressFamily>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
