syntaxes:
- syntax: |-
    ```Syntax
    Stop-BgpPeer
        [-Name] <String[]>
        [-RoutingDomain <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
