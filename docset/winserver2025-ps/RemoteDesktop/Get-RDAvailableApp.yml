### YamlMime:PowerShellCmdlet1
uid: RemoteDesktop.Get-RDAvailableApp
name: Get-RDAvailableApp
module: RemoteDesktop
isPreview: false
summary: |-
  Gets a list of publishable applications from a collection.
description: |-
  The **Get-RDAvailableApp** cmdlet gets a list of publishable applications from a collection specified in the **CollectionName** parameter.
parameters:
  cmdletParameters:
  - name: CollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a personal virtual desktop collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConnectionBroker
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Remote Desktop Connection Broker (RD Connection Broker) server for a remote desktop deployment.
      If you do not supply a value, the cmdlet uses the fully qualified domain name (FQDN) of the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualDesktopName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual desktop.
      This parameter is required.
      The virtual desktop identified here must be a member of the of the collection specified by the **CollectionName** parameter.
    aliases:
    - VMName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: VirtualDesktop
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-RDAvailableApp
        [-CollectionName] <String>
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Session
  isDefault: true
- syntax: |-
    ```Syntax
    Get-RDAvailableApp
        [-CollectionName] <String>
        -VirtualDesktopName <String>
        [-ConnectionBroker <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VirtualDesktop
  isDefault: false
outputs:
- name: <xref href="Microsoft.RemoteDesktopServices.Management.StartMenuApp" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the list of applications available to publish for a session collection'
  description: |-
    ```
    PS C:\> Get-RDAvailableApp -CollectionName "Session Collection" -ConnectionBroker "Rdcb.Contoso.com"
    ```

    This command retrieves a list of the applications available from the session collection named Session Collection, on the RD Connection Broker server named Rdcb.Contoso.com.
- title: 'Example 2: Get the list of applications available to publish for a virtual desktop collection'
  description: |-
    ```
    PS C:\> Get-RDAvailableApp -CollectionName "Virtual Desktop Pool" -ConnectionBroker "Rdcb.Contoso.com" -VirtualDesktopName "RDS-WKS-A26"
    ```

    This command retrieves a list of the applications available from the session collection named Virtual Desk Pool, on the RD Connection Broker server named Rdcb.Contoso.com.
    The cmdlet uses the virtual desktop named RDS-WKS-A26 as the source of a list of applications.
