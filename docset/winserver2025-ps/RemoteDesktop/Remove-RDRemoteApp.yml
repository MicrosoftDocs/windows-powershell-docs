    ```Syntax
    Remove-RDRemoteApp
        [-CollectionName] <String>
        -Alias <String>
        [-ConnectionBroker <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
