syntaxes:
- syntax: |-
    ```Syntax
    Remove-RDSessionHost
        [-SessionHost] <String[]>
        [-ConnectionBroker <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
