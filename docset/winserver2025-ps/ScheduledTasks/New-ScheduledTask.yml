syntaxes:
- syntax: |-
    ```Syntax
    New-ScheduledTask
        [[-Action] <CimInstance[]>]
        [[-Description] <String>]
        [[-Principal] <CimInstance>]
        [[-Settings] <CimInstance>]
        [[-Trigger] <CimInstance[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
