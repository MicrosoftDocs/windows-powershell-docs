syntaxes:
- syntax: |-
    ```Syntax
    New-ScheduledTaskPrincipal
        [[-Id] <String>]
        [[-RunLevel] <RunLevelEnum>]
        [[-ProcessTokenSidType] <ProcessTokenSidTypeEnum>]
        [[-RequiredPrivilege] <String[]>]
        [-UserId] <String>
        [[-LogonType] <LogonTypeEnum>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: User
  isDefault: true
- syntax: |-
    ```Syntax
