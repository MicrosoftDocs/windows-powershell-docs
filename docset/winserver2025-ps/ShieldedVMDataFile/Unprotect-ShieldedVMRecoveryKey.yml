syntaxes:
- syntax: |-
    ```Syntax
    Unprotect-ShieldedVMRecoveryKey
        -ShieldingDataFilePath <String>
        -EncryptedBitLockerKeyPath <String>
        -DecryptedBitLockerKeyPath <String>
        [-WhatIf]
        [-Confirm]
    ```
  parameterSetName: EBEKFileParameterSet
  isDefault: true
