### YamlMime:PowerShellCmdlet1
uid: SmbShare.Get-SmbMapping
name: Get-SmbMapping
module: SmbShare
isPreview: false
summary: |-
  Retrieves the SMB client directory mappings created for a server.
description: |-
  The `Get-SmbMapping` cmdlet retrieves the Server Message Block (SMB) client directory mappings
  created for a server. This can be a mapping from a local drive letter to a remote shared folder, or
  it can be a mapping without a local path.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/get-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the local path used to map the remote path on this computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the remote path that's accessed from this computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SmbMapping
        [[-LocalPath] <String[]>]
        [[-RemotePath] <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/SMB/MSFT_SmbMapping" data-throw-if-not-resolved="False" />
  description: |-
    The `Microsoft.Management.Infrastructure.CimInstance` object is a wrapper class that displays
    Windows Management Instrumentation (WMI) objects. The path after the pound sign (`#`) provides the
    namespace and class name for the underlying WMI object. This cmdlet returns a **MSFT_SmbMapping**
    object that represents the mappings created from the SMB client to SMB shares.
examples:
- title: 'Example 1: Get SMB client directory mappings'
  description: |-
    ```powershell
    Get-SmbMapping
    Status                                  Local Path                              Remote Path
    ------                                  ----------                              -----------
    OK                                      X:                                      \\Contoso-SO\VMFiles
    OK                                      Y:                                      \\Contoso-FS\VMS1
    ```

    This command retrieves the SMB client directory mappings created for the SMB server.
- title: 'Example 2: Get SMB client directory mapping for a directory'
  description: |-
    ```powershell
    Get-SmbMapping -LocalPath "X:" | Select-Object -Property *
    Status                : OK
    LocalPath             : X:
    RemotePath            : \\Contoso-SO\VMFiles
    PSComputerName        :
    CimClass              : ROOT/Microsoft/Windows/SMB:MSFT_SmbMapping
    CimInstanceProperties : {LocalPath, RemotePath, Status}
    CimSystemProperties   : Microsoft.Management.Infrastructure.CimSystemProperties
    ```

    This command retrieves the SMB client directory mapping for the **X:** directory created for the SMB
    server.
