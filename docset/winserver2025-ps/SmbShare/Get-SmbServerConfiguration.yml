### YamlMime:PowerShellCmdlet1
uid: SmbShare.Get-SmbServerConfiguration
name: Get-SmbServerConfiguration
module: SmbShare
isPreview: false
summary: |-
  Retrieves the SMB server configuration.
description: |-
  The `Get-SmbServerConfiguration` cmdlet retrieves the Server Message Block (SMB) server
  configuration.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet isn't run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SmbServerConfiguration
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/SMB/MSFT_SmbServerConfiguration" data-throw-if-not-resolved="False" />
  description: |-
    The **MSFT_SmbServerConfiguration** object represents the configuration of the SMB server.
examples:
- title: 'Example 1: Get SMB server configuration'
  description: |-
    ```powershell
    Get-SmbServerConfiguration
    ```

    ```output
    AnnounceComment                        :
    AnnounceServer                         : False
    AsynchronousCredits                    : 512
    AuditSmb1Access                        : False
    AutoDisconnectTimeout                  : 15
    AutoShareServer                        : True
    AutoShareWorkstation                   : True
    CachedOpenLimit                        : 10
    DisableSmbEncryptionOnSecureConnection : True
    DurableHandleV2TimeoutInSeconds        : 180
    EnableAuthenticateUserSharing          : False
    EnableDownlevelTimewarp                : False
    EnableForcedLogoff                     : True
    EnableLeasing                          : True
    EnableMultiChannel                     : True
    EnableOplocks                          : True
    EnableSecuritySignature                : False
    EnableSMB1Protocol                     : False
    EnableSMB2Protocol                     : True
    EnableStrictNameChecking               : True
    EncryptData                            : False
    IrpStackSize                           : 15
    KeepAliveTime                          : 2
    MaxChannelPerSession                   : 32
    MaxMpxCount                            : 50
    MaxSessionPerConnection                : 16384
    MaxThreadsPerQueue                     : 20
    MaxWorkItems                           : 1
    NullSessionPipes                       :
    NullSessionShares                      :
    OplockBreakWait                        : 35
    PendingClientTimeoutInSeconds          : 120
    RejectUnencryptedAccess                : True
    RequireSecuritySignature               : False
    ServerHidden                           : True
    Smb2CreditsMax                         : 8192
    Smb2CreditsMin                         : 512
    SmbServerNameHardeningLevel            : 0
    TreatHostAsStableStorage               : False
    ValidateAliasNotCircular               : True
    ValidateShareScope                     : True
    ValidateShareScopeNotAliased           : True
    ValidateTargetName                     : True
    RestrictNamedpipeAccessViaQuic         : True
    EnableSMBQUIC                          : True
    EncryptionCiphers                      : AES_128_GCM, AES_128_CCM, AES_256_GCM, AES_256_CCM
    ```

    This command retrieves the SMB server configuration.
