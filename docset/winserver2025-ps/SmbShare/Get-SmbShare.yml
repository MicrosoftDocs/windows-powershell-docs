### YamlMime:PowerShellCmdlet1
uid: SmbShare.Get-SmbShare
name: Get-SmbShare
module: SmbShare
isPreview: false
summary: |-
  Retrieves the SMB shares on the computer.
description: |-
  The `Get-SmbShare` cmdlet retrieves objects that represent the Server Message Block (SMB) shares
  being displayed by the computer.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AvailabilityType
    type: <xref href="AvailabilityType" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the cluster type of the shares being enumerated.
    acceptedValues:
    - NonClustered
    - Clustered
    - ScaleOut
    - CSV
    - DFS
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CachingMode
    type: <xref href="CachingMode" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the caching mode of the offline files for the SMB share. There are five caching modes:

      - BranchCache - Enables BranchCache and manual caching of documents on the shared folder.
      - Documents - Automatically stores documents offline.
      - Manual - Allows users to identify the documents and programs that they want to store offline.
      - Programs - Automatically stores documents and programs offline.
      - None - Prevents users from storing documents and programs offline.
    acceptedValues:
    - None
    - Manual
    - Documents
    - Programs
    - BranchCache
    - Unknown
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CATimeout
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the continuous availability time-out of the SMB share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressData
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Indicates that the shares being enumerated should request compression from clients.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentUserLimit
    type: <xref href="UInt32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the concurrent user limit of the shares being enumerated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContinuouslyAvailable
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Indicates that the shares being enumerated should be continuously available.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptData
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Indicates that the shares being enumerated should be encrypted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FolderEnumerationMode
    type: <xref href="FolderEnumerationMode" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the folder enumeration mode of the shares being enumerated.
    acceptedValues:
    - AccessBased
    - Unrestricted
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeHidden
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that shares that are created and used internally are also enumerated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsolatedTransport
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Treats this share to be a distinct file server instance. Clients will establish a new set of
      connections to access the share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LeasingMode
    type: <xref href="LeasingMode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies SMB leasing and oplock behaviors for application compatibility. The acceptable values for
      this parameter are:

      - `Full`: Use default lease and oplock behaviors from SMB3.
      - `Shared`: Grant read-caching lease but not write or handle-caching.
      - `None`: No oplocks or leases, behave like SMB1 (not recommended).

      > [!IMPORTANT]
      > We Don't recommend disabling oplocks, but may be required in some scenarios.
      > For more information, see [SMB1 Product Clearinghouse](https://techcommunity.microsoft.com/t5/Storage-at-Microsoft/SMB1-Product-Clearinghouse/ba-p/426008).
    acceptedValues:
    - Full
    - Shared
    - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more SMB shares by share name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSFlowScope
    type: <xref href="QoSFlowScope" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the Quality of Service (QoS) flow scope for the SMB share. The QoS flow scope determines
      how QoS policies are applied to SMB traffic. The accepted values are:

      - File: Applies the QoS policy to file operations, each file handle is considered a flows.
      - Share: Applies the QoS policy to SMB share connections, each connection is considered a flow.
      - User: Applies the QoS policy to each user connection, each user connection is considered a flow.
      - Session: Applies the QoS policy to each SMB session, each session connection is considered a flow.

      The default value is **None**.
    acceptedValues:
    - File
    - Share
    - User
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QoSPolicyId
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the QoS policy ID for the SMB share. The QoS policy ID is used to apply QoS policies to
      SMB traffic. The default value is **None**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scoped
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Indicates that the shares to be numerated should be scoped.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScopeName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the scope of the share by name. For use with Windows Server failover cluster file server
      resources.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShareState
    type: <xref href="ShareState" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the state of the shares being enumerated.
    acceptedValues:
    - Pending
    - Online
    - Offline
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SmbInstance
    type: <xref href="SmbInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the SMB share instance type. Accepted values are:

      - `Default`: Used for operations where a client device opens a file on a share on the server.
      - `CSV`: Used by Windows Failover Clusters.
      - `SBL`: Used by Storage Spaces Direct.
      - `SR`: Used by Storage Replica.
    acceptedValues:
    - Default
    - CSV
    - SBL
    - SR
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Special
    type: <xref href="Boolean" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Indicates that the shares to be numerated should be special. Admin share, default shares, IPC$
      share are examples of special shares.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SmbShare
        [[-Name] <String[]>]
        [[-ScopeName] <String[]>]
        [-Scoped <Boolean[]>]
        [-Special <Boolean[]>]
        [-ContinuouslyAvailable <Boolean[]>]
        [-ShareState <ShareState[]>]
        [-FolderEnumerationMode <FolderEnumerationMode[]>]
        [-CachingMode <CachingMode[]>]
        [-LeasingMode <LeasingMode[]>]
        [-DirectoryHandleLeasing <Boolean[]>]
        [-ConcurrentUserLimit <UInt32[]>]
        [-AvailabilityType <AvailabilityType[]>]
        [-CaTimeout <UInt32[]>]
        [-EncryptData <Boolean[]>]
        [-CompressData <Boolean[]>]
        [-IsolatedTransport <Boolean[]>]
        [-QoSFlowScope <QoSFlowScope[]>]
        [-QoSPolicyId <String[]>]
        [-IncludeHidden]
        [-SmbInstance <SmbInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
