    ```Syntax
    Grant-SmbClientAccessToServer
        [-Name] <String[]>
        -IdentifierType <IdentifierType>
        -Identifier <String>
        [-Description <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
