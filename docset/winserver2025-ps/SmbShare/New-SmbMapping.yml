### YamlMime:PowerShellCmdlet1
uid: SmbShare.New-SmbMapping
name: New-SmbMapping
module: SmbShare
isPreview: false
summary: |-
  Creates an SMB mapping.
description: |-
  The `New-SmbMapping` cmdlet creates a Server Message Block (SMB) mapping on the SMB client to an
  SMB share.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BlockNTLM
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to block NT LAN Manager (NTLM) authentication. If this parameter is set to
      `$true`, NTLM authentication will be blocked forcing the connection to use another negotiated
      authentication method, such as Kerberos. If set to `$false` (default), NTLM authentication will be
      allowed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DefaultSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressNetworkTraffic
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that SMB compression is requested for the mapped drive if the SMB server supports it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user account that has permission to perform a specific task, such as running a script
