      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the password to be used to connect to the SMB share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Persistent
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this connection is persistent.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: QuicPort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination port number used by the SMB server for QUIC protocol connections.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RdmaPort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination port number used by the SMB server for Remote Direct Memory Access (RDMA)
      protocol connections.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemotePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the remote path that's accessed from this computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequireIntegrity
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that SMB signing is required for the mapped drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequirePrivacy
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that SMB encryption is required for the mapped drive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SaveCredentials
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the credentials provided should be saved for when a mapping to the same SMB server
      also is created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SkipCertificateCheck
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the client doesn't need to trust the server certificate's issuer in order to connect
      using SMB over QUIC.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TcpPort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination port number used by the SMB server for Transmission Control Protocol
      (TCP) connections.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TransportType
    type: <xref href="TransportType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the network transport used by SMB. The acceptable values for this parameter are:

      - `TCP`: Use TCP network transport.
      - `QUIC`: Use QUIC network transport.
      - `None`: Use default transport behavior (first try TCP then try QUIC).
    acceptedValues:
    - None
    - TCP
    - QUIC
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UserName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user name to use to connect to the SMB share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UseWriteThrough
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that forced unit access (write through) is required and bypasses all OS caches, forcing
      IO to disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet isn't run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
