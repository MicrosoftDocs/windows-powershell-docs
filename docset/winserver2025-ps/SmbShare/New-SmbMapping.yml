syntaxes:
- syntax: |-
    ```Syntax
    New-SmbMapping
        [[-LocalPath] <String>]
        [[-RemotePath] <String>]
        [-AsJob]
        [-BlockNTLM <Boolean>]
        [-CimSession <CimSession[]>]
        [-CompressNetworkTraffic <Boolean>]
        [-Confirm]
        [-Credential <PSCredential>]
        [-GlobalMapping]
        [-HomeFolder]
        [-Password <String>]
        [-Persistent <Boolean>]
        [-QuicPort <UInt16>]
        [-RdmaPort <UInt16>]
        [-RequireIntegrity <Boolean>]
        [-RequirePrivacy <Boolean>]
        [-SaveCredentials]
        [-SkipCertificateCheck]
        [-TcpPort <UInt16>]
        [-ThrottleLimit <Int32>]
        [-TransportType <TransportType>]
        [-UserName <String>]
        [-UseWriteThrough <Boolean>]
        [-WhatIf]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#root/Microsoft/Windows/SMB/MSFT_SmbMapping" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a **MSFT_SmbMapping** object that represents the newly created SMB mapping.
examples:
- title: 'Example 1: Create an SMB mapping'
  description: |-
    ```powershell
    New-SmbMapping -LocalPath "X:" -RemotePath "\\Contoso-SO\VMFiles"
    Status                                  Local Path                              Remote Path
    ------                                  ----------                              -----------
    OK                                      X:                                      \\Contoso-SO\VMFiles
    ```

    This command creates an SMB mapping.
