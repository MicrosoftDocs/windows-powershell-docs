    Remove-SmbServerAlternativePort
        -InputObject <CimInstance[]>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
