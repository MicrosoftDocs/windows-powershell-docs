syntaxes:
- syntax: |-
    ```Syntax
    Remove-SmbServerAlternativePort
        [-TransportType] <TransportType[]>
        [-Port] <UInt16[]>
        [-IncludeHidden]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
