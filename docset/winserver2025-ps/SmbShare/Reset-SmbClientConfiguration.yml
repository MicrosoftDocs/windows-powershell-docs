examples:
- title: 'Example 1: Reset the large MTU behavior'
  description: |-
    ```powershell
    Reset-SmbClientConfiguration -EnableLargeMtu -Confirm:$false
    ```

    This commands resets only the large MTU behavior to its default value without user confirmation.
