syntaxes:
- syntax: |-
    ```Syntax
    Set-SmbClientCertificateMapping
        [-Namespace] <String>
        [-Flags <Flags>]
        [-Thumbprint <String>]
        [-StoreName <String>]
        [-IssuerName <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
