syntaxes:
- syntax: |-
    ```Syntax
    Set-SmbServerAlternativePort
        [-TransportType] <TransportType>
        [-Port] <UInt16>
        [-EnableInstances] <Instance>
        [[-DisableInstances] <Instance>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.PowerShell.Cmdletization.GeneratedTypes.SmbServerAlternativePort.TransportType" data-throw-if-not-resolved="False" />
- name: <xref href="System.UInt16" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.PowerShell.Cmdletization.GeneratedTypes.SmbServerAlternativePort.Instance" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Configure a new SMB server alternative port'
  description: |-
    ```powershell
    Set-SmbServerAlternativePort -TransportType QUIC -Port 1
    ```

    Configures an SMB server alternative port that uses the QUIC transport protocol on port number
    **1**.
