### YamlMime:PowerShellCmdlet1
uid: SmbShare.Set-SmbServerAlternativePort
name: Set-SmbServerAlternativePort
module: SmbShare
isPreview: false
summary: |-
  Configures the alternative ports for the Server Message Block (SMB) protocol on the local server.
description: |-
  The `Set-SmbServerAlternativePort` cmdlet can be used to set the alternate ports that SMB will use
  for incoming connections that accepts a list of port numbers and updates the SMB configuration
  accordingly.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to
      complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer. Enter a computer name or a session
      object, such as the output of a [New-CimSession](/powershell/module/cimcmdlets/new-cimsession)
      or [Get-CimSession](/powershell/module/cimcmdlets/get-cimsession) cmdlet. The default is the
      current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableInstances
    type: <xref href="Instance" data-throw-if-not-resolved="False" />
    description: |-
      Disables alternative ports on SMB instances. Currently only the **Default** instance is allowed.
      This setting is not used.
    acceptedValues:
    - None
    - Default
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableInstances
    type: <xref href="Instance" data-throw-if-not-resolved="False" />
    description: |-
      Enables alternative ports on SMB instances. Currently only the **Default** instance is allowed.
      This setting is not used.
    acceptedValues:
    - None
    - Default
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port number that the SMB connection should use.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet. If
      this parameter is omitted or a value of `0` is entered, then Windows PowerShell calculates an
      optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the
      computer. The throttle limit applies only to the current cmdlet, not to the session or to the
      computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TransportType
    type: <xref href="TransportType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the network transport used by SMB. The acceptable values for this parameter are:

      - `TCP`: Use TCP network transport.
      - `QUIC`: Use QUIC network transport.
      - `None`: Use default transport behavior (first try TCP then try QUIC).
    acceptedValues:
    - None
    - TCP
    - QUIC
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
