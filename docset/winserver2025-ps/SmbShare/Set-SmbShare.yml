syntaxes:
- syntax: |-
    ```Syntax
    Set-SmbShare
        [-Name] <String[]>
        [[-ScopeName] <String[]>]
        [-SmbInstance <SmbInstance>]
        [-Description <String>]
        [-ConcurrentUserLimit <UInt32>]
        [-CATimeout <UInt32>]
        [-ContinuouslyAvailable <Boolean>]
        [-FolderEnumerationMode <FolderEnumerationMode>]
        [-CachingMode <CachingMode>]
        [-SecurityDescriptor <String>]
        [-EncryptData <Boolean>]
        [-CompressData <Boolean>]
        [-IsolatedTransport <Boolean>]
        [-LeasingMode <LeasingMode>]
        [-DirectoryHandleLeasing <Boolean>]
        [-QoSFlowScope <QoSFlowScope>]
        [-QoSPolicyId <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
    ```Syntax
    Set-SmbShare
        -InputObject <CimInstance[]>
        [-Description <String>]
        [-ConcurrentUserLimit <UInt32>]
        [-CATimeout <UInt32>]
        [-ContinuouslyAvailable <Boolean>]
        [-FolderEnumerationMode <FolderEnumerationMode>]
        [-CachingMode <CachingMode>]
        [-SecurityDescriptor <String>]
        [-EncryptData <Boolean>]
        [-CompressData <Boolean>]
        [-IsolatedTransport <Boolean>]
        [-LeasingMode <LeasingMode>]
        [-DirectoryHandleLeasing <Boolean>]
        [-QoSFlowScope <QoSFlowScope>]
        [-QoSPolicyId <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
