syntaxes:
- syntax: |-
    ```Syntax
    Unblock-SmbClientAccessToServer
        [-Name] <String[]>
        -IdentifierType <IdentifierType>
        -Identifier <String>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query
  isDefault: false
- syntax: |-
    ```Syntax
    Unblock-SmbClientAccessToServer
        -InputObject <CimInstance[]>
        -IdentifierType <IdentifierType>
        -Identifier <String>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
