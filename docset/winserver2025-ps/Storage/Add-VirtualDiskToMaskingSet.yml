    Add-VirtualDiskToMaskingSet
        [-MaskingSetFriendlyName] <String[]>
        [-VirtualDisknames <String[]>]
        [-DeviceNumbers <UInt16[]>]
        [-DeviceAccesses <DeviceAccess[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
