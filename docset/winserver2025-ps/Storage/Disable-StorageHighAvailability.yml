### YamlMime:PowerShellCmdlet1
uid: Storage.Disable-StorageHighAvailability
name: Disable-StorageHighAvailability
module: Storage
isPreview: false
summary: |-
  Disables a Storage resource.
description: |-
  The **Disable-StorageHighAvailability** cmdlet configures a Storage resource to be in an unavailable or inactive state.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
