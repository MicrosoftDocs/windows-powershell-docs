### YamlMime:PowerShellCmdlet1
uid: Storage.Disable-StorageMaintenanceMode
name: Disable-StorageMaintenanceMode
module: Storage
isPreview: false
summary: |-
  Disables storage maintenance mode on a fault domain.
description: |-
  The **Disable-StorageMaintenanceMode** cmdlet disables storage maintenance mode on a fault domain, which includes SSU, StorageEnclosure, and PhysicalDisk.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the input object that is used in a pipeline command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Manufacturer
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the manufacturer of a device.
      This cmdlet matches manufacturer information of physical disk devices, and disables maintenance mode on those devices.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Model
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the model of a physical disk device that this cmdlet removes from maintenance mode.
      If multiple devices fit a model string, this cmdlet removes those devices from maintenance mode.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-StorageMaintenanceMode
        -InputObject <CimInstance>
        [-Model <String>]
        [-Manufacturer <String>]
        [-CimSession <CimSession>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="MSFT_StorageFaultDomain" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a fault domain object, **PhysicalDisk**, **Enclosure**, or **SSU** to this cmdlet.
examples:
- title: 'Example 1: Disable maintenance mode on a physical disk'
  description: |-
    ```
    PS C:\>Get-PhysicalDisk -FriendlyName "Disk22" | Disable-StorageMaintenanceMode
    ```

    This command gets a physical disk by using the Get-PhysicalDisk cmdlet, and then passes that object to the current cmdlet.
    The command disables storage maintenance mode on the disk named Disk22.
