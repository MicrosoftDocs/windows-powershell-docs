### YamlMime:PowerShellCmdlet1
uid: Storage.Get-StorageEnclosure
name: Get-StorageEnclosure
module: Storage
isPreview: false
summary: |-
  Gets storage enclosures.
description: |-
  The **Get-StorageEnclosure** cmdlet gets storage enclosures that are visible to your computer.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of friendly names.
      The cmdlet gets storage enclosures that the names specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFriendlyName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HealthStatus
    type: <xref href="HealthStatus" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of health status values.
      The acceptable values for this parameter are:

      - Healthy
      - Warning
      - Unhealthy
      - Unknown

      Health status describes the health of an enclosure.
      This cmdlet gets the enclosures that have health statuses that this parameter specifies.
    acceptedValues:
    - Healthy
    - Warning
    - Unhealthy
    - Unknown
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Manufacturer
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the name of a manufacturer.
      This cmdlet gets enclosures for the manufacturers that this parameter identifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Model
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of model IDs.
      This cmdlet gets enclosures that the model IDs specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalDisk
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a physical disk as a **CimInstance** object.
      The cmdlet gets storage enclosures that contain the disk that the object specifies.
      To obtain a physical disk object, use the Get-PhysicalDisk cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPhysicalDisk
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicallyConnected
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets storage enclosures that are physically connected to a storage node.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByStorageNode
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SerialNumber
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the serial number of the storage enclosure to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFriendlyName
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageNode
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a storage node as a **CimInstance** object.
      The cmdlet gets storage enclosures connected to the storage node that the object specifies.
      To obtain a storage node object, use the Get-StorageNode cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByStorageNode
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageSubSystem
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a storage subsystem as a **CimInstance** object.
      This cmdlet gets storage enclosures that belong to the subsystem that the object specifies.
      To obtain a storage subsystem object, use the Get-StorageSubSystem cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByStorageSubSystem
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UniqueId
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of IDs.
      This cmdlet gets the enclosures that the IDs specify.
    aliases:
    - Id
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByUniqueId
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-StorageEnclosure
        [-UniqueId <String[]>]
        [-Manufacturer <String[]>]
        [-Model <String[]>]
        [-HealthStatus <HealthStatus[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByUniqueId
  isDefault: true
- syntax: |-
    ```Syntax
    Get-StorageEnclosure
        [[-FriendlyName] <String[]>]
        [[-SerialNumber] <String[]>]
        [-Manufacturer <String[]>]
        [-Model <String[]>]
        [-HealthStatus <HealthStatus[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageEnclosure
        [-Manufacturer <String[]>]
        [-Model <String[]>]
        [-HealthStatus <HealthStatus[]>]
        [-PhysicalDisk <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByPhysicalDisk
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageEnclosure
        [-Manufacturer <String[]>]
        [-Model <String[]>]
        [-HealthStatus <HealthStatus[]>]
        [-StorageNode <CimInstance>]
        [-PhysicallyConnected]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByStorageNode
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageEnclosure
        [-Manufacturer <String[]>]
        [-Model <String[]>]
        [-HealthStatus <HealthStatus[]>]
        [-StorageSubSystem <CimInstance>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByStorageSubSystem
  isDefault: false
outputs:
- name: <xref href="MSFT_StorageEnclosure" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an array of **StorageEnclosure** objects.
examples:
- title: 'Example 1: Get all enclosures'
  description: |-
    ```
    PS C:\>Get-StorageEnclosure
    ```

    This command gets all the enclosures visible to your computer.
- title: 'Example 2: Get an enclosure by using a friendly name'
  description: |-
    ```
    PS C:\>Get-StorageEnclosure -FriendlyName "E1"
    ```

    This command gets the enclosure named E1.
- title: 'Example 3: Get an enclosure by using an ID'
  description: |-
    ```
    PS C:\>Get-StorageEnclosure -UniqueId "{b2c21800-b833-11e2-9981-806e6f6e6963}"
    ```

    This command gets the enclosure that has the specified **UniqueId**.
- title: 'Example 4: Get unhealthy enclosures'
  description: |-
    ```
    PS C:\>Get-StorageEnclosure -HealthStatus "Unhealthy"
    ```

    This command gets enclosures that have the health status of Unhealthy.
- title: 'Example 5: Get enclosures from a manufacturer'
  description: |-
    ```
    PS C:\>Get-StorageEnclosure -Manufacturer "Fabrikam"
    ```

    This command gets enclosures from a specific manufacturer.
- title: 'Example 6: Get an enclosure that contains a specified disk'
  description: |-
    ```
    PS C:\>Get-PhysicalDisk -FriendlyName "PhysicalDisk35" | Get-StorageEnclosure
    ```

    This command uses the **Get-PhysicalDisk** cmdlet to get the disk named PhysicalDisk35, and then passes that object to the current cmdlet by using the pipeline operator.
    The current cmdlet gets the enclosure that contains the disk named PhysicalDisk35.
- title: 'Example 7: Get enclosures attached to a storage node'
  description: |-
    ```
    PS C:\>Get-StorageNode -Name "Node14" | Get-StorageEnclosure
    ```

    This command uses the **Get-StorageNode** cmdlet to get the storage node named Node14, and then passes that object to the current cmdlet by using the pipeline operator.
    The current cmdlet gets enclosures attached to the node named Node14.
- title: 'Example 8: Get enclosures on a subsystem'
  description: |-
    ```
    PS C:\>Get-StorageSubSystem -FriendlyName "Clustered storage spaces on main cluster" | Get-StorageEnclosure
    ```

    This command uses the **Get-StorageSubSystem** cmdlet to get the storage subsystem that has the specified friendly name, and then passes that object to the current cmdlet by using the pipeline operator.
    The current cmdlet gets enclosures on the specified subsystem.
