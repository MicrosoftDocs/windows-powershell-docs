### YamlMime:PowerShellCmdlet1
uid: Storage.Get-StorageReliabilityCounter
name: Get-StorageReliabilityCounter
module: Storage
isPreview: false
summary: |-
  Gets storage reliability counters.
description: |-
  The **Get-StorageReliabilityCounter** cmdlet gets the storage reliability counters for the specified disk or physical disk.
  These counters include information about such things as the device temperature, errors, wear, and length of time the device has been in use.
notes: |-
  * When used in Failover Cluster, cmdlets from the Storage module operate on cluster level (all servers in the cluster).
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Disk
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a disk for which to get storage reliability counters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDisk
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalDisk
    type: <xref href="CimInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the physical disk object for which to get storage reliability counters.
      Enter a PhysicalDisk CIM object.

      PhysicalDisk objects represent physical disks attached to a storage subsystem and located in a storage pool.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPhysicalDisk
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-StorageReliabilityCounter
        -PhysicalDisk <CimInstance>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByPhysicalDisk
  isDefault: false
- syntax: |-
    ```Syntax
    Get-StorageReliabilityCounter
        -Disk <CimInstance>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: ByDisk
  isDefault: false
inputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_PhysicalDisk" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an MSFT_PhysicalDisk object to the *PhysicalDisk* parameter to get the storage reliability counters for the specified physical disk.
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_Disk" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an MSFT_Disk object to the *Disk* parameter to get the storage reliability counters for the specified disk.
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#ROOT/Microsoft/Windows/Storage/MSFT_StorageReliabilityCounter" data-throw-if-not-resolved="False" />
  description: |-
    The **Get-StorageReliabilityCounter** cmdlet returns a StorageReliabilityCounter object, or an array of StorageReliabilityCounter objects.
examples:
- title: 'Example 1: Get the counters for a specified physical disk'
  description: |-
    ```
    PS C:\>Get-PhysicalDisk -FriendlyName "PhysicalDisk8" | Get-StorageReliabilityCounter | Format-List

    ObjectId                : {e24dbc00-a448-11e1-a100-806e6f6e6963}:reliabilitycounter
    PassThroughClass        :
    PassThroughIds          :
    PassThroughNamespace    :
    PassThroughServer       :
    UniqueId                : {e24dbc00-a448-11e1-a100-806e6f6e6963}:reliabilitycounter
    DeviceId                : 8
    LoadUnloadCycleCount    : 224
    LoadUnloadCycleCountMax : 300000
    ManufactureDate         : Year: 2011 Week: 33
    PowerOnHours            : 0
    ReadErrorsCorrected     : 0
    ReadErrorsTotal         : 0
    ReadErrorsUncorrected   : 0
    StartStopCycleCount     : 80
    StartStopCycleCountMax  : 10000
    Temperature             : 28
    TemperatureMax          : 68
    Wear                    :
    WriteErrorsCorrected    : 0
    WriteErrorsTotal        : 0
    WriteErrorsUncorrected  : 0
    PSComputerName          :
    ```

    This command gets the physical disk named PhysicalDisk8, and uses the pipeline operator to pass it to Get-StorageReliabilityCounter, which gets all of its storage reliability counters through another pipeline with Format-List.
