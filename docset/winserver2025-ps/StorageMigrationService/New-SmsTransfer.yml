syntaxes:
- syntax: |-
    ```Syntax
    New-SmsTransfer
        -DestinationCredential <PSCredential>
        [-SourceCredential <PSCredential>]
        [-TransferType <TransferType>]
        [-MaxDuration <Int32>]
        [-FileRetryIntervalInSec <Int32>]
        [-FileRetryCount <Int32>]
        [-ExcludeDataSecurity]
        [-ExcludeLocalPrincipals]
        [-SecurityMigrationOption <SecurityMigrationOptions>]
        [-SkipMovePreExisting]
        [-ChecksumType <TransferChecksumType>]
        [-OrchestratorComputerName <String>]
        [-OrchestratorPort <Int32>]
        [-Credential <PSCredential>]
        [-SourceHostUsername <String>]
        [-SourceHostPassword <SecureString>]
        [-SourceHostPrivateKey <SecureString>]
        [-SourceHostPassphrase <SecureString>]
        [-SourceHostFingerprint <String>]
        [-Overwrite]
        [-OverrideTransferValidation <Boolean>]
        [-Force]
        [-Name] <String>
        [<CommonParameters>]
    ```
