syntaxes:
- syntax: |-
    ```Syntax
    Set-SmsInventory
        [-Name] <String>
        [-SourceCredential <PSCredential>]
        [-IncludeAdminShares <Boolean>]
        [-OrchestratorComputerName <String>]
        [-OrchestratorPort <Int32>]
        [-Credential <PSCredential>]
        [-SourceHostUsername <String>]
        [-SourceHostPassword <SecureString>]
        [-SourceHostPrivateKey <SecureString>]
        [-SourceHostPassphrase <SecureString>]
        [-SourceHostFingerprint <String>]
        [-Force]
        [-IncludeDFSN <Boolean>]
        [-IncludeDFSR <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: None
  isDefault: true
- syntax: |-
    ```Syntax
    Set-SmsInventory
        [-Name] <String>
        [-ComputerName <String[]>]
        [-SourceCredential <PSCredential>]
        [-IncludeAdminShares <Boolean>]
        [-OrchestratorComputerName <String>]
        [-OrchestratorPort <Int32>]
        [-Credential <PSCredential>]
        [-SourceHostUsername <String>]
        [-SourceHostPassword <SecureString>]
        [-SourceHostPrivateKey <SecureString>]
        [-SourceHostPassphrase <SecureString>]
        [-SourceHostFingerprint <String>]
        [-Force]
        [-IncludeDFSN <Boolean>]
        [-IncludeDFSR <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Manual Scan
  isDefault: false
