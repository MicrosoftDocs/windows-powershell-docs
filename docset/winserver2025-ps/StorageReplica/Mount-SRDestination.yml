syntaxes:
- syntax: |-
    ```Syntax
    Mount-SRDestination
        [[-ComputerName] <String>]
        [-Name] <String>
        [-TemporaryPath] <String>
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
