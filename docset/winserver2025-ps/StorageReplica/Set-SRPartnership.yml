syntaxes:
- syntax: |-
    ```Syntax
    Set-SRPartnership
        [[-SourceComputerName] <String>]
        [-SourceRGName] <String>
        [-SourceAddVolumePartnership] <String[]>
        [-DestinationComputerName] <String>
        [-DestinationRGName] <String>
        [-DestinationAddVolumePartnership] <String[]>
        [-Seeded]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AddVolumes
  isDefault: true
- syntax: |-
    ```Syntax
    Set-SRPartnership
        [[-SourceComputerName] <String>]
        [-SourceRGName] <String>
        [-DestinationComputerName] <String>
        [-DestinationRGName] <String>
        [[-ReplicationMode] <ReplicationMode>]
        [[-LogSizeInBytes] <UInt64>]
        [[-AsyncRPO] <UInt32>]
        [[-Encryption] <Boolean>]
        [[-Compression] <Boolean>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ModifySettings
  isDefault: false
- syntax: |-
    ```Syntax
    Set-SRPartnership
        [-SourceRGName] <String>
        [-DestinationComputerName] <String>
        [-DestinationRGName] <String>
        [[-NewSourceComputerName] <String>]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ModifyPartnership
  isDefault: false
