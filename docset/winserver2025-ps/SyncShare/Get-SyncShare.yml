### YamlMime:PowerShellCmdlet1
uid: SyncShare.Get-SyncShare
name: Get-SyncShare
module: SyncShare
isPreview: false
summary: |-
  Gets one or more Sync Shares.
description: |-
  The **Get-SyncShare** cmdlet gets one or more Sync Shares and displays their settings.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job. Use this parameter to run commands that take a long time to complete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of Sync Shares that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a Virtual Computer Object (VCO), if the server is part of a cluster.
      Use this parameter to return the Sync Shares that belong to a VCO.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-SyncShare
        [[-Name] <String[]>]
        [-Scope <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="SyncShare" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all Sync Shares on a server'
  description: |-
    ```
    PS C:\> Get-SyncShare
    ConflictResolutionPolicy : KeepBoth
    Description              :
    DevicePolicy             : t1
    Enabled                  : True
    ExclusiveAccessToUser    : True
    Name                     : t1
    Path                     : c:\t1
    StagingFolder            : c:\EcsStagingArea\t1
    StagingQuota             : 1099511627776
    StagingQuotaPerUser      : 10737418240
    Type                     : User Data
    User                     : {users}
    UserFolderName           : %username%
    PSComputerName           :
    ConflictResolutionPolicy : KeepBoth
    Description              :
    DevicePolicy             : Contoso-share01
    Enabled                  : True
    ExclusiveAccessToUser    : True
    Name                     : Contoso-share01
    Path                     : K:\Share1
    StagingFolder            : K:\EcsStagingArea\Contoso-share01
    StagingQuota             : 1099511627776
    StagingQuotaPerUser      : 10737418240
    Type                     : User Data
    User                     : {EngGroup}
    UserFolderName           : %username%
    PSComputerName           :
    ```

    This command gets all of the Sync Shares on the server.
- title: 'Example 2: Get a specific Sync Share'
  description: |-
    ```
    PS C:\> Get-SyncShare Contoso-share01
    ConflictResolutionPolicy : KeepBoth
    Description              :
    DevicePolicy             : Contoso-share01
    Enabled                  : True
    ExclusiveAccessToUser    : True
    Name                     : Contoso-share01
    Path                     : K:\Share01
    StagingFolder            : K:\EcsStagingArea\Contoso-share01
    StagingQuota             : 1099511627776
    StagingQuotaPerUser      : 10737418240
    Type                     : User Data
    User                     : {EngGroup}
    UserFolderName           : %username%
    PSComputerName           :
    ```

    This command gets the Sync Share named Contoso-share01.
