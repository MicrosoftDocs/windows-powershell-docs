syntaxes:
- syntax: |-
    ```Syntax
    Repair-SyncShare
        [-Name] <String[]>
        [-User] <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Query (cdxml)
  isDefault: true
- syntax: |-
    ```Syntax
    Repair-SyncShare
        [-User] <String>
        -InputObject <CimInstance[]>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject (cdxml)
  isDefault: false
inputs:
- name: <xref href="SyncShare" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe an array of **SyncShare** objects to the *InputObject* parameter.
outputs:
- name: <xref href="SyncShare" data-throw-if-not-resolved="False" />
  description: |-
    If you specify the *PassThru* parameter, this cmdlet outputs an array of objects that represent the repaired Sync Shares.
examples:
- title: 'Example 1: Configure a Sync Share to be repaired'
  description: |-
    ```
    PS C:\>Repair-SyncShare -Name "FinanceSyncShare" -User "Contoso\EvanNarvaez"
    ```

    This command configures the sync share named FinanceSyncShare to repair the synchronization metadata for the user named Evan Narvaez.
