### YamlMime:PowerShellCmdlet1
uid: UEV.Disable-UevAppxPackage
name: Disable-UevAppxPackage
module: UEV
isPreview: false
summary: |-
  Disables UE-V synchronization of Windows 8 apps.
description: |-
  The **Disable-UevAppxPackage** cmdlet disables Microsoft User Experience Virtualization (UE-V) synchronization of Windows® 8 apps.
  The cmdlet adds a setting to the computer or user sections of the registry that disables the package family names of Windows 8 apps that you specify.
  If you do not specify the *Computer* or *CurrentComputerUser* parameters, the cmdlet disables the package family names of Windows 8 apps for the current user.
parameters:
  cmdletParameters:
  - name: Computer
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet disables the Windows 8 apps that you specify for all users on the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ParameterSetComputer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CurrentComputerUser
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet disables the Windows 8 apps that you specify for the current user only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ParameterSetUser
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PackageFamilyName
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of package families.
      The cmdlet disables the package families of Windows 8 apps that you specify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Disable-UevAppxPackage
        [-PackageFamilyName] <String[]>
        [-CurrentComputerUser]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ParameterSetUser
  isDefault: true
- syntax: |-
    ```Syntax
    Disable-UevAppxPackage
        [-PackageFamilyName] <String[]>
        [-Computer]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ParameterSetComputer
  isDefault: false
examples:
- title: 'Example 1: Disable synchronization of a Windows 8 app'
  description: |-
    ```
    PS C:\>Disable-UevAppxPackage -Computer -PackageFamilyName "Microsoft.BingFinance"
    ```

    This command disables synchronization of the Bing Finance app for all users on the computer.
