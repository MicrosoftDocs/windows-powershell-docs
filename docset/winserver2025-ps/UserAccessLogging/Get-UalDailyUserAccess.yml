syntaxes:
- syntax: |-
    ```Syntax
    Get-UalDailyUserAccess
        [-ProductName <String[]>]
        [-RoleName <String[]>]
        [-RoleGuid <String[]>]
        [-Username <String[]>]
        [-AccessDate <DateTime[]>]
        [-AccessCount <UInt32[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get daily usage for a specific user'
  description: |-
    ```
    PS C:\>Get-UalDailyUserAccess -Username "western\sarahjones"
    AccessCount    : 1

    AccessDate     : 8/17/2012

    UserName       : western\sarahjones

    ProductName    : Windows Server 2012 Datacenter

    RoleGuid       : 10a9226f-50ee-49d8-a393-9a501d47ce04

    RoleName       : File Server

    PSComputerName :


    AccessCount    : 1

    AccessDate     : 8/27/2012

    UserName       : western\sarahjones

    ProductName    : Windows Server 2012 Datacenter

    RoleGuid       : 10a9226f-50ee-49d8-a393-9a501d47ce04

    RoleName       : File Server

    PSComputerName :
    ```

    This command gets the UAL records for a client user with a specified name.
    The results show access requests on sample dates 8/17/2012 and 8/27/2012.
