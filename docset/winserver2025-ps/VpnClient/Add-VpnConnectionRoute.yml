### YamlMime:PowerShellCmdlet1
uid: VpnClient.Add-VpnConnectionRoute
name: Add-VpnConnectionRoute
module: VpnClient
isPreview: false
summary: |-
  Adds a route to a VPN connection.
description: |-
  The **Add-VpnConnectionRoute** cmdlet adds an IPv4 or IPv6 route to a specified VPN connection.
parameters:
  cmdletParameters:
  - name: AllUserConnection
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the VPN connection being modified is in the global phone book.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
