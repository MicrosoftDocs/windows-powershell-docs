syntaxes:
- syntax: |-
    ```Syntax
    Set-VpnConnectionTriggerDnsConfiguration
        [-ConnectionName] <String>
        [[-DnsSuffix] <String>]
        [[-DnsIPAddress] <String[]>]
        [[-DnsSuffixSearchList] <String[]>]
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
