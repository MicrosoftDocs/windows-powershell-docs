syntaxes:
- syntax: |-
    ```Syntax
    Set-VpnConnectionTriggerTrustedNetwork
        [-ConnectionName] <String>
        [-DefaultDnsSuffixes]
        [-PassThru]
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
