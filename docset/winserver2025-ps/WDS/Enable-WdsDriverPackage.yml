### YamlMime:PowerShellCmdlet1
uid: WDS.Enable-WdsDriverPackage
name: Enable-WdsDriverPackage
module: WDS
isPreview: false
summary: |-
  Enables a driver package in the Windows Deployment Services driver store.
description: |-
  The **Enable-WdsDriverPackage** cmdlet enables a driver package in the Windows Deployment Services driver store.
  Specify a driver package by its unique name or ID.

  While a driver package is enabled, clients that request the package can install it.
  Clients must have access to at least one driver group that contains the driver package in order to install it.

  When you add a driver package to the Windows Deployment Services driver store by using the Import-WdsDriverPackage cmdlet, the driver package is enabled.
  Use the Disable-WdsDriverPackage cmdlet disable a driver package.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
      Use this parameter to run commands that take a long time to complete.
       The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.
       For more information about Windows PowerShell® background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an ID.
      This is the ID of the driver package to enable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DriverPackageId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name.
      This is the unique name of the driver package.
      If this name is not unique, specify the driver package ID, instead, by using the *Id* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DriverPackageName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-WdsDriverPackage
        -Id <Guid>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: DriverPackageId
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-WdsDriverPackage
        -Name <String>
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: DriverPackageName
  isDefault: false
outputs:
- name: <xref href="Microsoft.Management.Infrastructure.CimInstance#MSFT_WdsDriverPackage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable a driver package by using a package ID'
  description: |-
    ```
    PS C:\> Enable-WdsDriverPackage -Id 32d78628-07fb-4e18-adc4-f0ecf8b41bbe
    ```

    This command enables the driver package that has the specified ID.
- title: 'Example 2: Enable a driver package by name'
  description: |-
    ```
    PS C:\>Enable-WdsDriverPackage -Name "Fabrikam Device Driver (x64)"
    ```

    This command enables the driver package named Fabrikam Device Driver (x64).
    This name must be unique.
