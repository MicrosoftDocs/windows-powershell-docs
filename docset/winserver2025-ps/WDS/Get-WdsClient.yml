### YamlMime:PowerShellCmdlet1
uid: WDS.Get-WdsClient
name: Get-WdsClient
module: WDS
isPreview: false
summary: |-
  Gets client devices from the pending device database, or pre-staged devices from Active Directory or the stand-alone server device database.
description: |-
  The **Get-WdsClient** cmdlet gets client devices from the Pending Device database, or pre-staged clients from Active Directory® Domain Services (AD DS) or the stand-alone server device database.

  You can get client devices or pre-staged clients by specifying a name or an ID.
  An ID is a GUID, media access control (MAC) address, or Dynamic Host Configuration Protocol (DHCP) identifier associated with the computer.

  When you get clients from AD DS, you can specify a client within AD DS domain of the server that runs Windows Deployment Services, in a specified domain, or anywhere in the current AD DS forest.

  To get pre-staged clients from the Pending Devices database, specify whether to get devices that are approved, denied, or pending.
parameters:
  cmdletParameters:
  - name: AsJob
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the cmdlet as a background job.
      Use this parameter to run commands that take a long time to complete.
       The cmdlet immediately returns an object that represents the job and then displays the command prompt.
      You can continue to work in the session while the job completes.
      To manage the job, use the `*-Job` cmdlets.
      To get the job results, use the [Receive-Job](https://go.microsoft.com/fwlink/?LinkID=113372) cmdlet.
       For more information about Windows PowerShell® background jobs, see [about_Jobs](https://go.microsoft.com/fwlink/?LinkID=113251).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CimSession
    type: <xref href="CimSession" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Runs the cmdlet in a remote session or on a remote computer.
      Enter a computer name or a session object, such as the output of a [New-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227967) or [Get-CimSession](https://go.microsoft.com/fwlink/p/?LinkId=227966) cmdlet.
      The default is the current session on the local computer.
    aliases:
    - Session
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceID
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the computer.
      This identifier is the GUID of a network adapter, a MAC address, or a DHCP unique identifier associated with the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PrestagedClientByDeviceIdSearchForest
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceIdDomain
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceId
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the computer associated with the pre-staged client.
      This is a **sAMAccountName** value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PrestagedClientByDeviceName
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceNameDomain
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceNameSearchForest
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Domain
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet refers to pre-staged clients in the domain specified by the *DomainName* parameter, instead of the domain of the server that runs Windows Deployment Services or the whole forest.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PrestagedClientByDeviceIdDomain
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceNameDomain
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DomainName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a domain name.
      Specify a value for this parameter only if you specify the *Domain* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PrestagedClientByDeviceIdDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceNameDomain
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PendingClientStatus
    type: <xref href="PendingClientStatusFlag" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a pending client status.
      The acceptable values for this parameter are:

      - Any
      - Approved
      - Denied
      - Pending
    acceptedValues:
    - Pending
    - Approved
    - Denied
    - Any
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PendingClientByStatus
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequestId
    type: <xref href="UInt32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the request ID that the server that runs Windows Deployment Services allocates to a device in the Pending Device database.
      If you do not specify this parameter, the cmdlet gets all devices that match the value specified in the *PendingClientStatus* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PendingClientByRequestId
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SearchForest
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet refers to pre-staged devices anywhere in the current AD DS forest.
      If you do not specify this parameter and do not specify the *Domain* parameter, the cmdlet looks for pre-staged devices in the local domain.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PrestagedClientByDeviceIdSearchForest
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PrestagedClientByDeviceNameSearchForest
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThrottleLimit
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of concurrent operations that can be established to run the cmdlet.
      If this parameter is omitted or a value of `0` is entered, then Windows PowerShell® calculates an optimum throttle limit for the cmdlet based on the number of CIM cmdlets that are running on the computer.
      The throttle limit applies only to the current cmdlet, not to the session or to the computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
