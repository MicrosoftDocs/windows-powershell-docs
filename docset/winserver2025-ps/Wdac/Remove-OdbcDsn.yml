syntaxes:
- syntax: |-
    ```Syntax
    Remove-OdbcDsn
        [-InputObject] <CimInstance[]>
        [-PassThru]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-OdbcDsn
        [-Name] <String>
        -DsnType <String>
        [-PassThru]
        [-DriverName <String>]
        [-Platform <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
