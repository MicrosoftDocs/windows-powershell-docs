syntaxes:
- syntax: |-
    ```Syntax
    Set-OdbcDriver
        [-InputObject] <CimInstance[]>
        [-PassThru]
        [-SetPropertyValue <String[]>]
        [-RemovePropertyValue <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-OdbcDriver
        [-Name] <String>
        [-PassThru]
        [-SetPropertyValue <String[]>]
        [-RemovePropertyValue <String[]>]
        [-Platform <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
