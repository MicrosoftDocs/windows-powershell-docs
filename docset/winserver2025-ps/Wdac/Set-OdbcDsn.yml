syntaxes:
- syntax: |-
    ```Syntax
    Set-OdbcDsn
        [-InputObject] <CimInstance[]>
        [-PassThru]
        [-SetPropertyValue <String[]>]
        [-RemovePropertyValue <String[]>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-OdbcDsn
        [-Name] <String>
        -DsnType <String>
        [-PassThru]
        [-SetPropertyValue <String[]>]
        [-RemovePropertyValue <String[]>]
        [-DriverName <String>]
        [-Platform <String>]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
