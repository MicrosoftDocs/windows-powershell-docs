  cmdletParameters:
  - name: AtElement
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the element at which this cmdlet inserts the value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AtIndex
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the index at which this cmdlet inserts the property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AtName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the property name at which this cmdlet inserts the property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Clr
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the .NET Framework in the form vn.n, such as v4.0 or v2.0.
      The default is v4.0.
      Specify this parameter only when the *PSPath* parameter is set to either Machine or Machine/Webroot.
      If *PSPath* is not set to one of these values and the *Clr* parameter is set, Windows PowerShell ignores the value of *Clr* and returns a warning.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
