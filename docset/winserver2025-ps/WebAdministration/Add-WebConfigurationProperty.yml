syntaxes:
- syntax: |-
    ```Syntax
    Add-WebConfigurationProperty
        -Name <String>
        [-Type <String>]
        [-Value <PSObject>]
        [-Clr <String>]
        [-AtElement <Hashtable>]
        [-AtIndex <Int32>]
        [-AtName <String>]
        [-Force]
        [-Location <String[]>]
        [-Filter] <String[]>
        [[-PSPath] <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Adding a default document'
  description: |-
    ```
    IIS:\> Add-WebConfigurationProperty -Filter "//defaultDocument/files" -PSPath "IIS:\sites\Default Web Site" -AtIndex 0 -Name "Collection" -Value "new-index.html"
    ```

    This command adds a new default document named new-index.html to the top of the list of existing documents.
