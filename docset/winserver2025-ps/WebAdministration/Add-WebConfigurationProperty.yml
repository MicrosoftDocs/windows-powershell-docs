### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Add-WebConfigurationProperty
name: Add-WebConfigurationProperty
module: WebAdministration
isPreview: false
summary: |-
  Adds a property to an IIS configuration section.
description: |-
  The **Add-WebConfigurationProperty** cmdlet adds a property to an Internet Information Services (IIS) configuration section.
  Globbing is supported.
