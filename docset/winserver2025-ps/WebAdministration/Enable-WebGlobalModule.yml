### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Enable-WebGlobalModule
name: Enable-WebGlobalModule
module: WebAdministration
isPreview: false
summary: |-
  Enables an IIS module.
description: |-
  The **Enable-WebGlobalModule** cmdlet enables the specified Internet Information Services (IIS) module.
parameters:
  cmdletParameters:
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the module to be enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="PSObject" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an input object that contains the module information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the location in which this cmdlet enables the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the module to enable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputProperties
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Precondition
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a precondition for the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputProperties
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the configuration path.
      This path can be either an IIS configuration path in the format computer name/webroot/apphost, or the IIS module path in the format IIS:\sites\Default Web Site.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the managed type of the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputProperties
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-WebGlobalModule
        [-Name] <String>
        [[-PSPath] <String[]>]
        [-Type <String>]
        [-Precondition <String>]
        [-Force]
        [-Location <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: InputProperties
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-WebGlobalModule
        [[-PSPath] <String[]>]
        -InputObject <PSObject>
        [-Force]
        [-Location <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
examples:
- title: 'Example 1: Enable a module for a site'
  description: |-
    ```
    IIS:\> Enable-WebGlobalModule -Name "UriCacheModule" -PSPath "IIS:\sites\Default Web Site"
    ```

    This command enables the module named UriCacheModule for the default website.
