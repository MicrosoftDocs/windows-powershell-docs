### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebAppPoolState
name: Get-WebAppPoolState
module: WebAdministration
isPreview: false
summary: |-
  Gets the run-time state of an IIS application pool.
description: |-
  The **Get-WebAppPoolState** cmdlet gets the run-time state of an Internet Information Services (IIS) application pool.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the application pool for which the state is returned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebAppPoolState
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the run-time state of the DefaultAppPool'
  description: |-
    ```
    IIS:\> Get-WebAppPoolState -Name "DefaultAppPool"
    Value

    -----

    Started
    ```

    This command gets the run-time state of the DefaultAppPool.
