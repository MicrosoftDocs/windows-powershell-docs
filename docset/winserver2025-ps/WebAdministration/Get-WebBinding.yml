### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebBinding
name: Get-WebBinding
module: WebAdministration
isPreview: false
summary: |-
  Gets the bindings on an IIS site.
description: |-
  The **Get-WebBinding** cmdlet gets information about the bindings configured on an Internet Information Services (IIS) site, such as protocol and port number.
parameters:
  cmdletParameters:
  - name: HostHeader
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name for which the binding is configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address for which the binding is configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the site for which this cmdlet returns binding information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port for which the binding is configured.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol for which the binding is configured.
      The protocol is usually HTTP, HTTPS, or FTP.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebBinding
        [[-Name] <String>]
        [-Protocol <String>]
        [-Port <String>]
        [-IPAddress <String>]
        [-HostHeader <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.IIs.PowerShell.Framework.ConfigurationElement#bindings#binding" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the site bindings of the default website'
  description: |-
    ```
    IIS:\> Get-WebBinding -Name "Default Web Site"
    ```

    This command gets the bindings configured on the default website.
