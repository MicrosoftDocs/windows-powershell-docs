### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebConfigFile
name: Get-WebConfigFile
module: WebAdministration
isPreview: false
summary: |-
  Gets the file system path of the web.config file.
description: |-
  The **Get-WebConfigFile** cmdlet gets the physical path of the Internet Information Services (IIS) configuration file at the specified IIS module namespace path.
parameters:
  cmdletParameters:
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the IIS module namespace path to the site that contains the Web.config file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebConfigFile
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Open the Web.config file for the default website'
  description: |-
    ```
    IIS:\> Notepad (Get-WebConfigFile -PSPath "IIS:\Sites\Default Web Site")
    ```

    This command uses Notepad to open the Web.config file for the default website.
