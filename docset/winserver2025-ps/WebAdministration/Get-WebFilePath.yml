### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Get-WebFilePath
name: Get-WebFilePath
module: WebAdministration
isPreview: false
summary: |-
  Gets the physical path to the location of the specified IIS module.
description: |-
  The **Get-WebFilePath** cmdlet gets the physical path to the location of the specified Internet Information Services (IIS) module.
parameters:
  cmdletParameters:
  - name: PSPath
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an IIS configuration path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WebFilePath
        [[-PSPath] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the physical path of the default website'
  description: |-
    ```
    IIS:\> Get-WebFilePath -PSPath "IIS:\Sites\Default Web Site"
    Directory: Microsoft.PowerShell.Core\FileSystem::C:\inetpub

    Mode    LastWriteTime        Length    Name
    ----    -------------        ------    ----
    d----   7/28/2008 9:40 PM              wwwroot
    ```

    This command retrieves the physical path for the default website.
