syntaxes:
- syntax: |-
    ```Syntax
    Get-WebURL
        [[-PSPath] <String[]>]
        [-Accept <String>]
        [-ResponseHeaders]
        [-Content]
        [<CommonParameters>]
    ```
  parameterSetName: InputPSPath
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WebURL
        [[-Url] <Uri[]>]
        [-Accept <String>]
        [-ResponseHeaders]
        [-Content]
        [<CommonParameters>]
    ```
  parameterSetName: InputURL
  isDefault: false
examples:
- title: 'Example 1: Request the default website'
  description: |-
    ```
    IIS:\> Get-WebURL -PSPath "IIS:\Sites\Default Web Site"
    ResponseUri       Contents
    -----------       --------
    http://localhost/ <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN".
    ```

    This command returns data about the default website.
