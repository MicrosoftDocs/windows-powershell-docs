      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the configuration location that this cmdlet removes.
    defaultValue: None
    dontShow: false
    isDynamic: false
