### YamlMime:PowerShellCmdlet1
uid: WebAdministration.Restart-WebAppPool
name: Restart-WebAppPool
module: WebAdministration
isPreview: false
summary: |-
  Restarts an application pool.
description: |-
  The **Restart-WebAppPool** cmdlet restarts the specified application pool.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the application pool to restart.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Restart-WebAppPool
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Restart an application pool'
  description: |-
    ```
    IIS:\> Restart-WebAppPool -Name "DefaultAppPool"
    ```

    This command restarts the application pool named DefaultAppPool.
