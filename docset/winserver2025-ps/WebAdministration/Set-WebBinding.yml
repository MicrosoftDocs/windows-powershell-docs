syntaxes:
- syntax: |-
    ```Syntax
    Set-WebBinding
        [[-Name] <String>]
        [[-IPAddress] <String>]
        [[-Port] <UInt32>]
        -PropertyName <String>
        -Value <String>
        [-HostHeader <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputBindingProperties
  isDefault: true
- syntax: |-
    ```Syntax
    Set-WebBinding
        [[-Name] <String>]
        [-BindingInformation] <String>
        -PropertyName <String>
        -Value <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputBindingInformation
  isDefault: false
examples:
- title: 'Example 1: Change a web site binding property'
  description: |-
    ```
    IIS:\> Set-WebBinding -Name "Default Web Site" -BindingInformation "*:80:" -PropertyName "Port" -Value "1234"
    ```

    This command changes the setting for the **Port** property for the default website from 80 to 1234.
