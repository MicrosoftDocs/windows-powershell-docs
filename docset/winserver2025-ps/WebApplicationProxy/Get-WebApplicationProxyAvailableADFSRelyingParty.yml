syntaxes:
- syntax: |-
    ```Syntax
    Get-WebApplicationProxyAvailableADFSRelyingParty
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
