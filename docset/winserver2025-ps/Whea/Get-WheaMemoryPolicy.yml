### YamlMime:PowerShellCmdlet1
uid: Whea.Get-WheaMemoryPolicy
name: Get-WheaMemoryPolicy
module: Whea
isPreview: false
summary: |-
  Gets the WHEA memory policies for a computer.
description: |-
  The **Get-WheaMemoryPolicy** cmdlet gets the Windows Hardware Error Architecture (WHEA) memory policies in effect on a local or remote computer.
parameters:
  cmdletParameters:
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the remote computer from which to retrieve policy information.
      If you do not specify a computer name, the command returns the policy of the local computer.
      The alias for *ComputerName* is cn.
    aliases:
    - CN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WheaMemoryPolicy
        [-ComputerName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="WheaMemoryPolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the WHEA memory policy settings from the local computer'
  description: |-
    ```
    PS C:\> Get-WHEAMemoryPolicy
    DisableOffline : False
    DisablePFA : False
    PersistMemoryOffline : True
    PFAPageCount : 64
    PFAErrorThreshold : 16
    PFATimeOut : 86400
    ```

    This command gets WHEA memory policy values from the local computer as a **WheaMemoryPolicy** object.
