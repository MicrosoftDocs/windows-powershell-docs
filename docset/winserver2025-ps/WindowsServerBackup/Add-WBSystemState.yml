### YamlMime:PowerShellCmdlet1
uid: WindowsServerBackup.Add-WBSystemState
name: Add-WBSystemState
module: WindowsServerBackup
isPreview: false
summary: |-
  Adds the system state components to the backup policy.
description: |-
  The **Add-WBSystemState** cmdlet adds the system state components to a policy contained in the specified **WBPolicy** object.
  Use backups created through this policy to perform a system state recovery.

  The **WBPolicy** object must be in edit mode.
  To put the **WBPolicy** object in edit mode for a policy that is set as the scheduled backup policy, use the [Get-WBPolicy](./Get-WBPolicy.yml) cmdlet with the *Editable* parameter.
  The [New-WBPolicy](./New-WBPolicy.yml) cmdlet creates a new **WBPolicy** object that is already in edit mode.

  To use this cmdlet, you must be a member of the Administrators group or Backup Operators group.
parameters:
  cmdletParameters:
  - name: Policy
    type: <xref href="WBPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **WBPolicy** object that contains the backup policy to update.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-WBSystemState
        [-Policy] <WBPolicy>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Windows.ServerBackup.Commands.WBPolicy" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add system state to the backup policy'
  description: |-
    ```
    PS C:\> $Policy = Get-WBPolicy -Editable
    PS C:\> Add-WBSystemState -Policy $Policy
    ```

    This example adds a setting to the **WBPolicy** object to include the system state in backups that you create by using this policy.

    The first command stores the result of the **Get-WBPolicy** cmdlet in the variable named $Policy.

    The second command adds the system state to the backup policy in the $Policy variable.
