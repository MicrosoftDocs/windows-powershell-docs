### YamlMime:PowerShellCmdlet1
uid: WindowsServerBackup.Get-WBSchedule
name: Get-WBSchedule
module: WindowsServerBackup
isPreview: false
summary: |-
  Gets the current schedule for backups.
description: |-
  The **Get-WBSchedule** cmdlet gets the current schedule for backups in the **WBPolicy** object.
  Backups run daily at the times specified in the schedule.
  To change the schedule, use the [Set-WBSchedule](./Set-WBSchedule.yml) cmdlet.

  To use this cmdlet, you must be a member of the Administrators group or Backup Operators group.
parameters:
  cmdletParameters:
  - name: Policy
    type: <xref href="WBPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **WBPolicy** object to display.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WBSchedule
        [-Policy] <WBPolicy>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Windows.ServerBackup.Commands.WBPolicy" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the scheduled backup times'
  description: |-
    ```
    PS C:\> $Policy = Get-WBPolicy
    PS C:\> Get-WBSchedule -Policy $Policy
    ```

    This example gets the scheduled backup times from the **WBPolicy** object.

    The first command stores the result of the [Get-WBPolicy](./Get-WBPolicy.yml) in the variable named $Policy.

    The second command gets the backup schedule from the backup policy object.
