syntaxes:
- syntax: |-
    ```Syntax
    Restore-ACL
        [-Path] <String>
        -XmlPath <String>
        -LogPath <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
